body:
  text: 何文簡疏議卷三明何孟春撰乞恩分豁疏奏為糧價不敷乞恩分豁事案查先據開封等府通判等官王淮等連名呈前事據永城等縣山海等倉大戶盧士原等各告稱京邊倉場糧草價值髙貴俱各賠銀數多等情已經臣通查備呈户部轉奏去後續承準本部照會為價輕賠重乞憐民困事該本部題準山海紫荆關新城浮圖峪口唐縣新興密雲龍慶石匣古北喜峯口等七倉粟米唐縣新興軍城二倉小麥俱照原來批申內開價銀數目開送各倉委官監督照數稱收遇放官軍月糧等因備行到臣除遵依外今查得邊糧隆慶等倉見寫價值隆慶衛粟米每石原價九錢今用銀一兩二錢陸礬倉粟米每石原價六錢今用銀一兩二錢昌平縣黃花鎮倉粟米每石原價八錢五分今用銀一兩一錢保定府廣盈左右二倉粟米每石原價六錢今用銀九錢七分涿州常盈倉粟米每石原價六錢今用銀九錢七分良鄉縣豐濟倉粟米每石原價六錢今用銀一兩五分白羊口巡檢司黑豆每石原價六錢今用銀八錢保定府易州倉大麥每石原價六錢今用銀一兩五分廣盈左右二倉小麥每石原價六錢今用銀九錢及在內京倉粟米每石原價八錢五分今用銀一兩一錢五分光祿寺粟米每石原價九錢今用銀一兩二錢粟榖準米每石原價一兩一錢今用銀一兩九錢京倉黑豆每石原價六錢今用銀七錢四分御馬倉黑豆每石原價七錢五分今用銀九錢二分埧上倉黑豆每石原價六錢今用銀一兩二錢埧上北倉鄭家莊馬房金盞兒甸倉黑豆每石原價六錢今用銀八錢四分北髙倉湯山草場倉峪口張家莊馬房倉黑豆每石原價六錢今用銀八錢三分南石渠西倉黃土倉泳永旱石橋南倉南石渠倉峪口官莊馬房倉黑豆每石原價六錢今用銀八錢酒醋麵局黃豆每石原價一兩今用銀一兩四錢九分光祿寺埧上倉埧上南北倉北髙倉菉豆每石原價九錢今用銀一兩七分御馬倉菉豆每石原價一兩今用銀一兩二錢司牧局司牲司菉豆每石原價九錢今用銀一兩供用庫芝麻每石原價一兩三錢五分今用銀一兩七錢五分酒醋麵局小麥每石原價一兩一錢今用銀一兩五錢五分埧上東馬房倉大麥每石原價六錢今用銀九錢八分御馬倉大麥每石原價七錢今用銀一兩一錢豌豆每石原價九錢今用銀一兩四錢埧上倉埧上北倉草每束原價四分今用銀五分五釐義河倉北髙倉南石渠倉鄭家莊馬房倉草每束原價四分今用銀四分八釐湯山草場埧上南倉金盞兒甸倉天師菴外場草每束原價四分今用銀五分四釐黃土倉湖渠馬房倉草每束原價四分今用銀四分四釐北草場草每束原價四分今用銀五分三釐御馬倉內場草每束原價七分今用銀八分二釐京場西城坊草每束原價四分今用銀七分五釐臺基場京場明智坊外象房草每束原價四分今用銀六分三釐錦衣衛馴象所內象房草每束原價四分今用銀八分五釐北新草場草每束原價四分今用銀六分八釐司苑局草每束原價四分今用銀八分三釐供用庫草每束原價七分今用銀一錢八釐京庫濶布每匹原腳價五分今用銀七分九釐棉花每斤原價六分今用銀七分二釐丁字庫錫每斤原價九分今用銀一錢四分二釐生銅每斤原價一錢一分今用銀一錢四分三釐白芨每斤原價一分五釐今用銀六分六釐五毫總算內外倉場米豆麻麥布花錫銅白芨準米麥共四十一萬八千三百三石三斗七升草一百二十萬五千二百六十束除正收價銀外見在大户寫納該賠銀一十萬九千五百餘兩及查得在外宣府等倉二十九處粟米豆麥并布花準米及在內京倉等倉三十二處黍秫豆麥并礬蠟鉛靛丹粉紅花槐花牛皮牛筋黃紅銅準米麥共二十五萬二千四百六十一石三斗二升草二十六萬七千四百一十三束大戶俱因價值髙貴原銀不敷未曽寫納不知賠補又該幾何竊照河南地方近罹兵燹在處瘡痍呻吟未息去秋薄收民告艱食迄冬無雪麥不出土生靈困苦莫甚此時起運錢糧國儲所繫固不容於不完而民隱所在亦不容於不恤徵收各項糧價各有定數交付大戶前來上納奔走道途寄賃房屋盤纒耗費用已不資寫買之間乃比原價至加一倍有餘異鄉小民將何賠補賠補不及將何完納今欲督其完納不免勒令借貸借貸之物遺債將來傾家破産亦是難償追索到門必將逃竄由是官不得已而加徴民不得巳而重斂為弊滋多為害滋甚槩纍花户愁怨何堪伏望皇上廣施恩雨垂潤顛崖軫念下情特敕該部將河南一省起運在外各倉場糧草照依近日題準山海等倉折銀事例一體行令解户送收價銀在倉折放官軍月糧待候年豐仍上本色其在內倉場糧草所賠價銀行令本布政司各府州縣通查在庫糧價餘銀拋荒糧銀及河夫工食銀等項銀錢查出扣數稱封差人齎解來京交與各府部運委官查照各該州縣大戶虧欠糧價數目給補上納中間有不敷之數本布政司行令各府州縣查拘正德八年一三五七九甲上中六則未僉空間人戶到官量力出銀通融幫補庶幾錢糧得以早完解戶不致纍損實為便益臣事在専責理難坐視不任憂惶之私為此具本親齎謹具奏聞伏候敕旨正德九年二月二十五日計錢鈔疏奏為陳言計處錢鈔以制國用事臣聞大學之書用人理財為平天下之要道先王之制三幣並用管仲所謂以守財物以御人事而平天下者也後世珠玉金貝刀布之品廢而鑄銅為錢太公九府之圜法獨盛行逮至宋人始用楮為交會濟偏救急一時一方特出權宜而金元承之為鈔固不能經久而無弊也我朝製幣鈔與銅錢相兼行使初時鈔一貫準錢千文銀一兩及後鈔法不行錢千文銀一兩折鈔八十貫又其後鈔之用益微一貫才值錢二文耳今鈔久廢不用價益輕矣鈔一千貫為一塊貨視于市三二百錢亦無售者而天下郡縣關市山澤課程户口食鹽商稅船料等項猶踵舊額錢鈔中半輸納為課豈謂鈔足以制用乎內府各監局供應物件年中買辦論貨止直若干估價常贏倍蓰內帑之出雖曰錢鈔並給而鋪戶本等取償之資計算銅錢已自得利視鈔又其竒贏何有於凖物乎近年以來凡內府給出鈔貫價輕難售乃有一種姦黠依倚權要廣為收攬方舟兼輛出賣各處鈔關府縣衙門假名託姓情囑勢逼無所不至府縣官俯首聽命為之派散為之科率往往有之鈔一塊有得銀三四兩者蓋民納鈔有司每一貫亦有納銅錢至三四文者此無賴之所以得挾之以求利也臣不知於國家何得焉取之民而藏之官而官無所利出之官而散之民而民受其害是今日之鈔之極弊也欲去此弊亦在決於用與不用而巳或曰錢鈔兼行皇祖有法載在制律實三幣之遺意可但已乎而尺楮劣質非屬鏹比國初鈔法并法家錢鈔相折之數勢自不可復泥鈔關折錢一貫二文一分乃今見行事例今日決欲用鈔臣願舉此相凖生鈔每貫準錢三文字昏而質完者每貫二文中折邊爛者一文榜示行錢地方立為定制凡有買賣貿易使錢必兼使鈔用鈔必兼用錢自非一貫二文可易之物與者不許専與受者不得偏受若夫少多之間則在有司作法調其贏縮錢多則出鈔以收錢鈔多則出錢以收鈔昔人於此已有成説錢鈔二價輕重適平如此而行民可無害而官未必無利也或曰鈔勝國弊法也國家錢鈔兼行之律不以律天下者祖宗之意可仰知矣今課入不改其舊賞賚姑擬於昔而印造無復繼於後者列聖之淵識也然則今日鈔既不用臣願自今內府所藏寶鈔祇備九重不時賞賚之恩禮以為臣子之榮而無為多門無益買辦之長物以為閭閻之積天下稅課在民在商一切中半應納鈔者通令折納銀錢鈔每貫折銀三釐或錢二文一分徴解上納使無乾沒財無沉滯解者易於齎持納者不虞毁敗上收其利而下未嘗受害也臣所欲去鈔今日之弊在決于用與不用者其説如此不然鈔乃今日耗國之大蠧法禁紛紜徒事其末何益之有哉臣惟乾清坤寧二宫之災朝廷方有營繕之役天下元元傾耳仄足不遑安處利權之重若復不有所執以通融斡旋其間臣竊憂之鈔之用不用此二説者幸惟皇上特敕該部詳議而熟圖焉而又推類以盡其餘庶於制國之用亦少禆于萬一臣叨列藩服參知國計茍有所見不敢緘默干冒天威不任惶栗待罪之至為此具本親齎謹具奏聞正德九年七月日表清節疏奏為表清節以勵庶寮事臣切惟今故湖廣道州致仕右都御史熊繡存日事母能孝事兄能友居貴能貧居常能儉敡厯中外四十餘年守法奉公推賢疾惡不要時譽不急近功言無爽於屬垣行弗虧於顧影田廬一守先業未嘗少有所增俸祿頒及同宗未嘗私其所入其在官也恆蔬食以自厲故巡撫之日雖廩米有羡亦斥還官其在家也惟山居以自逺凡饋遺之物雖親戚至厚不容浼巳鄉人嘗評其人可謂白首持清節終身無過舉之士矣或曰士知禮法孰不願清而熊繡之清實過於清者也人非堯舜孰能無過而熊繡之過乃清而過者也奈何悠悠蒼天竟乏子嗣兄子過繼復先夭死遺孤藐然未底成立今熊繡云亡逺邇聞知咸相悼惜巡撫都御史秦金因採輿論為其奏請葬祭兼請贈廕該部覆奏已荷恩允彼地下幽魂豈任感激臣生與熊繡鄰州舊嘗為其官屬于其人品見知頗詳繡今事定蓋棺法應得諡九重日月實與照臨顧所司無由當建白耳臣近聞熊繡州人今見任吏部主事周卿聽選大理寺評事許愷皆云繡過繼子所遺之孤幼弱未知人事向後所就知復若何臣竊恐彼死者聲名無人表章日就湮沒臣往年見都御史戴珊張敷華之卒其門生屬吏其子孫俱曽請諡主事張鳯翔孔琦之卒其鄉人曾請恤其家俱蒙詔旨許焉熊繡之賢無愧張戴彼二王事安能比擬臣用是冒昧上言重為乞請伏望皇上將臣此奏詢諸在廷如果臣言不誣斷自宸𠂻嘉賜諡號仍敕該部查照張鳯翔等事例月給食米恤其孤孫其孫日後若堪補廕讀書就行住給使天下之人知皇上仁德足以輔天道之所未及為善獲報理無或遺表清節以勵庶寮秦金謂揆之治體不為無補者莫重於此臣言雖近黨義匪從私干冒天威不勝戰灼待罪之至為此具本親齎謹具奏聞伏候敕旨正德十年十一月十九日推行馬政疏題為推行馬政事節該欽奉敕順天等府所屬州縣寄養馬匹嵗久吏怠民玩輕視作踐倒失數多倘遇緊急誤事非細兹特命爾前去該府遍歷所屬地方専一督理前項馬匹或有禁革振舉良䇿例不該載者聽爾推類行之一年滿日交割接管官員一體整理欽此除欽遵外臣管窺有見駕䇿不辭瓜期今及一年芹悃敢陳三事一審分派一嚴比較一便查兊分派之審所以為嚴比較之階比較之嚴所以為便查兊之地而查兊之便者一皆分派比較之成功也䇿雖未良言則皆實伏望皇上早賜推行其餘馬政庶幾小補臣干冒天威不勝戰灼之至為此具本謹題請旨計開一審分派今順天等府所屬近京三十七州縣俱係寄養備用馬匹地方舊例免糧地五十畝養馬一匹順天等府共免糧地三萬五千七百餘頃該編人戶養馬五萬五千九百餘匹南北直𨽻山東河南各州縣嵗解備用有定數而各營各邊奏討兊給無常期前項編過領養人戶自𢎞治十二年科道等官清審之後到今十有七年權豪吞併差使負纍人多死絶册未除名地已賣盡馬猶在戶派來馬匹代領替養愈多愈耗愈久愈多如涿州等州上坡等里靜海等縣獨流等處臨期點閘率不得人到官積嵗倒失豈能使馬足數又如武清等縣原編領養人戶二千有餘見在馬匹不過九百有餘而倒失馬匹乃至一千三百有餘今年例解京馬匹陸續將到若將空間人戶前項縣分又當派領其實領馬之人無非倒失馬匹該追人戶此等人户舊馬賠償未能完足有何事力更能養新馬乎又如昌平等州里分視前併省漷縣等縣居民比昔逃亡已近三分之一近京之地堪領馬匹人户不曽領馬不堪領馬人户代領至數匹者有之管馬官吏往往庸懦不振雖責有専任而事多坐視掌印官有用心者不過為其拘集羣醫遞互責打而巳不知將來何以善後臣近出巡所屬地方各該州縣倒失馬匹俱經查追不到人戶行查提問該管官吏照例比較外竊念祖宗休息之政當行於今日聖明之時國家有用之財乃投諸溪壑難填之地痛心疾首撫事奚勝如蒙乞敕兵部計議合無查照近日題準差官清審事例行移兵科等衙門選差科道等官同本部屬官前去順天保定河間三府寄養馬匹州縣督同各該掌印等官弔拘原編免糧養馬册籍人户逐一審勘某州某縣原該免糧地畝若干編過養馬人户若干見今實有若干人户逃亡若干遺下地畝何人管業地畝典賣若干買主曾否承領馬匹審勘明白就將住居窵逺貧難人户得受免糧地畝與附近坊市得過人户地畝彼此兊換收除糧差仍照近擬加地事例再加與免糧地二十畝將里分併省居民逃亡州縣原編領養多餘馬匹照恤近民事例分派鄰近州縣使遂優恤及行太僕寺通查前項倒失馬匹過多州縣所餘空間人户若係先年倒失馬匹見今追徴未完之數今次解到馬匹暫免分派其該州縣掌印管馬官吏俱各住支俸糧比較各户買補馬匹以十分為率補完及八分者方許照舊關支倒失馬匹人户立限追徴巳完方行照舊領養馬匹夫養馬人户附近則在官易於點視得過之家領馬則倒失易為追補今又加免糧地二十畝共七十畝則人亦易從馬不為纍倒失馬匹過多州縣掌印管馬官吏俱各住俸比較買馬則馬有可完之期馬匹人戶賠償事畢方行領馬則人無重抑之苦矣臣所謂審分派者以此一嚴比較今南北直𨽻山東河南解到備用馬匹皆是孳牧地方監追人户數人方得起俵一馬虧欠馬駒數匹方得折買一匹近嵗兵部慮恐前馬營邊取用不敷奏行差官齎銀買馬官價定銀每馬十五六兩以上民間派買每匹貼銀至五七兩有竒往返路費一馬奚止用銀三十餘兩其來甚不易也二項馬匹本寺驗過有臕無病始發各該州縣寄養曽幾何時臣出巡點視則已有倒失者見在之中有腿腫眼青脊背成瘡傷者彼倒失者或稱急證事非得已若腿腫眼青脊背成瘡寄養人户稍知畏懼愛惜豈遽至此蓋由貧民無賴恃頑玩法知新馬挨次難便俵兊因而恣意裝載馳驅營幹生理及將賃覔與人耕種走遞遂致殘傷殘傷不醫倒失隨至單夫寡婦寧暇為後日計哉夫馬之來自民間甚不易而復棄諸民間使其不幸如此保定河間所屬州縣倒失例追本色尚得馬用順天所屬不過追銀十兩縱使追完貴取賤棄所耗已多况又積年拖欠豈不深可痛惜此倒失之所當亟追而無貰者也臣惟營操馬匹官軍間時不許帶鞍騎坐及馱載物件兩人共騎并借人私騎違者送問追罰馬匹借馬之人一體問罪罰馬法禁嚴甚然止行於京營而不及民間民間寄養馬匹先年題準三年揀選事例馬十八嵗以上不堪騎操者奏請或送光祿寺或賣銀類解本寺又量追罰事例馬有瞎瘸等項不堪者本馬人户名下追罰銀二兩其銀同馬解寺夫馬初發時法無十嵗上者有臕無病無殘傷者今使之至於老瘦瞎瘸皆人户積年作踐所致而姑為之禁乃爾罰不已太輕乎臣又查得順義等縣俱有先年遼東等處兊換騎操馬匹房山等縣俱有四衛勇士營退回馬匹定興等縣俱有近日陜西交兊馬匹遼東等處馬匹先奉揀選變賣者不過銀二三兩而止倒失者追銀八錢而止今例後倒失數多見在亦多老瘦不堪此等馬匹曽經官軍騎操出征追賊筋力勞憊方才換與人户寄養勇士營馬匹當時亦因不堪騎操方才退回今亦倒失數多與遼東等處馬匹似難深責陜西交兊馬匹有在彼鎮城守候日久倒失者有在途得病倒失者具告俵馬官處割收耳記存照該縣各因人户艱難未得追補以上三項倒失馬匹論馬則各不同論情俱有可恕今若比之初發騎養不動而倒失者一槩追銀補馬罰不已太重乎此又倒失之所當遞減而量追者也如蒙乞敕兵部計議合無斟酌前例行移本寺轉行督理少卿分管寺丞今後馬匹倒失例追本色折銀照舊比較追補老瘦瞎瘸等項係正德九年以前者仍照揀選及量追罰例奏請處置外正德十年以後馬匹有瞎瘸瘦損等項已成疾廢不堪給軍騎操者看驗明白即與退印責令變賣將賣過銀照倒失例添銀買馬及補完追折銀兩有打破迎鞍斷梁瘡傷等項不係痼疾堪調治者責令羣醫并人户加意餧養調治仍將人户追究作踐情弊或照營操罰馬或止照量追罰例處置若馬調治不痊照依今例變賣追補其有遼東等處兊換勇士退回陜西交兊倒失馬匹州縣各分别先今年分定與等第或量追銀一半或重而三分之二或輕而三分之一使知遵守不至差殊以上議追各項馬匹銀兩已完未完各該有司衙門俱要按月開數年終造册送部查考夫事例嚴則馬不至於耗損情法盡則人不至於怨咨革惠惡長姦之弊行稱物平施之政則官不虧而民不損矣臣所謂嚴比較者以此一便查兊今畿輔近地寄養馬匹専一預備征調及京營各邊缺馬取用之數舊例凡遇取用必挨次揀選交俵蓋恐管馬人員將新到齒小馬匹一槩起俵却將舊養齒嵗稍大馬匹存留貽纍民間久養故耳然新馬之中有齒嵗大於舊馬者舊馬之中有齒嵗小於新馬者必欲一一挨次選取亦非通融之術是以近日本寺凡遇取用馬匹行移各該州縣不論新到舊養止開坐取數目其各州縣掌印管馬官又多不能先事揀選一遇取用即差羣醫人等分投下鄉將見在馬匹盡行催趕各赴京邊聽候選兊初不暇計其馬有無臕息堪否兊給惟求不誤原定限期足勾原取數目而已馬之取用無常時人之奔走無寧月餧養不至兊給不前妨官病民積弊非一臣切惟馬有新舊取用之際可不必論而齒嵗之大小當以之為先後馬齒大小起俵之間或難盡拘而臕息之有無當視之為行止蓋馬齒嵗既大例先起俵馬無臕息不堪兊給坐取數少則齒嵗稍大有臕舊馬亦可足數坐取數多則齒嵗雖小有臕新馬自不容於不行若彼瘦損瘡傷不堪兊給馬匹掌印管馬官平日既不加意督令愛惜餧養今當取用豈宜驅迫道途徒勞往復重增困苦臣查得舊例馬政册嵗造二次夏季以前為新册秋冬以後為舊册開報馬匹臕息分數正要本寺以便弔取兊軍不致泛取勞衆費日今法久事隳州縣之所造報竟成文具臨事無復稽據遂至於此臣近奉命出巡地方已將造册馬數不明及奉例俵馬不查堪否數目致纍馬匹人户漷縣新城任邱文安等縣官吏住俸問罪外如蒙乞敕兵部計議合無今後馬政册造報不必拘於新馬舊馬如𢎞治三年事例馬匹齒嵗挨次選取不必拘於兒馬八嵗以上起俵七嵗以下存留騸馬十嵗以上起俵九嵗以下存留如𢎞治七年事例順天等三府所屬州縣前項寄養馬匹掌印管馬每月各要查點二次看驗臕息每嵗應該造報册籍一以臕息分數為主分别欵目開具人户姓名原領馬匹毛色齒嵗某等臕息若干無臕瘦損若干瘡傷調治若干俱各實報在册一樣二本送部及太僕寺查考其本寺督理少卿并分管寺丞按季出巡查點比較每月仍取具臕息升降多少總數行移本寺凡遇京營并各邊方奏奉欽依取用馬匹查照前項季報月報馬匹臕息分數於三分以上臕息數內坐取先儘舊馬次及新馬齒嵗大小以次相繼舊馬齒小不得以為舊馬而先之新馬齒大不得以為新馬而後之馬匹既至本寺堂上并坐營等官各照𢎞治六年題準疏通兊軍馬匹事例持公秉恕當官唱名以革揀占求換之弊若管馬官吏解到馬匹看無原報臕息分數不堪兊給本寺官就將該管官吏痛加責治仍行督理少卿照依敕書事例住俸比較若少卿等官出巡查點二分臕息以下馬匹多於三分臕息以上之數即係瘦損數多將各該官吏住俸比較庶幾法令互舉官吏知畏內外皆得點視彼此不容規避且使養馬人戶知馬有臕息獲早兊給庶無復久養之纍無臕馬匹免事奔走亦得盡愛養之力矣臣所謂便查兊者以此正德十一年五月日軍務疏題為軍務事準本寺關前事奉兵部劄付該本部題內開近日宣府出征回還馬匹走傷瘦損交與團營軍士領養草料不敷必盡倒死合無行移太僕寺轉行提督京營少卿會同該營坐營官將前已交在營不堪馬一千六十八匹逐一驗看數內堪以領養騎操若干不堪若干就便從長計議或查給殷實官軍領養暫免騎操或發附近州縣寄養聽候調用或估計變賣價銀買馬支用務要事理相應官民兩便內有倒死馬匹亦就查驗皮張鬃尾照例交官肉臟送光祿寺收用通將查議過緣由具奏定奪等因題奉聖旨是欽此欽遵備劄移關到臣行據奮武等十二營委官把總都指揮郭英等各將本營原經驗看出征回還不堪馬匹見在倒死數目開造文册呈報外會同鼓勇營坐營官都督張安驗看得奮武營馬一百一十三匹見在內無臕尚堪領養騎操馬八匹老瘦青盲癬瘡尚堪寄養調治備用馬五十五匹老瘦盲瞎瘡瘸顙癩不堪馬三匹倒死馬四十七匹耀武營馬一百二匹見在如前尚堪領養一十一匹尚堪寄養四十九匹倒死四十二匹練武營馬一百匹見在尚堪領養一十九匹尚堪寄養五十一匹不堪三匹倒死二十七匹顯武營馬六十四匹見在尚堪領養一十二匹尚堪寄養二匹不堪九匹倒死四十一匹敢勇營馬二十四匹見在尚堪領養四匹尚堪寄養五匹不堪五匹倒死馬十匹果勇營馬七十一匹見在尚堪領養一十四匹尚堪寄養一十九匹不堪四匹倒死三十四匹效勇營馬九十匹見在尚堪領養一十一匹尚堪寄養三十五匹不堪二匹倒死四十二匹鼓勇營馬一百六匹見在尚堪領養一十五匹尚堪寄養四十五匹不堪九匹倒死三十七匹立威營馬一百二十五匹見在尚堪領養二十九匹尚堪寄養三十一匹不堪一十六匹倒死四十九匹伸威營馬六十八匹見在尚堪領養二十六匹尚堪寄養七匹不堪四匹倒死三十一匹揚威營馬一百匹見在尚堪領養五匹尚堪寄養二十六匹不堪一十二匹倒死五十七匹振武營馬一百五匹見在尚堪領養二十八匹尚堪寄養一十九匹不堪六匹倒死五十二匹前項各營見在馬共五百九十八匹逐一驗看明白分别等第無臕尚堪領養騎操馬共一百八十三匹該軍人盧山等自告領養訖其老瘦青盲癬瘡尚堪寄養調治備用馬共三百四十三匹欲要召商估價賣銀貯庫緣此等馬匹走傷之餘所值不多估賣與人殊為可惜萬一邊方有事用馬倉卒銀買重有耗費相應發下附近州縣寄養以備異日駝馬之用但寄養人户未免纍其調治該管官員宜加優恤若有倒失照依遼東等處對回馬匹事例量追銀兩庶不虧纍其老瘦盲瞎瘡瘸顙癩等項不堪馬共七十二匹發賣無人承買買亦無人從價查得近為急缺供應事準本寺關要將營操殘疾馬匹照例驗送光祿寺筵宴供應已行去後所據前項不堪馬匹相應行營徑送供應其倒死馬共四百七十匹皮張鬃尾俱查驗是實責令委官郭英等同軍人韓章等領回并肉臟送各該衙門收用間據韓章等告稱肉臟未奉先已腐壞費用目下無處買補各軍艱難乞量折銀交官買馬便益隨據郭英等各稟相同查得成化四年事例騎操倒死馬匹皮張鬃尾肉臟聽從本主變賣價銀交官輳買馬匹今前項倒死馬匹肉臟既已無存若照變賣事例并皮張鬃尾一體追收價銀交官買馬委的於軍便益為此除驗看過見在尚堪領養與尚堪寄養馬匹行令該營遵照本部原奏該領養者官軍暫免騎操該發寄養者送寺發屬寄養不堪馬匹該送光祿寺者送光祿寺供應倒死馬匹皮張鬃尾領回并肉臟該送各衙門者領回聽候定奪外如蒙乞敕兵部將臣所議再加斟酌定奪施行庶於官民兩便馬政無失緣係驗看出征馬匹議處事理未敢擅便謹題請旨正德十年月日請還駕疏題為督理馬政出巡地方伏請聖駕還宫受大朝賀以慰臣民至望事臣切惟天極以居所為尊人君以恭已成治自古有道帝王鮮侍慎其舉動者也故我太祖髙皇帝著于寶訓內而離宫别院不許興及土木外非祀天耕藉未嘗輕出都城列聖相承守為家法若我孝宗敬皇帝之行事又我皇上之所親見者也我皇上聰明齊於列聖孝愛盡於兩宫而年來雜役太多逸遊太數今日遂有宣府之幸無乃為太逺乎用是部院大臣科道近侍君臣義切父子恩深衙門各分一人相與追隨道路思及行在欲有開陳至居庸關制不得過臣職忝侍御僕從之末奉命出巡重兹感激此義同也此情同也區區螻蟻安忍無言臣惟郊野之地曉侵風霧晝苦塵霾夏留暑餘秋報寒早况邊關所在干戈非闕廷之儀烽火有墩堠之警凡百戍役咸嗟曰難今日之行非其地也此廷臣之所以同皇皇也且夫聖節伊邇普天稱慶在外親王以及諸司咸齎賀表逺至四夷來王上國皆屬此時今集于禮部鴻臚寺者孰不洗耳鑾音注目黼座况兩宫在上今巳暮齡屈指孕聖之辰重憶流虹之瑞則凡受皇上股肱耳目心腹之寄日不左右者情之所望又當何如今日之行非其時也此廷臣之所以不容已於欲陳者也臣愚切惟皇上屬當此地又適此時回轡六飛羲御宜速祝封呼嶽所願如期仰聖瞻天為幸非細臣途次倉猝言語失序不勝愚誠懇悃俯伏祈請願望之至為此具本差人齎捧謹題請旨正德十二年九月初三日議馬政疏題為議處馬政大綱興革官民利病事臣聞國事莫大於戎武備莫先於馬三代而下夏卿特以司馬名官兩漢以來僕正専以數馬為職臣等任忝執御事歸責成未有涓涯可云報塞竊惟今日馬政當議者五而五者之中當興革者有十所謂五者曰畜牧曰徴俵曰收買曰寄養曰關換此馬政之大綱而當議者也所謂十者畜牧之議在清户籍正課額徴俵之議在選備用責管解收買之議在平價值廣儲積寄養之議在驗交納取兊給關換之議在預稽核酌緩急此皆官民利病所當興革者也臣豹管偶窺金緘難默敢緣愚得上瀆睿聰不為文詞惟究事實乞敕兵部再加議處當興革者斷而行之庶於公私少禆萬一臣等不勝欣望顒俟之至為此開坐具本親齎謹題請旨計開一所謂清戶籍者舊例北直𨽻府屬州縣論地養馬每免糧地五十畝養兒馬一百畝養騍馬各一匹山東河南府屬州縣論丁養馬每有力人五丁養兒馬十丁養騍馬各一匹南直𨽻府屬州縣論地者二頃養兒馬三頃養騍馬各一匹論丁者十丁養兒馬十五丁養騍馬各一匹𢎞治間兵部因本寺卿彭禮建言奏差給事中等官查勘之後迄今二十餘年地畝典賣人丁消乏不知其幾彼時各官亦曽預議要於大造黃册年月行令本寺各該分管寺丞督同各府州縣掌印官并管馬官將前丁地照例查勘若是地賣馬存馬纍丁乏就將見馬給付得業并丁多户內領養今已兩經造册未及舉行臣惟民間册載人丁不皆有力有力之家往往情通賂囑隱射脫免而無力者丁必著役役必從重論丁養馬未免負纍貧民貧民將原養馬地土掜作開墾不曽起科私下盜賣與人多寡不等在處有之買主一時不知利其無糧糧輕遂與交易後來被告幫貼多科橫索興詞無已論地養馬未免混賴大户如蒙乞敕兵部計議合無斟酌先年事例奏差給事中等官或只差本部屬官會同本寺各該分管寺丞督同該府州縣掌印管馬官員弔取先年勘過人丁地畝文册到官再行從實查勘前項丁地論丁則分鄉逐里三等九則務見某人有何事産除京官軍匠人等户內例優免外其餘不問豪民黠胥逐一審實各照養馬丁數添編兊僉某應堪作一丁某應減為半丁與某朋作一丁共若干丁補足原額領養一馬論地則務審見某人承種免糧地土若干某曽得買若干若是巳全得買承種前地不分官員監生吏典就將前地應養馬匹給付領養若止承種若干得買若干官為計算定與則例每畝出銀若干每年該出若干幫貼養馬及輳買備用馬匹前項丁地又各視其所認産業多寡以分上中下户等第上户為馬頭常川養馬中下户為貼户各貼所認馬匹務使姦徒不得以巧脫光棍不至於脅取查勘審編畢日仍造馬頭貼户地畝人丁文册一樣二本送部及寺查考庶養馬户籍丁地獲清貧民大户兩無纍害一所謂正課額者舊例額設種兒馬二萬五千匹種騍馬十萬匹北直𨽻山東河南府州分該八萬七千五百匹南直𨽻府州分該三萬七千五百匹一牡四牝搭配成羣祖宗立法養在民間正欲科駒以備俵用及後年久種馬并駒虧欠數多間有孳生又皆不堪起俵以此言者定為虧欠倒失追補變賣徴價買馬之例有司各於地畝人丁照數派銀輳買完解正德初御史王濟因差印烙馬匹見得民間雖有種馬之名無種馬之實有孳生之名無孳生之用奏行兵部將各處種兒騍馬通加揀選髙大者存留不堪者賣銀買補仍前搭配各該官員止是點視臕息病瘦送問倒失賠補孳生有無不必追究每年備用大馬止照種馬定額羣內議和朋買若羣內生有好駒聽從本羣幫價起俵其餘一切煩苛悉行除免人情視前儘為稱便但各該掌印管馬官員一年止點四次三箇月間若人户將馬顧賃與人二千里外亦可往回管馬官員非點視時所幹何事臣近訪得各府州縣為因科駒例廢本寺分管官到専一比較賠補倒失種馬所有馬頭羣內生駒輒被抑撥别羣賠補倒失夫孳生不得自用而倒失反無懲戒甚非先年改擬初意及照本寺近為換種馬以備寄養事蒙兵部題準通行北直𨽻七府將種兒馬內身量髙大齒少力強堪以騎操者揀選解寺及至到京仍多不堪退回枉費小民以此觀之民間今日尚無種馬之實孳生之用其微可知如蒙乞敕兵部計議合無今後種兒騍馬州縣掌印并管馬官半月一點該府管馬官三月一比較倒失賠補例該一月以裏赴官印烙如違聽分管官將掌印并管馬官住俸追賠所有生駒堪起俵者幫價起俵堪補種者價買補種務從本人情願有司不許逼抑補種馬匹分管官仍照先年事例揀選身髙四尺五嵗以上十嵗以下方準作種矮小老弱變賣易價務要湊完原數選易完足畢日備將人户姓名馬匹毛色齒嵗臕息分數造册二本送部及寺備照庶馬政課額將來不至埋沒邊方緊急臨期亦得調遣一所謂選備用者前項各府州縣養馬地方例解備用馬匹自景泰年間以來該兵部題準每年派取共二萬匹𢎞治初年因順天府所屬人户寄養積纍艱難每年俱暫派一萬匹正德二年因御史王濟建言將種馬補足羣數每年一羣之內朋買本色折色大馬一匹共二萬五千匹正德九年軍士關兌頻繁加至三萬及四萬匹十一年以來本部始復查照王濟所奏派取二萬五千匹十二年重申前例著為定規自此每年派取本折色間或視地方豐凶為之贏縮而二萬五千匹則確乎有不可移之數矣臣惟前項馬匹俱係各該分管寺丞督理本色多者嵗分二運該管寺丞若克勤職業及該府州縣掌印官盡心馬政法令嚴明一遇派取解寺不惟如限不違又且先時俱至身量髙大毛色光瑩齒少力強無不中選或非其人但慿管馬官吏馬販羣醫彼此串同浪估妄費馬既到遲選仍不中重煩易買益困小民夫為政在於得人立法又在歸一查得𢎞治三等年以來本部議行各府州縣將派取前項及有收買馬匹或議要身髙四尺兒馬四嵗以下騸馬六嵗以下或議要三尺七寸以上或又議要四尺以上兒馬五嵗以下騸馬八嵗以下又議如孳生駒臕力壯盛尺寸略有不及亦聽揀選正德二等年議行文移大率未定蓋各因人建言前後覆議齒尺不同非有所更革為寬嚴也各該有司能盡心者選解到寺身必四尺矮亦三尺八寸齒在四五嵗間老亦不出七嵗其不才官吏選解到寺身僅三尺七寸或止三尺五六齒有七八九嵗甚至十嵗之外精神臕力又各差殊本寺於前馬堪中者即時印發實憐百姓用價太多於後選不堪者深切恨彼官吏欲將解官送問馬匹退回又恐有誤馬政且原文亦有可從寬者只得於齒尺間但亦可留從寬將就然退回易買亦多有之又况先年斥退眼青腿瘸等病馬匹至今未完民困曷紆國事當慮臣等切惟先年營邊用馬頗少馬寄民間飼秣年久老不獲用以此選要四嵗六嵗以下便於挨次兊軍若在今日可無慮此若馬之身量尺寸又合斟酌便於遵守如蒙乞敕兵部計議合無通行各該分管寺丞今後但遇年例派取及有收買前項備用馬匹俱要親詣各府州縣督同掌印管馬官公平揀選身髙三尺八寸以上兒馬六嵗騸馬九嵗以下蹄腿周正方準作數起解敢有濫將三尺七寸以下及七嵗以上兒馬十嵗以上騸馬起解搪抵者本寺看驗得出比照𢎞治十年事例呈部參提問罪至於馬偶眼因傷熱小青腿因走逺小瘸可以調治聽從治愈陸續告印若齒渠不真及一應暗疾本寺猝未看出印發州縣寄養並許寄養州縣就連人馬申送前來以慿究問仍將印發過馬匹印與退字令其變換補賠若是寄養州縣官吏羣醫聽受情囑不即吐説日後兌軍不出責有所歸如此庶派取有定規民既免加添之纍揀選有定法官亦適寬嚴之宜姦得預防事無偏弊一所謂責管解者備用馬匹舊例該分管寺丞預先親詣各府州縣將印過孳生兒駒并買補馬內揀選堪中造成小册備開人户姓名馬匹毛齒尺寸用州縣印信鈐記責付該管官吏解赴兵部送寺驗收其後寺丞公差帶管不一各該地方不及先期遍歷比較本部又因邊事緊急不時買馬議行各府所屬州縣將派取備用及收買馬匹各解本府掌印官處公同管馬官吏獸醫人等看驗停當一體造册近年以來駒課不行一羣之內該派本色各照丁地出銀官為追徴收買管解每匹用價大率至二十兩有餘并算草料盤纒路逺去處有費踰三十兩者有司用心嚴密下人不敢欺蔽買解到寺驗得委值原價固多有之或非其人不值十餘兩者亦混買解致煩揀退積年挂欠無有了期彼收買與管解人員豈皆一一奉公守法之輩原初收買馬販獸醫交通作弊及至管解乃僉别人管解人員又生弊端在本州縣多討空頭印信册子或將好馬容留在家騎坐變賣或將中途抵換或將來京通同光棍馬販重復貼易規取厚利直至貼易已定臨當投文將前空頭册子方填解户姓名馬匹毛齒尺寸送部及寺本寺看驗既非原馬豈得復有原價馬匹馬匹齒嵗過多身量不及欲加詰問則弊在今管解者無人告發得諉原初收買之人若復弊在原初收買看驗之人事已脫卸馬無對證行文彼中亦得借口所付管解及今看驗者矣如蒙乞敕兵部計議合無今後行移各該分管寺丞督察各府州縣遇有派取收買前項馬匹買補完日解府掌印官處照例選看齒嵗尺寸果係堪中好馬價值相當方準倒解其管解該運就要原初收買看驗之人該府仍將看過堪中馬匹毛齒尺寸臕息分數并原買價值數目與原來獸醫姓名開造册內差人預先送寺收候所屬馬匹至日以慿看驗若該州縣解到馬匹毛齒尺寸本寺驗與府册不同馬又不值原價不堪俵給騎操即是抵換貼易不明馬匹將管解作弊官吏獸醫馬户人等通送法司從重究治庶罪有所歸人皆知畏價無虛費馬亦易完一所謂平價值者備用馬匹先年取自孳生孳生駒有倒失虧欠方議折銀成化間兵部議行各處折銀買馬事例悉以十兩以上十二三兩以下為率駒每四匹湊買堪中騎操兒騸馬一匹作數起解蓋彼時但馬一匹值價十兩上下儘堪騎操故定此議宏治初年本寺卿王霽因各處備用馬匹拖欠相仍奏行本部每匹折銀十兩解寺買補備用中有拖欠四户大馬去處每匹折解銀二十兩願解本色者改解備用馬二匹彼時解到備用及本寺召商收買發民寄養給軍征騎俱是此等價值馬匹及後因事收買官或增價數終不多𢎞治十五年御史公勉仁奏稱各處解寺馬匹所值不過銀十四五兩而一馬之費不下二十四五兩等因本部覆奏行勘未報正德二年王濟因為照額出辦之議自是以來各處論地論丁派徴馬價折色定銀一十五兩本色買解有每匹以一十八兩二十兩為率者有以二十四五兩為率者正德九等年本部差官買馬以十五兩為率分派各府州縣有每匹幫價至六七兩者有幫至八九兩者草料盤纒又在數外是豈昔之馬價特賤而今日獨髙貴哉本寺近為急缺騎征馬匹事奉兵部劄付該本部題準行移本寺差官買馬其價不許過十五兩虧損原折亦不許逼民包賠貽害地方仍禁權豪勢要不許將不堪馬匹強賣多取所以為是慮者周矣但前備用本色馬匹先年未經定擬價值各處收買不一價髙馬大與價少馬匹解寺兌軍未免益生爭論互有選擇如蒙乞敕兵部計議合無行移各該分管寺丞轉行各府州縣著落掌印管馬官吏查照派取備用本色馬匹除已買外未買之數悉以二十兩為率照例一羣之內朋合銀兩收買堪以騎操兒騸馬一匹解分管官并府看驗停當依限解俵毋得信慿馬販獸醫通同吏胥多徴馬價侵剋人户及指此為辭將老弱瘦小不堪馬匹一槩濫收充數以致交納不過展轉換買損折民財誤妨國事若是該府州縣掌印并管馬官聽受囑託買解馬匹到寺看驗不直所定價值本寺照依舊例連馬呈送兵部參提究治分管寺丞一併定議庶在民不辜重價之費在軍舉得良馬之給一所謂廣儲積者各處舊設草場先年俱該兵部題準差官清查丈量界至撥人佃種出辦租銀在北直𨽻者上地一畝五分中地三分下地二分在南直𨽻者上地一畝七分中地五分下地四分在山東河南者每畝四分於每年秋後徴收解府類解本部送寺貯庫以備京邊買馬支用分管寺丞照例嚴督比較州縣掌印管馬官以十分為率年終三分不完住俸寺丞與知府管馬通判照所管州縣十分為率四分不完住俸俱候完日關支其北直𨽻河間等七府南直𨽻鳯淮揚廬四府和滁二州滁州一衛係専論地養馬地方先年定編領種馬外俱各存有免糧餘地聽領孶生兒駒正德元年以來各處不復課駒餘地空間在北直𨽻者該巡撫都御史韓福具奏每年每畝徴銀二分寄貯府庫正德十年本寺分管寺丞陳希文奏稱真定府庫收前銀係干馬價又該兵部題準劄付本寺行移分管七府寺丞親詣各府州縣清查起解以後年分俱限次年三月以裏到部如違聽各寺丞追究等因通行去後今查得前項場銀正德十二年以前各處多欠徴解及已到部數多未完分管寺丞册報巳徴數內又多開作買馬用訖緣前租銀近為處置幫買種馬以蘇民困等事本部議擬不許一毫擅支蓋因本寺儲積買馬價銀不多又且近年馬價比昔髙貴邊方緊急費用不資所有餘地銀兩河間等府所屬州縣正德元年至十年多係小民拖欠未徴及有已徴又被不才官吏侵剋那借見行巡撫衙門提問未結今十三年夏季將終本部原限十一年十二年分應追數目各府俱未起解本寺除行催外及照南直𨽻前項地方餘地𢎞治九年給事中倪天民等奏內明説存留聽領孳生及作畸零之數今空間巳久比與河間七府事體相同無人具奏若是利遺民間猶之可也萬一貪官汙吏暗徴私斂白消乾沒殊為可惜如蒙乞敕兵部計議合無移咨南北直𨽻山東河南巡撫都御史弔取撫屬各府州縣草場餘地卷册到官逐一查勘原坐地名頃畝實數每年該徴租銀若干巳徴若干未徴若干徴完解過若干未完若干未解若干支銷若干除巳徴完解過外未徴者應照何等則例定徴未完者應於何人名下追究未解者見在何處收貯支銷者奉何衙門明文慿據自某年起至某年止所司有無曽行徴收小民有無曽經送納中間遇災去處有無曽與蠲免養馬人户有無曽告貼助務見一一明白下落果有侵剋那借情弊應提問者提問應參奏者參奏究治咨報查考本部仍行本寺及南京太僕寺各該分管寺丞遵照先今有行事理一體清查照例比較依限起解每遇年終造册回奏施行庶舊場所入馬價不至久虛餘地之徴馬政亦從兼舉一所謂驗交納者本寺先年因天長縣解馬主簿潘榮來京買到軍人有印官馬及在京馬販王端兜攬溧陽等縣馬匹事發送問隨事立例一欵司府州起解備用馬匹各要經由分管寺丞等官驗中起解若有馬販交通官吏獸醫作弊俱問罪枷號發邊衛充軍又一欵各處解馬赴京有兜攬價值將老馬攙雜驗印者俱發邊衛充軍其起解馬除例應折納外有齎價赴京通同收買者問罪罪不可謂不重法不可謂不詳然前車已覆後轍弗戒彼事未結此犯復繼查得本寺卷一宗為緝訪事該蠡縣民劉松具首錦衣衛正德十一年有馬頭曹堂等盜賣有印官馬朦朧完俵正德十二年因得慣便仍前作弊等情拿送鎮撫司究問明白送發刑部擬罪去訖一宗為抵換官馬事該南陽縣解馬吏張蘭具呈本寺正德十二年有桐柏縣民戴成等剋減價銀買解馬匹又將馬留在家赴京買馬等情行仰本府將各犯問罪原馬解寺外近正德十三年正等月內商河縣縣丞陳綱解馬到寺審得數內馬一匹係換得勇士楊均兒馬匹衡水縣義官魏鼎解馬到寺審得數內馬二匹係買到馬販陳慶馬匹安東縣大使吳碧解馬到寺審得馬户李璽等名下俱無原來馬匹又經恭送法司及呈兵部參問外夫管解之責臣巳備言於前矣緣地在鄰牆即內外耳目有所不及事當隔手即彼此心腹無由盡知交納之際人馬冗雜府縣衆多茍不廣為體究多加訪緝法則具存人終無忌如蒙乞敕兵部計議合無查照天順年間巡馬聖旨榜例行移在京緝事衙門巡視等官督同五城兵馬多差旗校人等但遇各處派取備用及買到馬匹驢頭等項管解人員到部送寺交納務要暗行細察若有馬販交通官吏獸醫作弊價值互相兜攬馬匹私下換易將不堪馬攙雜驗印及積年光棍詭名指稱打點教引在官各役乘機伺隙偶因驗中誆騙財物者拿送法司依律究問照例發落該城兵馬司預先省令各該地方知會今後管解馬匹人員一到即具歇家鄰佑姓名呈寺若有前弊不行舉覺事發之日一體問罪本部仍出榜於本寺門首常用張挂永為遵守庶在官事不徒勞在下罪亦知避法令既密弊端自絶一所謂取兌給者臣孟春先任少卿之時奏為推行馬政事內一件便查兌大略內稱寄養馬匹州縣掌印管馬官員每月俱要查點二次看驗臕息每嵗應造册籍一以臕息分數為主開具人户姓名原領馬匹毛色齒嵗其等幾分臕息若干無臕瘦損若干瘡傷調治若干俱各實報在册送部及寺查考其督理少卿并分管寺丞按季出巡點視每月仍取具臕息升降多少總數報寺凡遇京邊奏請馬匹查照前項報到臕息分數於三分以上數內坐取若管馬官吏解到馬匹看無原報臕息不堪兊給本寺官就將官吏痛責仍行督理少卿照依敕書內事例住俸比較若少卿等官出巡查點二分臕息以下馬匹多於三分以上之數即係瘦損數多將各官住俸比較庶幾法令互舉官吏知畏且使人户於有臕馬匹獲早兊給庶無復久養之纍無臕馬匹免事奔走得盡休養之力等因兵部議得前件依擬具題奉聖旨是準擬欽此欽遵備劄到寺通行外臣孟春近蒙欽升前職掌印奉兵部劄付為急缺騎征馬匹事內開本寺掌印官查照順天等府災重州縣選取好馬六千一百八十四匹於居庸關聽兊等因到寺查得本寺近年並無各州縣造到寄養馬匹臕息等項册籍及查當季又無月報總具臕息分數明文可擬除行本寺少卿等官并各該州縣斟酌馬匹多少坐數選取將選取過實有臕息分數及存留有無臕息瘦損瘡傷等項馬匹查照先今事理造册外臣等切惟先年臣孟春所以建議本部所以依擬者正緣在前所屬官吏不能先事將馬揀選一遇取用即差羣醫下鄉盡行催趕前去初不計其有無臕息堪否兊給惟求足勾原取數目而巳馬之取用無常時人之奔走無寧月餧養不至兊給不前妨官病民積害非一故預為此議擬豈意各官不遵欽準事例仍復故違若不重加究治將來誤事所係非細臣等又訪聞得近年寄養馬匹各該州縣官吏既不提調人户好生餧養每遇使客經過輒行借撥迎送往來答應差使秪顧目前急需罔思日後重責以致瘦損倒失嵗積月多馬因無臕册不復報遷延玩愒職此之由如蒙乞敕兵部計議合無將故違該府管馬通判并該州縣掌印管馬官吏照依先年比較新舊馬册事例俸糧俱各住支該州縣掌印官作急將册造完送部及寺待候本部委官管馬官吏兊軍回日查勘各州縣所兊馬匹與本寺坐取之數有無足勾已勾數者免罪外不勾數者將管馬官吏不勾七分數者將該府管馬通判該州縣掌印官一體查參問罪已後兌給馬匹俱照此例查數究治本部仍行巡按御史并分管寺丞嚴加禁約敢有似前借撥寄養馬匹送迎答應等項查訪得出應提問者提問應參奏者參奏提問照依先年題準防虧耗等事例每借撥二匹追罰一匹完足方許復職管事分管寺丞每於年終將有無追罰數目奏報施行庶戒可垂於將來事復興於已墜一所謂預稽核者查得宣德年間事例官軍每馬一匹給勘合一道填寫毛齒年月為照遇倒失等項陳告買補仍將買補馬匹毛齒附注勘合如領馬之人有故將馬與勘合告官轉付無馬有力官軍頂替騎操正德年間官軍領馬行移本衛造册送部及寺仍行該營查勘於例應領方聽給與天順間官軍領過馬匹行衛造册送部如關領數多開報數少或倒失轉交隱匿不報許諸人首告問罪追罰馬匹凡此事例無非欲清騎操以革重復詐冒之弊者也天順間本部題準官軍人等強奪起解在官馬匹者問罪枷號罰馬一匹𢎞治間題準領馬官軍有不照次第混亂爭奪者問罪罰馬就付本人騎操後再不許給與又各營領馬官軍有將應關馬匹故意刁蹬勒要錢物致使小民候久不完者本部通恭究治凡此事例無非欲便寄養以禁強頑需索之弊者也奈何近年以來官軍所領馬匹勘合舊制既已廢停京營奏關馬匹文册臨期亦不查造本部及寺委官到營只據片紙書名領馬馬多軍少兊不若干明日到營亦復如是各處解官告苦則以一軍而代留數馬本營隊長責備則因一馬而閲退數羣街市米糧草料髙貴小民身口馬匹盤纒既盡未免逃回該營因見少馬又得恣言前來催速本寺立限守催既至仍前踰旬曠月不得俵交彼四衛勇士等營無部委處難又可知𢎞治二年本寺呈部具述營中官軍識字軍吏害人等事本部所據以禁約者恐今亦不能無夫寄養兊不勾數管馬官吏之罪臣等已備言於前矣營中之弊豈容獨任縱之若強奪混爭今日雖無顯犯到官亦合重申預防用杜微漸如蒙乞敕兵部計議合無今後各營奏關馬匹務要把總管隊官查勘各官軍先年有無曽經關領領過之數有無揀選變賣并倒失等項應追銀兩有無解寺備查明白開造文册一樣二本送部及寺查考如果不係重冒是實將册就付本部及寺各委官處約會該營坐營官於某月日將取到馬匹查照疏通事例一同選取但十三嵗以上别無殘傷亦有臕息馬匹照例給與不許恃強官軍専占好馬驀赴印烙若寄養馬兊給之時本部及寺委官看得前馬無傷有臕被各官軍作難不領許令管馬官吏赴部鳴告若馬果瘦損殘傷部寺委官將寄養馬册內注記數目多少事畢呈部一體參究其各州縣新解到備用馬匹本寺例該驗印收發寄養不許缺馬官軍赴寺取便告兊有壞馬政如違比照強奪混爭事例問罪關領畢日該營照前造册二本回報備照庶馬匹數目日後不誤稽核軍民彼此目前不至耽滯一所謂酌緩急者先年京營官軍關換馬匹騎操年久未經選退遇有倒失俱係本人買補後因賠買艱難逃亡相繼成化年間撫寧侯朱永始為衆輕易舉朋合樁頭之議二項出銀官多軍少各就本隊算計若朋合多於樁頭倒失數少通融買補無不及數若椿頭多於朋合倒失數多支用盡絶數亦難完𢎞治初年本部因該營倒失馬匹買補多有未完奏將把總管隊等官查算住俸倒失三分以上買補未完者三項銀兩雖收完支盡亦住俸一箇月四分以上住二箇月五分以上住三箇月坐營侯伯都督並住止二箇月其於騎操比較如此至若奏關本寺寄養嵗中十無二三𢎞治四等年保國公朱永等為預防慮患等事節奏奮武等營見收朋合樁頭銀兩查盤明白街市少馬買補不前乞將送寺於順天府所屬取兌等因本寺卿李溫等為暫停兌換以足備用等事又各奏稱寄養有限該營積銀不買動要送寺兌換寄養恐致客商不肯販馬來京倉卒誤事等因本部題準今後各營朋合樁頭不拘多少務要陸續買補騎操不許收至萬兩之上致難盡買待候順天府馬積有三四萬匹本營虧欠數多如果買補不前具奏定奪其於寄養吝惜如此及至兌易之際又有本寺卿宋琮具奏本部題準處置寄養以蘇民困事例該營果因征調緊急用馬方許將銀奏送本寺斟酌見在馬匹多寡明白具奏定與騸馬十二嵗以上至十五嵗兒馬十嵗以上至十三嵗調取交兌不許委官人等刁蹬揀選其餘騸馬十三嵗至十七嵗兒馬十一嵗至十五嵗於宣府薊州等處交兊在邊缺馬官軍每領去馬一匹各出價銀四兩解寺不願者聽其交兌間又復酌量如此此皆二十年前後京營邊關奉行事例臣孟春彼時任兵部屬官親所知見正德元年又奉敕陜西延綏寧夏甘肅等處清查馬價所有在邊建白曾經本部議處奈何近年以來營邊騎操倒失之數自今視昔日有甚焉出銀之人不知何官住俸之官不知何人順天等府寄養調取之數從後觀前嵗常倍蓰朋合樁頭不聞兌易數目東俵西交不聞空間時月以致人馬奔命既頻且難買馬之價銀處處轉加髙貴給軍之馬匹人人勒要壯臕新收不得存留舊管不能發脫脂膏已盡溪壑難填興言及此實切痛心伏望皇上俯惻軍民平施雨露軫邦本之至重以馬政為深憂交兌之間悉聽本部斟酌緩急為之可否量分等第查奏施行庶于民物生靈少遂安全休息何文簡疏議卷三
