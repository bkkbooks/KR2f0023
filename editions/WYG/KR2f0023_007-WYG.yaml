body:
  text: 何文簡疏議巻七明何孟春撰地方疏題為地方事准兵部咨該本部題内開大同宣府并雲南等處各該巡撫官員今歲俱免赴京議事若有益於政體便於軍民應議事件明白條陳差人齎奏㑹官計議奏請定奪其所奏事件務要直言簡易不許虚飾繁文亦不許將應該自處瑣細尋常事情一槩混奏等因題奉聖㫖是欽此欽遵備咨前來切念臣本以庸愚濫膺巡撫去離僕從越在裔夷耳聞目擊應該自處者常圖效於萬分而心計手籌不敢自専者實願攄於一得顧臨兹地忽巳三年查得撫屬地方十有二事質彼僉謀斷於已見係干應議事件相應明白條陳用是虚繁不飾簡易以聞伏望皇上軫念遐荒特勅該部㑹議施行雖政體不能深益而軍民亦頗皆便臣不勝拳拳縁係地方事理為此開坐具本差承差楊金齎捧謹題請㫖計開一查得鶴慶軍民府洪武初領州六劒川蘭順北勝蒗蕖永寧當時土官掌印必須㕘以流官地方廣逺所以官皆全設後十七年改蘭州屬麗江二十九年改北勝蒗蕖永寧𨽻瀾滄本府止轄劒順二州兩州賦役全無供億劒川州止納知府馬夫一名其餘柴薪等項俱派本府一十三里出備且府官并首領共八員錢糧詞訟知府管理有餘守禦二所屯糧只須通判督理餘官俱無可理之事又地極邊方每選一官至任俸資柴薪不得時給往往貧乏難存而民間送故迎新却又不勝勞擾以此官民至今常告不便行據布按二司分守分巡官㑹呈要將本府止設知府通判經厯并見在土官知事共四員其同知推官照磨檢校四員盡行裁革庶使官無冗濫民可甦息等因臣惟前項府分領地既狹於前設官宜减於舊今事簡官多民疲差重若將所議同知推官照磨檢校裁革以省員冗以蘇民困揆之事體委的相應一查得鶴慶軍民府與劒川州相去山路一程中間清水江巡檢司額設官吏二員名弓兵五十名縁衙門在深陡山箐中四圍俱是夷賊之藪先年巡檢并妻曽被殺死吏兵不敢守住衙門厯久倒塌止存空基官吏至今在府寄住不過虚縻俸禄本州額設弓兵數多隨解隨逃文移往返歲無虚日官府為其攪擾人民被其負累後來被刼者困無衙門責任地方又毎告害臨近守哨之人描陪贓物以此百夫隊長土軍人等只得備用年例穀麥顧募本府宣化關羅羅守把保障一帶山路商賈始通而巡司竟為虚設行據布按二司分守分巡官㑹呈要將本巡司衙門弓兵裁革官吏起送别補印信繳部行委本府能幹官就將附近宣化關等處羅羅召集起取二三十家前來本司地方居住保障防禦彼處山地任其開墾自種自食免其一應差徭供口不及者將原額弓兵該免丁糧量追分給庶使羅羅弓兵土軍人等各首樂從地方無慮等因臣惟前項府分清水江巡司設置賊藪不能存立而雇募附近羅羅乃能防禦此見以夷治夷之足恃也若使其人就彼居食復聽其開耕山地以自給又令原額弓兵各照優免丁糧量出工食以為資助益足堅其樂利之心而惟我約束之聽誠於地方有益巡司官吏一向寄住本府既不能盡職業裁革起送揆之事體委的相應一查得大理府賓川州係𢎞治年間添設故赤石崖里各巢夷民版籍雖屬賓川州而赤石崖巡檢司仍屬雲南縣夷民因此不服所在巡司鈐束及神摩洞蔓神寨白羊市金沙江巡檢司衙門亦皆在未設賓川州之先各司俱屬趙州北勝州雲南縣太和縣等衙門統屬後䝉添設該州各司係隔别衙門秦越相視不服差調以此年中遇賊過往常至失機誤事不便行據布按二司分守分巡官㑹呈要將各司改𨽻賓川州統屬庶使臨時便於調用有事可以責成等因臣惟前項府分伍巡檢司皆在通賊要路而賓川州乃賊出必犯之地手足須衛頭目身手須運臂指不有所制不能相使今賓川既設州治則治境之内衙門宜歸統屬若將五巡司俱𨽻附近該州以便調用揆之事體委的相應一查得大理府浪穹縣所屬十二關巡檢司設在萬山之中四圍俱係夷羅賊巢路通浪滄盜賊不時出沒洪武初設有土官巡檢張䕶李􅍬二員掌印巡捕後各為事病故子孫衰㣲今止李􅍬之後土舍一人䕶管印信公事久巳廢弛及照縣屬鳳羽鄉上下江嘴箭桿場師并順盪等巡檢司俱有土官亦設流官惟獨十二關未除流官以此掌印缺員捕盜無所責成行據布按二司分守分巡官㑹呈要將前司添設流官巡檢一員掌印土舍李伯琳巡捕盜賊庶使公事易完盜賊少息等因臣惟前項府分該縣巡司土官既不能襲職土舍一人不能辦事若照鳳羽鄉各巡司添設流官就將前清水江裁革官員於此掌印此間土舍専一責成巡捕揆之事體委的相應一查得大理府地方盜賊最難緝捕者莫如鐵索箐赤石崖等處其巢穴甚多地方甚濶山溪甚險然道理俱相連絡迤南鐵索箐等九村屬姚安府居中禾頭等村屬雲南縣迤北赤石崖等處屬賓川州地險民夷教化難及且各巢素皆結為親黨出則彼此相應其鋒莫敵入則散居巢穴其蹤難追若不責成各該捕盜土官以靖地方各地方雖有一二哨堡三兩巡司何濟於事及照雲南縣一處原有土官二員新設賓川州原無土官行據布按二司分守分巡官㑹呈要將雲南縣土官楊訓調住賓川州官為起蓋房屋安置家小於州城中赤石崖亦為修造衙門令其在彼督捕盜賊彼中居民里甲徭役錢糧就委徵收解州磨石舊附近賓川州多係楊訓莊戸凡賓川州盜賊俱委楊訓督捕姚安府地方專任本府土官同知髙鳳督捕雲南縣地方專任本縣土舍張太清督捕各分界至各地方有賊各任其咎庶使督捕無缺責成有歸等因臣惟前項府分地方捕盜本是土官之責知盜賊之虚實諳地方之險易莫如土官近年土官敢於視賊為患縱賊分贓者一以責任之未專一亦以駕馭之未盡其術爾若將髙鳳楊訓張太清等照依所擬調遣於各地方責成督捕揆之事體委的相應一查得大理府雲南縣楚場巡檢司與十二長官司衙門並置一處先因巳故土官副長官李應宗闒懶不肯住守衙門常年偷安於你甸彌陀莊等處住居衙門徒設於彼以致賊人刼搶過往人財内外鹽路不通夷民因無生理往往糾賊刦搶歲無虚月行據布按二司分守分巡官㑹呈要將長官司遷移一泡江之西孔全橋新哨添修改為本官衙門領手下兵夫二百名照舊免差自備糧食住守在彼地方專一守把賊人不令出沒及將赤石崖巡檢司􅁶於東南俄打喇只苴之間著落土舍張太清督令附近村分開通赤石崖直抵孔全橋經行轎馬官道疏通鹽路西出伱甸北至力角庶使夷民得以運鹽生理夷情便利既有生理自不為盜等因臣惟前項府分楚場地方設有巡檢足任詰捕之責若移彼處十二長官司於一泡江之西以遏賊衝又移赤石崖巡司於俄打喇只苴之間以據要害又由此開路直抵孔全橋以通官道又開路西出伱甸北至力角以便貨利揆之事體委的相應一查得大理府雲南縣伱甸巡檢司設在平川無益捕盜距東五里許石沈江自𦍑浪十字官道之間乃賊必出之路行據布按二司分守分巡官㑹呈要將前巡司遷立於石沈江自𦍑浪十字路間守把庶使要害有防奸細可遏等因臣惟前項府分所在地方密爾東小廟山與磨石舊小尖山力角之東三處俱臨賊巢山髙路險箐深林密賊常於彼窺伺往來官道為之阻絶若將巡司移遷於彼揆之事體委的相應一查得臨安府石屏州寶秀鐵冶所額設大使一員攢典一名冶戸二十四戸額辦鐵課一萬七千三百九十四斤至正徳七年本府因見歲貯鐵斤數多支用數少申䝉巡撫衙門准行本府行令本所委官估計折納每鐵一百斤計價銀二錢八分共價四十八兩七錢三釐二毫遞年冶戸辦納本府貯庫縁所設一官月支食米一石一年計米一十二石折色米每月二石折􅚔鈔不等一年該銀六兩有零一歲之間官俸如此歲以計歲所費不貲而嵗納課程未五十兩以一官一吏之設董四十餘兩之課是輸於官者少所耗於官者多得不償失居然可知行據布按二司分守分巡官㑹呈要將前衙門裁革原課於該州帶管徵辦庶使食不冗而事亦集等因臣惟前項府分該所課鐵納銀數入不多而官攅俸糧嵗積不少若行裁革止令該州帶管徵辦揆之事體委的相應一查得䝉化府地方與順寧府臨境交接其蒲夷因無巡司守把得以自由遞年過界搶殺本府地方人民巳非一日順寧䝉化隔界先年雖設一備溪江巡檢司把截縁本巡司立在荒山峰頂無益於事行據布按二司分守分巡官㑹呈要將備溪江巡檢司遷移本江江口把截過渡盤詰姦細庶使前司不為徒設而蒲夷亦知少警等因臣惟前項府分鄰境見今互有申告過界搶殺情節備溪江口正其過渡處所若將前巡司自彼移此揆之事體委的相應一查得武定軍民府元時已曽建學及後土官弄積妻商勝知本府事學校始廢國初天兵南下商勝出糧餉軍仍襲土官知府儒學之事當時上司於彼婦女固不以責望之今承平日久雲南文教大行與中國等本府離㑹城不過二程府中街市居多漢人土軍下屯寄種夷民相接言語漸變應襲土官頗知書史佐屬俱是流官所轄州縣僰人子弟多務讀書五七年間有入附雲南府學者有入昆陽州學者父兄耳聞目擊皆有願教子弟之心其子弟皆有願學之志行據布按二司分守分巡官㑹呈要將本府東嶽廟改為文廟梓潼祠為明倫堂令應襲土官與各流官協謀規畫一應當備廨舍門宇查取所轄和曲等州縣出附别府州縣學生員囬府肄業仍擇選二州一縣俊秀子弟以就師資各免其家雜泛差役就為奏請建立學校衙門設官督教庶使夷俗丕變實效克臻等因臣惟前項府分密邇㑹城風聲氣習本不相異較之元江等府外夷荒郡則大不同先年本府土官跋扈無忌使原有學校重漸教化未應至此今元江府已設有學豈可使㑹城二程外地反為不教之夷今應襲土官既頗知書史所轄二州一縣又多俊秀子弟開導趨向規畫處置事皆極易無難若與建立學校衙門設官督教揆之事體委的相應一查得澂江府潞南州民和鄉離州一百五十餘里相去兩日之程我朝舊立為邑市縣雖裁減衙門而地里寛廣人民稠密錢糧遞年完納課程並無拖欠𢎞治四年新任知縣陶鉞以邑小為嫌揑故申奉巡撫衙門奏准歸併本州厯年既久民夷離州隔逺遂不復知官法日漸變為頑梗先時該州差人前去勾攝公務猶以財買囑冀其囘䕶今則習染成風公然不出且至於拒捕及擅自起兵讐殺官司皆莫能禁將來未必不以一隅之地而貽鄰境之憂行據布按二司分守分巡官㑹呈要將本鄉奏請照舊立縣其鄉街市坊廂公􅈦基址猶是舊日縣規但舍宇曽被拆去起蓋哨房今要從新起蓋縁本鄉依山近水樹木取用方便磚瓦灰石易於燒般所欠木匠工食亦費不多鄉民聞復立縣無不鼓舞自願出辦不必動支官錢若恐官吏員役費用查得本府新興州三里知州吏目各一員潞南州里分亦不過三里只合設知州吏目各一員且路南州先係土官知州改立流官同知一員以鎮佐之今土官既易應將同知革去移此俸資柴薪以給知縣餘止増添典史柴薪俸資亦不過因往昔舊規彼處之民未嘗以是為擾如此庶使逺近均有統屬夷民日就規矩地方可無後患等因臣惟前項府分所有屬縣既近年之廢反成有害則今日之復不當憚難况地不改闢民不改聚人心思舊衆口同詞若依所擬准令將邑市縣復立就將本鄉開墾田地生聚人民分立里甲裁革潞南州同知俸資柴薪移與知縣惟少典史吏典等項之費就於本鄉税糧内編派支給使小民應役適宜糧差出産有地而上下皆得其便揆之事體委的相應一查得廣南府維摩寶山一州俱係烟瘴極邊衙門選來知府知州佐貳官員多不赴彼到任只在㑹城或在臨安地方暫住聽候上司差遣今前府分屬州流官知府知州各一員選來尚且無事可理若再有佐貳官員安所置之又查得雲南左右中前後廣陸衛衙門設在㑹城嵗計共該夏秋税糧約有一十一萬有零其屯田散在附近澂江新興嵩明晉寧昆陽安寧昆明江川陽宗易門三泊富民羅次呈貢歸化河陽禄豐等府州縣地方先年設有屯倉例該委官前去收受因無原設文職監理其事只得於各衛指揮千百戸内選委徵收奈何近年以來不才軍職奉公守法者百無一二致將錢糧擅收折色入於私家任意花費及至事發監追却乃甘受刑憲坐待死期見今監禁有至五六年者八九年者甚至一二十年者不能完官無可奈何行據都布按三司掌印并督糧督屯官㑹呈將廣南府通判一員維摩寳山二州同知各一員量行裁革於㑹城雲南府除本府舊有管理有司税糧通判外仍再添設管理屯糧通判一員監同雲南左等陸衛管屯指揮千百戸等官専收各衛夏秋屯糧其外衛司所屯糧臨期三司掌印督糧督屯官㑹同選委附近文職監收先前所委收糧指揮千百户一切革除庶使官不濫而廩禄可省事得専而奸弊可袪等因臣惟前項府分州司官員到任既無地土候差常閲歲時茍不假以署權彼何異於待缺必須暫為委用亦少得其盡心若依所擬量行裁革移其俸資柴薪以為添設管理屯糧官員之費揆之事體委的相應正徳十六年五月十七日防禦疏題為防禦地方事臣聞養雞者不畜狸牧獸者不育豺為政莫急於安民安民莫先於除盜然官不得人民何以安人無專責盜亦難除切照雲南去天逺於萬里為地雜處諸夷深山大澤實生龍蛇盜賊之患所在非一如東路彌勒州賊首阿勿等霑益州賊黨折苴等臣已㑹同鎮巡官具奏征𠞰及隨宜撫捕外其迤西一帶如大理府賓川州之赤石崖螳螂古底等處雲南縣之石沈江上七村等處姚安府之鐵索箐稗子溝等處俱是盜賊巢穴山髙箐深聨絡二百餘里頻出刦搶來去不常事聞調兵撲捕率皆遁散事後掣兵囬還旋復嘯聚經年累嵗隄備實難昔時議者謂地方曠野官司隔逺未易號召所致欲於趙州迷度市巡檢司添設一縣以控馭之又因編戸數少民力弗堪而止臣訪得該州所轄定西嶺驛與洱海衛白崖川城堡相連村居稠密在古為龍佑那肇基建治之所古鐵柱尚存川原平衍我朝撥大理䝉化景東洱海四衛屯田在彼并本州九里民雜居約有六十餘村西抵飛來寺計七十里東抵金雞廟計一百一十里大抵前項盜賊出有三路從東出者自馬喇提外居左往金雞廟及姚安地方過英武闗小孤山刦搶并鎮南州囬首便道搶白崖川而歸從西出者自力角雞坪闗向北刦搶鄧川州羅陋向南過飛來寺往䝉化地方亦或過白崖川刦搶而歸從中出者自磨石舊過梁王山入白崖川流刦或東或西而歸而此地適均為盜賊出入中路近嘗建哨添兵選委指揮等官統領資以居中鈐制本為得地奈何軍職望輕士鮮用命中間貪婪者多隂受賊賂貽害滋甚臣節次案行布按二司該道守巡官員查勘處置先後囬報皆謂不若於大理府添設捕盜通判或同知一員將本處青龍舖改設府館令其常川住劄假與權柄西自趙州東至鎮南州及姚安府賓川州雲南縣所屬土官巡司哨堡悉聽鈐制糾察土官姦弊兼理軍民詞訟一應弭盜安民事宜聽其以漸脩舉呈請合于上司詳奪仍於賊出三路附近左右相度風水完聚去處築立堡城起蓋營房調取各衛土軍民兵每處兼撥二百名每名照舊月給行糧四斗五升聽其調度分委軍職土官管領守把其飛來寺抵沙橋二百里内沿途仍俱密置烟墩就撥各哨兵夫哨瞭如飛來寺賊出各墩烽火接放則中路東路軍兵一齊䇿應或截於前或追於後東路中路賊出亦復如是失機不行䇿應者聽其㕘治務使軍兵首尾相援盜賊腹背受敵兵威既振賊勢自沮迤西一帶患害或可少弭臣反復熟籌再三博訪各官所論事體頗宜伏望皇上軫念邊遐特勅該部議而行之臣又察彼盜賊雖産夷玀亦皆人𩔖𩔖有土官為其主宰審地里之險易與盜賊之虚實又須責成土官如姚安府地方則土官府同知髙鳳州同知髙椿賓川州則土官知縣楊訓雲南縣則土舍張太清宜令各照界至往來督捕若姚安地方有賊就著落髙鳳髙椿追襲務得真正賊人解報如或不獲行拘該管通把監禁若土官隂與交通代為隠蔽許令添捕盜官從實㕘究處治至於賓川州雲南縣亦然則官得其人而事權不致於渙散人専其責而盜賊自可以潛消矣臣地方之寄有在不任拳拳惟聖明留意幸甚縁係請乞添設捕盜官員防禦地方事理未敢擅便為此具本差承差楊金親齎謹題請㫖正徳十六年五月十七日乞復學校疏題為陳悃乞恩脩復學校設官降印便育人材以圖補報事據雲南按察司帶管提督學校按察使陳洪謨呈奉臣案驗准總司闗前事依奉催據金齒司經厯司呈行據永平縣申查得本縣與永平禦前前右右二所肘腋相連官舍軍餘俱寄民户糧差事同一體生員見有已成材趙完等六名未成材阮郕等七名俱附寄本司儒學讀書相隔路途二百餘里委的窵逺往返供送艱難以致人心厭倦士氣沮撓民間俊秀子弟在城及關廂社學生徒據軍民杜閏等連名狀報各有男杜橒張紳等四十二名頗堪教養願報入學及查本城原設有文廟一所正殿塑像俱全春秋祭祀不缺兩廡明倫堂兩齋牆垣完備止是櫺星門并公廨未曽起蓋基址見存本縣原係産木地方易於脩理所費不過工食之資查得本縣贓罰贖罪及聽解麥糧銀共二百二十兩有零可以動支其齋膳門庫就於本縣九里均徭民户内僉編其廩禄於本縣秋糧合屬官吏嵗支餘剰米四百石内關給其俸鈔於二所嵗辦酒醋徵收課程銀一十一兩三錢内給用人情事體俱各相應及據永平禦前前右右二所各申軍餘數少差撥不敷欲不遵依開設學校風化所關等情囬報前來㑹同雲南布按二司守巡金滄道左㕘政鄧相副使汪標議得永平縣與永平禦設立一處軍民雜居該禦止有二所軍丁不過千餘該縣雖編九里人民多係阿昌蒲羅不通漢語文化難入兼以路當衝要人少差繁先年因有縣治雖建文廟致祭而門戸廨宇等項俱未創造蓋因人材不足不堪建學以故中止今本縣典史楊麗金奏要比照通海呈貢等縣設立儒學一節詳據該司囬文事惟欲速成不為後慮查得永平生員附寄金齒司一學止有一十三名其餘社學子弟率皆頑童稚子不過勉强凑數而已即目俱不堪教養人才尚未衆盛豈宜輒便立學徒事糜費設使强與建學未免要補廩増額數本地無人金齒城中士人貪圖食廩應貢必皆爭先冒籍應考充補况張官置吏齋膳之費門庫之役俱仰給於縣所是以窮薄軍民之財賦反供異鄉富庶之士民不惟事理不順亦恐人心不平及照本司儒學人才較之往昔頗盛規模可比一府原設官止訓導一員一遇事故缺官掌印未免權用齋長生員䕶守生徒衆多教業廢弛而永平生員赴金齒學肄業者道路實有二百餘里往來供給委有不便彼謂人心厭倦士氣沮撓或亦有之合無轉為奏請將金齒司儒學比照各府添設教授一員掌印其永平生員不必赴金齒學肄業舊設訓導行令分教本學諸生并往來永平提調彼處生員其永平原有官地亦與起造齋膳號房隨有廩膳若干許令分出膳夫銀兩常川在學㑹膳講讀及彼處社學生亦令一體考課凡遇春秋祭祀師生同縣官從宜行禮而人材亦可隨地作養等因具呈到臣案照先准本院咨准禮部咨該金齒軍民指揮使司永平縣應朝典吏楊麗金奏前事該本部看得所奏合行雲南撫按衙門督同提學守巡該道等官查勘該縣生員有無衆多附寄本司儒學讀書是否道路窵逺備查明白如果人情事體相應立學將該用錢糧等項計議停當具奏施行若是不堪立學徑自立案等因到臣已經案行查勘去後今據前因㑹同巡按御史羅玉議照黨庠術序先王造士興賢之地家誦巷歌有國化民成俗之務為之有漸期於用夏以變夷教之有方尤貴篤近而舉逺今金齒司儒學既人材頗盛則師訓不可缺員永平縣地方既徒衆不多則學校難於遽設中間委曲誠又有如提學并該道守巡官所云者相應斟酌處置如䝉皇上軫念邊遐特勅該部再加議處合無准於金齒司添設教授一員掌管印信舊設訓導分教本學諸生中有永平附寄生員免其逺赴肄業令分教官往來提調并社學生一體考課講解其餘事宜悉依今勘所擬施行積之年久如果教養有成人材漸發戸口繁増財力寛裕堪以專立一學再行奏請庶幾此日官不乏教士得安居而異時學非徒建財無浪費臣除行該司聽候施行外緣係督同提學守巡該道等官查勘事理未敢擅便為此具本差承差楊金親齎謹題請㫖正徳十六年五月十七日陳言疏題為陳言乞重天命以興聖治事臣聞國運當興天命攸眷帝心簡在衆誠所歸皇帝陛下興聖於南維配天於北極藩邦之號表於徵兆莫之為而為厯數之傳形於誕敷莫之致而致陛下應符而出躬受天命蓋自知所重踐阼以來心存聖治固宜思所以興之矣臣限守炎荒遙瞻魏闕草茅耿耿不勝至愚竊伏私計今當數月在廷羣臣自元老以至庶寮幸際清明共圖傾竭事之是非政之得失官之臧否民之休戚罔不畢陳法令之斟酌紀綱之董正人才之進退威福之流布弊革害除壅袪滯滌忠明佞白賞信罰必維其時矣臣愚竊計今日羣臣之所陳者心有萬慮口有萬言萬慮至深萬言至富其條件不可勝計其科名各有指及臣外逺莫由與聞然大較知其所願惟在陛下脩徳勤政始終不間而已脩徳者勤政之本勤政者脩徳之發脩徳勤政非有二事所謂脩徳者宋吕公著告其君曰人主即位之始當正始以正天下脩徳以安百姓脩徳莫先於學人主之所當學者觀古聖人之所以用心論厯代帝王所以興亡治亂之迹求立政立事之要講愛民利物之術自然日就月將徳及天下書曰王人求多聞時惟建事又曰念終始典于學厥徳脩罔覺傳説之告髙宗不過如此揚雄曰學之為王者事其已久矣堯舜禹湯文武汲汲夫學者所以學治天下王者之事也故自堯舜禹湯文武之為君皆汲汲於學後世繼體守成之主生而驕逸忘其祖宗創業之艱難徒見天下無事以為禍亂無從而生或荒耽於酒或盤於遊畋或窮奢極侈小而喪身大而亡國皆由不能以學脩徳故也夫學以脩徳而政事由此立焉是脩徳者勤政之本也所謂勤政者司馬光告其君曰人主初即位正四海延頸企踵屬望之時若深執謙遜端拱不言羣臣奏事不加處斷中外之情能無鬱悒易曰聖人作而萬物覩又曰帝出乎震相見乎離志不可慢時不可失不回視反聽無以新隆平之基不改絃易轍無以拯頺靡之勢今近而畿甸逺而海隅之民注想維新如饑如渴須亟有以慰之百凡執事中君子小人情各不同窺測深淺相為勝負事又有當蚤應者詩曰弗躬弗親庶民弗信弗問弗仕勿罔君子言人主勤政無有逺近幽深悉知其事物如此而後能治天下若有行弗躬有事弗親雖有盛徳民何取信弗能問以盡其事弗能察以盡其物則小人得以勿罔君子矣庶民弗信則不能安民矣勿罔君子則不能知人矣不能知人何以求治人主不患無髙世之資而患無求治之意不患無求治之意而患無好學之實脩徳在於好學求治在於勤政是勤政者脩徳之發也欲進是道無他亦惟在乎知人與急親賢而已孔子曰舜有臣五人而天下治孟子曰堯以不得舜為己憂舜以不得禹臯陶為己憂古之帝王先務為急程頤告其君曰人主大率一日之中接賢士大夫之時多親寺人宫女之時少則自然氣質變化徳性成就商之髙宗舊勞於外及為天子不敢荒寧享國長久為後王法周之成王年十有三而即帝位起居言動必謹後世守成之主莫有及焉髙宗學於甘盤而傅説為之相成王以召公為之保周公為之師故其徳昌隆而政休美陛下起自外藩如商髙宗春秋鼎盛如周成王在朝士大夫素未相接文華講學當選天下儒碩於今方始既深居九重逺於萬里若復顒卭淵黙日益嚴重則自賢自聖上之乏涵養薫陶之功下之無周旋輔導之助外之幽僻之民銜寃失職者何由上聞疎賤之臣懐材藴徳者何由自達臣愚伏願陛下追法帝王舊典紹復祖宗故事未明求衣辨色視朝日御經筵無分寒暑或退朝便殿推擇二三大臣及諸侍從更召迭進與之從容辯議古今治體人間情偽使各盡其胸臆所懐至於文武班寮凡有職業應進見者亦必命之使前降以温顔假以長晷親加詢訪委曲詳悉使下情上通無所壅蔽又得知其人志趣所向器資所任而加銓定焉其有經術通明有守不畏魁磊淳茂耆艾之士及諸博通今古史𫝊智謀超卓可以㕘廟謨斷國論者陛下置之優閒引之禁近使得專意討論以備朝夕召見紬繹顧問密勿獻替務俾縉紳有道巖穴篤行之儒毋逺於朝毋遺於野如程頤所言經筵既罷常留二人直日夜則一人直宿祇候非時宣召資其啓沃其有事故請假者須與以次官互換輪直則羣臣間將皆有一言可禆時政將皆有一善可答君恩將皆得分陛下憂勤之寄將皆得副朝廷委用之誠不敢偷安茍禄養望待遷而陛下得開益聰明漸摩道義為商髙宗中興殷世為周成王専美姬室徳不期脩而自脩政不期勤而自勤矣或曰陛下昉臨大寶一日二日萬幾晝既研觀書史夜須省覽章疏究隠㣲於未形極思慮之不到而又欲與大臣從官延欵酬對日昃夜分猶將弗給恐非頤養神明之道竊以為不然為國有體勤政有要政有本末事有細鉅察目睫者不能見百步察百步者不能見目睫舉其綱則萬目張挈其領則衆毛理陛下誠脩徳勤政知人而親賢臣下之賢者登之不肖者斥之其材能之堪某事者就任使之有功者必賞有罪者必誅已先得其體要先得其本與其鉅者自然躬不勞而日有暇於講學矣若夫簿書煩冗文法碎密較量金穀割析毫釐乃百官庶寮之所司大明㑹典内開載列聖累朝品式格例甚悉陛下遇有以此言此事陳者第令各該衙門檢括看詳斟酌停當取决施行雖勿留意蓋無不可古人云習與智長化與心成又云少成若天性習慣如自然為可為於可為之時正賴今日臣所謂重天命以興聖治不越乎是惟陛下裁察臣無任瞻戀拳拳之至為此具本差承差施廷秀親齎謹題請㫖正徳十六年六月十三日公折俸疏題為公折俸以勸小官事臣聞子路曰負重致逺不擇地而休家貧親老不擇禄而仕不擇禄而仕者孟子所謂仕非為貧也而有時乎為貧謂夫居卑者也易曰天地養萬物聖人養賢以及萬民解者謂養民則必須賢故先養賢養賢則必須禄禄厚然後可以責亷隅安職業故中庸論九經其一為體羣臣體羣臣則士之報禮重忠信重禄所以勸士也方今宦途官之小者本為禄仕茍折俸太薄無以為俯仰資人品不齊所學所志豈能皆自信而固守國家欲其不受贓物不罹憲網難矣雲南逺方地窳民夷水路不通非他處比府佐并州縣官俱缺養馬丁夫府衛州縣首領各儒學及驛遞巡司倉場所庫務局等官位卑禄薄至者多係以例告逺及不得已貧老之人攜挾妻子去離鄉闗萬里驅馳經嵗始至末流雜職既鮮𨽻卒又無馬匹甚至無址可棲至則僦賃房屋揭借柴米舉家懸望折俸為生延及季終具告支取該管衙門舊每視為泛常過期不與致使房吏索錢不得使用不為稟給此等小官在任窮極或將子女結婚富室以圖借貸或將衣服典賣他人以為盤費臨事之際豈不知畏刑憲而侵盜官錢受取贓物秖顧燒眉且圖糊口事敗跡著監追配發罪非不當情實可哀其餘不幸疾病死喪柩尸暴露妻子流離者有之幸獲任滿又因力不能歸寄籍州縣終身抱丘首之恨者有之臣撫臨以來耳聞目擊不一而足應該為彼清究處置情節略已施行外近為㑹計糧儲事行據雲南布政司備將所屬大小文職官員月支俸糧造冊呈繳到臣查得布政司等衙門大小文職官員月支俸糧除本色米及折海􅚔米外其鈔米布按二司雲南府昆明縣官都司并在鎮城陸衛首領官每石價銀二錢八分五釐大理臨安鶴慶姚安武定䝉化等府劒川州官毎石一錢三分三釐楚雄曲靖尋甸澂江廣西鎮沅廣南永寧順寧等府新化北勝等州官并所屬州縣各該衙門官安寧五井黒鹽白鹽提舉司官與雲南府大理等府所屬安寧等州呈貢等縣各該衙門官每石一分六釐所支名目雖同所得分數不一臣惟俸每石同折宜一也今重者每石二錢八分五釐或一錢三分三釐輕者一分六釐鈔每貫同價宜一也今重者每貫一分四釐二毫或六釐六毫輕則八毫重輕厚薄懸絶如此八品九品官不在鎮城衙門每月除本色米一石外􅚔鈔米銀止共得二兩一兩未入流官每月止共得三錢五分七釐此等官員何以度日饑窘迫切何以保全終始此非我祖宗欽定折俸之通制非古聖人之所以養賢所以勸士之常道也或謂末流雜職儒學官外少由科貢多出吏胥幾何足養幾何足勸臣竊以為官無崇卑並膺朝命職有髙下並是國家臣子分職領事不可或無命服既加似難弗恤古之治天下者一夫不獲猶為已責而况與有職業相須為治之人乎今者伏遇皇帝陛下維新庶政大賚四方膏澤所施朽枯同被凡與出身咸思革面正竭涓埃願輸海嶽之時如䝉聖恩察臣此言特詢該部備查先年雲南并各布政司大小文職折俸輕重厚薄事例㕘量斟酌將雲南逺方選到末流雜職官員折俸鈔米或照本處何項等第或照他處若干分數稍從其厚各適厥中使小官有實恵可霑外郡與鎮城無異兩廣貴州等處各布政司小官折俸有差池者照此查議擘畫施行庶幾上天雨露之仁獲同於一視下土螻蟻之職克效於萬分而秉節持斧之使臣當其有事亦得以責成遇其有罪亦得以盡法矣其於政體不為無補縁係乞明事例公折俸以勸小官事理未敢擅便為此具本差承差施廷秀親齎謹題請㫖正徳十六年六月十六日辭俸廕疏奏為乞恩辭免俸䕃事正徳十六年七月初一日准兵部咨為捷音事該本部題該臣等㑹題本部議得雲南十八寨蠻賊阿寺等慿藉深山大箐兇惡僣稱王號連年刦殺人財騷擾地方本部先因都給事中劉洙論奏議行鎮巡等官勘議撫𠞰數年之間迄無成功都御史可孟春等奉命督勵文武官員部領土漢官軍分道並進設奇取勝元惡授首餘黨削平此皆皇上聖武神威布昭遐邇之所致也所據巡撫都御史何孟春鎮守太監史泰經略周悉兵糧皆足戰守咸備致此克捷論其功蹟實為之最巡按御史陳察協心調度紀驗詳明功亦可尚㕘政鄧相副使王忠都指揮方仲方略俱有領兵督戰之功㕘政晁必登僉事周愚俱有監軍督餉之勞僉事潘􅞜都指揮劉璽布政使方璘按察使陳洪謨都指揮劉宗仁各能隨事効勞贊襄戎事以上各官功俱可録合無查照近年平賊陞賞事例何孟春史泰各加禄䕃陳察量加陞用鄧相王忠等各量陞俸級潘􅞜劉璽等各量加賞賚及照都給事中劉洙先事建議得平强冦以靖地方功亦難泯等因正徳十六年三月初二日題奉聖㫖是史泰嵗加禄米十二石何孟春陞俸一級還各䕃子姪一人做百戸劉洙先事建議致有成功與陳察并鄧相王忠晁必登周愚方仲方略各陞俸一級潘􅞜劉璽方璘等各賞銀五兩紵絲一表裡欽此欽遵通行外所據應䕃子姪縁無姓名職役合咨前去煩照本部題奉欽依内事理將應䕃弟男子姪姓名咨報以凴上請䕃授等因到臣聞命驚惶罔知攸措竊惟地方之事皆臣職分之所當為盜賊克平非臣智力之所能致乃䝉先皇帝俯從該部查照近年各該地方平賊陞賞事例濫及臣等臣自揣有何功勞敢同各處恩錫伏望皇上容臣辭免使臣不致踰涯越分速戾招尤臣無任感戴天恩之至為此激切具本差承差張雲親齎謹具奏聞伏候勅㫖正徳十六年七月初三日閉銀場第二疏題為乞查原奏早閉銀場蠲國課以安民生事正徳十四年五月内該臣㑹同鎮守雲南總兵官黔國公沐崐巡按雲南監察御史萬鎡公同都布按三司官查議得雲南大理等府新興等處銀場節因鎮守内臣差去人員採挖未免囊橐其間以致嵗辦不敷將礦夫口糧折辦又將夫丁乾認共補課額大約一歲銀場所出不及五分之一礦夫口糧夫丁折辦乾認乃至十分七八正徳六年總兵等官奏將各場封閉免辦地方始獲少安正徳九年被瀾滄衛軍妄行奏開旋復科擾害生侵欺弊出正徳十三年鎮守太監具奏領勅職専提督以來歳必取盈礦夫口糧折辦銀布政司因麗江䝉化等府遞年拖欠恐誤解京那借在庫備邊銀共二萬五千餘兩凑解至今未補夫丁乾認銀都司遞年追併𦂳急將各土軍賣男鬻女接凑補納又被經收人員耗取侵用軍受横征之苦國無完課之期要將軍充礦夫一切查革各照原伍操備差使口糧亦各免派行令各府州縣量徵折色解布政司備邊其銀場照舊封閉等因該戸部題奉先皇帝聖㫖是這礦場應否開閉還著鎮巡等官查議明白來説欽此欽遵移咨前來已行雲南都布按三司將礦夫查革口糧免派及將銀場各呈鎮守巡按衙門㑹呈查議去後未報節行催外正徳十五年七月内臣又㑹同巡按雲南監察御史陳察再查議得雲南地方銀場法當封閉從前撫按官員累次言之已為懇切該部執奏巳為明備大抵銀場為利實少為害實多利纔十一害率千百而十一之利又不全歸公家千百之害常至槩及官私判山等場𢎞治十二年奏除之後續有採挖九重不得知也新興等場正徳九年奏開附近處所峒口名色九重亦不得盡聞也附近峒口數年之利巡撫等官不預其事不審以供上者幾何臣等去嵗㑹奏新開處所乃是追論之言既往無益不煩更悉本年三月初八等日雲南大理等府州縣各申報地震而近銀場地方震動尤甚實由場礦採挖深酷有傷地脈隂道不寧所致相應早加封閉不許姦徒再啓釁端使夫丁永壯城池之守銀米永充倉庫之儲等因具題至今未奉明㫖臣謹再㑹同接管巡按雲南監察御史羅玉議得前項銀場在先鎮巡等官議開議閉甲可乙否素不相合蓋鎮守太監係原奏開之人今日難於㑹議臣等原奏封閉之事始終决不茍同議開者方託以利欲炎上心議閉者厯陳其害冀悟天意言之矛盾固有由然今既伏遇皇帝陛下鼎命初凝離明普照先朝庶政絃轍維新積嵗奏章匭囊無滯銀場之當早封閉特在陛下查出原奏一言决矣陛下踐阼之餘儉徳形於詔㫖仁聲溢於羣聽富有四海豈以千萬緍為贏縮况沒籍罪人財産萬萬於兹望乞早降綸音著于令甲將前銀場永逺封閉地方生靈不勝大幸縁係乞查原奏以安民生事理未敢擅便為此具本差承差張雲親齎謹題請㫖正徳十六年七月初三日裁革冗員疏題為裁革内外冗員守臣復設府治撫安夷民以消地方大變事巻查先為巡撫地方事據雲南布政司呈奉臣批據前整飭金騰兵備雲南按察司副使劉節呈奉臣案驗前事行准接管兵備副使汪標牒呈到司㑹同都按二司查議相同等因具呈到臣㑹同巡按雲南監察御史羅玉巡按雲貴監察御史席書議得天下事消變於未萌者策之上消變於將萌者䇿之中變成而後救斯無䇿矣臣切見雲南地方俱有諸夷然西至大理東至臨安皆是府衛相㕘事體有定規賦役有常制故民雖未富猶得麤安惟金齒一司實古之哀牢郡漢之永昌府考自元以上皆為府治其後元務逺略創立大理金齒等處宣慰使司都元帥府於銀生崖甸其地在伯夷䝉樂山下去金齒司南一千餘里其夷沒後金箱二齒而葬故因得名與永昌府絶無干渉後元因其地不可守改為金齒衛移入永昌府共治元末道梗流官多缺止有土官通判在任聖朝洪武十五年於指揮王真處降附十六年春附近諸夷忿王真立衛鎮守不恤府事乃共推已退土官髙公引麓川思可發夷兵數萬來攻生擒王真盡夷其城而去本年十月雲南指揮李觀請復立永昌府金齒衛招撫安輯十七年閏十月朝廷降到永昌府印又續發南京及各處軍萬名充實軍伍府衛相㕘軍民安堵二十二年十二月李觀病故後指揮胡淵以舊城夷毁改築新城因欲自尊假以民少糧不及俸為名於二十三年十二月初八日奏革永昌府改衛為金齒軍民指揮使司兼管軍民彼時淵以築城有功意在専制自便又以指揮俱長單掌印例無考選軍政可使世世專有此土却將永昌一府之民併入永昌金齒二千戸所尚有附府良民無歸編立東西太和陸軍等里徑屬本衛原本衛所屬施甸等縣續立鎮夷等州俱革為長官司百夫長等衙門惟永平一縣乃古博南縣民不可革遂槩𨽻指揮司統屬彼時淵恃其功不欲與府頡頏訖得成其私計然親承屠城之􅃤深結夷民之心故需索少而糧差之額輕軍民和而調發之事簡又以府衛所有専供一司故夷民皆安財用頗足後來承之儘意貪剥近城寨分已不如前其後因麓川反叛加以征調夷民漸困及景泰末都督毛勝因隨麓川知金齒司指揮供給最厚遂營幹鎮守有内臣見得毛勝獲利監承黎義等亦行接踵前來廣占夷民之田以為官莊大取夷民之財以供諸費邊夷自此始不聊生然名目尚少猶可支持相承到今日増月長典馬典軍誅求萬計磕頭見面動要數千過江錢子粒錢聽事錢家火錢差馬錢馬草錢馬料錢油刷錢椒鹽錢料絲燈錢進貢弩手錢下京盤纒錢籠杠錢無時得了白米戸馬料戸麥子戸柿餅戸香笋戸酒米戸雞㙡戸牛皮戸柴薪戸無日不徵加以跟役小人百様生事害人光棍牢子一時縱横取索椎髓剥肉倡言不恤夷民畏死莫敢不從由是强者出為盜賊弱者逃入外夷如近城鳳溪一長官司今止數家二代不襲可見矣較之宣徳正統之間環城百里之夷民十亡八九比之成化𢎞治之始二三百里之夷民亦減六七所不能逃者赤身裸體食草鋤山氣息奄奄死亡無數而上下交征略不為異如施甸夷民害極欲變正徳十年三月城門為之晝閉騰衝軍士逼於拜見正徳十一年太監居宅曽被攻圍及今木邦起兵奪占孟定府又起兵入隴川臨芒市又起兵入灣甸州其州去永昌老徭寨僅四十里孟養又起兵過金沙江鑿山開道由茶山直抵騰衝孟密又敢要求宣慰遞到緬書有伱侍長差劉京官來拜見等語臣訪於地方官吏耆老言自討平麓川之後今經八十餘年並無夷人如此侵犯良由金騰二司軍官不才又恃鎮守内臣將官隂為主張附近夷民被害不過各逃往彼處以訴其怨彼各得招懐以益其强既知二司之虚憊又悉二司之貪殘而内外守臣且又年年下番哄誘寶石月月設計欺騙金銀遂使逺夷生凌侮之心興兵試作變之漸若不早為處置誠恐大變即興蓋附近夷民為二司藩籬今皆抱恨切骨則藩籬撤矣附郭軍民為地方根本今皆疾首痛心則根本病矣藩籬根本皆墮大變固應不逺臣叨受巡撫之寄憂如焚灼坐在氊針博采廣詢共言㑹城既有鎮守雲南并金齒騰衝地方太監金騰地方又有鎮守太監㑹城既有鎮守雲南總兵金騰地方又有鎮守㕘將一處兩人政體固有未便官多民擾下情誠有未堪先年金騰鎮守罷設不常秪縁舊制所無並係冗員之數今者夷民甚是艱苦邊事又多釁蘖鎮守官員不比其他文職就使全無漁獵終亦供給煩難無之不見其為少有之益見其為害得省一日則民得一日之寛得省一年則民受一年之賜今日為金騰計惟是裁革前項鎮守内臣將官裁革之後仍復府治以撫安之則内患可除外變自息臣以此言考諸前十數年巡撫等官固有憂先於臣具本凡二三次陳奏者矣縁該部只照常行雲南鎮守衙門勘報殊不思鎮守衙門太監與同𩔖為一心總兵與㕘將為一體為鎮守者於近夷日取之財必千必萬於逺夷嵗通之利莫考莫稽既圖利身誰肯為國一承行勘轉加唬嚇設言治其妄告倒説為伊解釋各差官於各寨逼要乞留鎮守保狀不願復府甘結更令科派備禮磕頭所以夷民則畏懼益深蓄怨益切二司則剥削愈肆聲勢愈張非徒無益於弭亂適乃促發其禍機今幸皇上入承大統聖譽昭升率土普天更新視聽延頸企踵想望太平用敢罄竭愚誠冀消變故臣近節該伏覩登極明詔内開正徳元年以來傳陞乞陞大小官職盡行裁革各邊但係正徳年間新添分守守備内臣詔書到日即便囘京分守守備内臣將官有正徳元年以後改作鎮守等項名色兵部查奏改正欽此前項鎮守金騰太監㕘將應在裁革及即便囬京并查奏改正之例如䝉乞勅兵部早賜施行其復設府治一事尤願聖明俯垂睿鑒不惑羣議斷自宸衷下之戸部備查前後撫巡奏詞所以不㑹鎮守之故以審事情免行鎮守衙門勘報致成掣肘之難反貽患禍將金齒司所屬永昌金齒二千戸所夷民并附郭各里百姓仍舊復立永昌軍民府統治再乞勅吏部精選四川湖廣貴州有守有為進士出身知府一員舉人出身通判一員推官一員經厯司經厯一員照磨所照磨一員司獄司司獄一員令其領印作急前來到任其所割𨽻州縣長官司及合屬衙門俱俟知府到日計度人民戸籍多寡地里逺近照舊為州為縣為長官等司另行奏請銓官降印其騰衝司亦原係府治後改為騰越州騰衝守禦千戸所彼時州𨽻永昌府所𨽻金齒衛後為比照金齒改為軍民指揮使司今其為害亦與金齒相同若金齒復為府衛騰衝亦合復為州或為縣將司改為衛土軍土民相㕘管理其大小事例亦比金齒次第舉行若其公堂廨宇臣已訪得二處空閑地方房屋甚多鎮守内臣將官去後各該官至自可不勞而備如此則近便夷民自可得安逺地夷心自然畏服而大變之不可救者可坐而消矣然不止潛消禍變於將來又可廣垂利澤於永久臣請略節陳之原兩司皆是指揮千百戸等官凡經收錢糧皆先取以阿奉權勢因而竊入私家盡行花費及至盤查則認借充盤隨復竊出花費事發之後監追至死無處賠納為此守巡官無法可治將金騰官銀多解大理府庫收貯今復府治則免寄大理既可省五日䕶送又可以答應𦂳急其利一也又凡承委撫夷勘問詞訟徵收錢糧各一事不知一字不識凡地方詞訟錢糧不能辦集今復府治則承委有人諸事易辦其利二也又所轄永平以文職縣治為軍衛統屬人情不便且又設有學校生徒彼提調官乃一蠢然武夫豈能作興士𩔖今復府治則府縣相承有司體統各得其宜金齒司學仍為府學士𩔖亦各有所觀感其利三也又驛課巡司缺官不報各買求署掌見今館驛日日折乾二兩而供應在外税課徵商倍常而課程尚虧災異常見而不敢申呈吏員久役而不欲起送今復府治則官無虚曠館驛可蘇税課可減商賈可通災異可警吏役可正其利四也凡元宵烟火料絲燈皆於操處出銀五十兩製造永昌所却又遍行科派夷寨春牛芒神天下同制今要多造兩頭承奉分派夷民各壇祭祀惟衣冠與祭有胙今要賣補二倍分送跟官光棍牢子人等今復府治則此費亦得斷絶其利五也又金齒無魚利比之大理不及然東湖各塘壩河池所出市不缺賣南北河道竹木之來嵗不缺入而魚課之徵抽分之利通入私門今復府治則財用自足其利六也往時官舍軍民之家有不得已乗喪嫁娶者皆在夜中惟恐人覺目今指揮等官稟過官府任行嫁娶或父母喪後三五日或半年白晝婚娶皷樂喧闐誇示市廛衆皆欣慕納賄請求以為榮耀人心全泯風俗盡移今復府治則此弊可無風俗還舊其利七也夫復設府治能消禍變之大創永久之利如此然十數年前巡撫等官言之無益鎮守衙門勘報竟格不行其事可知臣今幸遇聖明登極庶政維新千載一時機不可失三年於此慮已至深倘又畏首畏尾不一陳之豈不上辜於責任下負於地方哉臣猶恐欲專地方之權以取利幸地方之變以激功者曲加沮撓臣請逐件折之若曰永昌府係太祖髙皇帝時所革只當遵守不宜更復則胡淵革府之時府學亦革為足食倉矣何自正統以來列聖又因臣下之請復照府學事例立學到今乎若曰金騰地接外夷規畫已定忽復府治恐兵弱不能控守則見今臨安接界於安南比之諸夷之離金齒尤近安南地盡於南海比之各夷之宣慰更强臨安因有府衛足制强大之安南而金齒不然正由司治貪汚每起其欲變耳今以永昌府衛相㕘又加騰衝外䕶有不能控制數宣慰司窮逺之夷乎若曰民少不勾僉一府之皁𨽻門庫糧少不勾供一府之官員俸糧則查今革去鎮守衙門隠占白米戸之丁力足勾一時之皁𨽻門庫私納白米之石數足勾一時官員之俸糧矣何况三十寨之秋糧各里民之賦役乎若曰未嘗有例緩求其宜則見今雲南大理䝉化景東楚雄臨安曲靖俱有府有衛即其例矣且内惟臨安大理二府上地民戸財産田畝與金騰相等其餘府分逺不能及况今夷民困極大變將興救焚拯溺少或遲延則禍患必作噬臍無及豈容緩乎其餘區處細㣲事務曲折非本内所能悉者臣已悉與布按二司官晝夜計算經畫停當决可弭大患於將萌垂利澤於永久如或一有不效臣敢萬死以謝妄言輕舉之罪伏望聖恩憫念民生久罹荼毒無處控訴洞察民情將成禍患尚可消弭速施剛斷俯賜允從則地方幸甚生民幸甚臣等幸甚縁係裁革守臣復設府治撫安夷民以消地方大變事理未敢擅便為此具本差承差郭景文親齎謹題請㫖正徳十六年八月日何文簡疏議巻七
