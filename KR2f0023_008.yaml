body:
  text: 何文簡疏議巻八明何孟春撰陳革内官疏題為陳言鎮守内臣貽患地方事正徳十六年八月初四日節該欽奉詔書一各處鎮守等官違例奏帶人衆到於地方科歛財物所在官員因而乗機指一科十貪利成風以致百姓受害深可痛心詔書到日例外奏帶人員即便各囘原衛原籍閒住當差違者許撫按并按察司官察訪㕘奏挐問其鎮守等官更替仍照舊例寫勑不許干預錢糧詞訟侵越諸衙門職掌亦不許假以進貢為名僉取皂𨽻科歛銀兩擾害軍民額外進貢一切停止一自正徳年以來劉瑾錢寧江彬相繼擅權在京在外各該衙門弊政多端詔書該載不盡者議奏裁革欽此欽遵臣查得正徳八年十月内兵部咨一件為陳情乞恩以便鎮守地方事該本部題該鎮守雲南并金齒騰衝地方御馬監太監梁裕奏稱到任以來所有日用之需止倚廩米五升奏帶官舍五員名日支口糧七升五合未勾一日之用餘有㕘隨不支口糧舍人二十名缺食艱難欲照先任鎮守太監錢能等揭撥柴薪軍伴等項給用本部議得鎮守内外官跟隨軍伴例該二十四名外無撥給柴薪皂𨽻事例合無行巡撫雲南都御史㑹同巡按御史弔查先任鎮守太監錢能等是否奏奉事例准於所屬府州縣編僉柴薪皂𨽻若干名數後於何年月日有無奉有事例查革只今應否撥給具奏定奪題奉先皇帝聖㫖只照錢能每例行不必行查欽此欽遵備咨前來該前巡撫都御史洪逺通行去後都御史王懋中范鏞并臣接管巡撫臣訪得先年鎮守太監錢能張威恃勢貪財害人至今人猶切齒揭撥柴薪軍伴等項皆其作俑為之後來太監王舉覃平劉昶崔安張倫等鎮守踵以成例太監梁裕奏要照依先任太監撥給正係劉瑾錢寧江彬相繼擅權之時正係弊政今日應該議奏裁革之事然欲鎮守太監衙門自行議奏裁革不無遲悞臣廣詢密訪耆老人等再三始言雲南比先無鎮守太監民夷安樂自景泰年太監到來取用不訾每歲於雲南左等六衛曲靖平夷大羅六涼越州臨安楚雄洱海大理瀾滄䝉化景東易門安寧定逺中屯姚安宜良楊林馬龍木密二十七衛所僉取柴薪軍伴大認小認銀共三千三百八十七兩左等六衛取稻草青草并屯田稻草銀五百兩澂江元江石屏南安寧州建水羅次禄豐易門河西廣通嶍峨元謀十三府州縣取子粒銀五百二十八兩八錢昆陽昆明二州縣取門子皂𨽻菜戸松子銀一百六十兩箇舊錫場銀二百五十兩近城西南二壩菜海子石厰大西門二馬房北門外窰地石虎岡租銀西海子蘆蓆呈貢縣草場洱海蒙化二衛租榖共銀三百七十二兩一錢羅羅關歸化縣并近城取鷄鵝房魚塘銀四十五兩洱海衛武定尋甸二府取羊毛銀三百二十兩左右中前四衛元江元謀禄豐三府縣取酒米八百八十六石銀一百七十兩歸化寺石虎岡路南州東溝龍王廟昆明縣澂江嵩明歸化宜良四府州縣楊林宜良二所取子粒租豆醬麥共二百五十四石廣備倉取馬料銀七十二兩楚雄衛取麂皮三十張武定府銀九兩臨安府衛景東衛取紙劄銀八十五兩大理府衛䝉化衛取奏表尺夾牌榜手本單紙共三萬七千四百張墨一百二十錠筆一百五十枝臨安元江二府臨安衛納樓長官司禄蓬普台五畝三寨取新檳榔五萬箇乾檳榔二萬七千串臨安府衛取蔞子一百斤黒鹽井并廣通縣鼻板沖取食鹽銀九十兩和曲州竈户馬文林并加常村取硝鹽共三千六百斤廣通禄豐永平三縣并永平禦及南平關土官巡檢共取鷄㙡二百斤武定新興晉寧昆明易門江川河陽河西羅次三泊十府州縣取雞㙡工食銀九十五兩雲南右中二衛取蜜一百九十斤左右中前四衛取獵戸銀四十兩昆明縣取酒米并捕獵及看草場并數珠等户丁共二百七十九丁瀾滄衛取醃臘餘丁六十四丁共辦銀四百餘兩計一歲所入除檳榔硝鹽雞㙡紙劄蜂蜜等項名稱進貢費用未經估價外柴薪子粒租米等銀共六千五百有餘兩米豆醬麥一千一百有餘石所在官員乗機科歛無不忍心以害其該管被害軍民逐年辦納莫敢吐氣以聞於法司夫雲南鎮守太監如此他處内臣可知雲南地方貽患如此他處為害可知臣正徳十四年十一月内為公務事查得雲南都司嵗辦鎮守太監進貢椶衣鎖索杠架油紙籠罩黄紅氊􅖯銅環小嚼脂皮草轡旗仗什物銀一百八十五兩四錢行令分守安普道㕘議羅方減革去銀一百五十六兩四錢止存二十九兩以為十分中已減其九就今所聞計之㑹二十分中未去其一今幸皇上御極明詔載頒屬吏改觀憲臺増重臣得訪出前項鎮守太監衙門嵗辦銀兩歲認軍伴丁夫案行雲南都布按三司查革處置及將金齒騰衝鎮守衙門所有科索條件應該裁革縁由具奏外切惟立法於維新之時若易而守法於經久之後甚難成化間錢能鎮守雲南以巡撫都御史王恕之徳望累形於建白而竟不獲伸正徳間梁裕鎮守雲南以巡按御史張璞之風裁一與之爭辯而遂為所陷不獲伸者時有公論卒成名臣為所陷者無人申救卒死詔獄聖明在上此後萬萬無復此慮然塞流先源去草務根近日言官奏為裁革鎮守以固邦本事中間指陳鎮守太監為地方患必已甚悉奉聖㫖各處鎮守官係是舊制該衙門知道欽此臣聞各處内臣鎮守自永樂間始當時止是遼東開原及山西等處宣徳以後各邊相次添設沿襲至今非我太祖髙皇帝之舊制也陛下奈何以此為疑以鎮守為不可少乎今天下秪患其多而不患其無以設鎮守為有益乎今天下秪患其為害而不見其有益然則鎮守非舊制而當裁革明矣雲南鎮守太監始自景泰年來較諸各處尤非舊制前有錢能後有梁裕誣陷撫按風憲而奪之氣王舉覃平劉昶崔安張倫等因得磨牙競肉肆無顧忌當時所取又有多於臣今之所言者今代太監梁裕鎮守者適當取囘新代太監史泰鎮守者幸未云至維新之時立法之始臣既有行誰其不聽然經乆之後守法之人臣竊為彼難之伏望皇上奮不世出之資成大有為之治將各處鎮守太監非舊制者通查取囘地方有事用兵則自有總兵官其餘軍馬錢糧官吏民夷事情一切責成於撫按三司等官巡撫都御史巡按御史三司等官果有顯著勞効朝廷亟擢而優任之否者重罪而速罷之如此則地方之患除而天下民夷戴陛下與其更始之恩徳於萬萬年無窮矣臣目擊耳聞有懐愚忠晝歎夜思不容自黙縁係陳言鎮守内臣貽患地方乞要裁革事理未敢擅便為此具本差承差楊福親齎謹題請㫖正徳十六年八月十六日處置地方疏題為處置地方重務開建所治立營屯以圖久安事據雲南等處承宣布政使司呈為積年草賊嘯聚山林刦殺人財攻燒村寨等事奉臣案驗前事准本司掌印左布政使方璘咨准本司咨備行去後又准本司咨奉臣批據布按二司督糧并守巡臨元等道右布政使等官彭杰等呈稟揭帖奉批據呈欠開今應開建所治形勢局面四至八到去處并踏勘過水田旱地坐落地名及各隘巡司各路哨鋪某應依某山險應禦某處盜賊以見設置之故做工軍民夫役應用土軍若干民夫若干在某府衛州縣起取本所既建應當取調官軍該官幾員軍幾百名巡司哨鋪兵夫某處各該若干在某衛所州縣相凑取調摘撥共該若干分置某處某地住種管食本所并各應備衙門廨宇營房司倉堡哨鋪舍及築城垣石料木植磚瓦釘線灰觔油刷彩畫與凡一應什物動用承委人員顧覔人匠役使夫丁工價工食等項用費錢糧數目呈内俱欠一一聲説勘估計算夫將欲舉事必先立規事不致詳其始則不能盡善於其終規不先定其犬則不能推𩔖於其細仰布政司行該道官務要親詣地方委官踏勘區畫處治將各事由重為檢括分别建立脩設先後次第畫圖造冊囘報施行奉此又經備行去後續奉臣批據右布政使彭杰等揭帖奉批據呈查與委官王鐈原造冊内始末俱同但田地一事王鐈冊除十八寨山外坐落諸村王敬等水田三百畝旱地四百畝秋糧一十五石不計外實有水田八千九百五十四畝旱地二萬五千九百二十畝夏秋稅糧一百二十三石三斗今揭帖却連王敬等水田起科俱入前項糧數不知何故差抝其地方自㕘政晁必登呈立哨鋪之後未審盜賊有無窺伺田地自委官踏勘之後未審人戸有無告爭仰布政司㑹都按二司再加查議要以經久詳其未備呈奪施行奉此查得王敬等田糧中間委有差抝及盜賊事情係按察司有行又經備行各該司道覆勘去後又奉臣批據布按二司守巡該道左㕘政鄧相副使王忠呈奉批仰布政司即㑹都按二司查照本院節次案驗批發事理計議停當呈奪繳呈奉此行該按察司牒呈内開自㕘政晁必登呈立哨鋪之後據委官澂江府通判王鐈等設䇿擒獲十八寨强賊窩主何志聰守把補足哨驛丞李揖擒獲賊乍喜其色者俄沙陀沙的者其賊婦聶則建水州曲江驛驛丞王重擒獲賊王一言老阿賽阿寧阿哀賊婦阿亦阿屋賊屬恰林阿賽俱解司監問已後並無盜賊窺伺又該分守本道左㕘政鄧相咨稱查得田地自委官踏勘之後惟有民人史文廣王仲英楊志明招集佃田夷民在於法果寨妄稱復業本職委官安插於山外村分依傍親識住居及該委官澂江府知府童壐通海禦指揮儲祥同河西縣知縣張佐彌勒州知州周在弔取本州實徵文冊親詣本寨再行丈量踏勘得十八寨地土水田實該九千二百五十四畝旱地二萬五千九百二十畝原額夏稅三石五斗秋糧一百三十四石八斗所前水田三千五百畝内莫索甸據火莫龍莊戸何義占稱三百畝言者龍一百五十畝俱係沐總兵官莊田之數寨外王敬等田一百五十畝趙進等旱地四百畝秋糧共一十五石未算外實有水田八千六百五十四畝旱地二萬五千五百二十畝原額該州夏秋民糧共一百二十三石三斗合無具奏分豁等因行該本司左布政使方璘右布政使彭杰㑹同都按二司掌印按察使陳洪謨都指揮使劉宗仁并督糧右㕘政晁必登議照廣西府十八寨地方所擬建立所治巡司哨鋪設置官屬撥給職田起用夫役估計物料支用錢糧等項俱經守巡該道官㕘政鄧相等及委官知府童壐等重覆查勘俱各相應其差抝田糧今巳查明及莊戸何義妄占莫索甸言者龍田共四百五十畝稱係沐總兵官莊田隨喚千户何經審執總兵莊田查無莫索甸并言者龍地名顯是何義妄占謀為已有及照民人史文廣等非奉明文招集夷民擅到法果寨妄稱復業雖無為惡之心難免故違之罪所據何義史文廣等應合提問前田合追還官再照十八寨僻在萬山之中盜賊巢穴人跡少到田地多荒比之腹裏地方大有不同本寨雖徵稅糧原俱設有千百夫長分管召集四野流民散戸多有不肯佃種以致徵糧頗輕相縁已久今䝉平定立所設官議撥屯軍照例領田納糧固為舊制但開闢之初雖經議處添給各該屯軍旱地恐不濟事合將水田亦從寛綽庶使屯軍無累今本寨不敷夏秋民糧一百二十三石三斗若派令該州山外部來等二十一村小民陪納亦非安養夷民之道且前項民糧止有一百二十三石三斗今作屯田得米三千四百一十三石一斗六升既可増軍糧三千四百餘石雖減民糧一百餘石所損者少所獲者多奏與分豁誠非失䇿再照各官所議做工兵夫五千名每歲支米一萬三千五百石欲於正徳十六年有司秋糧内派給查得所屬有司秋糧嵗入之數止勾官吏師生歲用並無多餘無從取辦惟有曠夫口糧巳經奏免合無斟酌價銀多寡徵解布政司轉發做工處所支給庶幾勾用等因各呈到臣案照先為前事該臣㑹案通行及節據雲南布按二司督糧并守巡臨元等道右布政使等官彭杰等呈稟揭帖節經批發去後正徳十六年十月初一日准兵部咨為捷音事該本部題該臣等㑹題本部議擬節該奉先皇帝聖㫖是欽此備咨到臣又將前項議處地方事宜行令查議作急囘報去後今據前因㑹同鎮守雲南總兵官征南將軍黔國公沐紹勛巡按雲南監察御史羅玉議照各官先今呈内開稱廣西府十八寨地方崇崗峻嶺乃盜賊久恣憑陵之地諸夷雜種實官府不可號令之人積百年來為一方害邇者大軍克㨗醜𩔖掃除地既虚閒法當填實若非開建所治以控制其中分設巡司以協守於外無屯營以為持久之道即禍患必有復萌之虞臣等原議事平之後當為善後之圖意正如此既該各委官踏勘得村名召白陸地週圍六百三十餘畝川原廣衍陵麓迴縈北坐南朝左環右抱明堂映耀活水周流土脈肥饒草木叢茂用以築城立所氣勢十分相當則今議開建一守禦千户所宜卜於此委官自此起丈量踏勘地土水田共有九千二百五十四畝旱地二萬五千九百二十畝原額夏稅三石五斗秋糧一百三十四石八斗所前水田三千五百畝所城應築地基約該六百丈合開東西南三門開東西南大路三道東至彌勒州火莫龍烟白山并搆甸壩為界八十里南至建水阿迷二州揑沼寨一帶盤江為界一百七十里西至寧州婆兮盤江為界八十里北至革泥寨底潞南州竹子山并鬼丈黒村為界一百七十里本所應設文職吏目一員武職正千戸三員副千户三員所鎮撫二員百户一十二員屯種旗軍五百名操備旗軍三百名查得六涼衛後所官軍八百一十九員名設在偏僻相應全所調撥彼處守禦原所印信繳部另請鑄降守禦千户所并十百户所印共十一顆及夜巡銅牌頒給掌管定限安插就將前項踏出水田照例給發各官准俸正千戸三員每員七十八畝該田二百三十四畝副千戸三員每員六十八畝該田二百四畝所鎮撫二員百戸十二員共一十四員内除納粟一員不給外仍有一十三員每員撥給四十八畝該田六百二十四畝通共一千六十二畝俱不起科納糧屯種旗軍四百九十九名每名給田一十五畝該田七千四百八十五畝每畝照例起科屯糧米四斗五升六合該米三千四百一十三石一斗六升每旗軍再給旱地二十畝共地九千九百八十畝仍候耕種三年之後收獲見數每畝量徵夏稅麥糧納官揑沼寨當者居盤江三渡等處革泥寨當竹子箐大小尖山等處俱舊日夷賊出沒𦂳關隘口相應各立一巡檢司一名揑沼一名革泥每司設官吏各一員名請給印信各一顆及僉弓兵各五十名其官吏俸糧俱於附近彌勒路南二州支給弓兵於附近巡檢司官地每名撥給二十畝該地二千畝編弓牌一人召人領種充役法果寨正係彼地適中處所可以四望合立法果一哨所西清水塘額白沖村合立清水額白二哨此正通寧州婆兮盤江等處要路所東南言者龍寨平鼓山二處合立言者龍平鼓山二哨此正通阿迷州等處要路所南山黒口補足寨二處合立山黒口補足二哨此正通建水等處要路所北大寧山拖白寨擺頭目寨拖果村合立大寧拖白擺頭拖果四哨此正通路南彌勒州等處要路共設十一哨每哨設立哨兵五十名共五百五十名就於臣等原議設立守把拖白等四哨原撥路南阿迷彌勒等州民兵八百名内撥守照舊於各該州分支給口糧就於各哨附近旱地每名撥給二十畝共一萬一千畝各立哨頭督令常川防守其地三年開墾成熟後自種自食革去口糧其山黒口補足揑沼寨大寧山革泥寨拖白寨拖果村七處各設一鋪共七鋪就用本地立名每鋪設司兵八名共五十六名遞送公文亦於附近各鋪旱地每名各給二十畝共一千二百二十畝巡司哨鋪兵夫共七百六名共給旱地一萬四千一百二十畝俱令自種自食不起稅糧其境外大黒舊普龍二村合立一哨一鋪大黒舊就名大黒哨設兵五十名普龍村設立一鋪就名普龍鋪俱彌勒州地方大者夷板橋二村合立二鋪亦名者夷板橋鋪俱路南州地方每處司兵八名就於各村人民内僉報不給田地縁前項官軍兵役共該給撥水田八千五百四十七畝旱地二萬四千一百畝餘剰水田一百七畝旱地一千四百二十畝該臣孟春批允越州六涼二衛過戸等項軍人毛帖驢戴廣等調去新所查給領種照畝起科辦納屯糧查得十八寨原額夏税三石五斗秋糧一百一十九石八斗前項水田算該起科屯田秋糧二千四百一十三石一斗六升其該州夏秋原額民糧一百二十三石三斗移少就多委的相應分豁其築城建所做工民夫應於附近臨安廣西六涼師宗路南江川尋甸嵩明曲靖彌勒阿迷馬龍寧州石屏嶍峨羅雄河陽陽宗等府州縣斟酌起取共一千三百名漢土軍人於臣孟春近為清理土軍以釐積弊事查出雲南左右中前四衛土軍并後廣臨安曲靖越州宜良通海馬隆等衛所起撥三千七百名通共五千名分為二班每班二千五百名每名日支口糧一升五合日該米三十七石五斗月該米共一千一百二十五石以一年為則歲該米一萬三千五百石應照該司所議於礦夫口糧銀支給匠作四百名查有舊規亦於前項衛所取用每名日給工食銀三分共銀一十二兩月支銀三百六十兩嵗該銀四千三百二十兩定委指揮賀鏞崔漢趙昻郭倫陳棋曹武千户黄鋭施雄陳鼇江輝梁秀龔勝胡珊陳恩王斌百戸鄭壐楊勝陳世全李翔鳳劉昇瞿鑑任寛蔡繼宗等督工脩理其義民老人於彌勒阿迷路南寧州僉取監造廣南府通判謝文章臨安府推官江魚彌勒州知州周在收放錢糧總理提調通判推官知州指揮日支米三升千百户二升義民老人一升五合合用木植石料應該委官督夫於附近山場採取磚瓦石灰起窰燒造鐵器鍬鋤先儘上年軍前置辦什物查取易換備用不足於馬龍或昆陽石屏州鐵冶所取造調灰糯米計該三十餘石担土竹箕拖木麻繩調灰紙觔油刷彩畫烟煤桐油粉青水膠黄丹紫土官粉青緑水桶等項通共該價銀五千三百餘兩俱應動支官錢合於雲南都司并雲南澂江曲靖臨安等府庫内收貯贓罰支剰軍餉銀兩給發委官買辦應用候事完日造冊繳報已上各委官查勘計算似已明備俱合依擬臣等除將建立所分巡司哨鋪設置官屬撥給職田起用夫役估計物料支用錢糧等項案行都布按三司俱依各官原議事理施行何義史文廣等備行該道分巡官從重追問明白通行具招開詳仍將何義原占莫索甸言者龍田四百五十畝追退派給與該所屯軍四百九十九名以為寛綽之數彌勒州原額十八寨夏秋民糧一百二十三石三斗免行徵派聽候奏請明文至日定奪及行廣西府并彌勒州著落各該掌印官嚴督應捕人員帶領兵夫常川前去十八寨地方巡邏毋致殘賊復聚擾害地方如違重治外伏望皇上軫念邊遐魑魅隂崖始仰光於天日草茅棄地行獲稔於桑麻軍民癄瘁於此望以息肩疆埜經營於今幸粗就緒特勅該部早加議處將應開建所治定賜所名水田旱地巳立營屯土地原有民糧照例除豁行令臣等遵照施行地方生靈幸甚臣等幸甚縁係處置地方重務開建所治立營屯以圖久安及該部題奉欽依是事理未敢擅便為此具本差承差楊福親齎謹題請㫖正徳十六年八月十六日乞明典禮疏題為乞明典禮以正尊親事正徳十六年八月初四日欽奉登極詔書下頒遐域風動乎尚草之徳令行乎流水之源凡在命於兩間豈勝忻於一遇臣伏覩詔書朝廷政事得失天下軍民利病許諸人直言無隠欽此臣有地方之責軍民利病言之職也除節有具陳外其朝廷政事日者邸報傳至兹地又得仰承陛下降詔以來明目達聰諫從言聽弊無餘舊化出維新臣前此所言有闗於聖躬者巳行之矣臣今何辭以副明諭邸報中司禮監𫝊奉聖㫖朕既以興獻王長子入奉大統王墳在藩府其立祀并稱號爾禮部便㑹多官詳議了來説欽此臣待罪邊遐不獲預聞事蹟報中一條進士屈儒奏内有尊聖祖母為太皇太妃聖父為皇叔考興獻大王聖母為皇叔母興獻大王妃等語則恐是禮部㑹官之所議屈儒此奏奉聖㫖該部看了來説欽此則是禮部所議尚未奉俞命也臣惟秦漢來帝王或自旁支入奉大統推尊本生父母得失之迹具載史冊漢宣帝以武帝曽孫繼昭帝後不敢加號於衛太子史皇孫光武中興亦自以為元帝後不敢加號於鉅鹿都尉南頓君守禮抑情此實為得宋司馬光所謂當時歸美後世頌聖者也哀安桓靈乃追尊其祖父犯義侵禮此實為失司馬光所謂取譏當時見非後世者也光之議論因爭其君欲尊本生父母而發宋英宗時執政有進邪説者三省臺憲咸起爭之儀禮喪服為人後者傳曰何以三年也受重者必以尊服服之為人後者為其父母報傳曰何以期也不貳斬也何以不貳斬也特重於大宗者降其小宗也夫父母天下莫隆焉至繼大宗則殺其服而移於所後之親蓋名之不可以貳也名也者天下之辨也所以别嫌明㣲而不可不謹也夫為人後者為之子不敢復顧私親聖人制禮尊無二上若恭愛之心分施於彼則不得專一於此故也陛下天縱聰明此禮自應諳悉今日多官詳議更復奚疑事上未報豈非皇叔考之稱尚未當乎皇考帝考某皇某親之稱宋英宗時諸臣進言援古證今斷斷不可極為明白今日之事服當降等名統至尊陛下决不為此若邸報中所傳考字或是錯寫不然臣愚亦竊不能無疑禮記曰生曰父母死曰考妣白虎通曰父矩也度以教子者也考成也言有成徳也廣雅曰母牧也言育養子也妣嫓也匹於父也曰教曰養親之之辭也曰成徳曰匹父尊之之辭也故禮有世父母叔父母之文而無世叔考世叔妣之説此其所以别也今欲稱興獻王為皇叔考於古典禮有何引據宋英宗時有請濮王加皇伯考者宋敏求上言父之與考特存沒異名耳考者成也言其徳行之成祖與考有君徳而成之也晉武帝稱景帝唐𤣥宗稱中宗宋朝真宗稱太祖曰皇伯考是興王業獲尊位乃可稱伯考也吕公著亦曰真宗以太祖為皇伯考非可加於濮王也然則今皇叔考之稱其可加興獻王乎或疑考字誤必且稱皇叔父義亦未安荀子與史記並載周公自稱文王之為子武王之為弟成王之為叔父詩魯頌王曰叔父建爾元子俾侯于魯箋曰叔父為周公也詩人追述成王封伯禽時周公尚在故稱叔父者是生稱之辭既没則未有稱叔父者又經書稱伯父叔父同姓之臣也前代帝王多不通親屬冠於爵位之上西晉則封皇從伯父望為義陽王皇叔父幹為平原王亦生之稱宋英宗時有請濮王加皇伯父者宋敏求以此為證云不如從兩制禮官初議止稱皇伯以示萬世然則今皇叔父之稱其可復加先朝已諡之親王乎宋王珪司馬光等所議正今之所當法者而議者或不然何也爾雅曰父之晜弟先生為世父後生為叔父黄幹曰古人以父之兄弟有少長之分故呼父之兄曰伯父呼父之弟曰叔父今人但呼伯叔去父字非是故大學士丘濬亦曰伯叔同輩之稱也合如爾雅加以父稱議者之見殆在此然此秪可用於生稱親之之辭也既沒則否報中不省何人妄改宋程頥代為彭思永疏𫝊㑹庸見仍擬巳諡伯父稱皇伯父而新安胡氏信之彼烏知此宋真宗稱秦王為皇叔仁宗稱楚王昭成太子並為皇伯臣伏覩前詔書内陛下稱先皇帝為皇兄誠於興獻王稱皇叔如昔人所議亦允惬矣天下者太祖髙皇帝之天下也傳至憲宗皇帝生孝宗皇帝暨興王而孝宗皇帝以嫡長有天下傳先皇帝於宗室中特簡上聖授之大業陛下於興獻王雖天性至親顧復恩重然所以光臨九重富有四海子子孫孫萬世南面者皆先皇帝之徳孝宗皇帝之所貽也宋蘇頌言前代帝王入奉大統尊其本親不失禮者三帝漢宣光武於其父祖惟營墓置園廟令丞以異於諸侯晉元以父恭王無他子立皇子裒為琅琊王奉恭王祀其後皆更立王終晉不替是又今之所當取法者多官詳議當備載此前聞以為故實若非古之名不正之號非臣所願於今日也報中又一條司禮監傳奉聖㫖朕既入繼雖未敢顧私親但母妃在藩府無人侍養便寫勅遣司禮監太監秦文内官監太監鄒恩御用監右監丞方永前去奉迎欽此臣切惟陛下大孝格天不忘本生思欲養以天下惟日為嵗顧慈夀皇太后在上義難兩隆故形於辭意宛致如此真大聖之孝也聖母計日在途伊邇三宫慈顔自天來㑹都給事中邢寰奏内所當講者三事竊計舉行有期先後次第已歸睿斷至於日朝之禮又當審定等威問寢之宫尤合預分差序我國家列聖承傳家法嚴正髙出前代宫闈制度外臣非所敢知而慎防左右毋容小隙檢斥讒慝勿造異端俾皇太后皇兄后聖祖母聖母各綏福趾永遂歡心又陛下大孝之所宜深為體察者也臣聞君舉必書而書事必謹其始已上皆朝廷大政大典言必施之廷告天下之所傾竦事必書諸史冊後世之所談説一得一失所繫靡輕昔濮王之議與議者謂其君甫畢祥禫未遑廟謁不當遽有斯舉乃致數年紛紜弗决竟罷莫行今康陵土猶未復正徳年尚未改祥禫尚遙萬一興獻王稱考或父未合於古有如臣所云者并已上事幸望陛下再加熟慮重令講究謹之重之斟酌先後而緩行之務協輿情庶全公論使下免私謗上銷後悔臣干冒天威無任悃欵惶悚之至縁係乞明典禮以正尊親事理未敢擅便為此具本差承差髙泰齎捧謹題請㫖正徳十六年九月初七日開禁疏題為開例禁興民利以足國用以安地方事據雲南等處承宣布政使司呈准本司掌印左布政使方璘咨准本司咨奉臣案驗前事巻查先准戸部咨該前巡撫雲南都御史王懋中題稱雲南楚雄府南安州臨安府寧州澂江府路南州雲南府易門羅次二縣各該管地方表羅登樓矣達摩車西沙龍曲則山等處産有銅礦先年曽經聽民採取收課在官軍需之餘亦得少備官員折俸支用軍民貧乏者亦得就場生理度日成化年間巡撫都御史呉誠因慮臨安礦場逼近交阯恐有私販出境資彼軍器奏請封閉然利之所在人必趨之禁例雖嚴私竊如故數十年來未聞興販出境發露到官者徒以有用之物置於無用之地反資盜賊奸豪竊取殆亦不思之過合無仍將前項産銅地方選委各該有司亷幹官員専一管理召募夫丁開穵採取量為收課每季𩔖解布政司貯庫以濟軍需等因該本部議擬題奉武宗皇帝聖㫖是還著巡撫都御史上𦂳㑹同議處了來說欽此欽遵備咨前來巳經案行雲南都布按三司㑹同勘議去後未報訪得前項産銅地方先年奏准封閉在官雖有禁例一向無所施行近年具奏開穵各官司因難定擬不暇究其私竊所在奸徒細民千百為羣得利既多興販日廣以致在前鎮守太監衙門京官史鎮徐倚韋洪張榮曹鑑等往迴任其抽分上下為之䝉蔽鎮守者以補凑進貢為名採取者不知封閉有禁甚至形於告訐所司莫為斷理今鎮守衙門京官人等已奉例取囘事隔日久無究外若不早為處置繼者當復效尤仰抄回司著落當該官吏查照先今事理即行掌印官㑹同都按二司掌印官將前所産銅礦從長議處如果通開有益保無後虞應該専委何項人員管理作急具由呈報以慿㑹奏若計開採之後反累軍民仍舊封閉不得擅開其不係先年奏准封閉礦場不係逼近交阯地方及别處人民客商採取興販銅斤來㑹城者本司行雲南府衛各該地方務令盡數報出納税本府每季𩔖解布政司貯庫以備軍需及各官員折俸支用若店戸牙行夤縁隠匿縱容私販及豪强勢要假托名目邀截抽分並聽府衛巡視等官并總小甲鄰右人等擒拏首告犯人治罪拏獲告實人等給賞仍行赤水鵬等陸關巡檢司如遇販賣銅斤客商人等經過照數驗實每䭾重若干應報官税若干就於月報各項貨物揭帖内申報查考敢有開報不實賣放作弊被人訐發或體訪得出定照律例問擬决不輕貸奉此行准本司掌印官左布政使方璘咨㑹同都按二司掌印按察使陳洪謨都指揮使劉宗仁議照寧州之礦係臨安府所屬近於交阯雖未聞拏獲一人通番販賣銅斤然以其近也當嚴防範相應封閉其楚雄府南安州澂江府路南州雲南府易門羅次二縣各該管地方表羅等處礦場與交阯離隔懸逺路阻難通設若一槩封閉反資盜賊奸豪之徒竊取相應開穵合無將臨安府并所屬地方但鄰近交阯場分照舊封閉不許擅開著落該管衙門巡捕人等用心看守其楚雄澂江雲南等府所屬地方場分與交阯隔逺者照舊開穵選委各該府佐亷能官員管理召募夫丁採取量為收課解送布政司作正支銷年終造冊呈繳撫按衙門查考仍行各該把隘巡司等衙門務要嚴加把截盤詰不許銅斤販往臨安私通交人發賣如違追捕到官遵照先奉欽依内事理問擬處死充軍如此庶幾國課少増窮民有賴及查各處銅礦俱係先年奏開去處並不係封閉之數除遵奉案驗將不係逼近交阯地方及别處人民客商採取興販銅斤來㑹城者布政司行雲南府衛各該地方盡數報出納税施行外將咨到㑹議過縁由呈乞照詳等因具呈到臣批仰遵奉施行去後又據本司呈據雲南府申稱行據㑹城店戸李裕等客商蕭嵩等各執稱銅駝號票先年布政司收每銅十䭾抽銅一䭾後因收放不便照數折銀交司每䭾納銀六錢後䝉鎮守太監私自差人抽分逐漸加收每䭾納銀一兩二錢四分乞賜備達定示等因到司查得前項抽分銅課𢎞治十八年本司奉例鑄造銅錢每銅一䭾重一百四十斤每銅一百斤抽銅十斤以備鑄造銅錢後因雲南地方不用銅錢改將紅銅毎䭾一百四十斤抽收白銀六錢黄銅每䭾一百四十斤抽銀七錢白銅一百四十斤抽銀一兩後因太監衙門管理每銅一䭾抽銀一兩二錢四分今太監奉例取囘前項銅課歸在有司設若照依太監所抽似乎過重欲依本司舊例收銀六錢七錢又似頗輕合無酌中紅響銅每䭾一百四十斤抽白銀八錢黄銅毎䭾一百四十斤抽銀九錢白銅一百四十斤照舊抽銀一兩通行所屬出給告示曉諭但有興販銅斤俱由㑹城經過不許潛從小路即係漏税私銅所在官司連脚家并原䭾頭匹通挐入官問罪枷號及行雲南府照依本司舊規置立内外號簿二扇編刷花蘭號紙内號簿本府收存外號簿發仰交水税課局仍與商人號紙一張填寫斤數在内止許往赤水鵬等巡檢司直抵交水税課局將號紙比對斤數相同號紙存下就便放行等因具呈到臣又經批行去後㑹同鎮守雲南總兵官征南將軍黔國公沐紹勛巡按雲南監察御史羅玉查得雲南銅課如所屬寧州摩車場河陽縣七佛村陸涼州草排場易門縣沙矣山等處礦場先年該鎮巡等官奏准行令雲南布政司照例委官召人開穵採取毎銅一百斤抽銅四十斤送官賣銀解本司濟用庫候各項支給永為定規至𢎞治十四年二月二十六日該戸部題為公務事將前場分封閉𢎞治十八年雲南布政司左布政使周宏呈稱各處礦場雖稱封閉實被無籍之徒通同所在土流官吏假稱辦課聚集人衆千百為羣晝夜竊穵公然販賣奸人得計法度全無近該戸部奏准行移本司該鑄銅錢五百八十三萬二千文先抽銅斤即今支用將盡庫内各項銀兩多係邊儲備用解京之數若要支銀買銅未免庫藏空虚合無今後每遇客商販到銅斤到城每銅一䭾約重一百四十斤抽銅十斤收貯在庫以備鑄造俱經撫按官批令依擬施行正徳二年二月内前項鑄造銅錢數完原抽銅斤停止本年十一月内該鎮守太監崔安行布政司為傳奉事内開近奉欽取命造鐵減金銀靶緬刀斗牛飛魚草獸等項大約用銀二千餘兩無從區畫仰司將前銅斤給抽票簿印押送付抽分其後崔安取囘鎮守太監張倫相沿抽分張倫取回號票發布政司正徳九年九月内又該鎮守太監梁裕為鎮守地方事行都布按三司内開伊凡一應進貢謝恩并買辦金石方物等項物件費用數多查得先鎮守崔安等在鎮之時俱行取銅斤號票抽分銀兩凑補進貢今本鎮事體相同仰將銅斤號票送還本鎮變易銀兩應用至正徳十年又該鎮守太監史泰亦照前例行文為謝恩等事將銅斤號票徑自出給㕘隨人員抽分該司無復與聞課税盡歸消耗地方夙弊此其一節臣等切惟我朝各處凡産金銀銅錢等項地方或事有干礙立法封閉或勢難捐棄差官閘辦若盜掘私竊禁例甚嚴蓋以山澤自然之利捐棄不守恐為不逞之徒競利起亂貽害無窮若人得召穵以供課程官得申嚴以杜奸慝則備邊濟荒日後既有資賴窶戸窮民目前亦遂生理官民兩便上下皆宜今前項銅礦盜掘私竊法難一切禁於貧窶之衣食䭾載興販利復相踵歸於鎮守之抽分數十年來無人明白裁决蓋苦權貴借口進貢又虞地方或生激變昔管仲謂山海天地之藏上之人當取其利以富國而不可為豪强百姓所擅夫藏之於民猶寄外府管仲尚以為不可今内宦私室自收自用而不為國家分豪之助者其可不一問乎各處鎮守用度盈縮臣等不得而知姑據雲南一處言之在前各官在鎮認納柴薪子粒等項銀一年大約將及萬兩彼若果有報國敬君之心每年進貢但費十分二三亦足供用何至巧立凑補名色獵取銅斤銀兩不知一年所得於民如前數者歸於何用貪婪欺罔法所難容所據前項抽分號票事宜臣已行令該司查照先年舊規抽分貯庫聽候公用外但兹地逺在萬里弊端因襲多年若不著為則例未免以後鎮守跟隨人役撥置效尤指稱紊亂深為未便如䝉乞勅該部定議將雲南銅課抽分查照前擬行令雲南布政司嚴督雲南府收取銀兩解庫公用此後鎮守不許假以凑補進貢為由紛紊舊規侵漁國用况今節奉詔㫖各處鎮守内臣不許假以進貢為名僉取皂𨽻科歛銀兩擾害軍民額外進貢一切停止欽此欽遵雲南鎮守在前進貢多係額外之數矧又㕘隨人員假此恣行掊尅官失其利民受其害獻於天府者不過一二入於私室者却至八九况萬里扛運貽患他處也哉伏望天語丁寧嚴加禁革地方幸甚生靈幸甚縁係開例禁興民利以足國用以安地方及該部題奉欽依㑹同議處事理未敢擅便為此具本差承差袁璋親齎謹題請㫖正徳十六年十一月初二日祠祀疏題為立祠祀以表忠義報勛賢事臣聞顯仁褒節崇徳報功風化首務哲王令典古者於勝國之忠義未嘗略於旌表而本朝之勛賢不忍致其湮沒蓋王者之度量無外茍可為事君之勸雖仇讐而必加録聖人於故舊不遺凡可為勵世之具雖久逺而亦追祀晉韓延之拒宋髙祖之召其辭不遜髙祖以為事人當使如此宋房叔安發齊髙帝之謀中途被執髙帝以為物各為主竟無所責彼於仇讐其生者待之乃爾况為彼朝死節隔世無嫌者乎望諸列國之相漢主尚求其後仲父諸侯之佐魏君猶禮其墓異代功臣通乎祀典從古如此又况身參締構功勒鍾鼎闢土開疆樂推欣戴者乎臣竊見近日板刻皇明功臣録及雲南誌等書我太祖髙皇帝洪武五年以天下一統惟雲南弗賓不欲勤兵於逺遣翰林待制王禕持詔往諭禕至見梁王巴圗諭以天命人心令其亟奉版圖歸職方則尺地一民安堵如故髙官厚禄身名俱全巴圖不聽館之别室廩餼有加數日禕復諭之巴圖命員外郎賈寛改館加禮㑹元遺民自立朔漠者遣使徵餉迫巴圖殺我使巴圖匿禕民間使聞責誚益甚不得巳禕出被害十四年上命穎國公傅友徳為征南將軍西平侯沐英為副往征雲南自辰沅趨貴州攻下普定普安進取曲靖巴圖遣司徒達爾瑪為備及敗率其母嘉僖妻和爾徳濟等百餘人乗舟趨滇池謂行省右丞律爾左丞達徳曰我宗室無降理仰藥死妻子皆投水死律爾達徳既進毒於王皆自殺妻子從死者二百餘人友徳分兵城烏撒得七星闗通畢節又克可渡河於是東川烏䝉芒部望風降附副將軍亦降元司省各路得金銀銅印七十四馬數萬匹明年克大理取鶴慶路麗江破石門闗金齒車里平緬等處相率來降友徳奏於要害設衛以守及督布政司覈實衛所糧儲給軍食烏撒復叛友徳㑹兵進擊烏撒遣指揮顧成救普定賊悉敗遯乃割烏䝉烏撒芒部三府𨽻四川明年友徳等既平雲南因其土俗定租賦興學校瘞戰骨廣屯田撫軍恤民大布恵澤於大理六詔及烏撒普安等處創設諸司衙門固謐邊境十七年凱還此是雲南歸我職方之始末也友徳初授命宣徳侯金朝興實從在軍取臨安諸路征建昌有功進兵至㑹川卒雲南初平上思得親信鎮之命汝南侯梅思祖署雲南布政司事撫輯民夷亦有成績未幾卒巳上事具載前書可查臣再查得元御史大夫福夀守集慶即今南京至正十六年皇明兵圍集慶城破福夀死鳳凰臺下太祖嘉其忠今南京有衛國忠肅公祠㕘知政事余闕守安慶十八年城破闕死清水塘中太祖亦嘉其忠今安慶府有余忠襄公祠二臣之死元史當脩既皆載其忠義而有司奉命又特為之祠祀我太祖於勝國之臣如此蓋為億萬年臣子忠義勸也梁王巴圖右丞律爾左丞達徳之死在脩史後元史不載事又在萬里外至今祠祀未立然則欲法祖宗以表忠義臣愚切有望於今日沐英為傅友徳副師平雲南共成大功友徳班師英留鎮綏靖夷玀厯年獨久而戡難宣威固弗加於前人也今雲南有黔寧王祠顧成為友徳部將自指揮僉事累陞至都指揮使貴州普安等處功皆奉征南將軍調遣所致及後掛征南將軍印充總兵官守貴州封鎮逺侯計其内申毗贊外震威靈固非前主將比也今貴州有夏國公祠二臣之功身後廟食祖宗有成命在固祀典之所宜兩家且各有賢子孫世膺爵秩可以無憾而傅友徳金朝興梅思祖之功經其百戰其守其死之地獨無烝嘗之及金梅之後聞尚有人爵雖不嗣猶獲世官友徳則子孫沉翳其鬼餒之久矣然則欲法祖宗以報勛賢臣愚亦切以為宜在今日臣訪於雲南布按二司官左布政使方璘按察使陳洪謨等同聲曰宜詢於雲南府官知府邵鏞等問於鄉官儒學生員地方耆老人等亦莫不然臣行據該府委官踏勘得雲南府儒學西能仁寺近因主僧犯罪被遣寺宇空間小西門外接官㕔西官地基南門外社壇南官房屋俱空間官渡妙湛寺久無僧住木瓦零落相應拆卸搬移攙脩改造立為祠祀具申到臣准令處置今立新祠三所工力俱完規模頗肅該布政司呈稱正徳十三年内承准禮部照㑹為録遺忠以勵人心事行司將已故左布政使張紞巡撫都御史王恕致祭於雲南府儒學明倫堂前東舍不便諸生肆業應合邊徙等因已將社壇南祠一所徙置去後所有儒學西祠一所臣等欲立為穎國公祠以穎國公傅友徳神位置中以宣徳侯金朝興汝南侯梅思祖配接官㕔西祠一所欲立為元梁王祠以梁王巴圖神位置中以右丞律爾左丞達徳配如䝉乞勅禮部查議奏請賜之名額申之祭品令該司府就將臣近為議處差發以蘇民困事内錢糧每年收受買辦以時致祭庶因前示後奬一勸百之道不墜益彰勝國忠義之鬼懐感九泉本朝勛賢之舊永光來世恩被存亡恵霑幽顯凡有我皇明億萬年之臣子者豈不各有所激勸哉縁係立祠祀以表忠義報勛賢事理未敢擅便為此具本差承差袁璋親齎謹題請㫖正徳十六年十一月初二日邊務疏題為陳言邊務以防外患事准兵部咨該本部題該雲南道監察御史孫孟和題前事内開一練邊兵乞要兵部通行各該巡邊清軍御史將各邊軍士揀選公行賞罰本部議得揀選軍士充實營伍係是重事合無行移各邊巡撫衙門轉行分守分巡兵備官員將所部軍士親自揀選勾補毋得視為虚文有負委任如軍士逃亡或老弱不堪巡撫官不行㨂選許鎮守衙門徑自具奏巡按衙門指實查㕘等因正徳十六年六月十二日題奉聖㫖是准擬欽此欽遵備咨到臣除行欽遵外為照御史孫孟和原奏與兵部奏准揀選軍士一節無非為國足兵靖安邊境至意縁祖宗舊制凡天下要害處所要㑹地方必設統兵將官管軍都司鎮戍其地凡揀選軍士充實營伍操練人馬守䕶城池𠞰捕盜賊乃其責任各官原奉勅㫖及節年題准事例一一具在後因各該鎮守并都司衛所官不能皆盡厥職於宣徳二年推舉御史十四員差往各處清理軍役景泰四年又改巡視大臣為都御史前去巡撫凡錢穀甲兵之事雖無所不理而其責専在總肅大綱糾劾奸弊蓋農耕婦織各有攸司今若巡撫衙門守巡兵備官一一親自㨂選軍士其鎮守并都司官却令袖手就閒更理何事况各邉軍士不精武備不振皆由精壯殷實人戸投托鎮守内外官充為頭目伴當等項鎮守内外官甚至額外占收名役辦納月錢姦弊多端難以枚舉平時巡撫督令守巡兵備親自揀選正須查革前項弊端既清查得出巡撫當劾奏之鎮守衙門既身自違犯事亦難於具奏且巡撫都御史係風憲之長其或不職巡按查見凡百實跡上聞可也若因揀選軍士一事未免得失而使鎮守内外官皆得傍觀坐議恐於國體亦非所宜今假鎮守衙門徑自具奏之權將開兇饕他日挾私摭拾之漸天下公論誰其肯容奏辯紛紜於何底止萬一守巡兵備中不職官因懼鎮守衙門具奏動多掣肘通不究心臣恐武備自是益加廢弛上下和同非國之福如䝉乞勅兵部再行詳議合無遵照節年事例將應理軍政仍責鎮守總兵衙門督率都司衛所官員悉心綜理各將軍士如法揀選以時操練其營伍空缺應勾應補布按二司清軍官専任其責若都司等官操練無法或阿奉上司役占縱容下人投托干礙鎮守衙門及布按二司清軍官有負任使並聽巡撫巡按衙門指實劾奏從重處治如此庶幾事可責成官無推調各官職掌不至紊亂近時奸弊亦獲少除縁係言官陳言邊務及該部題奉欽依備行遵守事理未敢擅便為此具本差承差袁璋親齎謹題請㫖正徳十六年十一月初二日設官疏題為復設流官以安地方事據雲南等處提刑按察司呈為災異事准本司按察使陳洪謨闗先准總司闗據經厯司呈抄䝉巡按御史案驗奉都察院勘合劄付前事㑹行三司轉行該道守巡兵備等官親詣臨安府寧州地方審勘彼中民情事體應否銓選流官掌印禄俸應襲兒男有無過惡應否遞降佐貳巡捕務要查勘明白而無疑貳議處周悉而無紛更何為事體穏便而民情不拂何為輿論允協而地方有益仍具勘過縁由通呈㑹議等因行該整飭臨安兵備帶管分巡臨元道副使呉便㑹同分守本道左㕘政鄧相勘議得雲南各府州縣大小土官未有不為民害者不用法律惟任私情罪罰輕重隨怒威逼計取務盈所欲襲職則勒出裝送之資上官則公要拜見之禮朝覲則有盤纒平居則有年例嫁娶喪葬誅求無厭名曰貼婚貼殯均徭里甲需索不一號為日供月供三年一次槩聚丁衆論口入錢巧立名色謂之冷訛一丁身故舉户入錢方許歸窆與除户籍謂之放死封豕長蛇恣呑飽噬較諸軍職之害民者什百千萬軍職有犯强盜典刑子孫例不承襲而土官查無明例然其所以處之之術要在於得其幾而隨宜裁制之爾今之欲用土官者率皆曰以夷治夷殊不知此言可施於草昧之時而不可用於治平之世國初邊民新附王化未孚叛服無常驟難統率力加於衆者聽其自相雄長於彼醜𩔖得専殄戮此醫家以毒攻毒法也今日聲教無外夷僰悉入版圖悉供差役正當亟用循良之吏誕敷子恵之仁是猶人病毒者瘕積既除宜施平和藥餌以衛元氣若常服剛燥之劑則元氣日耗而大命傾矣久任土官何以異此然無其幾固亦未可輕動有其幾而置之不圖異日成尾大不掉之患貽蔓滋難除之憂咎將奚執且以本道所屬言之如廣西尋甸新化阿迷䝉自等府州縣厥初俱係土官掌印衙門逮後革除土官改置流官至今民庶得安生理地方賴以無事雖其中不免一二盜賊竊發然亦未有謂改流官為不善者臨安府寧州先年設有流官知州一員巡捕正徳間被今巳處决知州禄俸隂賄逆瑾將流官知州裁革因得肆志行事窩藏廣西府彌勒州十八寨强賊縱令刼財殺人分贓入已罪惡貫盈神人共怒幸而逮捕就獄明正典刑此正可以革除之幾為之子者縱能守法循理改過自新克蓋前愆不為民害猶宜鑒唐世賞以勸惡之弊不宜長惡恵奸膠守故常復令承襲也今其男禄世爵犬羊習性鴟獍傳家逐母凌弟寵妾毒妻聴信刁民王宋儒等撥置招集十八寨習溪强賊格什等三四百人在於私莊阿金等寨窩住時常縱令抄虜人財殺死人命截刼客貨戳傷官軍剥奪衣甲坐地分贓節被失主錢明等告捕不獲及統領賊黨搶虜里長番索家資殺死男婦五名口破肚取腸懸掛樹枝又攻打州治刼放罪囚暗令私莊羣醜助敵官兵似此悖驁縱恣執迷不復所窩之賊倍於疇昔所造之惡浮於先世往事可懲前鑒不逺失今不治而又授之以官將來無窮禍患恐有不可言者况本州地界東㕘彌勒南抵建水西至河西北距河陽東南東北與路南阿迷壤地相錯西南西北與通海江川境土相連四方八面俱係流官掌印衙門非若元江麗江鎮沅等處設在極邊必賴守把隘口者之可比革而去之勢亦甚易此之不務而隂中其剽剠繹騷以要名位之計則此後脱有悍惡復出本舍之右所處更在邊徼之外者又將何以處之大抵僣擬無涯之念每起於兇惡之未懲畔渙不軌之謀多出於逋逃之相倚若不防㣲杜漸恐後變起非常合無密行三司掌印官再加詳議及今之時量調官兵將禄世爵與窩藏十八寨强賊格什等并幫惡王宋儒等盡行擒捕到官明正其罪另請推選亷介素有才力曽經任過知縣等官老成練達知州一員前來管理州事設施措置安集撫綏則一州之民得脱水火而就袵席邊方土官皆知警懼雲南漢僰夷羅共享安靖逺久之福事體無不穏便地方殊為有益若必謂土官與軍職不同父祖雖遭極刑子孫難遽革襲則當别選禄俸父祖别枝子孫無過者保襲赴部降授本州判官或同知使之專管巡捕斯亦足矣等因呈奉巡撫衙門批看得所議反覆千言究極土官害人情弊禄世爵蒐慝隠禍傲狠明徳以亂天常今日乗勢逐便正所當併案者仰按察司㑹都布二司再加詳審議處囬報奉此該本司掌印按察使陳洪謨㑹同雲南都布二司掌印左布政使方璘都指揮使劉宗仁議照土舍禄世爵本以隂妖蘖牙乃復怙寵滅義逐母異居毒妻致死廣窩强賊而刦殺人財攻打獄門而搶奪囚犯已該兵備等官究其罪狀律法難容及照十八寨强賊阿勿等猖獗見今具奏請兵撫𠞰合無候調軍兵至日乗勢逐便將土舍禄世爵并幫惡王宋儒等擒拏到官勘究明白速正典刑等因呈奉撫按衙門議行三司統兵官督同姚安府土官同知髙鳳等將土舍禄世爵并幫惡王宋儒等與强賊格什等盡行拏獲解發本司㑹問得禄世爵所犯除謀叛等罪名外合依殺一家非死罪三人凌遲處死王宋儒格什等俱依逃避山澤不服拘喚拒敵官兵以謀叛已行論斬罪具招通呈㕘詳具奏訖今照該州土流知州未經查議移闗到職㑹同雲南都布二司掌印左布政使方璘署都司事按察司僉事翁素議得臨安府寧州土官知州禄俸并伊男土舍禄世爵世濟兇惡敢為叛逆今既明正其罪地方人民始得息肩若仍將禄氏兒男降授官職使之巡捕彼如放虎於山我復為虎附翼甚非得䇿前此該道守巡兵備等官議要比照廣西尋甸新化阿迷䝉自等府州縣事例革除土官職任復設流官管理地方委的事體相應合無依其所議將該州土官知州職事革除照舊請選流官知州一員管理州事或於本省各官内推選練達老成官一員奏請調用庶於地方有益等因具呈到臣巻查先為前事案行批發去後今據前因㑹同鎮守雲南總兵官征南將軍黔國公沐紹勛巡按雲南監察御史羅玉議得臨安府寧州土官知州禄俸土舍禄世爵惡皆盈貫罪踵滔天厥父巳經典刑厥子行復梟市既土官難以再延彼族則流官不可久缺正員該道守巡兵備等官與該司掌印官先後查勘議處明白停當臣等别無疑異今廣西府彌勒州十八寨强賊始平建所設屯大工方舉寧州乃其鄰封巡司哨堡事有相關官久缺員何以集事且禄氏兇孽新除原窩强賊尚餘未盡黨𩔖為牧守者於此太緩則有詭御之患太急則有泛駕之虞治若得人庶幾易於為理御非其道未免遂失其心所據寧州知州員缺若只照常具奏候除别處官員前來不惟一時不知夷情難於撫處又恐赴任稽遲妨廢政務臣等訪得麗江軍民府通安州知州堅晟先任順天府通州知州頗著能聲秪因剛直見忤權貴謫官蘭州同知重陞前職兩俱在雲南寄住聽差既悉夷情亦諳土俗伏望聖明軫念邊地急須正官特勅吏部再加訪詢如無違礙就將堅晟調於寧州到任管事地方便益縁係復設流官以安地方事理未敢擅便為此具本差承差趙稹親齎謹題請㫖正徳十六年十二月初四日便利官民疏題為便利官民以安地方事正徳十六年十二月初一日有新任鎮守雲南太監王嵩在鎮病故除另奏外巻查先為議處國課以安邊民事該臣節次㑹同鎮守雲南總兵官巡按雲南監察御史題稱雲南大理等府新興等處銀礦場分節因鎮守内臣差人採取囊橐其間以致歲辦不敷將礦夫口糧折辦又將夫丁乾認共補課額利少害多法當封閉等因該尸部覆題正徳十六年五月初四日奉聖㫖是這礦場既查議明白都著照舊封閉以後不許妄開致生擾害欽此移咨臣等通行欽遵外續為開例禁興民利以足國用以安地方事該臣議照雲南楚雄等府表羅等處産銅地方穵出礦場先年奏准封閉雖有禁例一向無所施行近年具奏開穵各官司因難定擬不暇究其私竊所在姦徒細民千百為羣得利既多興販日廣以致在前鎮守太監衙門京官人等往迴任其抽分上下為之䝉蔽鎮守者以補凑進貢為名採取者不知封閉有禁今鎮守太監京官人等奉例取囬額外進貢一切停止前項銅課抽分票簿應合早為處置行據雲南都布按三司查呈到臣㕘詳批行及又㑹同鎮守總兵官巡按監察御史具題去後又為陳言鎮守内臣貽患地方事臣訪得雲南鎮守内臣揭撥柴薪子粒軍伴等項銀嵗幾萬兩皆先年太監錢能張威恃勢貪財害人作俑為之後來王舉覃平劉昶崔安張倫等鎮守踵以成例梁裕繼至奏要照依先年太監撥給誤䝉武宗皇帝俞允正係劉瑾錢寧江彬相繼擅權之時今幸仰承恩詔裁革弊政又經案行雲南都布按三司查處裁革及具題去後顒望成命自天有期臣近為折支俸鈔事據布政司呈稱都布按三司及雲南左等六衛首領各府文職官吏俸鈔本司錫課商税不敷放給查得原奉臣案内開各處人民客商採取興販銅斤來㑹城者本司行雲南府衛各該地方務令盡數出納税本府每季𩔖解布政司貯庫以備軍需及各官員折俸支用在巻合無將今解到銅課銀兩相兼接放等因到臣批行外又為開讀事據布政司呈稱本省正徳十五年分税糧已徵已解獲有通闗實收者不過十分之三已徵未解不曽獲有通闗實收及小民拖欠應該蠲免者大約十分之七以後年分官吏師生軍士孤老勇夫等項不無缺糧關支查得原奉臣案備行守巡各道將各該管有司衛所每年揭辦鎮太守監衙門何項銀兩各若干正徳十六年八月太監史泰囬京以後年分該撥鎮守柴薪等項銀兩例應革除并剰下衛所軍伴有司田地均徭銀兩應該從寛作何處置應辦何項糧差應納何項課税鎮守金騰地方内外官員見奉取囬遺下辦納等項亦要逐一查處囬報在巻合無與司府各項銀兩通融准作俸給月糧等因到臣又經批行及具題外臣聞内臣出鎮自永樂間始今各邊内臣鎮守非我太祖皇帝之舊制也永樂間各邊止是遼東開原及山西等處今并腹裏一皆有之非我太宗皇帝之舊制也夫太監謂之内臣當居近侍各邊乃是外地無煩逺出而正徳年間後先相繼營幹不休秪因歲倚進貢之名遂得日為徵求之利然非其地大有所得地之逺者何故願來恭惟皇上聖明御極進貢不容於額外取囬屢見於詔中海宇蒼生豈勝感戴而雲南等處并金騰地方太監舊者取囬多者裁革繼者病故一時民庶大獲息肩公私錢糧恩詔之後臣得清查各有歸著地方感戴之私尤深於他處矣雲南并金騰地方鎮守太監不比舊制臣前節次具奏巳詳金騰已先經兵部奏准則在㑹城者聖明必當復有處置若又差繼王嵩者至前項銀場既已封閉盛世無所資焉銅課又歸所司彼將欲何覬覦柴薪子粒軍伴等項辦納例後俱是在官戸籍財物誰忍阿送而地逺萬里動須遵守朝廷維新法度恐非彼𩔖所能堪也臣巡撫於兹倐踰三載荷皇上厚恩改任留都自分此生殞身莫報兵部咨載累朝成命令竢交代實難擅離拳拳至愚慮孤此地因復為此塵凟天聽今王嵩巳病故倘有求鎮守者皇上念此遐荒察臣愚悃必諭止之所有前項公私錢糧仍勅代臣巡撫及巡按官不時清查考究毋俾欺隱不至變更幸甚縁係便利官民以安地方事理未敢擅便為此具本差承差洪思明齎捧謹題請㫖嘉靖元年正月初四日何文簡疏議巻八
