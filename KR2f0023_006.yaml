body:
  text: 何文簡疏議卷六明何孟春撰申戒邉官疏題為申戒邉官以正邦憲事據雲南等處提刑按察司呈為查參軍職事奉臣信牌前事依奉查開參問軍職一起該本司問得犯人釧保招稱大理衛太和所管操千戶汪琮正德七年八年內節次賣放操軍何益等三十二名認納月錢共海蚆九千六百索正德九年又賣放操軍楊定等十六名認納月錢共海蚆四千八百索入已事發持刀趕殺差人又令使女懷抱小兒攔阻後將伊連刀捉獲審證明白省候具招詳允查得本官别卷於正德十年參奉都察院勘合行提至今未到一起該分巡金滄道問得犯人楊瑋招稱正德十一年洱海衛指揮王官將軍丁馮鐸挾私責打送監因傷患病領出身死一起該分巡洱海道問得犯人鄒學招稱正德十一年楚雄衛千戶許宏將原經收寄庫秋糧銀兩領出給軍口糧外餘銀四兩八錢侵欺入已一起該整飭金騰兵備副使劉莭問得犯人楊景祥招稱正德十年騰衝司百戶張鑑指稱鎮守內外官員名頭科收軍人楊紞等銀五十九兩四錢除送王太監外餘銀四十一兩四錢侵欺入已一起該整飭臨安兵備副使吳便問得犯人沈濟招稱正德十二年臨安衛千戶單文指稱兵備官員名頭誆騙土舍普顯金鐲頭一對重十兩銀楪十五箇重五十二兩入已一起該管屯副使史良佐問得犯人董慶元招稱大理衛千戶朱麟侵欺正德八年分秋糧銀三十九兩二錢四分五釐二絲正德九年分麥糧銀一百三十八兩六錢秋糧米二百八石五斗九升將銀三兩五錢送與掌印千戶陳忠接受入已一起該帶管分巡金滄道副使汪標問得犯人趙禮招稱大理衛指揮戴瓚將捕盜失事住支俸糧於正德十三年三月內隱情關衛開支至正德十四年四月每月盜支糧米三石共三十九石入已一起該帶管整飭瀾滄兵備僉事周愚問得犯人金璨招稱瀾滄衛千戶金琳侵欺𢎞治十一年分馬料折銀一百五十一兩八錢六分四釐一毫又侵欺在官贓罰銀四十兩五錢千户楊泰侵欺正德六年分麥糧銀二兩七分又冒支正德八年九年軍人許義口糧共二十一石入已一起該整飭金騰兵備副使汪標問得犯人吳奏招稱騰衝司百户吳泰侵欺𢎞治八年糴穀備邉銀四十兩𢎞治十三年起至十六年分本所歲徴預防邉患稻穀共八十石五斗𢎞治十七年馬料榖一百九十三石𢎞治十八年至正德四年稻穀共一百一十九石正德五年六年七年十年分預防邉患稻穀共一百一十石五斗入已一起該管屯副使史良佐問得犯人路亨招稱楚雄衛定逺所倉署掌印記百户陳俸正德十四年八月內為事將印記暗與省祭官楊福傑接管得受銀十兩入已各等情事發拘審明白具招詳允關司將指揮王官千户許宏單文朱麟陳忠百户張鑑陸續具本參奏未示指揮戴瓚千户金琳楊泰百户吳泰陳俸俱見未參等因備呈到臣除行該司將汪琮差人守提王官等案候提問戴瓚等作急參奏外臣查得𢎞治六年為公務事該部院㑹議題准雲南軍職有犯除求索科斂誆騙恐嚇等項輕罪悉遵舊制參奏至日提問若人命強盜謀故人命故禁故勘一應真犯死罪并監守自盜常人盜誆騙夷方及上官承襲財物受財枉法各贓至滿貫者俱聽問刑衙門備呈巡撫官處拘審明白就與追檢暫發羈候開具實跡奏請提問發落若參奏已到不服提問及延至三箇月上不行出官歸結并倚恃凶頑揑詞奏告或買求主使他人奏告無辜審係涉虛問擬改調邉衛及一年之上不赴官者照依逃官事例問發為民子孫襲替仍調别衛帶俸差操不許管軍管事蓋緣天下軍職官員類出恩䕃罔知國法而雲南衛所司禦設置土官地方薰染諸夷性習傲上虐下趨利忘義尤為放逸靡所不為及至犯罪被拘輒又自倚軍職不行出官或宣揚伸訴而髙坐本家或委棄職守而潜居夷域官司罔究奸惡無懲是以先年特為厲禁用戒邉官不同恆典但前項事例𢎞治十三年已經革去今問刑例內不載切照雲南去京萬里而為事聽參職官俱仍支俸參奏文移上下往反動踰一年之外方得提問人不復知畏法法不足以立威如汪琮王官戴瓚等輩久逭正刑濫縻常祿爰自敗露以來六七年者有之四五年者有之少亦閲參二年惠惡長奸害政非細如蒙乞敕都察院㑹官計議合無查照先年題准事例再加斟酌今後雲南軍職有犯除徒流笞杖輕罪遵照舊制支俸聽參外若雜犯死罪以上如前經革事例之所云者俱聽問刑衙門備呈撫按官處一面冠帶散拘審究明白就與追檢暫發羈候行令原衛司所住俸一面開具實跡奏請區處其或抗違不行出官延至三箇月以上者雖稱未經審究即係事情得實懼罪躲避一面行令住俸一面將干證人犯追問明白具實參奏若參奏已到不服提問及延至三箇月上不出歸結并倚恃凶頑揑詞奏告或買求主使他人奏告無辜審係涉虛亦照前例問擬改調邉衛及一年之上不赴官者照依逃官事例一體問罪為民子孫襲替調别衛所帶俸差操不許管軍管事敢有隱情將男赴部替職都司該衛掌印官吏俱各參問枉法贓罪照例施行仍不准替如此庶厲禁復明人心有警威令克施刁風可息緣係乞申舊例戒邉官以正邦憲事理未敢擅便為此具本差承差親賫謹題請㫖正德十五年三月初七日地震疏題為地震事據雲南府安寧州申稱正德十五年二月初八日午時地震從西北方來續據本州祿豐縣申本日時地震從西北方來響向東南方去又據姚安軍民府申本日時地震從西來有聲如雷將本府公㕔并軍民房屋震動俱各有損往東南去又據大理府衛各申本日已時地震從西南來向東北去有聲震動軍民房屋又據本府賔川州申本日時地震二次從西南來向東北去有聲又據蒙化府申本日時地從西北大震往東南七遍有聲如雷至午時又從西北震往東南一遍至亥時又從東南震往西北二遍初九日寅時又從西北震往東南二遍因震牆倒壓死民人王憲幼男一口又據蒙化衛申報日時次數相同及稱北門城樓下西北角外牆搖倒髙七尺橫一丈東北城牆垜子搖倒十箇損裂二十餘箇月城垜子損裂七箇東南城牆角損裂高一丈橫一丈六尺本衛經歷司㕔屋脊搖倒一丈又據白鹽井鹽課提舉司申本月初八日已時地震二次從西南來震動軍民房屋初九日夜微震一次又據鶴慶軍民府申本月初八日午時地震二次從西北來向東南又從東南震回西北搖動公廨軍民房屋等因各申報到臣卷查正德十年以來大理等處不時地震俱經前巡撫官陸續具題去後今據前因臣聞地者隂也法主於靜宜靜而動為隂有餘民生安土夷類屬隂雲南地方諸夷雜處今乃頻年有此災異此民不聊生而夷甚可慮之應也推原其故蓋由臣并各該官員在今地方利有所當興者未能舉行害有亟當去者未能除革閭閻之下不免誅求之歎疆場之內常罹攘奪之虞職則未修罪得焉贖除痛加修省及行雲南都布按三司各行所屬府州縣衛司所大小衙門一體修省城牆官房搖倒損裂去處行屬查照修理人口壓死之家量為賑給務求實政以消咎徴外緣係地震事理為此具本差承差李載親齎謹具題知正德十五年四月初九日積年草賊疏題為積年草賊嘯聚山林劫殺人財攻燒村寨事據整飭臨安兵備帶管分巡臨元道雲南按察司副使吳便呈奉臣信牌劄付前事正德十五年三月十九日據廣西府申准本府署府事澄江府通判王鐈關據彌勒州永白村被虜監生楊志聰弟楊志明楊志宗佃民李景等連名狀告先年被十八寨强賊阿海虧洪等為惡敵殺官軍志明兄因承委捕解四賊受賞後被千夫長王仲明主縱前賊阿保阿吾等聚成伍寨吹動響器張打旗號分領八百餘徒各執器械將煙白山曲納樂等寨佃民阿令者覽等家人財劫虜情詞纍告在官正德十四年捕獲賊首阿保解問外本年六月內被前賊復聚五百餘徒分為三哨將佃民阿令者比有召等二村房屋燒燬搶去水黃牛五十餘隻并家財穀麥等項具告州府行捕因賊勢衆無可奈何反被洪州村潛住江西人艾廷松引領阿保義男阿鮓并前賊者所者妥等馬步七百餘徒各執長槍黃旗號頭分為四哨正德十五年二月初十日將本村并老悟土獠三寨圍殺燒燬房屋百十餘間因記前讎將楊志聰并妻楊氏男楊俊德楊九五姪男楊賢女桂月桂任并佃民那本者襪有歹者方奴春冬奴阿定進安等十五名口虜去又將志聰弟楊志通義男楊車龍殺死楊八有來等七名射傷又搶去楊志學楊洪李景假春阿自必五等一百餘家毛色不等馬五十餘匹耕牛一百五十餘隻豬羊三百餘隻口監生路引一紙并家財器皿衣服虜盡人民殺散等情又據火莫龍村莊户何志聰阿革阿勝李七連名告正德十四年五等月內被十八寨強賊阿勿者特襪希馬奈阿土木色等三次困圍本村燒燬房屋一百五十家燒死幼男女一十口虜去伯夷二十一名殺死阿留阿尚等九名搶去牛馬豬羊一千六百有零并衣服榖米户絶人亡狀告本府張知府處本年十月二十九日通行申蒙兵備差委千户馬珉帶領被害范朝宣普文得等告准明文㑹同本府牌差千夫長王仲明老人李有也前進十八寨撫勘強賊勢惡不容入寨各役回呈本官親詣本州㑹調師宗州土舍龍節千夫長自那并本州千百夫長龍泉番洪兵夫自備乾糧欲進撫捕蒙上司見賊勢惡恐致失事行令暫且停兵本官回府兵夫四散強賊愈加放肆本年二月初十日將總速牙官莊一帶燒燬五十餘家牛馬豬羊盡行抄搶等情又據本州豐篤村民阿雙阿習等連名告稱本年二月初十日以來被法果路襪卜髙頭甸黑土等寨強賊者革者擺阿寺阿革阿少阿俄阿必沙者阿方阿吐者討者黑者得阿豆阿旦赤立等七百餘人分作四哨攻打楊志聰等寨一哨將雙一寨圍困搶去馬二十八匹牛四十八隻羊一百三十六隻豬三十餘口虜去男婦泥吉母厄奈黑奈卜適作番受阿旦阿鶚奈自阿魯怕㱔額乃者方阿弟等二十六名口稻穀百十餘石并家財衣氈等情又據矣勒村生員楊璽弟楊通告稱前項月日被十八寨強賊阿上阿吾赤普阿赤阿希者托等莭將管下普特小黑舊納勒白虐擺習初白五村人民殺散牛羊財物盡行搶去等情又據祿克村貢生楊仁弟楊定告稱本年三月初三日被十八寨強賊阿擺阿乂等率領馬步五百餘徒將本村圍困燒燬佃民李章等五十家搶去馬二十七匹牛四十三隻豬羊一百餘隻口將一村人民殺散切思十八寨強賊將法果髙頭甸等寨賊首阿革阿勿阿擺等僣稱主人侍長總兵名目日每嘯聚千百餘黨倚恃山險箐深不時出沒流劫今日虜一村明日殺一寨不惟寧州通海等處地方受害見今本州所轄永白矣勒祿克等三十餘寨悉被攻燒戶絶人亡所餘無幾遺下糧差負纍等情各告到府案照先莭奉兵備副使吳便信牌為劫搶殺害地方等事莭奉撫按衙門批詞前事牌仰本府著落掌印官㑹同指揮查俊督併土舍龍莭千夫長自那併各有名龍泉趙成等量起兵夫牛叢火甲親詣十八寨等處有名賊巢將有名賊首撫拘到官諭以朝廷恩威殺伐利害令其改悔將今節次各起被告強賊盡首出官原劫搶殺人口財畜照數追出陪償餘黨悉不追究省令各安生理若仍前冥頑不聽撫諭就便相度機宜設法緝捕務將真正贓賊獲解以靖地方如是賊勢衆大卒難擒捕應該作何處置作急呈來施行等因移關到職㑹同臨安衛指揮查俊遵奉間續准本官關亦為前事㑹同牌差在城驛驛丞郭森把事尹傑趙玘督同彌勒州土舍昂繼先義官段紹先老人李有也等齎執撫諭印信告示前去各寨撫拘不期賊首阿勿阿利等仍前聚衆糾同叛逆那代漏網強賊在彼恃險逞惡趕殺差人不容入寨回呈到職查得本府節年卷內據建水寧州阿迷等州被害民范程林范玉魯法者哀者舊鮓矣等并本府彌勒州民趙林楊永楊受宗阿丁余昂楊仲芳楊志明何義等各告纍被十八寨法果等寨賊首阿勿者特阿利阿革者箇等朋惡聚衆不時過界劫搶攻打村寨抄搶財畜殺死人命等項重情在官詞狀難以悉開今看得十八寨草賊生發積惡年深比年纍次委官招撫隨撫隨叛當時賊衆不過五七百人尚倚住寨險峻林箐深密不能撫捕至今草賊生發騎步約有三千餘徒養成大惡愈加放肆吹動響器張打旗號披帶盔甲劫殺人財攻燒村寨日甚一日被害者已為流轉之尸驚散者俱作饑寒之鬼今附近賊巢村寨三十餘處婦女恐懼躲避深箐男子日夜執械隄防似此貽患地方荼毒生靈罪惡滔天神人共怒其賊既不聽撫在法實所難容若行巡捕官兵每處不過三五十名豈能捕獲切照兵部飛報賊情事例內開各處但有草賊生發緊急該管官司即便依律調撥官軍乘機勦捕火速差人申報如有朦朧隱蔽不即申報失誤軍機貽害地方依律從重參究此係職等責任所在萬一前賊凶惡愈肆致有失陷罪死何贖如蒙准申乞行副使吳便查照撫按衙門節次批詞信牌事理行令量起本府并師宗彌勒二州土舍龍莭千百夫長自那龍泉義官趙深趙倫等下民兵五千名令各自備數日行糧炒麵本職㑹同指揮查俊督率本府經歷劉勤土官照磨髙世安帶領兵夫人等前去十八寨分哨住劄撫捕但十八寨接連各州地界俱有通行道路恐賊逃遁又為費事前項量起兵夫自帶炒麵實難持久本職預借本府并彌勒州殷實之家飯米約及三四百石行彌勒州轉委維摩州吏目郭澄督同老人把事收給暫助行糧事完之日申請還補又恐此後用盡難繼均乞定奪施行等因畫圖申詳本院看得起調兵夫動支錢糧撫捕久惡賊衆事情重大該道官未經先禀難以遙度牌仰本職作急㑹同分守官員親詣該府地方相機審處從長定奪如必進圍應須捕治遇險則要害所當據何以使賊不致奔逸持久則饋餉不可缺何以使賊坐致困斃夫貪功妄殺有傷好生之德而養寇自玩重貽將來之害惟計出於萬全庶功收於一舉申內所言當預備者宜從作急處置呈奪施行奉此又奉本院劄付前事㑹同鎮守巡按衙門看得十八寨圖髙頭黑土法果法鮓六石足卜龍潭路阿卜等村寨俱係藏賊巢穴賊所棲託非一處澄江路南阿迷彌勒建水寧州等府州俱有通賊道路賊所出沒非一途前項強賊倘復撫之不聽諭之不從法在必誅兵非得已若要害無人守把寨分缺軍截遏則兵勢不相聨絡賊徒終得遁逃臨事好謀雖無傷敗之虞失㑹後期終鮮俘馘之績况坐甲以裹糧為先行師有後爨之慮兹欲頓兵攻堅又當振廩相續劄仰本職并臨元道守巡官㑹同計議應撫應勦守巡官密切差人前去澄江路南阿迷彌勒建水寧州等府州著落各該應捕人員率領本處兵夫於十八寨附近通賊道路預先守把兵備仍量選調臨安等衛操守官軍動支無礙官銀與守巡官各於廣西府并彌勒州分布住劄再加詳度令委官王鐈等率領土流官舍起取所屬民兵直抵十八寨賊巢振揚威武昭示刑德彼若革心改圖厥角謝罪將今莭次被告有名强賊送出即照先年處置夷情事理撫處施行若又再三不聽不從亦要隨變制宜相機行事明賞罰以作士氣申號令以一人心密構鄉導之人廣集奔命之士賊既天奪其魄我為師出有名彼散不得逃聚失所據浹旬之內氛祲可除如是該府申報不合機宜各官㑹議另有處置就便具呈飛報定奪施行奉此卷查先為強賊聚衆白晝攻打村寨殺虜人財燒燬房屋等事奉鎮守撫按衙門批據廣西府申准知府張縉關前事行該本職㑹同分守左參議羅方議照十八寨強賊恃險負固纍惡不悛知府張縉申要督調官兵設法撲滅固為地方至計但訪得本官起倩兵夫已令自備行糧半月却又科𣲖民間大家小户約銀二千餘兩逼迫逃竄先失人心合無仍令本官再勘保無後艱重申定奪等因呈奉巡撫衙門議得安民事不専於治盜治盜法莫先於禁貪知府張縉既酷且貪而欲驅積怨之民以臨死戰之地決難成功決致僨事批仰本職戒諭間本官自知事巳難為罪亦將露於本年十一月二十九日棄任在逃該分守左參議羅方具呈本院批仰㑹同本職勘報以憑參奏等因行間正德十四年十二月初二等日正德十五年正等月日不等節奉撫按衙門批據軍民舍餘范玉杜見劉宇鄭杲楊宗美王能波美白林師哄楊玘悟莭李昊等節次各告并據臨安府彌勒州臨安衛鎮撫孫鎮冠帶總旗李鉞曲江巡檢司曲江驛羅台舊驛千户陳瓊吏目袁棟百戶聶麟廣西府學生員何鏞等各申呈為劫搶殺害地方等事俱批節行巡捕指揮等官㑹同廣西府掌印官督併土舍千百夫長通把人等撫捕去後今奉前因看得廣西府署印通判王鐈申稱彌勒州管下十八寨强賊阿勿等節年劫虜人財燒燬村寨積惡有名肆行無忌纍經委官招撫隨撫隨叛今自正德十五年正月以來仍又大肆劫掠張打旗號殺死哨軍搶奪官馬以致失主紛紜告擾及至差人撫諭又乃恃險逞惡前來趕殺以故要行量調民兵㑹官緝捕似為相應其稱預借殷實之家飯米委官收給暫助行糧又恐此後用盡難繼查得臨安衛見今收貯正德十三年分支剩揭撥餘丁銀一千六十四兩五錢七分五釐正德十四年分八百一十一兩四錢一分并通海前前右右二所正德十四年分銀五百一十四兩四錢三分俱收在官係是無礙官錢可以於內量取支用本職行令通判王鐈指揮查俊率領本府經歷劉勤土官照磨髙世安等起調本府所屬民兵直抵十八寨賊巢多方脅撫其賊通澄江路南阿迷彌勒建水寧州道路遵奉牌劄先已撥差各該應捕人員率領兵夫用心守把外㑹同分守左參政鄧相調撥臨安衛官軍共四百九十員名雲南右等衛協守官軍五百十員名跟隨遙振并動支臨安衛收貯正德十三十四年分支剩餘丁銀一千八百七十五兩九錢八分五釐以備賞用於本年三月二十五日帶領自臨安起馬前至阿迷州為因經過路道逼近賊巢整備防護民兵至次月初一日早方到彌勒州據署印知州盧元愷巡捕指揮查俊各禀賊黨衆盛不肯聽撫本州雖奉明文調集兵夫一千餘名并路南州兵夫二百八十名而通判王鐈尚在本府調兵未齊難以攻圍及審頭目人等亦稱兵寡難進職等不敢輕舉㑹同審處前項強賊據險貽患有年欲為萬全之計必須預備糧草起調元江臨安澄江羅雄等處象馬等兵約同一萬員名呈請旗牌人員督率前進方克有濟但事在持久非旦夕可成職等雖已發牌前項府州令其調集聽取竊慮農務將興或隂雨連綿兼以天道值暑瘴癘交作則又事有難為是以只得量添附近精兵困圍脅撫欲得獻其首惡權為一處俟有成算另行呈奪再照通判王鐈勇於捕盜志亦可嘉但視為輕易驚動賊黨申稱調兵五千尚未得千人決期二十五日進兵至今猶未到州以致各職至此猝難舉事等因具呈到臣案照已經節行去後今據前因㑹同鎮守雲南并金齒騰衝等處地方兼提督銀場內官監太監史泰巡按雲南監察御史陳察議得德莫大於好生政莫良於化惡十八寨強賊諸夷雜種異禀殊俗死亡不弔殺掠為能先年在官纍勤招撫忘彼桀驁欲就羈縻撫使未及旋歸居民已為薦食惡不可化非一日矣正德十年春鎮守撫按官以此奏聞専意勦擈然賊犯賊級擒斬無幾名顆而我軍殺死百户一員殺死并殺傷兵夫不下百數十名事遂中止盜賊如何不肆地方如何得寧當時兵備等官參奏提問至今方結今日虎窺內地藩籬而益深狼噬齊民膏血而無忌撫則既知不肯聽撫勦則又恐不能成功瘡切傷弓過其地者實難奮翼目觀入井當其任者忍弗動心為今之計合戒覆前以圖善後豈惟兵糧宜集尤貴將領先擇副使吳便查帶支剩餘丁銀兩未及二千相應留備軍興賞犒之費今要起調各屬象馬等兵一萬每人一日該用糧一升五合每日該糧一百五十石以一箇月為率該用糧四千五百石二箇月則倍之應於路南彌勒寧州近十八寨州縣分屯方便支用萬兵既集軍民兵夫應於各府州縣衛所文武職官選取謀勇忠勤一二百員統率調度方稱任使兵在神速固驟發可以掩其不備事須豫立惟有備斯無患於將然今天道人事既難猝舉乘間伺時亦合早慮通判王鐈據參政鄧相等所呈合當提究但正用人之際姑記以俟後議除案行都布按三司行移掌印并該道守巡兵備督糧督屯官員查照逐一議處仍請鎮守衙門欽降旗牌督催土兵預備聽候相機撫捕及將在逃知府張縉科𣲖情罪勘報另奏外緣係地方重大賊情起調兵夫動支錢糧事理為此具本差承差李載親齎謹具題知正德十五年四月初九日禁科擾疏題為禁止科擾以安軍民事據整飭金騰兵備雲南按察司副使汪標呈奉臣信牌前事行該本官問得犯人董天福招係大理府太和縣民充騰衝軍民指揮使司户房典吏本司一應公務每年揭撥餘丁出辦銀兩俱經印指揮陳亷徴收支銷正德十四年例應朝覲本年六月內蒙巡撫何都御史案驗備開吏部咨到朝覲事例行移雲南布政使司通行所屬應朝衙門土流官員應帶吏典書役皂𨽻人等各照今定􅐻纒數目出辦支給不許分外多帶一人多科一毫酒席等項悉從省革守巡官至處嚴加訪察但有不行存恤軍民故違科害者體訪得實不待告發就便參究各道仍將按屬官吏支領應朝􅐻纒銀共若干已於某處動支中間有無分外科取緣由呈報等因轉行兵備官備行本司呈委指揮馮鑑帶同該吏楊一霑應朝陳廉自合於前項餘丁銀內依數支給為當不合令馮鑑楊一霑照依往年自備酒食邀請本司各所并經歷司巡司稅課司館驛等衙門指揮千百户大使驛丞等官各以禮量助􅐻纒餽贐馮鑑楊一霑各得銀以足原擬􅐻纒之數比陳亷要得乘機侵盜將餘丁銀內動支六十兩止將三十兩送與馮鑑楊一霑各顧夫馬應朝去訖餘銀三十兩陳亷不合侵盜入已本年十一月內蒙兵備江副使牌行本司查理應朝官吏􅐻纒銀兩陳亷不合揑稱於左等所銀差內動支六十兩給與官四十兩吏二十兩領訖虛情關行本司董天福在房承行明知前弊不合不行查舉輒依書寫轉呈江副使處致蒙查出備呈本院牌行本官將天福提解到官查審前情明白將董天福問罪照出指揮陳廉等人贓另行等因備招具呈到臣除參詳合律批行將董天福依擬發落馮鑑楊一霑候回日查究外參照雲南都指揮使司騰衝軍民指揮使司指揮使陳廉指倚官吏應朝為由私將官銀侵盜入已事屬違法律合提問緣係軍職未敢擅便為此具本差承差李載親齎謹題請㫖正德十五年四月初九日議國課疏題為議處國課以安邉民事准户部咨該本部題雲南清吏司案呈奉本部送户科抄出臣等題前事㑹同鎮守雲南總兵官征南將軍太子太傅黔國公沐崑巡按雲南監察御史萬鎡公同都布按三司官查議得雲南大理等府地方原設新興等處銀場原撥各衛軍充礦夫採穵嵗辦銀兩莭因鎮守內臣差去人員採穵未免囊橐其間以致嵗辦不敷將礦夫口糧折辦又將夫丁乾認共補課額大段一嵗銀場所出不過三千有餘礦夫口糧夫丁折辦乾認乃至二萬八千餘兩正德六年鎮守總兵官并巡按御史奏將各場封閉免辦以紓民困三四年間地方獲安正德九年被瀾滄衛軍周達妄行奏開旋復科擾害生侵欺弊出正德十三年撫按又將災異感召情節建議封閉該部議擬覆題未蒙俞㫖本年鎮守太監專任提督以來查得礦夫口糧折辦銀解布政司者先年因有麗江蒙化寧州浪穹等府州縣遞年拖缺數多抵鑄之時恐誤解京那借在庫備邉等項銀共二萬五千餘兩凑解至今未補夫丁乾認銀解都司者遞年夫丁辦納不前官司追併緊急至於賣男鬻女破産蕩家接輳補納又被經收人員耗取侵用軍受橫征之苦國無完課之期緣雲南地方土號不毛物産最少家無宿藏米榖極貴總計一嵗之賦稅僅勾一嵗之供給況邉徼易動夷情靡常事變無形兵糧當預若使此地無此銀場朝廷决不以千數緡為盈縮而礦夫得各回原籍操備則得軍一萬七千四百四名口糧得令有司收積則得糧一萬八千七百五十六石夫丁得免乾認銀一萬三千一百餘兩以備仰事俯育則得各遂生理恩感昊天歡騰異域然則銀場一事閉者為地方弭害其指甚夥開者為公家營利能得幾何以事之利害言之閉者反足為利開者適足成害以利害之多寡言之閉者所弭之害多而所喪之利寡開者所得之利寡而所貽之害多此前此鎮守撫按所以踵陳封閉之奏而該部具覆力主其說蓋酌寡量多惜大略小當如是也臣今日敢不復為皇上言之皇上下之該部備查詳議必有以驗臣言為不誣矣或曰奉公行法惟貴得人利無小而可棄害無大而不可去臣願乞將原撥軍充礦夫一切查革各照原伍操備差使將原擬口糧亦各免𣲖行令各府州縣量徴折色通解布政使司聽作備邉并營建宫室支用將九處銀場判山窩村廣運寶泉四場先年因無礦脉除豁訖新興南安白塔白崖黃礦五場查照近規鎮守衙門行令三司掌印等官於各府州選委廉慎勤能佐二官場各一員管領人工採穵沙礦辦納國課若原開峒口礦脉衰微不勾辦納聽令查勘附近新開處所一體採穵雖難拘定額數務在儘數納解庶上收天然自有之利下免主者取盈之害等因題奉聖㫖户部知道欽此該户部參看得巡撫雲南右副都御史何孟春所奏銀礦一事先年撫按奏准封閉民困始蘇今都御史何孟春仰荷巡撫重託靖安地方乃其分內借曰鎮守等官㑹議宜開自當力主其說若果灼見國課難完礦夫困苦亦建議免辦却乃奏要附近新開礦峒一體採穵非惟輕信人言抑且有負任使况銀礦得利甚微為害甚大若使准其所奏誠恐假託辦納弊出多端因而科擾侵欺勢所必有不能安民而反殃民將來激成他變咎將誰歸宜從抄出查例執奏施行等因抄出送司案查正德六年為地震事該鎮守總兵官黔國公沐崑等㑹題要將雲南大理等府新興等場比照福建等處事例封閉該本部議擬題奉聖㫖准議欽此通行欽遵訖又為遵舊制復銀場以便軍民生理辦納課程禁除私竊安靖地方等事該雲南都司瀾滄衛軍丁周達節次奏稱各場封閉要行復開該户科參出周達送問遞回訖又為照舊採辦銀課以備國用以安地方等事該鎮守雲南太監張倫奏要備工具雇夫開礦採穵煎辦納課以安地方該本部議擬合無照舊封閉題奉聖㫖是欽此又該軍丁周達令弟周進奏要復開亦該户科參出本部議擬照舊封閉題奉聖㫖恁每還議處了來說欽此該本部議擬仍令鎮巡等官從長㑹議定奪題奉聖㫖礦場不必踏勘只照先年崔安等事例採辦仍著鎮巡等官梁裕等管理欽此又為災異事該巡撫雲南都御史范鏞巡按御史唐龍各題稱雲南大理等府新興等場與螳螂赤石崖賊巢相近其間夷獠因附為姦乞要仍前封閉該本部議擬行移彼處撫按衙門將正德十二年所採見在銀課照數煎辦解京正德十三年正月以後銀礦即行封閉礦夫停革銀課免辦題奉聖㫖銀課照舊閘辦欽此通行欽遵去後案呈到部看得鎮守雲南總兵官黔國公沐崑巡撫都御史何孟春巡按監察御史萬鎡各題稱雲南大理等府新興等場一歲銀場所出不過三千餘兩折辦乾認乃至二萬八千餘兩要將原撥軍充礦夫一切查革將原擬口糧亦各免𣲖將新興等五場於各府州選委廉能佐二官管領人工採穵沙礦辦納國課若原開峒口礦脉衰微不勾辦納聽令查勘附近新開處所一體採穵一莭為照雲南礦場節該本部議擬具題俱奉有前項欽依所據新興等五場既是礦脉衰微利少害多相與具奏封閉其附近新開處所原無採穵豈可創舉以開釁端既該戶科參出前情合無候命下本部通行雲南鎮巡等官都御史何孟春等將原撥礦夫一切查革回伍操備原擬口糧亦各免𣲖其新興等五場并新開處所一體封閉嵗辦課額暫且停免待候礦脉長盛之時另行具奏定奪等因題奉聖㫖是這礦場應否開閉還著鎮巡等官查議明白來說欽此欽遵備咨前來已行雲南都布按三司將原撥礦夫查革原擬口糧免派及將礦場應否開閉事宜備呈鎮守巡按衙門㑹呈查議去後月久未報除行催外卷查正德十三年四月二十五日該前巡撫都御史范鏞准户部咨為遵舊制專督銀場事該鎮守雲南并金齒騰衝等處地方內官監太監史泰題稱前任太監劉昶崔安等奉敕不妨鎮守職專提督本處銀場聽其選擇武職官員管理閘辦銀課責限完解近年以來降敕太監梁裕與同總兵巡撫官公同管理議委文職閘辦掣肘不堪行事乞要職專提督等因該本部議擬題奉聖㫖是這閘辦銀課准照劉昶崔安事例提督管理寫敕與他欽此欽遵通行外正德十四年四月二十日臣接管巡撫切惟前項銀場課額利少害多休戚事干地方興除乃臣職分撫臨之初即行查議事求其大此實宜先案㑹先存鎮守總兵官沐崑前巡按御史萬鎡議照所言與臣俱同以此相與酌量亟申奏請臣並不敢輕信人言但臣彼時初到方及一月聞見惟恐缺真言語未能專决有負任使罪實難辭今㑹同巡按雲南監察御史陳察再查議得雲南地方原設銀場法當封閉從前撫按官員纍次言之已為懇切該部纍次執奉已為明備惟乞皇上睿聰剛斷一言而已彼欲開者未嘗不飾以利而啖聖心此欲閉者敢不歷陳其害而悟天意大抵銀場為利實少為害實多利才十一害率千百而十一之利又不全歸公家千百之害常至槩及官私判山等場𢎞治十二年奏除之後續有採穵九重不得知也新興等場正德九年奏開以來開出附近處所峒口名色九重亦不得盡聞也然則附近峒口數年之利臣不預其事不審以供上者幾何臣去嵗㑹奏新開處所追論之言既往無益不復究竟根源煩瀆聰聽本年三月初八日雲南府安寧州祿豐縣大理府衛賔川州鶴慶府白鹽井提舉司俱各申報地震而近銀場地方震動尤甚臣等已奏聞外天下近年地震之變雲南獨多雲南地方地震之變銀場尤甚實由銀礦採穵深酷有傷地脉以致隂道不寧故也變必有應患當預防今螳螂母喜龜山一帶盜賊出沒人民饑窘萬一勢激利動結構召集重貽境內大患臣等各有地方責任雖死何贖伏望皇上俯從前此撫按官所言及該部所執奏者斷在不疑早加封閉仍著於甲令不許聚斂姦徒再啓釁端使夫丁永壯城池之守銀米充倉庫之儲地方生靈不勝幸甚臣等不勝幸甚緣奉欽依是這礦場應否開閉還著鎮巡等官查議明白來說事理未敢擅專為此具本差承差張時霖齎捧謹題請㫖正德十五年七月初四日治貪疏題為處治貪酷官員事臣莭該欽奉敕諭文武大小衙門管事官員有才不勝任妨廢政務者有肆為貪酷虐害軍民者聽爾體察得實輕則量情黜罰重則拏問如律應奏請者參奏處治欽此欽遵臣到鎮以來於今再歲其於地方之事敢不責已而先身又須屬吏之賢相與共成而協理顧人才自是不齊而邊逺尤難責備臨其上者舍短取長惟當器使在於下者圖新改舊或可善終臣未嘗輕薦一人不敢輕論一士務久之以俟其定於行處以考其真至於妨廢政務肆為貪酷真跡顯著應拿問者不敢不行黜罰應奏請者若雲南布政司等衙門布政等官許淳等近據布政司呈為預處考察黜調官員以防姦弊事所司實秉一鑑之空而皇上已明萬里之見矣楚雄府同知蕭澄違例擅取兵夫假差私受賄賂白鹽井鹽課提舉司提舉陳元憲詐稱應朝斂錢擅離原職回籍臣已參奏未奉明㫖廣西府知府張縉橫挑玀賊釁開而不復支持暴斂土民事發而遂自逃去該臣行查另奏外查訪得尋甸軍民府知府戴鰲在任之時衙門修理雖有蹟而冒破之弊甚深盜賊緝拿似有功而牽攀之利無算詞訟既行罰贖分外豈是官收錢糧常被加徴就中每多私入且納賄有黠奴戴益以代其手而招賕又姦吏張本全以中其心因黠奴占娶民妻而致讎其親夫馬輝斃於捶楚之下因姦吏抽分料價而假禍於别犯任亥羊得等死於囹圄之中及查本官自正德十三年冬給由去訖今二十箇餘月未回其他任內贓私人命事形告訐官與彌縫方在追求未容悉數本官不顧公座久虛水程久誤豈獨遷延畏避或將希企升除臣惟本官給由不即依限回任設有寸長可取已為妨廢政務况如此之人乎任內贓私人命告訐在官但有一事是實已見肆為貪酷况如此之夥乎彼若仍得遂其姦謀人將復何畏乎國法如蒙乞敕該部再加詢察如果與臣議合亟將本官革職為民或照考察不謹事例行令冠帶閒住另選他官來管府事仍候雲南按察司將其任內各項情莭勘問施行庶政務可漸修明凶貪亦知警懼幸甚緣係處治給由久不回任貪酷官員事理未敢擅便為此具本差承差楊岐鳳親齎謹題請㫖正德十五年閏八月初一日議剿草賊疏題為積年草賊嘯聚山林劫殺人財攻燒村寨等事正德十五年閏八月十四日准兵部咨為積年草賊嘯聚山林劫殺人財攻燒村寨事該本部題該臣等㑹題本部議擬本年七月初一日奉聖㫖是這十八寨強賊聚集人衆攻燒村寨劫殺人財地方十分受害吳便張縉都著巡按御史提了問何孟春等議奏地方事情執持兩端含糊不决好生有負委託著上緊㑹議停當奏來定奪如或仍前怠玩致誤事機罪有所歸欽此又為地方賊情事該本部題該刑科都給事中劉洙具題本部議擬節該奉聖㫖是這邉方賊情莭年鎮巡等官因循茍且不遵成命處置缺當本當查究但俱已遷官去任了都饒他撫剿事宜已别有㫖著何孟春等㑹議具奏欽此欽遵各咨到臣案照先今㑹題去後行據守巡臨元道參政等官鄧相等呈稱本年三月二十三日該原委備禦巡捕指揮等官李遵等各選調附近軍民兵夫跟隨各職至彌勒州添撥本州并路南州民兵各領帶於構甸者圭山等處將招撫告示差令把事李和等齎進曉諭各賊不容入寨又督據巡捕指揮查俊等陸續拿獲路襪卜寨賊人一名阿旦法果寨賊人二名者奈者寧言者龍寨有名賊首一名張七各寨有名縱賊窩主二名王仲明楊清賊屬二名黑都等審實起解并獲到贓牛一十一隻無主識認發州賣銀三十一兩支給兵夫行糧四月初四等日廣西府署印通判王鐈師宗等州土舍龍莭等豆溫等鄉千夫長自那等各領帶民兵到來初九日責令通判王鐈督領前進該本官呈稱十二日至莫索甸劄營是夜瞭望法果路襪卜寨俱有火光燭天次日發兵出哨龍節自那等兵夫自為一哨義官趙琛番洪段一青等兵夫合為一哨土舍昂繼先秦升楊廷秀楊志明何志聰等兵夫為一哨領齎告示前進法果等寨挾撫見得各賊百十餘家燒毁不見賊人有番洪昂軒等同自那等行至路襪卜寨箐內遇見騎步三百餘衆擁來拒敵我兵奮勇向前抵鬬各賊方才退遁有昂繼先秦升何志聰等因見日晚林箐深密不敢妄入各兵復回將高頭甸陸油木頭革三寨房屋盡行燒燬於附近箐內摉獲賊屬二名口普的等帶回本營十四日不料龍節自那等志在貪得見各寨不燬不能大有所獲輒自解散逃回以致廣西彌勒路南等處兵夫不肯前進等因具呈職等暫令本官掣兵回州將龍節自那等行廣西府提問賊人問報外議得該府彌勒州十八寨地方四靣山大崖陡中間林密箐深又有盤江險溪急流衝繞其下上下聨絡二百餘里所聚賊徒不止三千餘人倚險負固據為虎窟膏腴田地不屑耕種惟恃夷性打劫不納公家賦稅不服官府管束鄰近臨安府所屬建水阿迷寧州通海縣澄江府所屬路南江州等州縣軍民莊户無不被其殘害先年節經動調兵夫征勦為因巢穴廣險各賊易於藏沒調來兵夫罔知彼處路徑險厄反被損傷致遺失事之纍兵夫回後復出大作譎詐多端纍撫纍叛無可奈何近自正德十三年三月以至於今仍又大肆凶惡動則千百為羣少亦不下三四百輩或在本州地方或過前項府州縣界甚至深入臨安府經由大路逼近府治三二十里張打旗號吹動響器劫殺人財攻燒村寨哨堡殺死官軍民兵搶奪官馬靡所不為以致寧州婆兮鄉沿至建水州大曲江豐樂等鄉阿迷州部沼等處挨連􅐻江一帶地方上下百有餘里莽無人烟田糧地土盡生草木人民俱各逃移糧差無從措辦其餘鄰近地方各亦時懷驚惶朝不保暮雖處太平之世猶居離亂之鄉似此罪惡滔天神人共怒職等親詣地方差人撫諭不容入寨進兵挾撫又行拒敵若非動調大軍勦捕將來釀成大患殆不可言合無趂今預積糧草將正德十五年分有司夏稅內量派折色銀兩若干解赴廣西府收貯倘數不敷動支臨安府庫收庫臨安衛節年屯糧折色銀兩委的當官員領齎糴買在倉收貯又行令附近建水路南阿迷寧州通海江川州縣亦各存留稅糧本色或將預備倉榖碾米以備守把或征進兵夫支用等因到臣看得賊不可撫則兵决當用兵調既多則糧費益廣惟先事而有備斯乘時而可為各官所議與本院前此所行緣由大抵相同除批仰都布按三司查議呈奪外㑹同鎮巡衙門議照前賊惡已貫盈法當誅滅但恐各該村寨雖稱俱係賊巢中間豈無良善各該夷玀雖稱不聽撫諭向後或知悔改查得先年節該欽奉詔書各處強賊嘯聚為非詔書到日官司出榜許其自首有能擒捕首惡并黨類首官照例升賞仍量給犯人財産欽此欽遵外今十八賊寨若不再為審處遽爾加兵烈火所延玉石難辨大軍所過雞犬不寧且前賊寨分地方險逺林箐深密道路﨑嶇東則建水阿迷二州西則寧州婆兮村并盤江上中下三渡北則路南州母丈矣與其壤土相接豆溫鄉竹子箐尖山小明凹梁王山龜山口等鄉村寨近年勦未盡餘賊與其唇齒相依彼知罪在不赦天兵下臨未免先期潛遁或相窩藏或相勾引同惡相濟實蕃有徒相應仍出榜文備開恩詔定委的當官員齎捧親抵其地再加撫諭曲指回生之路大開宥死之門庶冀自新得全醜類又經案行布政司備將奉到恩詔書寫大字榜文數道責付今定委官指揮張鎧顧浩千户何經繆俊量帶軍兵防護張鑑顧浩前去廣西府彌勒州著落各該土流官舍并訪取慣熟鄉導諳曉夷語之人令其指引直抵各該村寨將榜文張掛俾其革心向化各將寨內有名強賊送出將原殺死人命燒燬房屋照俗陪償搶虜人畜退還給主寨中賊屬取具不致再行聚衆搶劫殺人重甘死罪結狀通行繳報何經繆俊分投前去澄江等府阿迷建水師宗等州通十八寨道路地方張掛曉示豆溫鄉竹子箐尖山小明凹梁王山龜山口等鄉村寨各管鄉村千百夫長通把人等但有十八寨強賊經過逃避不許窩藏容留就便擒拿送官照例給賞等因通行去後又據豆溫鄉百夫長阿完男沙者告稱千夫長自那賣陳致使伊父并夷民阿恕阿者馬卜沙乃阿線楊洪等七名被賊伏兵殺死并虜去盔甲鞍馬及何志聰等各告到臣看得莭次賊情已往者不為不大將來者尤有可虞竊恐四月十三日之事被賊殺死兵夫虜去盔甲鞍馬未經告理不知幾何而二十三日以後至今強賊復出搶虜又不知有幾次前項賊勢猖獗如此虐焰不可復邇天誅不容無加該道守巡等官若不及今處置之際專在地方急為調度使得消弭將來罪必有歸悔無所及又經案仰三司即行該道守巡兵備管糧管屯并統兵都司查照先次批行事理作急㑹議定擬某人某人分詣各處殫心竭力一一處置糧食務無匱乏之患軍兵務得布置之宜設何方略可以撫出賊衆有何計䇿可以殄厥渠魁要害於何早加防守鄉導於何早加招集有罪人犯被害鄉村早加勘處等因行據都布按三司各將查議處置兵糧等項緣由具呈到臣議照兵備副使吳便等四月內挾撫前賊領帶官民兵夫四千有餘不能得其欵服今次委官齎榜前去并守巡兵備官又復親詣住守挾撫若亦止是前項兵夫彼賊積習凶頑必將仍前抗拒徒延嵗月有誤事機且撫不服則勦當繼糧既蓄則兵可徴又經㑹同太監史泰牌差雲南左等衛所官舍王昂等將今議定選調各府州縣衛所官軍民兵照數揀選武定府先調民兵五百名尋甸府五百名霑益州五百名新化州三百名羅次縣三百名嶍峨縣一百名易門縣二百名定逺縣二百名亦佐縣一百名舊越州土舍海潮下五百名并協守官軍雲南左衛三百二十六員名雲南中衛三百員名曲靖衛三百六員名越州衛五十二員名宜良所三十六員名俱令各該漢土官舍目把人等管領跟隨左參政鄧相副使王忠都指揮同知方仲方略於六月十二日起程前去各隘口住守相兼挾撫其餘俱要置備鮮明器械在各衙門時常操練聽候調用庶使軍威振揚首惡不容逃遁地方知警餘黨得先解散等因通行去後續據委官雲南右前二衛指揮張鎧顧浩呈稱各職於本年六月初九日起程詣廣西府并彌勒州本月二十七日行據本州申據老人王惠王志聰等呈稱領榜前去督併百夫長龍經前進十八寨法果路襪卜髙頭甸維所等村寨張掛撫諭與賊首阿勿者特等打話各賊說稱可將有職人員當我每寨上才將現在贓牛馬匹人口退還若要有名賊首送官如今我每已盟誓了還要添人難以拿出等語惠等再三撫諭各賊堅執前言不領榜文不聽撫諭誠恐傷害性命只得回還等因本年七月初一日又據廣西府經歷司呈據把事段龍五李文善呈依蒙前去彌勒州著落土舍昂繼先火頭楊義等進法果等寨撫諭各賊勢衆不容入寨口稱將你府州官吏通把四五人當在我們寨上我好陪贓若要拿人我每只要人多半箇不與等語不肯領榜不聽撫諭及探得各寨強賊聚衆為惡誠恐傷害各役只得回還等因申呈到職尤恐不的㑹同廣西府署印通判吳奎牌差本府巡捕土官照磨髙世安親詣十八寨覿與強賊打話撫諭若肯聽撫將阿勿等拿獻送出如仍前不服亦要從實回報去後各職親詣彌勒州公同署印澄江府通判王鐈又行㑹差土舍昂繼先百夫長龍經義官趙林楊瑞老人李友也王仲和等齎榜前去張掛再行撫諭續據高世安呈稱督併原差老人百夫長與續差義官人等到於羊白寨令龍經村民阿歹者方進入十八寨內路襪卜等寨與賊首阿勿者特阿俗等打話將榜文緣由撫諭當被阿勿者特等說稱先已有二次來撫我每决不聽了衆賊聚集呐喊要來羊白寨捉拿職等有阿歹者方走報職等知會當被強賊隨後趕殺職等一同奔命走回等因到職又據義官楊瑞趙林老人李友也王仲和等呈與髙世安相同看得十八寨強賊纍經撫諭却乃冥頑梗拗不容差人入寨不領榜文倚山勢為險惡聚強衆以成羣出入劫殺全無畏懼各村人民時懷憂恐若不預為裁度未免貽患地方等因到臣除批仰布政司行該道守巡兵備并統兵官查照計議外又據守巡兵備統兵官參政鄧相等揭帖禀稱七月初十等日土舍秦升等擒獲强賊者速等九名口土舍祿世爵擒獲强賊者魯等四名斬獲首級三顆獲到馬一匹署印通判王鐈等擒獲維所寨有名大賊首阿革并餘黨一名及斬獲首級二顆報禀到臣查得别卷為地方事正德十一年二月內准兵部咨該户科給事中劉洙奏前事該前巡撫雲南右副都御史王懋中㑹行都布按三司并該道守巡兵備官計議呈詳去後未報該臣查出為照本院文卷山積簿書塵委事非官吏親交三司掌印并分守官交代不一情猶可諉兵備副使吳便帶管分巡乃無一字照舉致臣前此失查重覆㑹題俱合有罪除兵備官候事平别議該吏查提外又經㑹行三司守巡兵備統兵官鄧相等拘喚齎榜入寨人員到官查審強賊阿勿等如果莭次撫諭負固執迷不肯聽從有如指揮張鎧等所呈相應勦捕即便㑹同計議𠞰捕日期原調聽候軍兵應否依數調用惟復量行選調若是賊勢衆大守禦軍兵數少原調軍兵必須全調不敷之數應否於附近土官衙門選調諸夷象馬凑用就行議處停當具由呈奪務要謀出萬全機無一失撫勦之後合用防護守禦等項事宜亦就查照劉給事中所奏一一處置停當以憑具奏毋得茍且等因通行去後續據雲南按察司呈為預處考察黜調官員以防奸弊事該臣批仰僉事潘􅞜暫管臨安兵備去後又據委官雲南左中二衛千户何經繆俊呈稱六月十一日前到澄江府將榜文給發張掛曉諭行據該府經歷司呈稱查得該府河陽縣地方梁王山竹子山尖山三處先年勦捕之後尚有賊黨阿邦革等在彼勾引十八寨強賊出沒搶劫正德十五年四月內奉上司明文將阿邦革奴革阿未等斬獲首級備申撫巡衙門餘賊近聞調兵俱已赴府告納糧差安插訖本月十三日前往路南州行至地名黃草壩哨探得哨下河內有船二隻當令哨頭必八哥鋪司俞寬等將船扛擡在哨十四日到州據該州回稱管下小明凹大尖山竹子箐梅子箐蘆柴箐龜山口末舊母丈矣等村先有羅雄等州邑市等縣強賊在彼潜住與十八寨相通劫掠近聞調兵亦各赴州告認糧差安插訖二十日前到宜良縣所地方撫諭該縣回稱查得尖山明凹梅子箐蘆柴箐係路南州該管村寨附近本縣四五十里俱先年及今為盜其清水塘良盜混居等因又經備行巡捕千戶劉昂覆查去後二十八日前到寧州撫諭據本州吏目史欽結狀內開土舍祿世爵私莊惟哈樂阿白等村與十八寨相通為盜如哈小水井二寨俱善惡相半西龍山址開北二寨俱係賊阿白寨窩藏那牙寨賊歹等哈樂寨窩藏西龍寨賊阿古等山母多寨窩藏維所高頭二寨賊納亨等阿金寨窩藏禁非木本二寨賊牛答等阿勿寨窩藏西黑村賊阿番等俱十八寨強賊見今窩藏前項寨內悉皆負固執迷不服其黑土維所西龍三寨俱係十八寨數內賊巢等因又據臨安府經歷司申稱除行建水阿迷二州查勘徑自回報守巡兵備衙門轉呈外其豐樂大小曲江等鄉村寨鄰近盤江一帶遞年節被廣西府十八寨強賊聚衆過界劫搶今蒙調兵勦捕鄉民得安緣由到職具呈守巡兵備官查勘外本職訪得寧州土舍祿世爵雖曾擒斬賊犯首級解官其十八寨強賊逃避本州地方者多見在各寨日則登山瞭望夜則宿歇架格山洞等因具呈到臣批仰分巡副使王忠即㑹分守并統兵官務要根究明白回報使異日無僣賞濫刑之非庶官府有收功責效之實去後據參政鄧相等呈稱㑹議得廣西府彌勒州管下十八寨強賊阿勿等據險恃強嘯聚纍世劫殺相繼百有餘年其鄰近臨安澄江等府所屬建水阿迷寧州路南通海江川等州縣及本府州構甸等處地方無不被其殘害先年敵殺官軍具奏撫捕竟無全功養虎貽患遂至於今千百成羣健馬強兵橫行境土劫虜焚殺殆無虛日商賈絶其往來軍民不保生理錢糧被其縻費子女虜為囚奴逃移漸多糧差失誤邑里蕭條呻吟不絶纍撫纍叛莫敢誰何此盛世之所不容而必討者近奉撫鎮巡按衙門具題隨宜撫捕仍體朝廷好生之德不忍遽爾加兵案仰各職量帶官軍先行挾撫大書榜文差官曉諭令其獻出首惡陪償搶劫財物給還虜去人口免其族類更獲生全正當革心向化束手聽命却敢仍前負固不容進寨輕拒榜文及纍差通事前去打話曲為開導示以王法挾以軍威反行凶逆率衆趕殺執迷不反近該通判王鐈拿獲賊首阿革解官阿勿等仍敢揚言報讎擁衆攻城以致地方人心驚疑震恐若不大彰國法早為殄除何以警示諸夷消弭後患但賊勢強大巢穴廣險功難速成糧餉必須多積軍民兵夫夷兵象馬必須俱調方可舉事大約軍馬糧餉齊集雨水瘴癘亦消聽候明文刻期進勦如其首惡就擒餘黨投首亦就撫處然後班師事平之後應該更置防禦事宜另行呈議庶進兵無茍且之為而成功有永久之計再照寧州等處土舍祿世爵等窩藏強賊稔惡不悛亦合議處以消後變等因到臣行據都布按三司掌印官都指揮使劉宗仁左布政使方璘按察使陳洪謨等呈稱前項強賊猖獗肆行劫殺無厭每當撫諭負固執迷既欲趕殺委官且又揚言報讎全違人道蔑視天刑極惡窮凶人怨神怒况奉欽依事理得預撫勦機宜及今剪除勢不容緩添兵益糧相應查照原議處置其餘事情似難定執俱候臨期相機行事等因備呈前來俱經㑹行外今准前因除備咨內題奉欽依事理通行欽遵外㑹同鎮守雲南并金齒騰衝等處地方兼提督銀場內官監太監史泰巡按雲南監察御史陳察議得天地之化由肅殺以成歲功帝王之道以威武而輔文德義存禁暴情豈佳兵廣西府彌勒州十八寨強賊阿勿等不受所司約束不供本等糧差聚衆即刀槍自隨出山即搶殺為事逺近地方被其蹂躪往來道路為之阻塞胎禍階亂閲世積年暴戾恣睢呌囂揮突惡罔不極罪無有加臣等特念蠢爾蠻夷類同禽獸仰思皇上招攜懷逺之意俯顧微臣保境安民之心不敢為不教而殺之誅故常盡先撫後𠞰之慮彼羅雄舊越州邑市縣等處解散之衆幸自各從安插得保生全則此寨中冥頑之徒既堅不聽懷徠豈容曲宥使復虎貽反噬疽成內食决為剿計良適其時其他别卷元凶亡命窩主今方誘之效順安其反側若懷異志又在臨期或當破竹之餘自有壓卵之勢所貴三軍司命得人為先將領得人戎務可濟左參政鄧相副使王忠僉事潘􅞜都指揮方仲方略經營之久者已閲三月奔走之勞者常環數州形諸文移頗有成算臣泰近因鎮守缺總兵官已故黔國公沐崑原領印信符驗旗牌俱付收貯相應固守㑹城慎防叵測臣孟春少俟催督糧足兵齊相應親詣軍前調度區處為此除再申明案仰三司轉行各官通行附近賊巢各該軍衛有司等衙門先將賊人緊關要路江口差撥官兵人等用心守把如有船隻即便撤去晝夜哨瞭毋容逃出仍曉諭鄰境鄉村夷民使知只將十八寨法果等寨勦捕其調到官兵俱已戒飭必不擾害各無驚疑若遇賊人逃出經過能就捉獲送官一體給賞若勢重難擒即便星飛報知該地方把路等項官兵追捕毋得黨助為惡因親縱放受財隱藏或妄拿平人自取重罪一面移文調取先次定擬各府州縣衛所㨂選聽調官軍民兵武定府民兵三千名尋甸府二千名元江府一千名景東府一千名蒙化府五百名鶴慶府五百名霑益州二千五百名姚州二千名北勝州七百名鄧川州五百名劒川州五百名安寧州二百名鎮南州三百名馬隆州三百名順州三百名南安州二百名大姚縣一千名亦佐縣四百名嶍峨縣四百名雲南縣四百名廣通縣三百名雲南在城右前後廣四衛官軍共七百員名六涼衛一百八十貟名越州衛一百貟名楊林宜良二所各一百員名安寧易門二所各五十員名各委土漢官指揮千百户同知知州知縣土舍人貟張鎧等并髙鳯等各管領俱該僉事周愚督率於東西北府州縣地方進入㑹同各官分為三哨一哨左參政鄧相都指揮方仲由路南州拖白村進入一哨副使王忠都指揮方略由彌勒州火莫龍村進入一哨僉事潘􅞜帥指揮馬升等由寧州婆兮村進入仍嚴戒飭不許擾害經過處所及鄰近賊巢鄉村亦不許於中途退遛不進剿捕之時若獲原被虜良人男女俱要送官審實給主與有功者一例給賞如有違法并貪功故殺良善及透漏消息賣放正賊臨陳不行齊力奮勇畏縮退避不聽調度輕率妄動致誤事機者定依軍法從事三司領兵官員查照施行若各路所統官兵有不勾用者作急具呈定奪仍先籌畫萬全之計布置停當刻期並進直搗巢穴務在一舉克捷首惡無遺黨類悉殄以安地方人民若官軍人等獲有功次就便驗實給賞記録事完繳報凡百進止機宜并案驗該載不盡者悉聽各官臨事之際隨宜應變而行尤須審察下情協同商議俾兵不徒勞糧無虛費功成之日自有公論毋得偏執已見不詢衆情坐視違延重貽後患不便守巡官仍查前項附近撫處過賊寨地方若無窩藏容隱凶惡有名强賊不必摉捕若又中變助惡與法果等寨一體施行其合用糧餉并隨營賞功銀兩等物布政司掌印官并右參政朝必登作急措置支給外查得臣泰節該欽奉敕諭內開凡有軍機夷情等事須與總兵官及巡撫巡按三司等官計議而行欽此臣孟春莭該欽奉敕諭內開但有賊寇生發即㑹同鎮守總兵等官同心計議量調官軍設法撫捕毋令滋蔓欽此欽遵及㑹同巡按雲南監察御史陳察參照外切緣前項盜賊已經兵部題奉成命隨宜撫剿及查𢎞治十三年剿捕竹子箐正德二年剿捕豆溫鄉七年剿捕安南長官司賊人俱係一面剿捕一面具奏蓋以雲南至為險逺去神京則萬里離外國才數程地逈天髙苦封章之難達風吹草動慮仇虜之易聞近日鎮守既缺總兵先年巡撫實兼軍務今非昔比事與勢違臣等竊惟皇上責臣等以執持兩端含糊不決欲臣等知惟斷乃成之功諭臣等以奏來定奪又曰如或仍前怠玩致誤事機罪有所歸欲臣等知不從中制之義臣孟春職專統御主謀弗臧實負萬罪緣係動調官軍勦捕盜賊事理未敢擅便為此具本差承差李如松齎捧謹具題知正德十五年閏八月十七日何文簡疏議卷六
