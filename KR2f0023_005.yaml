杖一百流三千里那禧婻悶婻先那旺俱依奏事詐不以實者律各杖一百徒三年封先白士斌俱依擊登聞鼓申訴而不實者律各杖一百董全張子才趙景段索劉士俊張銓徐貴趙玘姜秀趙文泰楊得先沈榮曾鑾羅友質張倫張闕一頁俱告紙劉士俊等一十六名俱官紙各一分折穀各五斗趙氏婻悶贖罪鈔各二千二百五十貫并收贖鈔趙氏一十八貫婻悶一十五貫那禧贖罪穀三十石封先白士斌各九石劉士俊張全徐貴趙玘姜秀趙文泰楊得先沈榮曾鑾羅友質張倫張朝宗楊宣張經楊伏秀馬汝莭各七石俱發臨安府追完穀送預備倉上納鈔收庫陳經原接受那端賄送土産七成色銀一百兩銀壺一把重一十五兩金臺盞一副銀酒杯一箇各重十兩係彼此俱罪之贓合入官發雲南府追解雲南布政使司貯庫作正支銷各取實收繳照周憲原分受那端贓銀一百兩銀壺一把金臺盞一副銀酒杯一箇緣本犯身死那受等原劫去通凹鳩班等村牛馬猪羊家財等項招稱殺食費用無存未到白氏等俱供狀人張輔等俱遇革羅氏等係家人共犯俱免科並免追提封愛璽等與土官知府那端副長官白琥俱另行及參照刀中成謀同親兄殺死親叔揆之於法死無足惜但刀中成父刀匪為爭村寨被叔刀粉殺死以此刀中成為父報讎亦將刀粉殺死彼此人命兩相抵償若將本犯處决情似可矜元江軍民府土官知府那端爭奪村寨殘害骨肉倚勾捕而令人擅殺小功尊長挾私忿而調兵抄搶居民財物搆禍經年不解誣奏積案無窮本府因逺羅必甸長官司土官副長官白琥朋惡相濟奏事不實俱合參問如律但那端令人斬殺堂叔那受并隨從人等俱係應死人犯其原抄家財又該委官照依土俗講斷陪償明白各相和好况係邊方土夷性同獸類若照律例提問又恐因生别釁且該府地方逼近交址車里等處外夷疆界亦須要人守把合無將那端白琥免行提問與刀中成各照土俗因其情罪輕重量為罰米送赴附近臨安府官倉收貯以為備邉之用等因備呈照詳到臣批據按察司呈稱查得本司别卷一宗為屢惡搆兵殺搶村寨絶滅正枝謀殺祖母乞恩論序官職等事內開鎮沅府土舍刀三猛刀賜等各因爭襲祖職將各管下村民搶殺數多委官勘斷照依土俗折算陪償該三司官將各犯分别情罪輕重量罰榖石回報鎮巡衙門奏奉欽依轉行本司發落訖又查得元江軍民府卷內正德二等年土舍那玫等與土官知府那端忿爭村寨妄動夷兵殺虜人民混搶財物亦該三司官勘呈鎮巡衙門照依土俗斷給陪償那端等量為罰米贖罪奏奉欽依發落訖㑹同都布二司官議照刑憲之設所以律中夏而羈縻之制則以待遠人刀中成等既係極邉之人難盡繩之以法則其勸懲之典又當出於條格之外况其事情比與刀三猛等攻抄村寨殺虜無辜數多者事頗有間而彼且擬罰米贖罪及本卷前事亦有此例且刀中成情罪有可准折那端之殺那受則又奏告年久屢次陪償數多况那受又係強盜殺人應死人犯若以彼中土俗論之恐亦足償厥辜矣及查勘合來文明開有照依土俗事例議擬之說律法既難於全科擬斷亦且有前例脫欲另行議處緣無别項事宜合無撫順夷情查照舊議將土官知府那端副長官白琥俱免參提與同刀中成各量情罪輕重照例罰米刀中成那端各一百石白琥三十石上納贖罪以為備邉之用再照前項各犯不法揆厥所自皆因無賴之徒投託土官土舍之家撥置搆扇以啓爭端及至禍結又各駕掜虛詞妄行奏擾情甚可惡合無將李長春等仍行各該衙門緝捕得獲查照律例從重問擬以戒將來等因回報到臣除陳經等參詳合律行將刀中成與陳經照舊監候趙氏那禧婻悶婻先那旺封先白士斌董全等各照罪名摘發封愛璽與李長春等緝拿究問外㑹同鎮守雲南并金齒騰衝等處地方兼提督銀場內官監太監史泰巡按雲南監察御史萬鎡看得前項各犯莭次奏告情詞重大既該整飭兵備副使吳便㑹問明白刀中成若仍依原擬與那端俱犯該死罪以上緣俱係極邉土夷鷙猛貪婪乃其常性喜則為人怒則為獸強必凌弱大必侵小自彼種類所不能無况刀中成為父刀匪報讎殺死親叔刀粉以臣等妄議在律自有正條當依父母為人所殺而子孫擅殺行凶人者律杖六十但㑹問官拘於成案已經呈詳本院未示遂不敢改擬耳或謂侄殺親叔與常人報讎不同臣聞漢有後妻殺夫其子遂殺其繼母者有司當闕為京觀孰若好生大德懷鴟梟以好音矧交址相連去處地方險隘所在禦魑魅者不可缺人作屏蔽者不可易主所據前項各犯事情查與按察司呈稱先年處置夷情大率相同副使吳便所呈參以三司所議與臣所見不過如此伏望皇上軫念邊民俯從愚悃特敕各該衙門計議合無照依臣等所議刀中成改擬免科那端白琥免行提問各照土俗那端罰米一百石白琥三十石贖罪俱運赴附近臨安府官倉上納以為備邊之用各犯徑與發落其陳經亦就定撥邊衛充軍追贓完日拘連當房家小發遣仍再嚴加戒諭那端等各要恪遵朝廷法度保守身家和睦宗戚愛恤百姓緝寧邊境如再不改前非仍蹈舊轍搆釁生隙擅調専殺自取滅亡後悔無及庶幾情法兩盡而恩威並施矣緣那端白琥俱土官陳經係論功定議軍職刀中成係原擬極刑今改擬免科及節該奉欽依是這土官所奏事情著鎮守巡撫巡按等官㑹同議處務要停當原委官員果有受財偏枉等項就提問參究了來說事理未敢擅便為此具本差承差趙禎親齎謹題請㫖正德十四年九月初六日貪官科害疏題為貪官科害事據雲南布政使司分守洱海道右參議劉鶴年呈問得犯人陳洪招係楚雄衛前所百戶朱錦下軍正德十四年六月內有本所今在散行副千戶羅輔蒙上司行委徴收礦夫銀兩原定夫丁每名帶耗徴銀一兩一錢羅輔自合照數徴收為當不合向各夫丁誆說今年課銀都要足色好銀一兩七錢方才交得等語洪與一般礦夫今在陳潮樓保陳瑀未到王剛陳瀚張濟張連平玊郭友珍黃輔周鸞周華各不知誆哄情由輒便聽信每人各出足色紋銀一兩七錢交與羅輔收訖止出一兩一錢收帖與洪等執照計夫丁三十名除該收正數外共餘七兩八錢羅輔不合侵騙入已洪與陳潮陳瑀樓保不甘將情不合添揑虛詞具狀赴分巡洱海道告准行拘羅輔到官面審前情是實追出前誆銀兩給與各軍收領取領附卷將陳洪陳潮陳瑀樓保俱問擬不應減等笞罪的决照出千戶羅輔另行備招呈詳到臣除參詳批行將陳洪等依擬發落外參照雲南都指揮使司楚雄衛指揮使司前千戶所副千户羅輔承委徴收礦夫銀兩加耗已為過取倍徴復以自私假誅求之政而助官為虐責固有歸行誆騙之計而欺上罔下情尤可惡揆諸法律應合提問及照前項礦夫原辦課銀俱係窮軍乾認額數軍丁以此被害者不獨該衛數軍為然軍職以此營私者不獨該衛一官如此官行殘民以逞之威軍抱浚我以生之歎非一日矣臣近為議處國課以安邉民事奏蒙皇上明見萬里悉依該部覆奏軍充礦夫一切查革地方生靈不勝感戴天恩之至但恐屬軍衛此等無恥人員性習貪猥志希茍得或於訪察不到去處仍前誆騙無告軍丁事敗情露百才十一若不嚴禁重治未免人心易玩弊政難除如蒙乞𠡠部院計議合無行令雲南撫巡官員通行所屬大小問刑衙門今後礦夫已奉成命查革外如有仍前指稱徴收課銀誆騙軍丁各主銀至二十兩以上者事發不分官吏軍民舍餘人等俱照各邉沿海常人盜銀二十兩發邉衛永逺充軍事例問擬發遣庶幾法嚴而下無輕犯弊絶而軍獲少安夷徼可保無虞大恩得以永芘便益緣係提問軍職及援例議刑事理未敢擅便為此具本差承差楊文昭親齎謹題請㫖正德十五年正月十七日貪官害民疏題為貪官害民事據雲南等處提刑按察司分巡洱海道僉事周愚呈奉臣批據楚雄府定逺縣民見監李𤣥狀訴為分豁久禁事行該本道問得犯人李悌招係本縣琅井巡檢司土舍丁正德十一年十二月內本縣地方盜賊生發有未到土官主簿李元珍不合帶領今在官李𤣥黃冠未到楊溥等各不合跟同本官假以捕盜為由前到今在官尹文德未到兄尹文政處嚇說你家窩藏強盜快將銀兩送我本官及手下人方才饒你尹文政思係良民堅執不允李元等各散回報本官記恨在心本月內李元珍捕獲已故賊首李朝等在縣不合計同楊溥等并未到施恩等各不合依聽挾私教誘各賊寫供詭名尹文秀在內因而坐陷將尹文政捉拿拷打勒令招認各不合聲言快將錢來買命尹文政只得備銀一十八兩內將十兩送與李元珍二兩與李𤣥六兩楊溥等各分受入已方將尹文政放回本月二十六日廣通縣巡捕土官主簿段永聰并李元珍牌行與悌緝拿盜賊知得尹文政被李元珍等嚇受銀兩不合將伊捉拿嚇銀一兩五錢入已後伊將情狀赴巡撫范都御史處告准批行分巡洱海道牌行本府行縣拘提李元珍又不合懼罪逃脫止獲李𤣥與悌等送府審得尹文政久病將悌等解道審發本府監候問報間李𤣥不合飾詞狀赴巡撫何都御史處訴准批行本道提弔人卷查審明白將李悌等問罪照出楊溥等與李元珍人贓另行備招呈詳到臣續為土官暴惡害民致命等事據雲南布政使司分守洱海道右參議劉鶴年呈奉臣批據定逺縣里長李宗亮狀告前事行該本官問得犯人王子明招係本縣民兵正德十二年二月內有散行在官土官主簿李元珍緣事提到按察司至正德十三年五月內事完回任不合令子明與同今在官一般民兵李二各不合依聽與管下土民索稱父母官了事回還你每都要備禮拜見等語衆民兵派定未到甲首者魯該銀八兩者魯不合分派戶丁阿落出銀二兩比伊無措將幼男希引出賣得銀一兩外添羊一隻折銀五錢送與李元珍不合接受入已阿落尚有銀五錢未完者魯又不合逼迫凑辦阿落無計於七月失記的日投河身死伊未到妻張氏告理間李元珍懼罪將青布二匹者魯將小牛一隻各不合買免張氏不合接受私和了訖本年間本府已故陳知府行取民兵四名赴府聽用正德十年革去二名每名解銀六兩共銀十二兩送府李元珍以此考逼夷民不得安生致多逃竄本年七月內本府同知蕭澄應朝有署掌府印未到通判談冠不合故違上司明文輒行本縣僉選兵夫二名護送比李元珍見得文書催緊自備白銀一十六兩解府送與蕭澄不合接受起行去訖李元珍將送過銀兩灑派管下八十四名民兵辦還每名科銀三錢共銀二十五兩二錢入已有今在官李宗亮思得阿落係伊甲首户丁致死且被李元珍莭次擾害不過將情狀赴巡撫何都御史處告准批行分守劉參議提弔子明等人卷到官鞫問前情明白將李元珍省候王子明等問罪照出談冠并者魯等與李元珍蕭澄人贓另行備招具呈前來卷查臣近為禁革科擾以安軍民事照得撫屬雲南地方蕞爾蠻徼舟楫不通往來物貨惟資擔負山田收薄市井利微差重民艱於今已甚各該土流衙門多有不才官吏苛政如虎貪心似狼或徴收錢糧一斗收至二斗或收折銀兩一錢加及二錢貧户罹非義之誅求私衙濫無名之取受被使令者多乘機以作弊掌支直者又指一而科十得來者視若輕微不足計較出辦者計其前後不勝纍及以致軍民困苦盜賊恣睢今各官應朝在邇相應禁約查得朝覲事例司府官員跟隨皂𨽻不過六名州縣不過四名首領官不過二名路費聽鎮巡衙門定與數目於無礙官錢內支用不許擅自巧取一錢一物行據雲南布政使司呈稱先年朝覲布按二司堂上官長夫十名首領官三名吏典并書寫人役銀各十八兩俱於本司濟用庫收貯贓罰銀內支給所屬各司府土流官各長夫四名州縣土流及提舉司官三名首領官二名俱於見役里甲內出辦等因已經批仰遵照舊規支給及通行禁約所屬府州縣官查照則例不許分外多帶一人多科一毫事發參究去後又為撫安地方事據雲南布政使司右參議劉鶴年呈奉臣按驗前事呈稱雲南地方管下小民半係夷玀近來摽掠縱橫嵗無寧日推原禍本實由土官若土官不行科擾夷玀自然安生而土官又被親管不才官員公行求索上官索之土官土官派之營長營長斂之火頭火頭取之小民夷玀小民既不能耕種又不慣經營不事搶劫何以應之盜賊不寧地方受害職此之故今欲嚴捕盜之法莫若清止盜之源若所管官司正已於上不行科擾土官土官縱有剝削亦少顧忌不至公然橫行而小民之困亦得少蘇乞行禁約等因該臣議得揚湯以止沸不若去薪而沸自止捕盜以安民不若治貪而盜自息貪官止見目下民之易虐豈謂異日天之難欺民之易虐今莫甚於邉逺天之難欺彼實付之茫昧監司乃復忍心坐視塞耳罔聞罪則惟均法當先治又經通行撫屬大小衙門禁約遵守去後今據前因俱詳參合律除批行各道將王子明李悌等依擬發落談冠并者魯等行提問報聽用民兵查革外參照雲南布使司楚雄府同知蕭澄故違明例而擅取兵夫假託公差而私受賄賂定逺縣土官主簿李元珍因索拜見而致傷人命妄攀盜賊而嚇受民財罪已昭彰律當提問再照雲南地方去京萬里軍衛之雜夷玀者率以異俗自居府州之羣土官者多以僻郡自恕而執憲大臣又每疏其莭目以務安全姑息因仍蓋非一日臣來蒞之初即加申飭奈何積習生常怙終不改如右參議劉鶴年所呈者衙門豈惟楚雄一府流官豈獨蕭澄一員土官豈止李元珍一人而各處往往有之臣除體訪禁約外如蒙乞敕都察院計議合無通行各處撫巡官轉行所屬軍衛有司大小衙門今後敢有非因緊急重大公務申奉撫巡官處明文擅於所屬土官衙門濫增差役科斂財物一夫一文及巧立名色如行取聽用民兵僉選護送兵夫之類并有將自已貨物散與發賣或低價買物多取價利致令科斂者事發俱照求索土官夷人財物事例問發邉衛充軍若土流屬官阿意奉承一體查參從重究治庶人心有警邉逺知畏盜源可清民瘼可息緣係提問在外五品文職并土官及議處法例事理未敢擅便為此具本差承差段鰲親齎謹題請㫖正德十五年正月二十九日貪官違法疏題為貪官違法等事據雲南布政使司分守金滄道右參議劉鶴年呈奉臣批據大理府大和縣民充雲南縣你甸巡檢司吏楊玉枝狀告前事及據本巡檢司弓兵楊接告為違法事俱批行該本官問得犯人任大雄招係四川順慶府嶽池縣人由吏員任大理府趙州雲南縣你甸巡檢司巡檢正德十二年六月二十五日到任本司額設弓兵三十六名除投軍死絶外見在三十二名先年撥將一十六名跟隨散拘今在土官巡檢李欽緝捕盜賊正德元年以來李欽不合將未到弓兵李應李清李甫二楊勝光蘇山五名役占辦納月錢每年每名出銀一兩二錢一年共銀六兩俱交與李欽不合收受入已令各歇役在家致缺巡邏盜賊生發地方不寧李欽罪名遇蒙正德九年正月二十八日赦宥不合不行首正至正德十三年連前通計李欽得過銀七十八兩大雄係掌印官不合不行查舉本年十一月二十八日有今在弓兵楊接被賊偷去黃牛一隻報與土官李欽隨差未到弓兵李甫等將牛爪見送到李欽處本官不合令未到弓兵楊五四去與楊接索說土官已尋獲原牛要你備禮相謝取贖等語比伊只得揭借鹽一百塊值銀六錢慿今在弓兵楊松送與李欽不合接受入已方將前牛給領訖本年十二月內李欽指稱答應往來公差使客為由又不合科斂李暹等三十二名每名榖二斗又令未到弓兵蘇威英羅六等於你甸一村分投科斂未到軍民客戶張子恭等四百六十八家每家榖二斗連前共榖一百石俱送與李欽不合接受入己正德十四年二月內大雄不合將蘇威英羅六并未到弓兵張祥李繼森楊鳳輪流役使每名役過三日共一十五日本年四月內布政司將在官楊玉枝撥補本巡檢司已問革吏杜鳳名缺比杜鳯不合向楊玉枝索討頂頭銀兩不與將情具告兵備林副使處行提杜鳳問罪革役發落訖五月初一日楊玉枝著役間杜鳯又令伊未到父杜達將楊玉枝揪扯復討前銀比楊玉枝又將情口告大雄與李欽處一向不與分理楊玊枝懷恨將各役占弓兵及楊接亦將李欽科斂財物實情各不合添揑虛詞混同具狀赴巡撫何都御史處告准俱批行分守金滄道劉參議將大雄等行提到官查審委的前情明白將任大雄楊接等問罪照出李欽人贓另行備招呈詳到臣除參詳合律批行將任大雄等依擬發落外參照雲南布政使司大理府趙州雲南縣你甸巡檢司土官巡檢李欽私占弓兵辦納銀兩惟知得利肥己不顧捕盜缺人緝獲贓牛索取失主財物指稱使客科斂槩村人戶事皆違枉律合提問及照各處巡檢司之設專為盤詰奸細防禦盜賊而雲南建置獨多蓋緣所屬地方民夷雜處競爭為性劫搶成風故各司弓兵多係土著比與别省僉編不同而該司巡檢復設土官得與流官相兼行事欲其習知地利覺察種類無分彼此各有責成奈何此等流官不過老吏出身受寄如同木偶土官又係凶族遺孽習尚無異狼貪賣放索求積年常事禦盜之人去而為盜要害之地益以生害簡書弗畏在在有之查得見行條例內一欵各邉關堡墩臺等項守備去處若官軍用財買閒者官員問罪調極邊衛分旗軍人等發沿邊枷號一箇月常川守哨又一欵文武職官索取土官夷人猺獞財物犯該徒三年以上者俱發邊衛充軍今照雲南係西南極邊地方關隘巡司所係亦重但前項事例止言邊備官及文武職官而各處土官憫其夷俗冥頑未曾議及以故狎恩玩法全無畏憚今不嚴禁重治將來日復一日地方豈有寧時如蒙乞敕都察院計議合無查照前例參酌科斷今後沿邊一帶土官巡檢敢有不以地方盜賊為意仍前賣放弓兵致令盜賊摽掠貽患軍民者事發到官其土官比照文武職官索取夷人財物犯該徒三年以上者發邉衛充軍其弓兵若用錢買閒歇役者亦問擬枷號發落庶幾法令明嚴人心警畏邊壤生靈少獲安息緣係提問土官并乞議處條例事理未敢擅便為此具本差舍人佘定親齎謹題請㫖正德十五年二月十二日何文簡疏議卷五
