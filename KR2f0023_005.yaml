  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0023_WYG_005-1a, image: WYG0429/WYG0429-0110a.png}
body:
  text: 何文簡疏議卷五明何孟春撰強賊激變疏題為強賊朋惡勢衆流劫鄉村殺戮人命構起邉禍奏奉委官受屬偏枉激變地方等事准本院咨准刑部咨准兵部咨該元江軍民府土官知府那端具本差通事楊明奏前事該本部題稱查無先年奏行勘問緣由題奉聖㫖是這土官所奏事情著鎮守巡撫巡按等官㑹同議處務要停當原委官員果有受財偏枉等項就提問參究了來說欽此欽遵又該本部議得前項土官知府那端所奏情詞俱係干詞訟合無移咨刑部查議轉行雲南鎮巡等官㑹同議處等因題奉聖㫖是欽此欽遵備咨轉行前來案照先據雲南等處提刑按察司呈據本司經歷司呈抄蒙巡按雲南監察御史張羽案驗奉都察院勘合劄付該元江軍民府已故土官知府那忠次男那璘妻封氏婻羅具狀令義男那阿道抱赴登聞鼓下訴為奸雄弄權撥置土官朋謀調兵抄殺祖母屠危宗族支解人命虜掠良民輕視國典大肆縱橫違法等事偹劄查照先今事理㑹同鎮守等官通行查提各奏訴緊關人卷勘問歸結奏請發落等因備行守巡該道勘問及備呈前巡撫雲南右副都御史顧源照驗在卷續據該府土舍那受妻封氏婻悶告稱伊姪知府那端調領象馬圍困祖寨將他刻五十餘家盡行抄殺房屋燒燬等情莭經行據雲南布政使司呈委雲南後衛指揮僉事陳經廣西府通判周憲前去該府㑹勘又據婻悶并伊男那仙訴被陳經周憲得受那端金銀象牙犀角等物將夫男殺虜地方殘破等情又經行據本司㑹同雲南都按二司議照那受與那端叔姪忿爭其曲直是非必有至當之論今周憲陳經擅調兵夫攻殺那受各官專殺之罪受賄之情亦不可宥備呈前來案行守巡洱海道督委尋甸臨安二府知府戴鰲黃翺押帶陳經周憲親詣該府勘報及經㑹本具題外續據雲南按察司呈准洱海道關據戴鰲等呈稱委勘前項事情所有陳經周憲得受那端金銀等物緣陳經未蒙發下况與周憲那端俱係職官難以訊審等因行據雲南布政使司呈㑹同都按二司議得土官知府那端與土舍那受等叔姪爭論止是委官勘斷情罪並無擒勦文移陳經周憲却乃不照原行調兵殺虜况那端正與那受訐告縱使那受罪在必誅中間擅調受賄之情法難輕貸必得方面官員押帶各官親詣彼處㑹勘方可完結等因又該前巡撫都御史王懋中具題去後續准本院咨該本院題稱看得參奏陳經前項事情關係非輕律合提究欲仍咨本官將陳經行提到官追問明白查照律例議擬奏請施行等因題奉聖㫖是欽此欽遵備咨前來行間又准本院咨該元江軍民府土官知府那端具本差通事楊祐奏為強賊朋惡勢衆流劫鄉村殺戮人命搆啓邉禍等事該本院看得那端所奏緣係地方夷情移咨煩為㑹同鎮守等官查勘具奏定奪等因准此該前巡撫都御史范鏞㑹同鎮守等官議照土官知府那端所奏情詞查與土舍那禧親族舅翁封氏婻羅封先及已死那受妻男婻悶那仙并白士斌等各奏告情詞事干一連併行都布按三司轉行守巡該道右參議等官劉鶴年等帶同知府等官戴鰲等前去該府查弔干審人卷撫提勘斷續據右參議等官劉鶴年等呈稱依奉親詣該府地方散拘知府那端并撫提那禧及應審目把人等到官將前項各奏詞內殺死人命搶奪人口財物牛馬等項一一講斷應陪償者令其陪償應追給者令其追給具由回報到院查行間又據雲南按察司呈據經歷司呈抄蒙巡按雲南監察御史唐龍案驗奉都察院勘合劄付該元江軍民府被殺土舍那受妻封氏具本令義男那阿三抱奏為豪惡土官妄憑蠻例剪滅宗親輕視國典吞嗜無厭將來不軌等事又該本府土舍那禧具本令義男阿永抱奏為悖逆土官聽憑惡橫行誅殺謀害宗枝將翁斬首支解違法等事雲南後衛指揮僉事陳經奏為陳情乞恩辨明誣贓久禁坐害寃苦等事廣西府通判周憲奏為陳情乞恩矜録勞績明治冒功分辨捐身效死撫夷官員反行誣陷前程久禁等事俱行該道守巡兵備官勘問及備呈本院查照間莭准兵部咨該元江軍民府因逺羅必甸長官司土官副長官白琥等奏為言宿弊除叛惡靖地方以蘇民困事本府儒學教授李相等奏為陳時弊辨寃枉弭邉患以安地方事續准本院咨該元江軍民府已故土舍那玫妻封氏婻先具本令家人阿你抱奏為忤逆賊婦吞併地方違法等事移咨到院㑹行各司轉行勘問處斷間今准前因又經前巡撫都御史范鏞㑹行各該守巡兵備等官親詣撫處去後未報該臣接管催據整飭臨安兵備帶管臨元道雲南按察司副使吳便呈㑹同分守本道左參政朱應登行據臨安府知府朱琉臨安衛指揮僉事馮登將審勘過人犯刀倫即刀中成等似招供詞呈報到職會同接管分守夲道左參議羅方提取各犯到官問得刀中成招係元江軍民府土官知府那端下頭目先年本府已故土官知府那忠娶故妻封氏生故男土官知府那璲又娶妾李氏等生故男那璘那玫那珩那英等那璲娶故妻封氏婻當生故長男那祿并今在次男那禧那玫生今被殺那受已故那相在官那旺那祿娶未到頭目封哀璽即封愛璽故姐封氏婻燕即婻板生故男那靖并今在散拘土官知府那端那璲存日將地名南馬者欣瓦迦道阿肆鄉撥與那璘甘莊他刻等處村田撥與那玫末龍罷蒿等寨撥與那瑛他郎因逺伍寨及小􅟠南沔檳榔園撥與那禧各令管業比時議定自後遇有絶枝者將莊田送歸做官子孫免其爭亂以為定規那瑛病故遺下末龍罷蒿等寨伊今在妾趙氏將罷蒿寨典當銀兩使用成化年間中成已被殺父刀匪與被殺叔刀粉共用工開墾得地名必朔寨田地一衝告報本府起科秋糧六十七石遞年辦納不缺成化十年刀匪刀粉互相爭占前田被刀粉將父刀匪殺死比時中成與故兄刀中旺各因年幼不能理論那璘娶故妻封氏婻羅生故男那昂那升那晟將南馬肆鄉村田分居那昂生故男那銓後那璘那昂父子繼故將南馬四鄉村田遺與那升那晟那全叔姪比時那全年幼財産俱是那升那晟掌管後那璲病故那祿護印聽襲與那禧弟兄爭奪因逺五寨地方互相訐奏蒙委官勘斷仍撥與那禧照舊管業𢎞治十年那祿病故那靖襲職娶今在散拘土官副長官白琥未到女白氏為妻那禧見那靖幼小不合就照土俗收嫂封氏婻板為妾隨同在府住過扶助那靖行事次年生女一口名召罕先𢎞治十三年刀中旺與中成長大思起父刀匪被叔刀粉殺死無辜不合朋謀亦將刀粉殺死被伊妻婻粉具告撫按衙門委官撫勘中成又不合與刀中旺各懼罪逃躲委官將婻粉安插必朔寨居住回報訖𢎞治十四年因貴州叛賊米魯作亂蒙調本府官軍前去征勦該那瑛妾趙氏所管末龍寨朋出兵夫四十名趙氏不肯出備致纍頭目封愛璽自行顧倩前去後班師回還告蒙委官追斷趙氏將末龍寨准作封愛璽倩軍之需仍令封愛璽出銀三百兩贖回原日趙氏出典與人罷蒿寨與趙氏母子管業本年那升那晟亦故各絶嗣家財仍是二人未到妻封氏婻車收管比有南馬等寨通把人等將那全接取到寨扶助管辦糧差因那全幼懦不立却將南馬寨管下小寨地名道阿瓦迦二處獻與那玫又將南馬大寨并者欣小寨獻與那禧因而投靠那禧為男那禧就與那全聘娶祿蓬寨未到火頭羅雄今故妻羅氏為妻後那靖病故無嗣那端襲職亦娶封愛璽未到女婻罕為妻封愛璽隨女在府住坐比有未到生員李長春舍人魏海脫逃老吏楊傑流民楊士連劉道明劉山四各不合與今故趙敖各故違雲貴等處但有漢人交結夷人引惹邉釁濳住苗寨教誘為亂貽患地方者俱問發邉衛永逺充軍事例李長春魏海趙敖楊傑撥置那端楊士連劉道明劉山四撥置那禧各成怨恨互相讎殺那禧恐被那端暗害潛回他郎寨居住一向不與原姦收嫂婻板往來𢎞治十八年那全因患水腫羅氏亦因生産各病故絶嗣所遺財物俱被羅氏未到母封氏收回祿蓬寨去訖其南馬四鄉村田那禧同本府頭目把事人等照依原議絶枝田地俱送與那端管業刀中旺亦因時疫病故正德元年那玫今在妾婻先男那相年方七嵗病故婻先疑是已故妾白氏婻當男刀旺即那旺用藥毒死婻先一向懷恨在心正德二年三月內那玫要奪南馬村寨商同已被殺男那受并今故召霸白珩即白亨等借調他郎夷兵三百餘人各帶盔甲器械騎坐象馬擁入南馬寨將人民家財牛馬乘機殺搶奪占本月初八日等日白亨等又到虧老等寨圍困當有本寨未到民集作阿永阿甸阿車先等蜜報知府那端差白琥等前來退兵那玫不從那端又央那禧解散伊不合坐視不理彼此各愈成讎本年九月二十日那端母婻板前去瓦迦寨收租種蒜那玫得知使令白亨并未到哀麻等要將婻板截殺比有跟隨婻板今故召霸宋寧等向前對敵哀麻不合將婻板臥轎砍碎殺死轎夫阿輪使女阿業并各身帶金銀首飾器皿盡行混搶去訖那端得知隨差封愛璽帶領兵夫象馬前來與白亨等對敵各退封愛璽等領兵回府將情偹由通呈鎮巡衙門㑹行布政司行委指揮張鎧知州何子奇到府體勘那玫白亨那受各又抗拒不服出官本年十一月內那玫又令白亨奪占哈桑管下沼鐡等五寨殺死村民阿鬼阿章阿且捉虜阿折等并牛馬豬羊等物又攻地名南洞寨殺死寨民光艾等致被本寨未到頭目刀丙刀悶刀車刀卯向前對敵將那玫侄孫封彪阿先摩先刀愛家人阿腫格殺身死刀丙令未到民光愛等告府那端又不合令封愛璽不合依聽將那玫原置買新化州嶍峨縣私莊南戞壩江等村寨并那禧所管地名小􅟠南沔二處檳榔園奪占及燒燬嶍峨縣私莊房屋六間那禧又不合將那端所管車夫能邦卜永孔等六十八寨奪占正德三年三月內那旺與那受不睦又怕婻先尋害隱情投往那端處倚住本年五月內那玫在家病故未曾埋葬封愛璽思起白亨等久占南馬村田要行奪殺比趙敖楊傑魏海李長春未到夷民張輔李平何全張永昂楊昆玉李孟堅頭目刀兵刀勒張府封車封蘭跟隨那端明知地方擾攘各不合不行勸阻那端又不合令封愛璽亦不合帶領夷兵前去圍困將白亨手下男婦殺虜五十名口未退婻先告蒙巡按周御史莭委指揮等官張鎧等前來各寨㑹勘撫拘那禧那受那端封愛璽白亨到官面審各亦輸服責令那禧等照依土俗講和仍將那璘分管南馬絶枝田地并那禧原占那端邦卜永孔等六十八寨俱退歸知府那端管業那玫置買新化州嶍峨縣南戛壩江等處田地退與那玫妾婻先管業那端原占小􅟠南沔村田并檳榔園亦退與那禧管業訖仍令那受出備馬二匹牛三隻銀三十兩那禧出備牛一隻馬一匹銀三十兩俱與那端母婻板陪禮及將虜去人口追給各親完娶殺死人命抄搶財物等項俱依土俗陪償仍令各立合同明白取具那禧等退領供給在官各問罪罰榖通呈鎮巡衙門詳允行府追榖各不曾上納後那受又備馬二匹鞍一副牛二隻銀六十兩央凂未到族婦陸氏赴府行禮外結和好內藏忿恨暗令婻先出名亦不合聽從掜稱那端使人將那全夫婦毒死領兵將財産一搶無餘那端同封愛璽等與那旺領兵前來甘莊攻燒房屋有夫那玫奔命那旺追趕戳死等項虛詞混將那璲那祿等先年奪占田土已經斷明事情具狀令姪阿小於正德四年間抱赴登聞鼓下奏行都察院勘合劄行巡按羅御史轉行三司㑹勘蒙陳參議等官親詣本府撫拘知府那端并那禧那受封氏白亨婻先封愛璽及知因白琥等到官面審各相情願輸供蒙將甘莊并本府管下鄰近地名阿東那補達壩章孟山坡補凹坡烈摽哈糯白邦澗等十寨撥與那受婻先管