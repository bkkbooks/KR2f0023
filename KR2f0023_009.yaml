body:
  text: 何文簡疏議卷九明何孟春撰辭免改任疏奏為乞恩辭免改任容令休致事臣先任都察院右副都御史巡撫雲南等處地方欽蒙聖恩升授前職緣雲南等處巡撫官例該聽候新官到鎮交代方許離任臣節准吏部并兵部咨開緣由到臣遵照於嘉靖元年三月內與接管巡撫雲南都御史王啓交代已經具奏前去南京兵部到任管事間本年五月內道出湖廣地方又准吏部咨為缺官事該本部等衙門具題㑹同推舉得南京兵部右侍郎何孟春翰林院侍講學士劉龍俱堪任吏部右侍郎等因題奉聖㫖何孟春改吏部右侍郎欽此欽遵備咨到臣切惟諸曹以吏部居先夙號六官之長小宰與天卿為二實陪八座之榮縉紳之領袖匪輕人物之銓衡攸在若才弗堪於所授將物終議於不平臣也何人欲叨兹位聞大橫于龜告覩昌運于龍飛幸不棄遺與加抆拭前此之擢於臣過矣右侍郎吳廷舉梁棟可資不得久於內朝之召都御史胡世寧芳馨已著不能免於言路之譏臣才愧二賢罪叢百戾而乃自南移北由武換文感天地之深恩誓丹心而難報據淵冰於非分纍兩足而益危臣曷敢冒承重貽顛踣伏望皇上亟收殊渥俯察愚忱或聽將原職歸休故鄉或仍假舊官俟缺他日所有劇司髙選留儲清識異材庶幾上無僭賞之嫌下免素餐之責臣披肝瀝膽望聖瞻天不勝惶悸為此具本專差家人何文親齎謹具奏聞嘉靖元年六月初三日陳言疏題為陳言修省以彌灾異事臣聞二氣不和必形於灾異五行或變莫甚於水火火出為風風稱號令猛風非號令之恆水騰為雨雨象恩澤驟雨非恩澤之正有一于此謂之咎徵陛下聰明睿知承祖宗丕基嚴恭寅畏受皇天眷命爰自踐祚詔頒天下歡動海隅諸福百祥所宜駢集然兹改元之歲正月火乘春木而內禁為之灾是火性不炎上也七月水泄秋金而舊都被其害是水性不潤下也風雨助虐抑又甚焉何也臣稽古驗今諸凡此類皆人事感召之所在天心仁愛之所歸也今春京師灾異臣方外逺竊伏思念陛下初政誠美中間豈無召此之由而今根本重地乃有此灾其未然而預告者乎其巳然而當驗者乎陛下遇灾知懼引咎自歸避正殿减常膳致齊積誠祗告天地宗廟社稷痛自省循兼敕兩京文武臣寮同加修省上思以答天心下思以慰物望此商王髙宗之所以底中興也臣才猷未效於平日位次忝居於大臣修省之餘其敢無言以獻萬一臣伏覩陛下今降敕諭謂此灾異由於政事乖違刑罰不中民困未蘇國是未定是誠有之陛下盍亦求所以乖違而不中以致未蘇未定之所由乎臣伏觀陛下年來號令之失其恆恩澤之非其正者多矣書云令出惟行弗惟反人君發號施令豈可二三而今有朝更而夕改者賞用酬功非功則人罔懷恩罰當懲惡縱惡則人罔畏法而今有私進而幸免者內批與外議每相枘鑿續降與前詔自作方圓法曾禁止未踰年而復見施行事已停除不期月而重增條貫有司將何據守天下於何尊信陛下試取登極以來降出綸音反復考之各衙門之所執奏諸言官之所敷陳陛下嘗嘉其言有理嘗許其說得是或槩批以是答以知道及後略不措意所行且與背馳之事何可勝數部院科道進呈章疏危言正論無非欲禆陛下更化新政而陛下謀移始慮內啓多門意向既從他請則答曰已有㫖曰已屢有旨曰成命已下其如外議何指揮已入躗言則答曰罷曰不准或遂從寬或仍免查究其如前詔何臣所謂號令之失其恆恩澤之非其正者陛下試於此而考求之則政事乖違刑罰不中民困未蘇國是未定之所以然舉了然於淵衷矣陛下既知其實自當改從外議一依前詔脫再涉疑令各府部院寺科道等官各將曾經執奏敷陳已上奉到㫖意事宜再行斟酌擘畫備開欵目奏請區處陛下付諸參預密勿元老詳勘以聞斷而行之天鑒日臨誰敢獨為上拂天心下違物望之議萬分一有舞文巧詆凶叨奸竊不肯守法奉公勉修職業人等出乎其間事發於內則罪在臺閣閽宦事發於外則罪在府部院寺科道等官陛下明施嚴憲無少宥原天下後世其誰不服聖明威斷陛下躬上聖之資履中興之運令必行禁必止成畫一之政立悠久之規持其權綱挈其要領使薄海內外咸遵一軌以光丕業以保眷命以延億萬年太平之祚豈不休哉古人有言修德所以勝妖雖禍可轉為福商王髙宗不得專美於前臣有望於今日惟陛下留神聽覽臣無任惶灼祈懇之至緣係陳言修省以彌灾異事理為此具本親齎謹題請㫖嘉靖元年九月日辭賞疏奏為乞恩辭免賞賜事嘉靖元年十月十五日准本部咨為紀功事准兵部咨前事內開巡按雲南監察御史羅玉奏勘征勦雲南廣西府十八寨强賊有功官軍人等功次緣由該本部題奉聖㫖是各該有功官軍人等都依擬升賞羅玉賞銀伍兩紵絲一表裏史泰取回見存如何開作病故祿廕還查例行欽此該本部查議得太監史泰前項軍功加祿廕職與御史何鰲等所奏事理有礙况巡撫都御史何孟春巡按御史陳察已經辭免事同一體難再施行外為照都御史何孟春巡撫地方動調官軍區畫糧餉指麾之下罔不周悉以致各寨逋誅之冦剪蕩無遺積年受害之民生理有賴論其勞勩與太監史泰及御史陳察俱不可泯所加俸廕已奉欽依准令辭免有勞不居固士夫自處之常有功當賞實國家激勸之道况今覆核功次御史已賞而巡撫鎮守巡按官員顧若或遺恐於事體未安輿論不服所據先任巡撫今升吏部右侍郎何孟春先任鎮守太監今取回史泰先任巡按雲南今巡按四川御史陳察仍合量加賞賚以酬其勞等因題奉聖㫖是史泰何孟春各賞銀二十兩紵絲二表裏陳察銀五兩紵絲一表裏欽此欽遵備咨轉行到臣切惟昔人有言德未為人所服而受髙爵則才臣不進功未為衆所歸而膺厚賞則勞臣不勸往在正德年間爵及匪德賞非有功陛下即位以來更易釐正多矣而所司乞請奉行輕重其中不無因仍踵習之弊蓋在上者務於普施當途者不肯任怨故也如十八寨功次臣何因與此賞乎御史陳察以御史羅玉曾被賞故賞及可也臣以太監史泰查例之故而亦賞及可乎臣去年為辭免俸蔭事奏蒙恩命嘉允又為查理錢糧功次事在所司行查明白幸逃物議其可復受賞乎雲南布按二司有功官員為辭免賞賜俸級事臣嘗為其具奏前功皆二三子之力臣何力之有焉而亦與此賞乎貧者視其不取老者戒之在得臣年向老官難謂貧乃緣微庸遂勤內府兼金重幣之賜以貽不勸之譏非臣所以自處之素懷也臣竊觀今日朝廷之上賜豫蕃庶用度靡節海內蒼生供億滋煩邊鄙日聳軍旅未息水旱告急賑貸乏資司利權者計無所出管榷嚴而賦斂亟上失生財之道下多浚我之歎臣愚與有咎焉而又可當此賞乎伏望皇上察臣愚衷收回成命此後於凡內外臣工例得賞賜俸級祿米等項通加節省使府庫倉庾積不涸而藏不竭以寬民力以拯民灾則事體安而輿論服矣臣不勝感戴願望之至為此具本親齎謹具奏聞伏候敕㫖嘉靖元年十月十六日亟伸公義疏奏為亟伸公義以明典禮事臣原任都察院右副都御史巡撫雲南時曾為乞明典禮以正尊親事奏下該部值先節該奉慈壽皇太后懿㫖興獻王稱興獻帝節該奉聖㫖於安陸立祠遣官恭上冊寶太常寺題奉欽依照太廟例祭用籩豆十二臣前所言者該部因已罷行遂不復加議擬比改任入京又聞治中王槐阿承戚畹貢獻諛詞致蒙皇上又於安陸添祠祭署遂除蔣輪男榮為奉祀官令其世襲供事榮奏興獻帝陵廟合用祭器樂器樂舞生等項監生何淵又懷奸面欺至欲太廟權立世室覬動上意罪尤可惡該科參駁科道官紏論是非明白該部㑹官廷議尚復奚疑而謂往者尊崇之典降自聖母之慈成於皇上之孝在廷之臣莫之敢與其為指揮誼多未安蓋可知矣前此敕諭中外之㫖皇上欲諉於聖母乎宋治平三年德壽太后嘗降手書令英宗於本生親各加稱謂范純仁極言非常之事不可假母后之詔令於是中格往者事理皇上不得有所諉也廷議之臣自云莫之敢與誠懼公義弗白天下後世必將罪已故爾皇上何所執據乃欲任是而自纍乎近日該部因奉欽依再議欲將科道等官前後章奏一併㑹官議請定奪科道等官章奏蓋不獨為樂舞而已臣雖凡愚實與班列仄聞今月三日在廷之臣咸云前項典禮先次建明巳悉㫖從中出未獲允俞再議之舉罔知上意何在萬一不然欲仍照太廟例非臣下之所敢與夫太廟禮樂用於天子不可代用於臣下用於京師不可分用於藩國用於一而不可二者也用於內而不可外者也而議者有萬一照太廟例之虞有非臣下所敢與之語夫非所敢與之語蓋知其不可甚不得已而聽於皇上也皇上若如往者斷自宸衷或違公義必重為盛德纍昔人有言有君如是其忍負之臣弗忍也臣惟今日之議當先議宗宗法定則大宗小宗各有所主以議廟則廟有常式以議祭則祭有恆規我祖宗所以鑒古帝王垂一代之憲以示聖子神孫於億萬斯年者舉無愆矣禮曰别子為祖繼别為宗别子為宗繼别為禰此祝號之定辭也有百世不遷之宗有五世則遷之宗有無宗亦莫之宗者此立宗之定法也父子相繼曰世兄弟相繼曰及父子迭為昭穆兄弟則世其昭穆此宗祀之定位也夏自仲康兄弟繼者二人商河亶甲至小辛小乙兄弟繼者十有一人周共王定王兄弟繼者如商當時未聞有竒邪之臣敢為髙論而不顧亦未聞有異姓之人間其宗法而莫傳蓋禮明于上而分定于下也逮至漢成帝立定陶王為皇太子即封楚孝王孫景為定陶王以主共王祀宋英宗以濮安懿王長子繼體仁宗亦立懿王次子宗懿以主王祀尊祖故敬宗敬宗故收族萬世不易之法如是皇上起自親藩光承大統念興國不可缺祀則主祀不可久虛往者禮臣㑹集廷議立崇仁王為興王以主興獻帝之祀此天之經地之紀人心之公義也乃惑於王槐之邪說而令蔣輪之子攝之將來厲階有不可勝言者漢王根等受侯封黃霧四塞唐武三思為周後太白復經天今京師地動晝晦霾青連月旁暨四方病灾告沴月凡幾處未必非異姓主祀應也傳曰神不歆非類民不祀非族非族無義非類無仁無仁不孝無義不忠興獻帝有神其肯享外氏之祭乎禮器曰禮有以多為貴者天子七廟孫卿亦曰有天下者祀七世故商書七世之廟可以觀德而周之制則本仁以率親由義以率祖以文武有大功德也則謂之文世室武世室焉乃若煬公諸侯也季氏禱之而作宫則非彛典矣後世事不師古漢宣帝乃為悼考立悼廟韋𤣥成曰父不祭支庶之宅君不祭臣僕之家哀帝乃為共皇立廟京師師丹曰去一國泰祖不墮之祀就無主當毁不正之禮甚無謂也今何淵乃欲立世室于太廟之側太祖太宗列聖在天之靈其肯妥侑而安享乎淵一介草茅敢恣邪說瀆犯天常固緣今日小宗法廢主祀無人以啓之也禮曰天子之豆十二又曰鼎爼竒而籩豆偶隂陽之義也春秋書初獻六羽衆仲曰天子用八諸侯用六天子用八所以節八音行八風也公羊髙曰始僭昉于此矣尸絞亦曰始獻樂矣是籩豆樂舞聖人制之以象天地之物宜而嘉其㑹通十二八佾又天子之所獨制而自崇者今蔣榮奏用樂器祭器樂舞生等項夫用祭器是專天子之禮用樂器是專天子之樂以異姓專天子之禮樂履霜之漸可無懼乎胡寅曰以義處禮則祭不至於數煩以仁處禮則祭不至於疏怠言貴得中也臣伏願皇上奮乾耀離逺鑒古昔邇法祖宗割私愛從公義即查該部原奏選建宗室近屬昭穆之中其序應繼興獻帝後者立為王以主安陸之祀主祀之廟一凖我祖宗行下藩國之常式凡廟所有祭器樂器古今雅俗多寡數目悉擬恆規而宏其度豐其體以表殊異將蔣榮取回仍備外戚恩廕王槐何淵拿送法司明正其罪則公義伸典禮明而宗法定廟祀儀物又何多議為哉臣有懷悃欵無任願望之私緣係亟伸公義以明典禮事理為此具本親齎謹具奏聞伏候敕㫖嘉靖二年正月日救灾防患疏奏為乞因議救見災預防後患事昔宋蘇軾官杭州歲饑奏于其君曰事豫則立不豫則廢救災恤患尤當在早災傷之民救之於未饑則用物約而所及廣救之於已饑則用物博而所及微臣切見今歲户部兩次㑹官議賑淮徐等處災傷巳是救之已饑之餘用物博而所及微矣然又有可預憂者古人云天災流行國家代有向去之災如人初病繼來之災如病再發病勢雖同氣力衰耗恐難支持今各處纍歲災傷幸被聖慈大施拯恤民於百死中微有生意來年收穫知復何如軾謂當及救之於可救之前莫待救之於不可救之後者實前事之鑒也宋孝宗時朱熹論荒政曰蠲除賑貸固當汲汲於其始而撫存休養尤在謹之於其終譬如傷寒大病之人方其病時湯劑砭灸不可少緩而其既愈之後飲食起居所以將護節宣小失其宜則勞復之證百死一生尤不可不深畏今者饑民雖免死亡然皆鳩形鵠面薾然無異於大病之新起若有司加惠撫綏寬其財力一二年間筋骸氣血庶幾可復其舊若遂以既愈而不復致其調攝但見其尚能耕墾田疇撑拄門户而遽責以纍年之逋負與夫倚閣之官物是人其必無全理矣熹之所論譬者軾之論也熹謂乾道間旱稅苗皆嘗恩宥而流殍甚衆久而不復蓋次年帶納逼迫所致至淳熙初乃以薦饑始蒙蠲放則三年之間所失已多而無及於事又明年之所當鑒者也臣敢通録如前上勤睿覽望詔在廷蚤加規畫臣聞漢宣帝時魏相因嵗不登奏故事詔書二十餘事凡賈誼朝錯董仲舒等所言皆條請行之唐宋諸臣因災進言于君多按前代故事我祖宗惻怛民隱之實德發于詔令為荒政具甚備具載有司臣無容盡述惟願皇帝陛下特敕該部詳檢而速行之敬天保民救災恤患之術蓋必有在若稍增飭斟酌議論則前代故事見諸史册亦極詳悉臣敢亦採掇一二頗切于今日者竊附愚忠開坐于後幸惟陛下少垂省焉臣忝居議列上瀆天聽無任惶恐激切屏營之至為此具本親齎謹具奏聞伏候敕㫖計開一後魏孝文帝時嵗饑韓麒麟奏曰自承平日久遂成侈俗車服第宅奢僣無限喪葬婚娶為費實多貴富之家玉食錦衣而農夫餔糟糠蠶婦乏裋褐故令耕者益少田土荒蕪穀帛罄於府庫寶貨盈於市里衣食匱於室麗服溢於路饑寒之本實在於斯請凡珍玩之物皆宜禁斷吉凶之禮備為格式令貴賤有别民歸朴素數年之間公私盈贍雖遇凶災可免流亡臣惟今日侈俗相髙財用最廣蓋誅求無所不至故耗蠧隨處皆然麒麟所謂饑寒之本者惟聖明留意上有壅焉法不下行施禁立格宜從近始一唐德宗時陸贄奏曰聖人作則皆以天地為本陰陽為端慶賞者順陽之功行於春夏刑罰者法陰之氣用之秋冬事或愆時人必罹咎典籍垂誡言固不誣天人符同理當必應既有繫於舒慘是能致於災祥雖天所降沴不在郊畿然海內為家無論遐邇願滌瑕以德消沴以和威惠之相濟合宜陰陽之運行自序臣惟今日賞多濫得罰失公評可用之財未歸藏府最章之罪弗正典刑以月令推之愆時咎徵水旱並來良有攸自贄所謂慶賞刑罰者惟聖明留意省新恩之常祿可以哺窮困追巨罪之逋贓可以補租賦檢視臺諫前後章疏一聽于公可消前戾一宋太宗時王禹稱奏曰一穀不收謂之饉五穀不收謂之饑饉則大夫以下皆損其祿饑則盡無祿廩食而已今旱雲未霑宿麥未茁既無積蓄民饑可憂望下詔直云君臣之間政教有闕自乘輿服御下至百官俸料非宿衛軍士邊庭將帥悉第減之上答天譴下厭人心俟雨足復故雖朝行中家最貧俸最薄亦願首減俸以贖耗蠧之咎但感人心必召和氣臣惟今日饑則淮南江北等處為甚饉則湖廣等布政司在處有之成化間布政彭韶曽奏要將在京在外文武官員位髙祿厚者額設皂隸第減名數還官公用該部查例具奏多寡次第已經斟酌彼時不為災傷且有此議近日侍郎吳廷舉又奏南京府部院等衙門直堂皂隸應合退出若干賑濟次第明白深合昔人第減之意四品以上祿厚則家不可以言貧五品以下家貧則俸不能以更積禹稱所謂上答而下厭者惟聖明留意自四品以上悉第減之文官五品及武官四品以上聽其自審為義無積不强在京在外官有因事加俸添皂之資即當裁割以備拯恤若夫乘輿服御宮禁用度應體大禹克儉之德內帑何患無餘中貴外戚百凡賞賚無論舊例制兹歉歲俱合省免候災傷寧日通議定奪一宋仁宗時范鎮奏曰今民户困甚而朝廷取之不已民竭其力以佐公上而自用之不得是則嗟怨之氣干戾天地此水旱變災所以作也願召大臣使考求祖宗以來兵數與官吏之數與天下賦入之數斟酌損益上下遵守則國用有常民力有餘天地之和至矣又奏曰水旱之作由民之不足而怨民之不足而怨由有司之重斂有司之重斂由官冗兵多與土木之費廣而經制不立也國家自增兵以來賦役煩重及近年不惜髙爵重祿假借匪人掊克暴虐此民所以怨也所以干天地之和也水旱之所以作也乞敕大臣考今官數兵數與賦入之數立為經制又罷土木之費使民得足食而少休息則天地之和至矣臣惟今日官數之冗員𫝊奉未革兵數之寄籍冒承如前天下賦入之數所供不給所需京師土木之費經營始息於內庭繕治又興於戚里民食何時得足民力何時得休鎮所謂嗟怨而干戾者惟聖明留意髙爵厚祿今假借於匪人多矣掊克暴虐之政見於糾彈者曾盡施行否乎今誠能立經制如鎮所云省官與兵而節土木之費禁斷掊克暴虐之政使民無怨天地之和可以立致一宋神宗時韓維奏曰今氣令舛逆寒暄不常諸道州軍頗多旱暵百姓艱食流離轉徙未有自生之路天道人情蓋與始初不類恐朝廷言思視聽之間有所未當願思天戒以百姓困窮為念君臣協心講圖惠政以救此急哲宗時蘇轍奏曰天氣下降地氣上騰陰陽和暢雨澤乃至君廣聽以納下臣盡言以奉上上下交泰元氣乃和今侍從近臣雖六官之長皆不得進見聽既不廣則事不得不偏聽狹事偏則陰陽亢隔和氣不效必然之理宜因此時明降詔書許百官面奏公事上以盡羣情之異同下以閲人才之賢否人情不壅天道必從久旱之災庶幾可息臣惟今日官中備荒社倉義廩大率多是虛名農家平居少有半年之食一遇水旱公私俱匱嗷嗷待哺之民朝不謀夕勢激利奪孰無等死之心天之降咎多在凶年年凶民饑民饑盜起盜起而吏弗能禁貽國家禍何可勝言維等所謂天道人情者惟聖明留意上下不協心則聽狹而事偏感召災傷未見已時夫皇天無親鑒降在下休咎之徵咸由人致兹欲修德應天轉災為祥惟在陛下一念之間顧所以責任大臣與諫官者何如耳一宋高宗時李光奏曰方今之患莫甚於州縣之吏蓋公廉多不見容而贓貪或得幸免百姓受弊不可勝言慶厯間歲旱范仲淹請遣使者往勞來之於是命仲淹為江淮安撫今日旱荒民多流徙願選公忠諒直之臣通民情曉吏治者以安撫為名察郡縣貪苛之吏孝宗時趙汝愚奏曰講行荒政全在得人任得其人則能每事隨宜措置不至乖疏任非其人鮮不敗事守令之不堪倚仗者宜委諸路監司體察監司之責在今尤須謹擇若旱傷分數稍重路分須選帥臣有才望者專一措置施行臣惟今日所在有司得人甚少災傷地方復有貪苛之吏民何以勝光等所謂安撫體察者惟聖明留意右都御史吳廷舉等通民情曉吏治責任斯在固當追效古人敕㫖丁寧而督勸之使於當職人員有賞格以待能幹有刑條以懲不職作新濟農之倉大舉惠民之政則濟民獲免於饑餓饑民不至於流徙流民不至於殍亡斯副朝廷好生之意一宋髙宗時廖剛奏曰昔晉飢使乞糴于秦秦伯以問諸臣百里奚曰救災恤鄰道也行道有福㔻鄭之子豹在秦請伐之秦伯曰其君是惡其民何罪于是乎輸粟于晉故後世莫不以秦伯為有德於晉而以晉之閉糴為負義夫秦晉敵國猶貴於通有無以拯其民孰謂一統之內乃欲分彼此邪昨歲旱傷所在不收今舊穀將沒民且艱食竊慮州縣官吏各私其民胡越相視而不相恤則老弱有溝壑之患而壯者聚為盜賊在朝夕矣欲望申戒諸路監司使之檢察所部官吏毋得遏糴庶幾通融周急國無饑民臣惟今日荒熟相近地方有米願糶有錢願易商旅規利船裝車載有司正當招誘以通有無而州縣官各私其民彼路此郡有米去處遏不出境是豈臣子與國休戚之心朝廷一視同仁之義哉臣訪知各處為監司而遏糴亦間有之剛所謂通融周急者惟聖明留意敕下該部行撫按官今後有災地方召人興販無災州縣遇有鄰郡米客收買許依市價平糴仍約課務不得邀阻收稅則商旅皆願出於其途有無一通價值自減而饑民獲接濟矣一宋孝宗時趙汝愚奏曰諸郡連嵗旱傷流徙未定不可不厚有施惠以慰人情合將旱傷州縣人户第四第五等來年諸物課錢盡數蠲放使彼無聊之民䝉被德澤預知嗣嵗青黃未接之際免有征催自然人情稍安不至失所臣惟今日重災地方百姓艱食已多流徙若不早加安慰彼戀土者亦將首鼠兩端逮春徂夏日月尚遙豐凶之期豈能自定户有負逋各懷憂畏寧無相率而逃失業既衆羸弱者餓死溝壑强壯者聚為盜賊盜賊一起猝難討擒兵盜相拿邦國深禍汝愚所謂使彼預知免征催者惟聖明留意敕下該部行撫按官於重災地方再行詢究分别等第先後奏聞曠然垂恩以示諭之征催既寬逃亡必少所在田畝不至拋荒鄉農安心布種自救其饑萬一更罹薄災可以不仰官司重為拯恤而將來公家租賦亦免失陷矣嘉靖二年十二月日乞隆聖孝疏奏為乞隆聖孝以光治化事臣前任都察院右副都御史巡撫雲南時正德十六年九月上旬得傳到邸報恭惟皇帝陛下差官奉迎聖母有朕既入繼雖未敢顧私親但母妃在藩府無人侍養之諭伏讀感涕仰知陛下大孝不忘所生思欲以天下養緣慈壽皇太后在上義難兩隆故形於辭意宛曲如此真大聖之孝也即日上疏大略以為聖母在途伊邇三宫自天來㑹日朝之禮又當審定等威問寢之宫尤合預分差序我國家列聖承傳家法嚴正髙出前代宫闈制度非外臣所敢知而愼防左右毋容小隙檢斥讒慝勿造異端俾皇太后皇兄后聖祖母聖母各綏福祉永遂歡心又今日陛下大孝之所宜深體察者拳拳愚忠巳獲通於黼座若推尊本生稱號之典臣實狂愚於此疏內曾極言之後䝉恩命洊轉回京又有以承皇上孝治天下之道能使九重內廷咸安厥止能使天下凡為人後者莫敢不重其宗凡為私親者皆得均於其養豈勝為斯世慶不圖近來主事桂蕚重有意見開陳上誤天聽蓋宋人之所斥曰邪說者而桂蕚有甚焉禮部㑹官看詳覆奏今經再議復越旬餘本月二十七日臣等百官朝退聞召內閣輔臣賜問而出及午又聞傳召禮部官詰與御史馬明衡對所奏事臣不識其果何故也召內閣若為推尊之典則禮部㑹官屢矣公議已定議已詳矣輔臣幸接威顔言當無弗同者御史所奏事或云為前此禮部官曽奉㫖意昭聖慈壽皇太后聖旦節命婦免朝賀則禮部已出告示應該朝賀命婦家各知㑹彼御史因告示上未見陛下奉皇太后懿㫖字樣不敢不因事以效忠爾外間訩訩傳說陛下欲稱皇考於興獻帝欲稱皇太后於興國太后而又有臣子弗敢聞者欲盡如桂萼等邪說而行之如此則孝宗皇帝在天之神何以自安興獻帝在天之神何以自安禮繼大宗尊無二上此豈武王周公如事生存之道邪今昭聖慈壽皇太后興國太后兩宮萬福方享陛下以天下養如此則昭聖慈壽皇太后何以自安興國太后亦何以自安而為陛下臣子稍知經義不為桂萼等邪說者方在朝廷在天下其何以自安邪人情無甚相逺前項命婦免朝賀事雖出慈壽懿㫖而人情不安中不能以無疑此欲效忠之臣所當亟為陛下告也臣向所奏在萬里外暨今二年叨與議末重有感焉所謂慎防左右毋容小隙檢斥讒慝勿造異端數語今本無其實而拳拳之愚預憂過計尤望皇上深加體察始終一孝以治天下將禮部㑹議及臣等覆奏大禮早賜俞允施行用杜後來形迹之疑社稷幸甚天下幸甚緣係乞隆聖孝以光治化事理為此具本親齎謹具奏聞伏候敕㫖嘉靖三年二月二十八日何文簡疏議卷九
