body:
  text: 何文簡疏議卷一明何孟春撰建言疏奏為建言事臣少觀古史聖君之世必無以言得罪者聖世之臣必無以言為諱者蓋言者得罪而言始為諱也人臣以言為諱其非聖世可知仰惟皇帝陛下踐位以來圗求治理省覽章疏採愚者之慮擇狂夫之言數年之間下興敢言之風上有弗咈之美三代而後臣不謂重有今日臣生適聖君之世又為聖世之臣敘烈揚休情無已已而今月十三日事乃有深為陛下惜者臣始聞科道官待罪闕下不信久之朝無諱言此其時也科道近來不聞以言得罪者既而詔下錦衣衛獄臣詢諸道路緣岷王奏稱武岡知州劉遜違法事情科道為之分釋有乖宸斷以至於此夫岷王所奏陛下不加體勘便差官拿解劉遜赴京陛下於待宗支厚矣科道共論所奏未委虗實乞免差官校陛下又并科道下諸理臣則以陛下為過於厚宗支也夫過於厚宗支猶不失為陛下盛德而外間傳言至謂陛下素不罪言者今乃有此事由科道前曽阻幸臣之進不當聖心杜貴戚之求久蓄聖怒故耳臣益惑焉陛下前於科道劄子不惟不罪而又聽之此何謂哉陛下本厚宗支而過卒生臣下之言如此則臣所以不能不為陛下惜也科道惟習熟陛下必不罪言者感激自許以不諱言為職小大廢政然否之際輒形諸論列事體差謬豈能無之十三日之事臣非敢謂言者不當得罪而恐臣下自此以陛下為罪言者將遂以言為諱也科道在今職為言路陛下今因其言之失而罪之失止一事而連坐者五六十人國體不無少傷公論不無少挫挫公論傷國體而聖治自此少虧矣編修羅玘御史張淳有見於此曽各具本親齎冀徹旒冕載回成命伏闕惴惴以俟逾三日不得報臣用是復有請焉陛下恩遇臣子如腹心手足痛癢切於一體今之逮繫科道庸知不朝怒夕霽陽光驟照於既霜之餘而臣等輩妄陳覼縷干聖聽草茅耿耿蓋不昧於懷也抑臣又有為陛下慮者科道衆官逮繫久矣令行夏正暑向炎熇狴犴迫隘毒蒸如炙萬分一有沾疾而瘐死者陛下何以忍之論罪不至死而死當其在獄聖世有諫臣如此臣不識陛下何辭以謝天下伏願陛下含垢納汙廣山澤之量早賜詔旨從輕發落使下不墜敢言之風陛下亦終始全從諫弗咈之美天下幸甚倘以臣言不足聽而復遲之命下之日又非臣所請者朝野觀望誰不乾沒為心自全為計等水鳬於隨波同仗馬之食豆而肯更批龍鱗料虎口捐不資之軀以蹈不測之禍耶臣瞻天仰聖無任戰栗之至𢎞治九年四月十八日省營繕疏奏為省營繕以光治道事臣竊見近日司禮監節傳奉聖旨蓋造乾清宫西七所并添修萬嵗山後育秀亭該各衙門措辦物料雇覔工匠摘撥團營做工官軍者臣自聞命寸衷若驚端居以思中夜而歎陛下即位以來節儉形於宫闈仁恩遍於寰宇積之於心施之於政無非為國愛民而數年之間土木頻興若神樂觀等五處迄今尚在做工宫西七所固難免於蓋造山後育秀亭可以不復添修今乃前工未訖後工踵之此作未成彼作復繼費府庫之財疲軍民之力恐與陛下初政愛民之心不相類也臣謹昧死而冒言焉命下踰月矣臣未見有為陛下言者意者陛下鋭於所為言必得罪人故自危不敢言耶何宜言而久不言也雖然臣有懷於此欲進而退將陳而止者亦已屢矣竊計陛下之聖豈不能容狂瞽之言而必罪謇諤之士哉臣知此之宜言而畏首畏尾自同緘默是自欺也臣厯觀載籍前代人君未有不惜民力好厪土功而克善其治者民之所以勞財之所以傷國本之所以易搖國用之所以不給致之雖非一端而土功實甚聖帝明君故必謹焉事參緩急時酌應否非不得巳不輕以為而其為之必皆出於為民如大禹之溝洫文王之臺沼始下無所病而上安其利王制用民之力嵗不過三日又視嵗之所入以定役數凶札之嵗則無力政新氓之治則無征役於役民之中寓愛民之仁如此今天下所在差遣如蝟毛貧孤靡遺而大者創建王府供餉軍需元元之瘵難以縷數耳目之所不及臣不舉以慁天聽也京師比年土木之功豈盡同於古之役民者乎參時酌事豈皆甚不得巳者乎春秋莊公新延廄傳曰言新者有故也因故而新之似無大損而孔子必書之於䇿以見其非時而役也育秀亭之添修何以異於延廄魯人為長府閔子騫曰仍舊貫如之何何必改作長府之作不見經傳蓋因子騫之言而止陛下於凡工作獨不當仍舊耶漢書載文帝即位二十三年宫室苑囿車騎服御無所增益有不便輒弛以利民嘗欲作露臺召匠計之直百金曰百金中人十家之産吾奉先帝宫室嘗恐羞之何以臺為文帝之時海內富庶都鄙廪庾皆滿而府庫餘資財京師之錢纍巨萬太倉之粟陳陳相因且惜百金中人十家之産則他所用肯復妄費有加於此者乎奉先帝宫室嘗恐羞之則凡規制一定之外肯復有所充拓而侈於舊乎漢文為後世嗣統守成之令主蓋以是也陛下志欲齊軌禹文顧不念漢文帝之言耶且今之時視文帝之富庶何如矣國家無事百三十年于茲豐亨豫大之運宜非漢比而閭閻之下愁嘆之聲窘蹙之態殊不稱於盛世昔有子有言百姓足君孰與不足百姓不足君孰與足臣觀漢文帝在位賜天下民租之半者再除之而不收者十餘年當時豈無一切用度國有餘蓄故耳陛下視今之內帑儲崻果誠有餘何不間嵗示天下以免租之詔使天下曉然知陛下愛民之心歆感生育遂油雲霈雨之望於苖稿之日之為大哉而嵗必取盈舉諸算𣙜之利以供工作臣未睹今日之有餘蓄也陛下試計今日工作奚趐百倍露臺之費也二處物料七所之所寄放及該監之所收貯一有不敷不免索之於外索之於外則工部不免那移順天等府不免科𣲖盧溝橋張家灣等處局厰應用者曽不能補料之半柱礎等石皆要開塘起取琉璃素白磚瓦亦要設窑燒造凡百所需無不擾擾在內者以一糜二在外者以十供一如顔料中石大青大緑皆每斤值銀數兩所用無慮數萬斤需銀亦無慮數十萬兩木石等匠除在官人外雇覔該三百名每名一日工價七分一日即該銀二十一兩略約一年工價巳費七千餘兩矣陛下方春時和不為賑貸之議奈何有用之財棄之不急之務有限之入蕩於無藝之支無漢文帝之富庶而所為過之無乃不可乎京營官軍統之以三而簡之以十二所以肘腋宸居股肱郡輔潛蓄精鋭專備倉卒調遣者也其半外衛四都司春秋兩班按期輪替即漢南北軍而兼乎番土唐左右衙兵而併其府衛以居重馭輕從中制外我祖宗之貽謀存焉非土木之功所當役也臣揆之制軍民二役分自後代成周役民之法有為五兩卒旅者兵之役也今之比閭族黨州鄉之中朋户抽丁既専役於兵矣而復不免於他作不失之重役乎邇年神樂觀等五處做工官軍有八千者有五千者少亦不下三千三大營巳撥去一萬七千團營撥去五千備更番者又該五千工程浩繁有一二年者有二三年者動輒再閲寒暑在京土著之家稍有生理逐月雇工等項用銀至一兩餘外衛而無業者則行糧糶盡答應不前自度難支多行逺竄心畏罪罰不返本衛亦往往有之夫人情孰不欲骨肉相保鄉井相聚而以行役去其父母妻子差戍拋其田廬屋産采薇之謂靡室靡家載飢載渴者不可憫乎今二處做工團營又該撥去九千通計更番即一萬八千之數繅絲見蛹勢殆未巳竭澤得魚後將何繼且臣聞之各處管工官員大較假公濟私便遷延以規利務隱射以求間工程不急催完軍士致荒訓練在營聽操者無幾何矣營中之弊殷實私於辦納精壯私於跟隨技藝私於造作教場操點暫令應名號令甫畢四散而去稽其數目莫竟所止由做工有以為推托之地也外使祗今入朝本營人馬送迎擺列巳告不足萬一意外之虞突如叵測欲一呼十萬容可得乎此臣之所為國家根本慮也往事不可諫而臣不惜覼縷之者願陛下今日之察之也雖然臣聞之道路之言又有當為陛下告者外間嗷傳陛下添修育秀亭而盛厨廡叢臺榭將以極遊觀也陛下早朝晏罷厲精圗治清燕之間寧有他念我太祖髙皇帝皇明祖訓遊玩去處更不許造今乃及此殆為祖宗之舊不忍就墮而人言大謬者生於疑耳見影疑形聞響疑聲疑之所在未全無以言之所生亦必有為輦轂之下衆口沸喧傳之四方訛且益甚矣仰惟我太祖皇帝沉機先略創制定規佑啓後人纎悉畢具洪武八年建大內宫殿詔有司不事華麗曰使吾子孫後世守以為法又曰遊觀之所朕決不為嘗指宫中隙地謂皇太子諸王曰此非不可起亭館臺榭今但令內使種蔬蓋以一人治天下不以天下奉一人恐奢侈之易萌而宴安之易溺也陛下允執厥中監於成憲遊觀二字臣奚復容臆揣而外間得於倣佛之迹終莫釋然宋蘇軾告其君云人言雖未必然而疑似則有以致謗者臣愚故為陛下惜也欲人勿疑莫若勿為陛下能如祖訓所戒於疑何足置喙宋英宗朝有請于汴河築堤者趙抃謂民多不欲奏巳其事築堤以防患而民不欲尚為之巳今日之工作異築堤者多矣我太祖龍興初自宣至徽有儒士來見問曰鄧愈築城百姓怨否曰頗怨即命罷之築城以衛民因民頗怨而遂罷之今日之工作異築城者多矣陛下安能保民之皆欲而無怨耶無怪乎有是言也是言殆近於謗然畏謗而悔過非陛下之聖不能也道德之端淫泆之原皆起至微而方寸轉移天淵懸絶月令工師之命無或作為淫巧以蕩上心特重言之一器物之淫巧而上心乘之以蕩况所以蕩上心有大焉者是誠不可不慎也君之心權輿乎天下之安危休戚者也慎持之則財不肯輕費力不肯輕役斂於民也薄動於民也簡不慎持之則反是而天下之安危休戚分焉此常理也陛下之聖臣知無他念矣倣佛之迹猶願陛下去之七所制度所當有育秀亭事理所可緩陛下倘察臣言於此參酌而弛其一凡物料工匠官軍盡得減半則慶幸在朝廷當何如禔福在生齒當何如而外間之所疑亦自釋矣如或亭已拆動則可加補葺不增一楹使完而已古者宫室塗而不雕摩而不刻人君之孝固在謹守祖宗之法之訓而豈在侈土木於前觀哉陛下幸加早斷毋以事集而難已也唐貞觀初太宗謂公卿曰朕欲營一殿材用已具鑒秦而止是也毋惡臣言之戅而難受也貞觀四年太宗發卒修洛陽宫張玄素切諌比之煬帝太宗為罷役是也臣以陛下之聖必不罪言者故敢進此愚忠未諳事體甘觸諱忌草茅耿耿自不能已惟陛下少垂察焉臣伏闕待命不任惶栗為此具本親齎謹具奏聞伏候敕旨𢎞治十一年三月十八日應詔萬言疏奏為應詔陳萬言以禆修省事臣聞之昔范睢獻秦書曰語之至者臣不敢載之於書其淺者不足言也宋蘇軾上書其君仁宗亦曰臣試論小者而其大者將有待而後言也言係乎事事有小有大泛言則淺究言則至臣今獲承明詔將言其淺而小者乎亦將言其至者大者乎言係乎事事視乎時時之所急雖小而非泛言不失為至非時之所急君子不以溷其君言固將先乎所急者雖然在其君聽之何如耳乃者清寧宫災陛下夙夜祗畏思敕天之戒儼神明於蠖濩遣官分禱天地太廟社稷以致災之故首罷育秀亭之工作已成者而撤之特詔廷臣痛加修省凡有所見許其直言涓流不容私潤爝火冀可助光中外執事實深慰喜激衷申悃誰其忍默浹月之間囊封投匭於詔旨所斥百司政弊姦貪顯迹軍民利病收拾砌纍食磨寢勘罔不上聞自以朝無諱言時難再際延頸企踵洗耳刮目顒俟報可而九重玄邃景象依違所見施行未盡遂言者之所望豈所言者皆非時所急者耶不然則此詔也宋司馬光之謂數年前亦有之而今為修故事而已乃今閏十一月日有食之災見於天古之君臣尤不敢忽陛下修省之誠當不但巳毋致臣下有此疑也當世之務入於弊者多矣官之姦貪殆未易知行伍閭閻覆盆不照之處紛紛利病如九牛毛一時刀筆安能槩舉臣以詔旨徵諸道路得數事亦欲為芹曝之獻而恐非時之所急者敢先以果聽斷公任委為陛下勸焉而始及之以上禆修省萬分之一可乎臣惟前日宦官李廣未死桑雍釀憂狐媚希寵氛祲之盛至薄太清陛下於聽斷不無有所借任委不無有所專今天禍其身身死罪露宵旰之間聽斷果矣朝廷之上任委公矣臣猶以為言者蓋欲即已往勸陛下於將來庶幾陛下有所懲艾不致將來有如廣者之所為也書稱萬幾詩詠普天率土人君御煩治廣代天工者雖有其人而動皆覆白於上茍聽斷不果意緒紊於遲廽弛張滑於猶豫藻鑑昏於繫纍則政出多門命從中降而紀綱不可得立爵非士共罪非衆棄而賞罰不可得明前之所是著為律後之所是疏為令而號令不可得一太阿且為人所盜弄而能禁其毋割乎史稱漢宣神雀五鳳之治吏稱民安由其信賞必罰聽斷惟精以得之也元帝嗣祚權入𢎞石之手而宣業遂衰由其優遊不斷牽制文義以失之也箕子洪範言沉潛剛克繼之以作福作威子思中庸論天下之至聖必及於發強剛毅足以有執蓋果之為貴也如此陛下自即位總攬政事如天之運本無凝滯而二三年間各衙門所題請事宜或不即出積之旬日出即有非原所議擬者中間豈無有奔走幸門交結近侍夤緣肺腑依托唇齒以相引救者乎躁者望速化戾者覬苟免私者願獨利左右之人惟利是嗜惟黨是親養諛導佞排鯁撓直所偏好則鑽皮出羽曲為掩覆所偏惡則割肉安刺外生科條不顧逺圗不恤清議是以人情恟恟衆口沸騰見某人某事不當如是而如是則曰某者隂為之地也某人某事當如是而不如是則曰某者隂為之間也某人某事始不如是而終如是則曰某者隂為之斡旋也臣亦不能無惑焉如都御史王越以傳奉詔不果用者兵部議推總制西路重臣所推閲數人及越乃賜俞允王越得陛下之識擢推究其源豈無有譽越於陛下者乎給事中王綸以詔與補外者吏部故纍以布政司參議缺聞而所補皆所陪點之人踰年而後得參議前之不得有毁綸者矣團營官軍兵部題準不許奏計做工而育秀亭等處工役竟復不免差撥此固有人以啓陛下然也甘肅守臣奏復哈密乞憐降敕及金印命服封其國長聖斷著差官去兵部具題欲無差官詔如前旨於是擬差二員以上奏入一月有餘復得旨準不差官夫前欲差官者陛下之意久而不差所差之人必有非陛下意之所欲差者庸知左右有不欲差其所厚者以僥幸功名而無陛下之命故此未發乎陛下春秋鼎盛英睿邁古淵衷所處未應左右能與惟夫遇事稍尚安詳故有如李廣者得進言也臣見近年科道官及諸執事所上封事又多有久留中者彼其所言不干廟廊則觸權貴中鰓鰓然常恐鷹摶狡兔反為兔噬而陛下輒以留中使彼不得請命却步喪氣徘徊鬱塞叩天無路何也奏文之可不可行與不行兩言而可決者陛下豈以前代故事容受直辭則欲常在斧扆時省覽耶抑欲保全言者以滅謗且宣付史館以成君臣之美也臣不能知然知陛下不行其言則必無是無乃其言謬悠無可採者乎彼之敢於上聞傾􅅹肝膽其思必熟其計必審非以為已謀也以為已謀小加譴黜大正典刑可也非為已謀而國家之慮縱有不熟思不審計而傷於戅失於裂滅者陛下亦當山藏海納於短取長優示旨諭以奬敢言之風未可棄置如無漫不加皂白使左右者得以甘心而成其曖昧之禍以誣風節之士也書曰小人怨女詈女則皇自敬德厥愆則曰朕之愆不敢含怒盛德之君忍乎匹夫之無狀而必省諸巳况於在廷之臣為國元士負其慷慨以言為獻者乎商周之際以不諫而得罪者有矣墨刑是巳未有諫而得罪者也諌而得罪見於末世然漢唐有道之君亦自不爾陛下始意圗治求言甚切先朝以言被黜之人如林俊輩無不起用而御史彭程以言事罷為民按察司副使楊茂元以言事降為府同知彭程楊茂元之罷與降當時必别有以得罪者人相傳言則以為為某為某矣禮部郎中王雲鳳以省牲日駕後騎馬得罪降知州雲鳳先常發李廣之姦於陛下故論者亦謂此乃李廣因事以中傷之所謂曖昧之禍也今日之給事中胡易御史胡獻皆言事者胡獻見蒙降調胡易猶在禁獄欲加之罪固自有辭臣愚但恐非陛下求言始意臣聞彭程已死楊茂元王雲鳳行當復用於論定之日胡易胡獻二臣者陛下倘查無大過乞速錫矜憫以釋論者之疑昔唐太宗問魏徵比來政治徵對曰陛下貞觀初導人使諫三年以後見諌者恱而從之比年勉強受諫而不平也徵之對不及政治政治之進退實決於此臣願陛下於此察焉得頌不如得針得唯唯不如得諤諤得所可恱不如得所可警人情無甚相逺彼顧欲噓死灰以自焚啖野葛而自毒耶白璧不可為容容多後福有能奮然不顧盡其言於天子者蓋素有風節之士不多得也而言脫其口咎攻其身怨種於前患生於後彼非失心遺死生之人則誰肯更言者將來流弊人且浮沉自營心口相戒甘茍玩以誇太平執文具以為觀美務因循而長偷謾樂軟熟而憎剴切隨時好尚以固寵榮雷聲是非以便附會臣不識此於盛世安所取乎此臣所以願陛下之聽斷果也人有常言天下大器也措諸安地則安措諸危地則危人主有是大器者也是大器可以一人有之然舉而措之一人之力則不能濟故必有以借其力於下有以借其力於下則下得與力君子與力則安小人與力則危故力不可輕借人主於共理天下者而任委可以不公乎易泰之初九曰拔茅茹以其彚否之初六其辭亦然此不無謂也師之六五曰長子帥師弟子輿尸解之者謂君子用事而使小人參之之過也參术以補苓黃泄之不可以為醫繩墨以引斧斤背之不可以為器甘滑以進苦澀雜之不可以為味理必然者陛下視今之所任委何如乎萬邦黎獻共惟帝臣委命致力不為乏人而天冠地履尊卑分懸上下情隔苛禮維甚文誠未孚言獲傷舌動遭掣肘貂璫乘焉默運潛持隂邪之徑貨利之關日闢日廣爭馳捷出人才雜揉吏事滋蠧陛下且不知其底定矣陛下試一思之致此固有由也古之君臣相取以圗天下之治其相得甚相歡也都俞吁咈談燕一堂推置心腹洞徹表裏纎芥之嫌不萌其間是以其臣知無不言言無不盡出其身為天下營各執其職而始終無所忌避而其君所為而成所欲而遂陛下能如此乎臣生長外郡見臣郡之守所屬來謁必門卒為通所屬急於見無不賂門卒者既見以簿書上簿書坌積則付房吏看詳所屬恐其尋隙以議無不賂房吏者門卒房吏於守何親而得賈利而假權况乎人主之左右為狐為鼠為鬼為蜮豈無賈利而假權者哉外廷固不如內廷之近密也士大夫固不如宦官宫妾之褻昵也前日李廣未死陛下之政事彼得而撓人才用舍彼得而議九重非時之旨諭彼亦可以時而假也羣臣趦趄齟齬於外觀望風旨李廣之不若也固宜有苞苴其門相與生盟死結者矣名位已盛欲其固基宦逰未逹欲其進級地在間逺欲其招携迹涉孤危欲其培植事防詿誤欲其回護衣冠清流豈真不知耻哉無以結知於陛下故結知於陛下之左右憂時之念奪於有我之私徇國之誠不足勝其營身之計士風如此陛下可無挽之科道請按李廣贓簿以治交結者罪陛下祕之但令指名來上而卒置不究科道所指之人得於所聞未由皆實陛下置之不究論者咸歸陛下能惜大體然言路峥嶸昉立風采陛下亦當黜一二之尤者以示後勸陛下用意過厚以為彼附李廣自廣有寵故也廣死無所寄寵彼將自罷何足深責以敗厥類陛下此處且能惜士風矣臣以為陛下果有此意莫若自今以後公於任委孔子不主瘠環而臧倉沮孟子邪正必不兩立今之士大夫能嚴顔正行無求於李廣然有如廣者復存於今當其氣熾焰張之際抑將奈何間居詳語不過俯首太息而巳彼誠不得君嫉妬是畏無以展布四體罄竭思慮事功之的難以責其必至臣以為此三二十年來任委未公之積弊所致也自古願治之君無不詳責於臣下而考其政詳責於臣下使賢否不能隱考其政使是非不敢私所以使其不能隱不敢私者非君之智術以伺察猜防為也臣觀唐太宗論其臣房玄齡輩優劣人為數語斷其平生無爽諸司所行事委曲皆悉之非太宗能以身親羣臣朝夕不廢延納何以得此恭惟我祖宗在位建官惟賢位事惟能而優接臣下罔存形迹早朝奏事未畢每於晚朝盡之正朝之外尤隆經筵勸講之禮遇有機務輒駕御左順門召六部大臣與之商確間臨內閣命學士定其可否然後施行明良胥慶一德一心以馮以翼庶尹允諧百官承式故大學士楊士竒有三朝聖諭録李賢有天順日録之作具載列聖所與議論之言藹若家人父子傳播四方見者踊躍今陛下早朝視事能幾時刻通政司引奏之外德音不可復聞晚朝曠廢經筵勸講之禮雖存而聖意無所咨詢侍從之臣講罷亟退殆以粉飾治具云耳天下事陛下一切徵諸尺牘何以詳責於臣下而考其政哉臣惟臣下之告君見於疏奏不如見於對陳之為切疏奏之言不如對陳之言之易為功蓋疏奏者情每難盡而對陳者從容出之每有餘疏奏者以言期上之行而對陳者得反復究竟利害之實而上行之自勇疏奏者人逺讒邪或蔽之而對陳者下輸其情上獲其益雲龍之廷公論具在無扞格也今羣臣其誰得更番需次對陳於陛下者天下事一切惟尺牘之聽是以賢否是非左右得以調停消息而陛下無自知之無以詳責於臣下而考其政何得無其弊哉臣聞之我朝之有內閣猶前代之有中書省也我太祖皇帝罷丞相革去中書省太宗皇帝故以老成文儒選居內閣專備顧問預參密勿是內閣者論道經邦之地唐人謂政常在中書為治本宋人謂事不由中書即亂世之法臣以今較之政宜常在內閣事不可不由內閣陛下盍隆其禮而重其責焉大學士如楊士竒李賢皆膺列聖之眷注故得盡其才九重有一言一事皆得議於其始故不至布出於外而致喧嘐之紛籍今則不然所以有任委未公之積弊也詩曰雖無老成人尚有典刑記曰大臣不治而邇臣比矣故大臣不可不敬也是民之表也邇臣不可不慎也是民之道也臣願陛下恢張經綸之慮眀目逹聰兼聽博采日與內閣講論當世之務大小條件內外便宜一一付之該某部所掌則令某部與俱不厭猥煩務求今之所以異於古者何如得失之機何在設施之方損益之節以何為善欲變害以為利何為而可詳審斟酌既得畫一則斷而行之仍令內閣及府部耆舊大臣各薦其所屬科道預舉其所知以應宣召以匡所行之不逮不以小恩廢大義不以私憾枉公法不以舊習妨新政不迷於兩可之辭不沮於交鬭之口如此而行不當者少矣若復有之六科得而繳駁十三道得而糾舉定不至以水濟水泛害無極也經筵之日陛下誠能好問好察于休勿休孜孜無倦侍從中當有以正巳之學為格君之學諷誦詩書喜揚善導以益聖德於緝熙者我太宗皇帝嘗詔武臣有曰上能推誠則下樂盡力陛下能公於任委臣下感激自然百倍不錫馬而榮不授鉞而懼同心併智相與淬礪以效區區將自不容巳陛下於此而循名以責其實定其黜陟才之短長事之軒輊舉在冕旒黈纊之下其不勝任之人科道劾之而彼非被空文陛下罷去之而彼不怨彼知天之不可欺陛下之深知也豈復肯以賂啖左右而取罪哉當此之時雖有李廣千百亦何能為掃除幃闥免無它責幸矣外廷既昌內廷自戢士大夫之氣既作宦官宫妾之勢自不得行此臣所以願陛下之任委公也陛下幸裁察焉果聽斷公任委二者臣言之矻矻覼縷切至陛下聽之若非即時之所急無大於此陛下聽斷誠果任委誠公言無所壅賢無所妨官守得盡其職言責得盡其忠何患乎姦貪之不去何患乎軍民之利病無人以為之興革董子有言正朝廷以正百官朝廷正而天下治其道如此臣敢以此勸陛下臣言非老生迂士之泛談也若夫臣之得於道路者請别白而終言之其一曰臣聞郡守縣令民之師帥古人有是言也縣得人則百里受其賜郡得人則千里蒙其庇或非其人則百里千里嬰其害聖君在上思天下匹夫匹婦有一不獲其所猶當不可况百里千里之生靈可寄之於匪人乎臣觀今之為陛下守令者有非其人者矣狼羊相牧禽犢是資闒茸齷齪所在皆是陛下之民有不獲其所者矣筋骨供於棘舌肌膚刮於銛刀終嵗瘡痍痛定復痛知治體者能無怵然古者郡守入相郎官出宰守令之職甚不輕也今之為知府者皆四品廷臣纍日積久而後至宜少不才者而府佐及知州知縣佐二等官則不皆進士為之進士出身者十三四監生吏員出身者十六七此郡縣所以有不得其人者歟世之所重在進士考課之法旌異之典獨詳於進士出身者而監生吏員出身者不才者恕於考課才者略於旌異此其弊也論者曰進士年少氣鋭州縣職非彼所止彼能以黃甲自愛故不安小成而多舉職旌異之典每先焉監生吏員出身者流大較鐘鳴漏盡日暮途窮之人志氣銷蝕精力疲憊僅勝冠裳無有幹局望利而饞觸事而頑沿風踵類考課若其弗恕彼浮家飄宅何所於歸十人而九皆坐可黜之列無以酬其燈火棲遲之望塵埃奔走之勞矣其中有錚錚於鐡蕭叢而蘭馨者雖其上司旌異間及該部自以非進士此無所事旌異也臣以為不然趙禹之才出於佐史龔勝之賢發於郡吏黃霸丙吉薛宣非漢名相乎嘗為卒史為獄吏為書佐矣人才何常之有作之則振摧之則靡進之則前退之則却所賴上之人執其機耳天下善人少不善人多才者無幾不才者比比號名進士者珉中玉表有不才者矣郡縣之職今况不皆進士為之監生吏員出身常居大半而上復無以為作之進之之機采名不采實惟其出身之拘而不較其才使監生吏員出身者才者無以見其能而不才者遂無顧藉曰我非進士比空自苦何為於是受賂營私不復以承流宣化為事巧需酷算一毛不遺上司至則厚奉迎以寬指摘飾玩好以市姑息幸不失官則以嵗月廣為子孫地是監生吏員出身者無勸於前無懲於後幾何其不率天下而為不才之歸也如此天下之民何辜焉祖宗時其取人也廣其察之也核待之也一凡諸途出身之人參錯有位皆英英而騰蒸蒸而升有以自樹今乃風馬牛不相及一大府連數州縣分職數十員不數進士進士外乃少可旌異者考課之法不嚴而旌異之典有所偏之弊也臣愚欲乞今後巡撫巡按及布按二司分守分巡官凡遇所屬府州縣掌倅官員有政績超卓堪事數者分守分巡以呈巡撫巡按處事為核實奏聞旌異不以其出身之途而偏低昻之衡該部按其旌異者前後多寡遞擢用之不廢乎資格之循而無形迹之泥進士者將益有所激發監生吏員出身者亦將不肯自棄而砥行礪節蘄標榜於時流矣若復有曠職廢事害民者督之於考課於進士不以其名第加護於監生吏員不以其生平可憐而加貸也臣惟古今之考課道二一察其守一視其為守以廉為以能二者凡有官之最臣以為課牧民官者又在以得民心為本世有廉者未必能有能者未必得民心而民愛之者非有詬咻溫暖之政而無歎息愁怨之聲不能也臣故以得民心為考課府州縣官之最郡縣官員有廉者有能者有得民之愛之者旌異在部該部既按以擢用之又每嵗查照取其廉且能而民愛之者一人奏為髙第如漢故事陛下特降璽書奬諭以風天下不得民心雖文案無隙於照刷而旌異無所取使天下之為守令者知愛民是尚而循良之歸民將蒙庇受賜洊及於無外矣其二曰臣聞國初各處未嘗有巡撫官宣德間始以侍郎都御史為之時惟南直𨽻河南山西陜西有常置其他布政司詔遣有時一年二年而皆回今秩皆都御史除浙江福建外則皆有常置矣臣惟今之巡撫即魏之慰撫大使隋之宣撫大使唐之存撫安撫使也宋亦時命焉而今為重邊方領制置之權腹裏兼轉運之職手持敕紙以便宜行事三司屬其管轄數郡係以慘舒昔宋神宗謂文彥博等曰諸道使臣職任至重宜謹擇人久於其任彥博等對曰為治之要無以易此故熙寧元豐諸道使臣有久至十餘年不除代者勞效顯著則增秩賜金簡慢不職則削官奪賜乘驛入奏更互赴闕吕祖謙至著以為一代法今之巡撫視宋諸道使臣又為加重其人固不可不謹擇而久任之也臣切見吏部推各處巡撫都御史該腹裏會户部該邊方會兵部揣比停當而後上請親擇何謹如之然其受任往往不久人方與地宜而地莫能留地方德其人而人莫與處功垂成而來者交籍事未集而謀者巳易其又不然者屬府未及按部下情未及體悉六條未及舉刺庶務未及興革席未及暖而座巳非矣今制嵗差御史一員巡按各處若巡撫不久其任與巡按無異何復用巡撫為哉臣聞宋司馬光有言古者各守一官終身不易今居官者三年數月輒以易去望職事之修功業之成不可得也臣以今日觀之京官分曹列署寮寀稠沓似無不久任之弊至外官若不久其任即已不得究其用下不得沾其惠陛下欲行久任之道於外又宜從巡撫始近例巡撫官每年一次赴京議事然當議事之年多有以地方有事不果行者臣請即腹裏邊方為限腹裏三年邊方五年必須一次赴闕陛下親降德音詢問民瘼一以示其優異一以觀其底裏六部各奏其所行果有成績蕃錫而慰遣之其有不職科道得指實而論之夫巡撫擇其人於先而久其任於終於更互赴闕之際有增秩賜金之褒有削官奪賜之辱則彼之得久其任者必為有益地方以無負陛下者矣陛下他日股肱輔弼亦必多得人而不肖以徒手幸摶陛下之崇級厚祿者無有矣抑臣聞之巡撫官為撫治地方而設浙江福建乃獨無巡撫何也閩越地瀕海島番倭出沒未為無事賊首葉宗劉鄧茂七嘗據其地僣號稱王攻劫城邑哮噬無前至勤王師就勦血蹀通衢始獲制其死命以今視昔二省地方獨可忽乎湖廣鄖陽江西贑州今因流民不靖俱添巡撫官而所管地方連帶他省他省顧無巡撫可付責耶臣以為地方東牽西制下司難以奔命遵行贑州巡撫官可改専管江西彼鄖陽者非山西之延綏陜西之甘肅比可以裁革而江西福建二省不可以不添設也伏望陛下以臣此議下之該部酌而行之使大臣不孤巡撫之責各處俱得巡撫之惠其三曰臣聞古之明君所甚惜於名器者欲以奔走天下之人而礪世磨鈍也惜之故人不易得而得者以為重後世不知此爵祿混混源濁流濫茍一男子皆獲波及無所於擇肉視乳臭坐致人上視其名器不足為其重名器不足為其重而彼何德於上之有上以其法應與也與之下以其法應得也謂上與我者乃我故物雖得罪譴不足疵纇如此上之爵祿輕於糞土不足以為下勸矣此後世之任子所以識者致議於其時歟臣惟我朝祖宗立法凡文職大臣必立朝久勞勩茂名德隆者録其子孫一二以榮後裔出自特恩不為常例近年三品以上官始槩乞恩以子孫入監然亦有所裁節不至如宋任子之無謂使子任其孫孫又任其子也其武臣則不然父死子繼無子同産兄弟繼之無同産兄弟從兄若弟繼之又廣於任子之法蓋我太祖皇帝平定四海太宗皇帝肅清內難藉於武臣之力居多披堅執鋭推鋒破敵全一生於九死之餘惟其艱險故報之獨延長也今天下衛所巳定恆滿其位而後來之官往往倍蓰什伯不論事之難易功之大小例得世襲其中乃有身不臨陳徒以與參隨頭目之末而濫冒者所獲首級豈陳前手刃之賊或由其勢邀或出其貨取或得於尸戮守臣皆與奏報張皇功次繪無為有織虛成實該部雖經節行各邊禁約而弊端竟不少衰今之新任升有功之人要無祖宗時比者將不世襲之歟墮將士立功之心因噎廢食未見其可將世襲之歟繼繼繩繩無有限極車載斗量杷椎腕脫其如後來之冗何朝廷於此必有道以處之臣愚不能究竊願朝廷之惜名器也臣惟今文武途二食君之祿實一世襲既優諸武矣則法度之所繩於文武者豈容復異今問刑衙門文職犯贓必罷職枉法滿貫必充軍而軍職犯該監守常人盜賣犯侵欺枉法滿貫該絞斬者止降級調衛枉法不滿貫該徒流者止原衛帶俸犯均而罪不同科甚不倫臣質之律軍官有犯私罪該笞者附過收贖杖罪解任降等敘用該罷職不敘者降充總旗該徒流者發各衛充軍皇祖制律未嘗不與罪文職者等而刑官乃特遵近年條例近例又有載犯該竊盜掏摸盜官畜産白晝搶奪姦宿軍妻行止有虧敗倫傷化者俱發原籍為民子孫承襲噫敗倫傷化者罪死而得為民法巳弱於懲惡之典而其子孫即得承襲是其職特舉此付彼有為民之名無罷職之實其罪豈不且輕於降級調衛之不得即替者哉或謂降級調衛者猶存其職為民者其職亡矣職乃其先人之功所得職亡於其身故即承襲於其子孫以報其先人也湛恩汪濊固如是夫臣以為今之升世襲者不皆祖宗時開國佐命之舊至其罪又每從寬貰之其源不清其流不節爵祿益濫如之何名器之足為其重也乞敕該部計議今後各邊有警守臣上請興師勢果緊急該部即行文彼處出榜以示從征官軍臨陳若能奮先擒斬首級回轡之際徑赴鎮巡官處辨驗以俟具奏升賞其中官軍貧苦當升而願賞者鎮巡官辨驗明白厚與賞犒敢復奏報依阿為人首告及該部或彼處巡按御史異日廉察得出凡關節所通俱坐欺罔又乞該部會同法司議定軍職前項所犯罪名一斷以律成化年間事例不得引用仍通行各處問刑衙門知會有問該罷職為民者必候本犯身死方許子孫承襲其先人非開國佐命之舊承襲之日革去一級於原衛所帶俸差操庶幾彼知慮後不敢褻上之名器而來不檢之輕於蹈罪也其四曰臣聞民惟邦本故山附於地君附於民文王視民如傷非其民真有傷其心常恐其或傷耳陛下之民文王之民也陛下之心文王之心也深宫燕間念及天下其亦以民有或傷者乎周公告成王以文王之無逸曰懷保小民惠鮮鰥寡是文王以傷視民之實也陛下發政施仁惟其是而已天災流行時不皆太和天下不皆三登萬庾旱乾水溢何嵗而無民傷無瘳朝廷則有不盡知者臣以天下郡縣嵗凶荒處民稅糧有一毫不獲蠲免者有以知朝廷之不盡知也守令責在牧民民傷水旱彼宜不忍而彼有忍者矣臣切見嵗凶荒處耆老告報府州縣不敢謂實委官踏勘踏勘者返曰實始為申合干上司鎮巡等官鎮巡官不以為實委官踏勘踏勘者返曰實始為請命命下該部查例當行始為行文轉而下府州縣即其所傷分數以減征緩賦民其有速獲貸賑者乎凶荒之民枵腹待哺如涸轍之鮒望斗升水於旦夕猶不足以救而彼文書往復動經數月半年豈其所堪哉故今之嵗凶荒處耆老不以報告府州縣以無益也府州縣不以申合干上司鎮巡等官以無益也府州縣委官踏勘不過搔擾一番鎮巡官委官踏勘又一番擾到頭貸賑之及其濟幾何此守令之宜不忍於民者而亦有忍焉者也此天下之凶荒所以朝廷有不盡知而莫之救也凶荒而莫之救人如鬼臘突絶炊煙襁負相屬殣尸相藉誰與出涕無賴於此嘯召烏合必多盜賊業可生活者均之為害而有司催督租稅又門常胥徒身常枷棒良民且亦流移行劫矣臣以為九重軫念元元欲盡文王如傷視民之實宜及先事詔諭各官所治倘遭水旱凶荒年嵗該府州縣預委公正官一員遍厯田畝勘過分數明白開申鎮巡官處若係半災即將當年夏稅秋糧仰行照依所勘分數開除若係大祲即為設法處置仰分守分巡於該府州縣預備倉糧放支賑濟事畢取具委官職名及貸賑若干回報以憑奏聞毋拘常法必俟得命蓋古人權以救荒有為之者救荒之道宜速不宜緩速則骨肉之恩人人皆遍緩則排門散粥延街俵米而不及事漢謁者汲黯因視河內火過河南以民傷水旱遂持節發粟不顧矯制之罪今之鎮巡官行事於外非黯當時者類地方去京師逺權以救荒不為專也或謂朝廷誠降是令各處凡遭水旱不蒙賑則蒙貸廥廪何所儲民將有過稱凶荒者臣曰非也漢文帝自即位賜天下民租之半者再其後除之而不收者十餘年不為凶荒尚爾况於凶荒而可吝乎儲蓄者固上之所以為民也上惟無以他妄費冗食奚懼乎儲蓄之虧凶荒者水旱致然所謂有目者共見有耳者共聞者也其勢豈至於可欺哉其五曰秦開阡陌廢井田後世仍之天下遂有兼併之弊然弊之所為止民間貧富強弱之相形耳今乃有甚焉者其皇莊乎先朝畿內地空間籍之公家佃民種而收入其地廣狹有定界其入有定額非以病於民也近年看莊人役罔恤國體近莊田土小民衣食之資橫加侵占由尋及丈跨畝連蹊求益不巳在莊傍者産去稅存征科之及負纍賠辦富者以貧貧者何能安養民間馬牛羊豕或誤逸莊地即不可望得歸有以近莊故塜墓被其發掘屋廬被其拆毁者耕夫餉婦稍不退讓輒罹鞭捶噤酸忍痛敢怒而不敢言按巡之使過之而不敢問守牧之官即之而不敢直曰此皇莊無如何也然則九重厚民之意何自見之承平以來生齒日繁盡地力不足以給民食而莊地今廣於昔豈荒而待墾者莊賦今贏於昔不過掠之於無辜耳國家未得莊之利民間得莊之害已無端矣且皇莊之名臣愚有所未解天子以四海之富任土作貢豈此數莊為巳物耶昔漢景帝詔民徙寬大地宣帝詔池籞未御幸者假與貧民郡國宫館勿復修治流民還歸者假公田貸種食元帝亦以公田及苑振業貧民江海陂湖園地屬少府者以假貧民勿租賦今天下未有寬大地以便民者畿內之莊固公田也今縱不能以假貧民種食勿租賦可於民之所種食而租賦者奪之使民以貧乎畿甸咫尺不能無害民之地况逺於此者陂湖園池課程之類為王府所有者私蓄聚斂之臣各操漁獵之具而所在之民能無苦乎臣聞勳戚世族所得附京恩賜莊田家人亦有挾之以蠶食於他者軍民之不逞亦復以已業投獻權要恃為窟穴而他取償焉或投作陵户以嫁糧差附京如此在外王府之所認納宜又倍之齊民之姦治世之賊心之所營為害不資不可不嚴為之所也臣愚欲乞陛下敕該部官往勘皇莊地面從實丈量若軍民告認舊業鄰證有可執結割而歸之其莊占已久者收為本莊餘地地坐某府州縣則某府州縣就地起科佃民耕種止稱公田毋得仍作皇莊名目丈量已定造册繳部嵗收其入查該內外某衙門應用則付某衙門以備嵗費若遭水旱與民田一例開除既不失莊之賦亦不病治莊之民而畿甸之內無滋毒之疢矣該部仍通行各省有王府處陂湖園池課程之類係王府奏討者有司準此例嵗為送納租賦免致王府差人督取今後世族之家各行戒飭管業家人毋致生事軍民一應人等舊非陵户等户不許冒報及不許以巳業投獻權要及在外投獻王府敢復不悛及不行自首事發其業入官軍發邊衛充軍民發口外為民事干受獻者奏聞處置如此兼併之弊其甚者庶幾可去其六曰臣職司馬之屬竊檢軍政條例有以見我朝列聖之拳拳於軍政也我太祖皇帝武戡有元治不忘亂設為衛所養天下兵衛若干所軍若干荒陬絶徼所在充斥今經百三十年未嘗有大征伐以耗之也各處府州縣今皆有清軍官而又有欽命之御史上下相兼専以清軍為責其清出軍丁例僉批解軍丁到衛例存恤之府州縣清軍官清出數少者候考滿行黜解人縱軍在家延住及在道而賣放者併坐以軍衛所官旗哾嘬所管軍丁致其逃者降級調衛立法之密若此此外問刑衙門又有問發充軍之律清軍御史又有招募為軍之榜日積月盛是宜各該衛所伍符尺籍無所影射遷徙謫刺嵗有增添今視祖宗時額數乃五不存三七多亡四邊方腹裏一遇番替僅僅無餘何也臣知其故矣夫軍新舊相仍有抽充者有垜充者有配充者有投充者湠漫天下商出參隱不容齊一丁從衛所逃故則册從原籍清勾清勾不斷於遞年而逃故常虛於舊伍承平之生齒豈益減縮姦黠之徒或竄大户而易姓或贅婦家而避身或乘調他衛而遂脫宗或因流地方而遂變役軍固不易清也清軍官異境之人在任不久豈能備知本軍充調來厯里書作弊動曰挨無文册展轉屢煩敝紙千百之中幸得清出一二起解之際又非親丁得解親丁亦不得其正妻同解而去所解去者乃其義男女壻其臨期略買之妾婢耳此類到衛其有不逃者乎彼該衛所率去原籍數千百里逃而再勾率過數年勾而再解又出數年之外在逃三次於法應死彼輒執稱原逃不獲或稱巳死官司以人命至重往往不肯追究何怪乎逃故之常虗也其據律問發者官為押送沿路為防護際煙瘴逼沙漠筋攣藤糾制準實邊而邊卒不可實不徒其戍者之無生而且纍其送者之無還也其出榜招募者近能得幾正軍正匠及聽繼之丁在所不許彼蓬萍無蒂孰保收籍今之時非國初比土著素産孰願為軍此例之行虗名而巳此今之衛所所以軍不免於缺乏也國家大事莫大於戍列聖拳拳於軍政為之條例無非欲軍之盛為國家億萬年根本計而稽之衛所至不及祖宗時額數之半臣愚欲乞今日行所以安為軍者之道焉臣聞唐陸贄論鎮守之兵又曰非物理所愜不寧非人情所欲不固論選置鎮守之兵又曰必量其性習辨其土宜而總之以便於人情之一語今天下為軍者北人而南南人而北使其族姻永棄齎費不前僵顛於不可極之途而瘵於已至之域豈便於人情者哉是以軍户被清如剝膚軍丁被解如棄市原籍茍可埋沒遑恤其他衛所茍可在亡無虞厥後律示免死而人懷等死之心榜求報效而人不動自效之念也然則陸贄便於人情之一語其安為軍者之道乎今日所以安為軍者之道即贄之謂量其性習辨其土宜是已合無該部計議轉行各處清軍御史督同各該清軍官員將所屬府州縣軍户通對伍項文册清出軍丁係缺伍失勾及先年清出在官逺方不曽到衛者清理有次造册繳部略仿𢎞治三年題準改編事例將兩直𨽻十三省所屬府州縣區其衛所南北於南北仍各度其近逺南北近逺既定則查算其清出軍丁之數與之兌換使南解補南北解補北近及五百里逺止二千里此收則彼分豁彼收則此分豁行令天下衛所分豁之後不許再勾則密理能寒者不失燕代疏理能暑者不違揚粵風塵免其艱難水土易於諳服逃者將自行首官居者將樂然就役矣豈憂額數之不復乎彼各處問刑衙門所有問發人犯定擬衛分雖罪應發極邉亦宜分其南北俱拘連當房家小隨往斯不過逺以纍長行押送人役而本犯不致逃故行伍亦得其助若曰罪戍不逺無以警衆臣以為欲警衆庶當在遇赦不輕原也軍豈復借於招募乎軍户所巳清出軍丁户有不願行者令其户當二軍於本處或鄰近衛所注籍食糧差操其户餘丁照例優免彼安土重遷宜多有之是亦足兵之法也臣此議皆便於人情以安為軍者之道倘賜施行天下軍民幸甚臣之所得於道路者此六事其中亦有急於時者故終言之願陛下終聽之焉陛下聽斷誠果任委誠公羣臣將皆慫慂自效於陛下聽斷任委之中所興所革將萬萬於此矣此臣所以以果聽斷公任委為陛下勸也臣草茅蟣蝨至賤極微叨與生成敢忘覆載寸心有見妄瀆聖聰至萬餘言中猶絲棼陛下幸察臣愚愛君愛國無有他也臣不勝瞻天望聖俯伏屏息待罪之至為此具本親齎謹具奏聞伏候勑旨𢎞治十一年閏十一月十七日恤邊疏奏為陳言恤邊患以勵人心事臣𨽻官司馬凡軍國幾務皆得與知切見近日大同守臣奏報北人擁衆侵軼疆邑生靈無辜橫被荼毒皇上宵旰憂勤形於詔諭命將出師有監督有提督拳拳拯溺救焚之意軍馬錢糧處分甚􅊖臣憂同把人獨不能效一言耶臣按大同各路沿邊地方俱有營屯之地正統十三年該總督邊儲户部侍郎劉璉奏準將各該衛所旗軍所種田土著令自種自食不納稅糧景泰元年兵亂之後巡撫等官分撥屯田團種等項軍舍餘丁辦納子粒成化十三年又經踏勘田土官逐畝丈量在官增添糧草成化二十二年總督軍務兵部尚書余子俊又將新墾田土不分山坡溝澗悉與清出造册起科相沿至今設有山西按察司僉事一員専督其賦跬步之間無遺利矣而今值此大警沿邊地方若非受害之衝所在官軍亦係調征之數中間田土豈無荒廢臣聞北兵自大同右衛盤石嶺等屯搶至大同左雲川二衛城西北海子等各屯凡四十餘處男婦老幼殺虜大半頭蓄糧食蕩然一空副總兵馬升遇之於新城堡參將秦恭遇之草溝遊擊將軍王杲遇之於小村子張俊遇之於東荆莊官軍各有死傷而王杲全師幾覆張俊屹存孤旅伏尸流血遍於原野今計張俊奏報之後半月有餘此北兵衆未聞出境去訖官軍死傷又不知幾受害者撫循優恤朝廷之典具在固當舉行其不受害去處官軍巳經調征身命不保所餘妻孥孤寡無力間有餘下可恃者或因警駭散逾時始復春夏不及耕種秋冬必無收獲茍一切拘於常格謂此儲蓄收繫而嵗必取盈焉亦將何以聊生臣惟李牧之守雲中趙充國之屯金城即今屯田之制但取耕守相資初不重督之於賦也今大同之兵未及寧息將卒用命正惟其時皇上於出征調征官軍俱給銀兩布匹無非欲大施惠澤振作士氣前項田土既不可復李牧趙充國耕守之便顧當不思所以處之乎昔漢髙帝下令平城守城邑者終身勿租賦宋藝祖亦嘗詔攻城役夫與復三年我太祖髙皇帝凡大兵所過之地必赦免其稅蓋帝王解倒懸之仁政也臣伏願皇上軫念邊方特敕該部行移見差提督并巡撫等官備查前項地方田土所在何處係當受害之衝何軍係在調征之數何頃畝係荒廢逾時軍舍餘丁之家孤寡無力因警不及耕種查勘明白就將該年應納糧草與其分豁其舊有逋負者悉除之仍許明年糧草量為蠲免五分或三分以為軍裝之費若在邊儲蓄不足則於河東開中引鹽或多方措置以相輔助聖恩如此邊方將卒豈勝感激人心以勵士氣自倍視死如生瘡痍皆起只此一事未必非禦邊之策也臣冒昧陳言戰栗待罪為此具本親齎謹具奏聞伏候敕旨何文簡疏議卷一
