body:
  text: 何文簡疏議巻十明何孟春撰辨斥忠邪疏題為辨小人斥讒說以全大禮以保治道事臣等聞氣化有陰陽人生有邪正正為君子邪為小人時之方泰君子道長小人道消否則反是君子與小人不兩立也自古願治之君莫不願得君子而任之任之伊何聽其言也然君子事上動為匡拂之言小人在朝每託將順之説將順之説行則邪干正矣匡拂之言弗入則君子避小人矣自古所以治日少而亂日多者非願治之君少也願治之君不能知其臣之孰為正為邪孰為君子為小人也自古帝王莫聖於堯舜而書曰惟帝其難正邪之别君子小人之辨其果難乎書曰朕堲讒説殄行震驚朕師曰何畏乎巧言令色孔壬堯舜其既知之矣書曰有言逆于汝心必求諸道有言遜于汝志必求諸非道古之人欲其君之求知君子小人者其道如此陛下興維新之治丁方泰之時寤寐唐虞登庸賢俊盍亦其言之聽而察之逆于心而道焉必正也必君子也遜于志而非道焉必邪也必小人也邇者大禮之議邪正不同陛下聽言而求諸道與非道莫要於此今大禮則既成矣禮官與執政若九卿中及諸臺諫匡拂之言累千萬矣所謂逆于心之言者陛下亦嘗求諸道與否乎而二三小人敢為將順之説且𩔖招罷閒在下不學無耻之徒相與依附設鉤距以導諛聖意所謂遜于志之言者陛下亦嘗求諸非道與否乎何彼説之易行而臣等㑹議之言之弗入也臣等惟彼近日所陳自第一條至第十二條所以托諸將順而惑誤我皇上者不一而足而第六條言陛下只當稱皇考恭穆獻皇帝聖母聖皇太后亟去本生二字改稱皇伯考孝宗皇帝皇伯母慈壽皇太后得禮之當第十二條言新頒詔令决宜重改何其不顧綱常説之容易跡其大逆罪不容誅此臣等有死不敢聽聞者也而第十三條又有今日議禮朋黨之故之説臣等實竊懼焉宋歐陽脩曰士不忘身不為忠言不逆耳不為諫小人之讒忠良其説不逺欲廣害良善則不過指為朋黨欲動搖大臣則必湏誣以專權去一善人而衆善人尚在則未為小人之利惟有指以為黨則可一時盡逐至於大臣已被知遇而蒙信任難以他事動搖則惟有專權是上之所惡故須此説方可傾之臣等用是於大禮既成之後不得已而復有言焉而必每條為之辯者誠望聖明察之而知彼所持之説之欺妄也宋張方平言歴代敗亂之兆皆由朝廷立彼此之論而已彼此立則朋黨分朋黨分則勝負生勝負生則攻奪作攻奪作則敗亂之所以起臣等於此竊懼焉惟聖明察之早賜辨斥宗社幸甚天下幸甚為此合辭連名具本開坐謹題請㫖計開一其言古者天子無為人後之禮云三代以前天子無嗣者皆兄終弟及無立後之禮防姦臣利於立幼非社稷之福故商尚書凡兄弟相及者不稱嗣子而稱及王至漢成帝立定陶共王子為嗣宋仁宗又立濮安懿王子為嗣大儒朱熹有曰古禮之壞自定陶王時已壞了葢成帝不立弟中山王以為禮兄弟不得相入廟乃立定陶王葢子行也孔光以尚書盤庚之及王爭之不獲當時濮廟之爭都是不曾好好讀古禮見得古人意思觀此知古者天子無為人後之禮今議禮之臣畔古禮書强執陛下為孝宗皇帝後此欺妄一也以上通鑑前編并朱熹語錄存證前件臣等惟三代家天下以來父死子繼兄終弟及曰繼曰及父子兄弟傳位之名以别世昭世穆之異同爾漢孔光所謂及王本殷王傳位名也何知殷法兄弟相及者不稱嗣於其先君乎商頌曰嗟嗟烈祖有秩斯祜申錫無疆及爾斯所又曰顧予烝嘗湯孫之將此商之及王承嗣大宗之一證也漢成帝以兄弟不得相入廟舍中山而立定陶於是兄終弟及之典少見於世唐之敬文武三宗雖相繼而及然皆乘時搆禍立不以正宋太祖之於太宗初擬傳弟及子哲宗而下非所足論然則前代兄弟相及情文俱備未有若我武宗皇帝遵奉祖訓親挈神噐以授我皇上者也夏有天下傳十五世凡一十七君而以弟繼兄者二人仲康之於太康扄之於不降則兄終弟及之始也商有天下傳十七世凡三十君而以弟繼兄者多至十三人孔光所謂及王是也周有天下𫝊三十二世凡三十七君而以弟繼兄者猶五人焉前此議禮者謂三代宗祀之文今雖不可考見而凡嗣先君者未嘗不稱嗣未嘗不以臣道自處弟之於兄亦何異子之於父春秋書公孫嬰齊而曰仲嬰齊以弟而後兄也列國陪臣尚明此義况於有天下者胡氏傳以兄不可以子其弟以亂昭穆而謂弟不可以後兄不有春秋大事於太廟逆祀之説從祀先公復正之説臣子一例之説乎例以君臣之道而仍不廢其兄弟之名以亂昭穆之序固春秋之所予也漢周舉引閔僖二公事斷殤順二帝昭穆之序謂殤帝在先於秩為父順帝在後於親為子是亦以君臣例之有得於春秋之義矣宋劉原父釋從祀先公云陽虎惡季氏臣陵君猶僖公子先父故先正逆祀以㣲喻其意葢本子雖齊聖不先父食之説直稱僖為子閔為父而兄為弟後者亦以君臣例之於父子矣况弟為兄後者乎唐宣禘祭祀文於穆宗及敬文武宗皆稱嗣皇帝臣某昭告穆宗宣宗皆憲宗子敬文武宗皆憲宗孫而宣宗以弟於兄叔父於猶子前一皆稱嗣稱臣葢當時與其羣臣講明為人後之義弟之於兄叔父之於猶子以君臣例之與父子無弗同焉者君臣之分重兄弟叔姪之分輕也况兄有君道焉以命其弟者乎大儒朱熹謂古禮之壞自定陶不可嗣成帝也孔光不獲行其言而定陶立乃聽董宏冷褒叚猶之言而壞古禮也故即接云當時濮廟之爭都是不曾好好讀古禮見得古人意思為人後為之子其義甚詳熹謂為人後為之子其義甚詳者語其門人問古禮之本㫖也語錄存證如此所謂古禮者莫大於儀禮曰為人後者孰後後大宗也大宗者尊之統也諸侯及其太祖天子及其祖之所自出尊者尊統上卑者卑統下此可見古天子為後於大宗者重其統也又何知古者天子無為人後之禮乎而彼乃去朱子為人後為之子其義甚詳之語又去周公儀禮天子後大宗之文以欺陛下而謂今議禮之臣為畔古禮書為强執陛下為孝宗皇帝後為欺妄臣等不知其所謂畔古禮書者畔何古禮所謂强執陛下為孝宗後者何處見得强執其所具餘條妄注某書存證大抵𩔖此皆是借證刪截文飾其自欺妄之詞爾此其人之欺妄一也一其言祖訓天子無為人後者云祖訓凡朝廷無皇子必兄終弟及須立嫡母所生者曰必兄終弟及則不立後可知曰須立嫡母所生者則倫序可知葢兄終弟及國有長君社稷之福立嫡母所生嫡長無嗣則立次嫡弟之嫡長不可奪者此太祖髙皇帝眞稽古三代之禮以垂萬世之法者也今禮官所强執陛下為孝宗皇帝後不惟畔古禮書雖髙皇帝訓亦不之遵此欺妄二也以上祖訓存證前件臣等伏惟我皇明祖訓之意朝廷既無皇子則親莫親於同産兄弟故必用殷法兄終弟及而兄弟間有嫡有庶故又須立嫡母所生者使庶不得以干嫡嚴定分以遏亂源也而彼乃言不立後可知何所䝉也朝廷親弟先帝次子先帝本統不移旁支安用立後改其私親之禮陛下入繼大統乃孝宗皇帝親弟所生之嫡武宗皇帝無皇子無親弟而倫序之當立屬在陛下武宗遺詔實載此言何由彼又於此曰倫序可知也彼言嫡長無嗣則立次嫡弟之嫡子不可奪者就孝宗視陛下也豈非所當後於朝廷者乎國有長君社稷之福是宋杜太后臨終命其子太祖之語太祖舍子傳弟及後太宗問所立於其臣趙普普曰太祖已誤彼引之欲何如祖訓兄終弟及明云朝廷無皇子如前日武宗之不幸是也若有皇子子自當繼祖訓豈欲聖子神孫蹈宋之誤而彼乃敢厚誣制書輙犯朝廷所宜深忌諱者以欺陛下亦何忍也臣等切詳彼前一條首云三代以前兄終弟及無立後之禮防奸臣利於立幼非社稷之福也此又引杜后語云國有長君社稷之福其意不在議禮必他有所附會前此臺諫劾其所奏主闇弱而臣强之説不過欲離間陛下君臣之情自為希圖富貴之計葢見其肺肝矣彼意在此而不覺其言之隱切至此極也或曰彼嘗上言堯舜傳賢及三代傳弟而多興矣彼嘗曰堯以不得舜為憂舜以不得禹為憂而不憂失天子之祀矣臣惟舜之嗣位格于文祖是堯之廟天子之祀不絶堯又有丹朱為子延及漢髙尚曰堯之苗裔也禹之嗣位受命於神宗是舜之廟天子之祀不絶舜又有商均為之子延及虞思陳胡公之屬也堯舜何嘗曰吾之嗣不必繼而天子之祀可輕乎堯舜禹異姓而禪受者也舜格于堯曰藝祖而瞽瞍之名猶夫故也禹受于舜曰神宗而伯鯀之名猶夫故也何嘗推尊若今日之盛乎彼之歴指𫝊弟而興者太戊盤庚二君外率是牽合儒先嘗謂仲丁以來更立諸弟比九世亂諸侯莫朝宋宣傳弟而穆公逐子殤公殺身呉諸樊餘祭夷昩兄弟次𫝊以啟僚光簒弑之禍亦可以言興乎自禹至今傳子興者何止千萬獨不可舉以為言乎據其所言祖訓兄終弟及廼為取法帝王則以父子相繼為非可法者矣大位當以傳弟為是皇上聖子神孫萬世承統將欲以傳子為法乎將以傳弟為法乎如前日之事武宗之幸乎亦大不幸乎此不得已之事而彼每舉為皇上告意欲何如魯莊公將死召季子授以國政曰吾將焉致乎魯國季子曰般也存何憂公曰牙謂我曰魯一生一及君已知之矣慶父也存季子曰是將為亂夫何敢於是季子召叔牙酖而殺之彼軰自犯滔天之罪而不自知陛下誠一思及而問彼不道之罪萬死有餘戮矣髙皇帝稽古三代之禮以垂萬世之法陛下之所深鑒有在凡我臣子莫敢不服若為人後禮髙皇帝已定于孝慈錄孝慈錄序曰朕觀前代之君好内山林之士暴貴其身致君牽制文義優游不㫁於是制為五服為人後者為所後父母謂之正服為其本生父母謂之降服為其兄弟及姑姊妹謂之義服此明訓具在也而盡背之而謂今禮官必强執陛下為孝宗皇帝後為畔古禮書為雖髙皇帝訓亦不之遵不知其誰畔誰不遵乎彼於祖訓且加厚誣而况於他書有何書是其證據此其人之欺妄二也一其言與為人後者孔門所鄙云天子諸侯自古皆無為人後禮末世諸侯之大夫以下始有與為人後者昔孔子射於矍相之圃使子路延射曰僨軍之將亡國之大夫與為人後者不入此可見為人後者孔門之徒所深鄙今議禮者不以陛下為入繼大統之君而忍比與為人後之例如閭閻中乞養過房子一般何哉况古禮族人以支子後大宗實大夫士之禮未聞以臣下敢執天子為人後者此天地之變古今之異事此欺妄三也以上儀禮禮記射義存證前件臣等惟為人後者之説見儀禮喪服篇為人後者為之子之説見春秋公羊髙𫝊儀禮周公所制禮也公羊髙實子夏弟子子夏實聖門髙弟髙此言與禮經合其傳授有自而矍相圃之射擯與為人後者儒先訓與為人後者宗子死無子族人以支子為後矣此非其近屬因有所利復求為之忘親之人故可擯孔子非擯為人後者也使無為人後之禮則家語亦在所不載矣為人後者若擯於孔子是人不可為人後也大宗或絶人不得後大宗也不後大宗是有父而無其祖也不知尊祖則不知嚴父其無綱常大矣孔子夢周公且從時制者儒先故謂孔子非擯為人後者也儀禮𫝊為人後者也孰後後大宗也大宗不可以絶族人以支子後大宗也然則適子不得後大宗其有支子在也漢戴聖曰大宗不可絶言適子不為後者不得先庻耳族無庶則當絶父以後大宗魏田瓊晉范汪並同此議而大儒程頤亦曰無兄弟而繼統之宗絶亦當繼禮雖無文可以義起以此見大宗不可絶也此前日陛下入繼大統之事也為人後者為之子陛下繼體先帝持重大宗死服祭𦵏生事者稱謂四年于兹矣為後於天子者然後得有其天下為後於諸侯者然後得有其國為後於卿大夫士者然後得有其家何也後大宗也陛下為後於天子者也天子者父天母地之宗子也自古帝王無嗣諸侯入繼大統未有不明為人後之義者也繼其大統系者承其宗祀此為人後之義也霍光迎立宣帝議曰禮大宗無嗣擇支子孫賢者為嗣孝武皇帝曾孫病已可以嗣孝昭皇帝後魏明帝詔曰擇建諸侯以繼大宗則當纂王統而奉公議豈復顧私親哉又曰後嗣萬一有由諸侯入奉大統者則當明為人後之義宋司馬光修資治通鑑前代詔書惟此特錄全文以章示萬世頃歲禮官已嘗隨奏呈御覽矣陛下奉武宗遺詔遵祖訓為入繼大統之君于今四年凡有血氣莫不尊親而况議禮者在廷之臣也而彼乃有不以為入繼大統之君而忍比與為人後之例之説無乃故為是躗也乎禮族人以支子後大宗指大夫而下彼謂後大宗大夫士之禮也遂謂諸侯天子無宗法天子諸侯無為人後之禮殊不知禮者道其常而已天子一娶十二女諸侯一娶九女所以廣繼嗣若道其常豈有無後而以小宗為後者然而有不得其常者繼有天下之宗子無嗣無同産弟而可無為天子後者乎旁支固未有不後於天子而有天下者也此儀禮之所具載以為天子及其祖之所自出而大宗之統即宗法也禮無生而貴者雖天子諸侯之子茍不命於君父則上無所承下無所受何以成其尊也諸侯雖有世子必請命天子而後立故曰未有諸侯而不之王諸侯無子其立後在天子所不必言矣且大夫宗子收族者也尚必以支子後之諸侯一國之宗天子天下之宗而可以云無為後之禮乎彼只有見於適子不得為人後而不知宗子不可以無後此程頤所以有義起之説也詩曰宗子維城天子之宗也春秋𫝊曰鄫取莒公子為後諸侯為後之證也但其立異姓為可罪耳彼謂為人後與閭閻過房乞養一般夫閭閻小人之所為本立異姓之子也而卿大夫以上明於宗法則同姓同宗之子也故曰禽獸知母而不知父野人曰父母何算焉大夫及學士則知尊祖矣諸侯天子則知尊其太祖及祖之所自出也陛下之于孝宗同姓而非異姓同宗而非異宗也孝宗有陛下為之子則大宗之統不絶也武宗有陛下為之弟則大君之統不絶也詩曰君之宗之此之謂也而彼乃指斥乘輿比之為乞養之子以激陛下之怒是可忍也孰不可忍也漢宣帝嘗詔議故太子謚有司奏曰禮為人後者為之子成帝議宜為後者翟方進等皆以為禮曰昆弟之子猶子也為其後者為之子哀帝欲為定陶共皇立廟京師師丹曰為人後者為之子光武時宗廟未定張純朱浮奏禮為人後者則為之子既事大宗則降其私親唐陳貞節告𤣥宗宋張齊賢告眞宗司馬光范鎮吕誨等告英宗皆引為人後者為之子之説而彼乃言未聞以臣下敢執天子為人後者而謂今議禮者為天地之大變古今之異事無乃其自謂乎此其人之欺妄三也一其言陛下實入繼大統之君云武宗皇帝遺詔云朕皇考親弟興獻王長子賢明仁孝倫序當立迎取來京嗣皇帝位謂之嗣皇帝位是繼武宗皇帝之統初無為孝宗皇帝之子之説至陛下登極始變其説以陛下為孝宗之子繼孝宗之統使陛下違武宗皇帝之詔背獻皇帝之恩遂至父子君臣皆失其道此欺妄四也以上迎立之詔書存證前件臣等仰惟陛下實入繼大統之君已具陳於前議禮者三四年間言之已詳統與嗣之為繼非有二也武宗遺詔迎取陛下來京嗣皇帝位不但曰倫序當立而必曰朕皇考親弟興獻王長子賢明仁孝倫序當立者孝宗皇帝莫親於獻皇帝而武宗皇帝莫親於陛下也詔内親之一字親陛下也長之一字長陛下也賢之一字賢陛下也以親以長以賢皆在陛下而皇祖有訓兄終弟及則陛下倫序當立以後大宗繼大統天與而人歸矣彼乃稱引遺詔倫序當立嗣皇帝位為陛下繼武宗統無為孝宗之子之説何也近有為大禮設問者曰遺詔無為後為子之文今可强為後乎遺詔固嘗曰倫序當立也曰嗣皇帝位也曰立曰嗣也何也立也者立後也嗣也者為人後也其嗣一也何以謂之無文且持重於三年死服祭𦵏生事者稱謂於三年矣乃今欲抵其隙而背之邪為此答者葢為邪説而發者彼謂陛下登極之日始變其説以陛下為孝宗之子繼孝宗之統乃我太祖髙皇帝之統也大宗之統也而𫝊於武宗武宗之統豈有異孝宗之統乎武宗遺詔視陛下為同産弟陛下被命迎取時天下臣子其誰弗慶之親之長之賢之以繼先帝以奉大統者陛下當天與人歸之期其自知而信矣在廷之臣與勸進者有變於武宗之遺詔者乎或曰彼嘗有繼統不必繼嗣之説矣夫天子以天下萬世為心固重於正統也然自家天下以來禹湯文武皆𫝊之子不以為非安得謂嗣不足重也若云只要帝王之統不絶則如湯之于桀夏之統不絶武王于紂殷之統不絶漢髙祖於秦唐高祖于隋宋藝祖於周元世祖於宋我太祖髙皇帝於順帝皆謂之繼統可也皇上奉先帝遺詔入繼大統而謂之不必繼嗣只是繼統彼欲皇上比於湯武可也將置先帝於何地也禮官與進言之臣望行於初政者仁之至義之盡矣而彼乃謂使陛下違武宗之詔背獻皇帝之恩遂至父子君臣皆失其道何其心之倒而言之悖也此其人之欺妄四也一其言禮官以陛下稱孝宗皇帝為皇考慈壽皇太后為聖母恭穆獻皇帝章聖皇太后為本生父母者非禮云儀禮喪禮篇云為人後者傳曰何以三年也受重者必以尊服服之又曰為人後者為其父母報傳曰何也不貳斬也夫於所後父母服三年名曰重於本生父母服期年同於伯叔父母名曰輕今孝宗皇帝本陛下之伯慈壽皇太后本陛下之伯母反稱之曰皇考曰聖母而為重焉獻皇帝本陛下之父章聖皇太后本陛下之母反稱之曰本生皇考本生母而為輕焉輕者反重重者反輕議禮之臣亦各有父母者試以其身處之於心安乎此欺妄五也以上儀禮存證前件臣等謹按儀禮喪服為人後者傳曰何以三年也受重者必以尊服服之何如而可謂之後同宗則可為之後何如而可以為人後支子可也為所後者之祖父母妻妻之父母昆弟昆弟之子若子孫為所後者之兄弟之子若子若子者以言乎如眞子也若非眞子何服斬之有又為人後者為其父母報傳曰何以期也不貳斬也何以不貳斬也特重於大宗者降其小宗也夫治親疎貴賤之節惟喪服足以盡其詳何也稱情而立文也故曰三年者至痛極也非父母不足以當之至於期而謂之曰報則有所間矣執父母之喪則父母之未有執期之喪而猶以父母者此則所後所生之别百王之所同古今之所一不可易也然儀禮於本生有父母之云司馬光則以為立文宜爾胡寅則以為假曰父母以明當降降則不可名父母矣彼之所引者此也而曰於所後父母服三年名曰重於本生父母服朞年同於伯叔父母名曰輕豈非彼釋經之㫖邪彼嘗蹈襲宋歐陽修濮議謂為人後者為之子非聖人之言禮喪服記為人後者為其父母報是所後稱父母無改稱伯叔之文而今乃為此言既言稱所後為父母者為非又言稱所後為父母者為是此近獻議者所以謂彼天奪之魄者也從前言之則曰天子無為人後之禮此又引所後之文何其自相乖僻如此非天奪之魄而使之然乎禮記曰自仁率親等而上之至於祖名曰輕自義率祖順而下之至於禰名曰重固有宜不宜也夫絜重揆禮在陛下誠宜率祖之秋也彼前之名曰輕曰重者葢竊乎此而為之言者也彼前謂所後為父母本生父母為伯叔父母於儀禮雖未有明文而有宋大儒程頥司馬光等曾言之則今日禮官與建議之臣所執之正義也而彼又謂今孝宗本陛下伯慈壽本陛下伯母反稱之曰皇考曰聖母而為重焉獻皇帝本陛下父章聖本陛下母反稱之曰本生皇考本生母而輕焉彼之云重焉輕焉者承其名曰重名曰輕而言也而其言又若此輕者反重重者反輕其於前言不侔甚矣此其人之欺妄五也一其言陛下只當稱皇考恭穆獻皇帝聖母章聖皇太后亟去本生二字改稱皇伯考孝宗皇帝皇伯母慈壽皇太后得禮之當云唐𤣥宗稱中宗為皇伯考宋真宗稱太祖室曰皇伯考妣及伏讀祖訓凡親王若天子之姪則稱天子曰伯父皇帝陛下叔父皇帝陛下生可稱伯父死獨不可稱伯考乎今陛下本以倫序入繼大統於孝宗皇帝宜生稱伯父死稱伯考今禮官以為廟中無伯考之稱棄禮書背祖訓此欺妄六也以上祖訓并文獻通考存證前件臣等惟本生二字誠古禮書所無者獻皇帝章聖皇太后胡為乎有本生之稱稱本生者蓋陛下恭愛之心無有窮已必欲尊稱獻皇帝曰皇考尊親章聖皇太后曰皇母而重違在廷之議而加本生字以别于入繼之大宗此實禮之以義起者也非禮官之所敢擬者也獻皇帝始尊曰興獻帝繼曰本生皇考恭穆獻皇帝章聖皇太后始尊曰興國太后繼曰本生聖母章聖皇太后其為崇隆自古之所無也漢髙祖尊太公漢宣帝尊悼考光武尊南頓君皆不曰皇帝哀帝尊定陶王曰共皇安帝尊清河王曰孝德皇桓帝尊蠡吾侯曰孝崇皇靈帝尊父曰孝仁皇皆不曰帝禮官與執政以陛下孝情所廹而將順以至此極也其亦可以愜矣陛下始當未愜之時彼因進謂執政留一皇字以待而謂百皇字不足以易一考字而陛下遂深信之以至此也獻皇帝嘗為武宗之臣初省一字欲有所别尊無二上之義今於皇考上加本生字欲有所别禮無二考之義宋王曽所謂稱權猶足示後者禮官與執政於此甚非得已者也皇上愛親雖有無窮之情亦有不得自盡之情人臣事君雖有必從之義亦有不容曲從之義而彼每進危言以激聖怒何忍乎陛下於孝宗皇帝稱皇考於祀文於慈壽皇太后稱聖母増徽號於册寶而詔示天下者四年於兹今欲改稱皇伯考伯母義豈安乎近有為大禮問者曰夫義惟時之從故禮門内之制恩掩義門外之論義斷恩且已受詔於武宗曰君已受迎立於昭聖曰母已後於孝宗曰考綱常在此而不在彼也而又欲改於四年之後乎嗚呼孝宗上賓于天已二十年稱之為考不知已改之為伯考不知已而彼忍為是言乃累疏而求必遂也昭聖后在上彼前此累疏尚未誦言改為伯母而今得並言矣彼固知前言之可啖也昭聖既改為伯母章聖當母儀天下而昭聖凡百理當回避天下表章俱應停革皇上可以安乎章聖可以安乎彼必曰是則姑仍其舊古今天下豈有母后在上而又使伯母母儀之理乎彼嘗謂奉迎章聖既至子為天子不可以臣妾之禮事人獨不念昭聖夫為天子十八年子為天子十六年為皇上之母又四年可從降禮以事人乎彼於此必又變其説曰孝宗雖伯有祖道焉則昭聖有祖母道焉臣恐昭聖之不能以祖母而自處也何也不得為母故也其名實已異也陛下雖欲如前尊上禮節之行先昭聖而次章聖亦有所弗可也彼為是言者非先帝之臣子乎而忍負先帝至此欲望其忠于陛下得乎彼謂唐𤣥宗稱中宗為皇伯考宋眞宗稱太祖室為皇伯考妣而謂陛下當稱孝宗為皇伯考也事果𩔖歟𤣥宗真宗之稱於中宗太祖者果可法歟春秋之義臣子一例不以親親害尊尊也晉元帝有事於太廟鍾雅奏景皇帝不以伯祖而登廟稱伯祖不安詔從之𤣥宗時太廟壞孫平子上言臣繼君猶子繼父孝和宜遷還廟何必為禮下同魯晉陳貞節蘇獻等不以為然平子援經辯數分明獻等不能屈而蘇頲右博士諸儒以平子孤挺見迕於禮官不平其公議者在也真宗時張齊賢等定廟祀言天子絶期喪宗廟中安得有伯氏稱唐朝五代有稱者禮官之失請自今有事太廟有太祖室宜稱孝孫太宗室宜稱孝子而其説不行眞宗既伯太祖則宜自稱姪而終其世猶稱孝子是其當時不能自安之情亦可見矣且夫𤣥宗眞宗所以伯中宗太祖者睿宗嗣中宗𤣥宗有睿宗為之考太宗嗣太祖眞宗有太宗為之考睿宗太宗嘗為天子矣太廟有考能承大宗統矣獻皇帝未嘗纘承正統而陛下特起嗣武宗位為是武宗後不假言者弟於武宗則子於孝宗不假言者子於孝宗而伯之稱焉可乎而可使太廟無考廟乎禮記祭法王立七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟逺廟為祧有二祧此天子之七廟也祖訓凡親王若天子之姪則稱伯父皇帝陛下叔父皇帝陛下為進賀表箋言也而何嘗謂入繼大統之君上承大宗之統而可稱伯考於廟祀乎夫自家天下以來宗藩入繼者多矣惟元魏孝莊昩於禮故敢稱髙祖為伯考其臣臨淮王彧表諫以為髙祖之於聖躬親實猶子陛下既纂洪緒豈宜加伯考之名歴觀載籍未有此事元魏之後中國之君豈復有此事乎而彼乃敢為是言而謂今禮官為棄禮書背祖訓此其人之欺妄六也一其言陛下宜别為獻皇帝立廟京師云漢宣帝别為父史皇孫立皇考廟漢光武别為父南頓君立皇考廟禮也又按漢哀帝追尊定陶共皇帝立寢廟京師序昭穆儀如孝元帝葢成帝曽立哀帝為子故師丹以為不可者以共王為本生父故也今禮官强執陛下為孝宗皇帝子比之定陶王為成帝子以獻皇帝為本生父故來邪説紛挐此欺妄七也以上文獻通考存證前件臣等切惟漢宣帝嗣昭帝後昭帝其祖也得考史皇孫然止謚曰悼其廟止是因園為寢有司奏為人後者為之子故降其父母不得祭魏相又請園毁不修漢光武起於匹庶蕩滌天下名為中興實同創革及立親廟張純朱浮亦以為為人後者為之子既事大宗則降其私親親廟不合禮意設不遭王莽推求宗室以陛下繼統者安得復顧私親違禮制乎純等謂繼統者不顧私親葢既事大宗則降其私親也純等葢明於繼統之義者也又謂宣帝以孫後祖不敢私親故為父立廟獨羣臣侍祠今宜除親廟以則舊典戴涉等議宜以宣光以下代今親廟於是南頓君立廟於章陵亦獨羣臣侍祠而已宣帝於悼考無兩考嫌光武取天下於既絶身復漢祚豈太平入繼之可比而為其臣子議禮如此二帝俱能從之所謂禮者是否自有在也漢安帝於孝德皇清河嗣王奉祀而已桓帝於孝崇皇博陵置令丞奉祠而已晉元帝於恭王以皇子琅邪王嗣而巳宋英宗於濮安懿王以濮國公主祀而巳安等諸帝雖不可比宣帝光武猶為不盡棄禮惟是定陶共皇立廟京師以後桓帝有烈廟靈帝有奐廟萬世下有議及此未嘗不唾罵冷褒段猶等之作俑也而彼引此文有共皇帝稱又有序昭穆儀如孝元帝之説何所考見是欲爭附褒等而妄尊奉乎徃代以誘今日也彼嘗奏乞今日必父其父以法堯舜而欲别立廟反導皇上於哀帝桓靈之間獨何心哉為子為本生父之説臣等已詳於前無復用辯大内之奉慈殿緣周人有祀先妣之典漢宋因之孝穆太后之祀援此為例故為有據今日事非所倫也程頥嘗言神道不遠人情獻皇帝上視孝宗武宗為君為兄憲宗以上為父為祖其親且尊皆如皇上之於獻皇帝皇上之孝事如生存儼然在上設若同期宴會獻皇帝獨專一室以私子養乎皇上兼事二宗誠敬必有所分九廟神靈其享誠敬不專之祀乎是致獻皇帝於父祖君兄不得為孝且敬也而皇上於獻皇帝又得謂之孝乎今觀德殿已當落成獻皇帝神主奉迎將至揆諸典禮雖巳過情而陛下則為至孝彼之言則既行矣而又嘵嘵焉誣禮官為强執何其怙恩而求勝也此其人之欺妄七也一其言禮官以陛下比宋濮王事體大不相同云宋濮安懿王允讓第十三子初名宗實仁宗未有嗣取宗實入宫命曹皇后拊鞠之年方四歲親命學士王珪草詔立為皇子養之宫中二十八年與陛下不同况仁宗立濮王子為嗣大儒朱熹已曾并定陶王事論其壞禮今禮官牽合以比陛下此欺妄八也以上通鑑存證前件臣等查得禮官初議引宋英宗以濮安懿王子繼仁宗後而載其當時司馬光等之奏與程頥代彭思永之奏以為今日之事興獻王於孝宗為弟於皇上為本生父亦猶濮安懿王之於仁宗英宗皇上宜稱孝宗為皇考改稱興獻王為皇叔父興獻大王興獻王妃為皇叔母興獻大王妃及奉再議至五議俱不敢違前説乃得奉勅尊本生父為興獻帝本生母為興國太后比因彼續有所奏奉議至再多係前説又奉勅尊興獻帝為本生皇考恭穆獻皇帝興國太后為本生聖母章聖皇太后而彼乃又奏此臣等切惟陛下之入繼與宋英宗事其跡若異其義實同彼謂陛下未嘗以宗室子入宫為孝宗所養育有異於英宗此以跡言之而若異者也禮官謂前代選立旁支或先俾主震器於生前或遂令主宗祧於身後非謂生前為子者可為人後身後入繼者不為人後也向使英宗未嘗育于宫中未嘗爵為皇子仁宗既沒曹太后始援而立之以繼仁宗則英宗遂可不考仁宗母曹太后乎仁宗在位乆垂老而無子乃預立英宗為嗣其他中道崩殂而無後者皆不及預立而入繼其統者皆曰吾未嘗親受詔而為之子吾自繼統非為之後也其説得乎此以其義言之而實同者也近者建議為人後者曰按晉杜瑗曰夫所謂為人後者有先之名也言其既沒於以承之耳非竝存之稱也子夏曰族人以支子後大宗明為人後者實宗子已沒而族人立之非宗子存而立之也以是言之仁宗養英宗於宫中乃立嗣耳及仁宗崩而英宗繼統斯應為人後之禮也故生前為子者但曰立嗣而身後入繼者始為人後耳彼謂孝宗未嘗命陛下為子因曰非為人後者此正不知為人後之義也臣等愚意此義比之禮官所言尤為明白宋朝宗室皆在京師非如今日分封外服故可擇為預養仁宗嘗告其臣曰宫中養一子其後只立宗實為嗣若論養育則其同養而不得立者亦可謂之為後乎向使仁宗立皇子後或親生有子天下必歸所立皇子乎亦必歸所生子乎然則所立皇子亦未可即謂之為人後者明矣故當時司馬光請建儲疏亦曰大宗無子則小宗為之後者為之子也願陛下擇宗室賢者攝儲貳以待皇嗣之立退居藩服宗實被命為皇子將入宫戒其舍人亦曰謹守吾舍上有適嗣吾歸矣彼乃謂養育與親立為後而身後入繼不為後者真坐不知為人後之義故也今人有生三子而其長子死焉者次子三子豈不可為父後而長子之子持三年喪謂之承重代父為後也庶子雖叔而不得主父祭長子之子雖姪而得主祖祭孫死而孫之子亦然故謂之為後皇上既主孝宗武宗之祀而可謂不為之後乎朱子曾幷定陶王事論古禮之壞者見其語錄答門人濮議之問曰歐陽修之説斷不可且如今有為人後者一日所後之父與所生之人相對坐其子來喚所後父為父終不成又喚其父為父這自是道理不可試坐仁宗於此亦坐濮王於此使英宗過焉終不成都喚兩人為父只緣衆人道是死後為鬼神不可考胡亂呼都不妨都不思道理不可如此先時仁宗有詔云朕皇兄濮安懿王之子猶朕之子也此甚分明當時只以此為據足矣亞夫問古禮自何時壞起曰自定陶王時已壞了葢成帝不立弟中山王以為禮兄弟不得相入為廟乃立定陶王葢子行也孔光以尚書盤庚殷之及王爭之不獲當時濮廟之爭都是不曾好好讀古禮見得古人意思為人後為之子其義甚詳已上語錄之所載也而彼乃謂仁宗立濮王子為嗣大儒朱熹巳曾幷定陶王事論其壞禮則是彼全不識文義見得大儒所論壞禮處也而敢靦顔以論大禮而謂禮官牽合以比陛下近日進言者所以謂其天奪之魄而無亷恥者也此其人之欺妄八也一其言陛下宜迎獻皇帝神主至京入别立新廟云古者遷國載羣廟之主以從禮也今禮官以為史籍並無遷主之事此欺妄九也以上禮記曾子問存證前件臣等惟彼之所引者遷國載主之禮是謂本為天子如盤庚遷都及為諸侯而遷國者非謂今日以旁支入繼大統為天子者也若如其言獻皇帝分封已越數世有繼别之宗有繼禰之小宗或陛下更有親弟迎使既至陛下以宗社為重必須受命而親弟當嗣王爵為獻皇帝後無疑陛下自不得而考獻皇帝矣獻皇帝神主在廟有嗣王共祀又將何如前此禮官謂安陸陵園當立嗣王共祀禮也彼乃比於古者遷國之事謂獻皇帝神主宜迎至京而又知萬萬不可以入太廟而欲别立新廟祀之其非禮無稽自可見矣此其人之欺妄九也一其言陛下入繼大統遵高皇帝祖訓不當輙稱慈壽皇太后懿㫖云伏覩祖訓凡皇后只許内治宫中諸等婦女宫門外一應事務毋得干預况立君繼統實遵太祖髙皇帝兄終弟及之訓慈壽皇太后固不得專制干預者也今禮官輙䧟慈壽皇太后違祖訓以干預外事此欺妄十也以上祖訓存證前件臣等仰惟祖訓此言見内令第四條禮記所謂聽天下之内治者也而彼引之言陛下入繼當遵祖訓不當輙稱慈壽皇太后懿㫖然則慈壽懿㫖其有弗遵祖訓者乎臣等伏讀武宗遺詔朕皇考親弟興獻王長子賢明仁孝倫序當立已遵照祖訓兄終弟及之文告於宗廟請於慈壽皇太后即日遣官迎取來京嗣皇帝位欽此繼立大事也武宗以告于宗廟八廟之太皇太后孝宗皇帝在天之靈實聞之聖母存焉則不當請之而使聞之乎請于慈壽而即日遣迎是慈壽之尊祖訓也既而慈壽懿㫖云皇帝寢疾彌留已遵奉祖訓兄終弟及之文告於宗廟即日遣官迎取興獻王長子來京嗣皇帝位君臨天下一應事務俱待嗣君至日施行欽此然則慈壽何嘗敢違祖訓以干預外事乎而禮官又何嘗有䧟之之事乎懿㫖豈禮官之與定者乎天下太祖高皇帝之天下也法度亦太祖高皇帝之法度也若無所本不敢創立祖訓謂朝廷無皇子必兄終弟及此子孫萬世守以為法度者也彼嘗謂武宗皇帝無子又無親弟獻皇帝在則實為孝宗皇帝親嫡弟倫序當為天子以及陛下故皇帝皇考皆當追稱之者設使武宗彌留之際獻皇帝無恙先帝遺詔母后懿㫖廷臣集議咸以祖訓初無以叔繼姪之文止迎陛下而獻皇帝方命不遣曰是倫序當我乎立可不可也陛下亦曰吾不知有天下只知有吾父吾為父後不得去本國卒不受命可不可也又或其時有陰姦如彼者而在執政之位倡議獻皇帝止生一子不得為人後聖母之意别有所屬孝宗諸親弟尚有在者先帝之兄弟行者又不止數十人陛下果如彼説直以祖訓為辭不用詔㫖而自謂當立可不可也今日神器必歸眞主雖皇祖之訓先帝之遺詔固聖母之意也英廟之復辟也孝恭太后懿㫖實行中外而彼欲絶陛下大宗之恩謂武宗無與焉聖母不得干預焉者欲陛下之不母之也是何心哉陛下之心其亦然之否乎或曰彼嘗有正名之説矣即如其言謂獻皇帝在必為天子武宗為君獻皇帝為臣萬世定分將謂以武宗為姪皇帝而可乎又如皇上在藩邸臣也今日君也天下親王伯也叔也兄也伯叔祖父也今日皆臣也兹亦得謂之正名而不可改乎夫天下有名有實固有實存而名亡者亦有名存而實亡者去實全名正名統實聖賢道名分之大法也陛下不得考獻皇帝者名也然一日離潛繼統獻皇帝即為天子之父章聖皇太后又享天下之養是父母之實也子孫萬世克守宗祧陛下之後即獻皇帝之後是有天下之實也獨不念所以致是者非由武宗遺詔乎孝宗君臨天下十有八年深仁厚澤士民思之至今垂涕武宗遺詔降而陛下入繼天下萬國翕然仰戴亦曰孝宗之子昭聖皇太后母儀天下幾四年屬先帝宴駕血屬乏人逆彬伺釁禁闕攘懿㫖内出次第誅夷而能恪遵祖訓虛天位逾月以待陛下又守家法不襲垂簾故事一應政務㫖示羣臣俱待嗣君至日施行若此后德在古為難而有功於皇上不在生育之下尚賴體念先帝付託之重孝養備至亦僅建父母之名于上而彼又請并欲奪之不知所以處莊肅太后者又何如也此豈人臣之所忍言者哉亦豈陛下之所忍聞者哉祖訓凡風憲官以王小過奏聞離間親親者斬近有進言者謂彼非風憲官太后又無小過又陛下母非親王比而敢於誹謗離間如此設使太后憂思不豫雖斬彼萬段恐無益也此其人之欺妄十也一其言壽安皇太后不得率天下終三年喪實陛下終天之恨云禮經嫡孫承重者為祖父母服三年壽安皇太后止生獻皇帝獻皇帝止生陛下今獻皇帝不在陛下實承重嫡孫當率天下為三年喪禮也禮官乃定為哭臨一日喪服十三日但以文移行之兩京而已夫以日易月三年喪應二十七日期年應十二日然則十三日之説果何制也壽安既為皇太后矣為天子祖母矣當詔天下喪之禮也以文移而不以詔及兩京而不及天下又何制也此等已徃之事莫大之失為天下後世非笑陛下雖欲追悔而不可及前日既誤今日可容再誤邪議禮者皆安然而無愧悟此欺妄十一也前件臣等切惟古者天子一娶十二女嫡庶定矣故諸侯不再娶於禮無二適魯隠公立仲子之宫春秋罪其非禮至漢朝乃引公羊母以子貴之説當時已自為非義矣壽安皇太后為憲廟貴妃終孝宗武宗之世皇上繼統之後推原本始故尊稱之典特隆其喪也彼比陛下於嫡孫承重然則陛下之所承何處為重而當率天下終三年喪不知其果出於何禮也公羊春秋天子曰崩諸侯曰薨獻皇帝以興王薨於正德十四年而彼曰獻皇帝不在彼知不可曰崩而又謟不曰薨而曰不在不在其可為死亡稱乎彼言之可羞形於議禮大扺𩔖此古禮所無者臣等今無暇於辯矣伏覩太祖高皇帝孝慈錄序服子為父母庻子為所生母嫡孫為祖父母承重為人後者為所後父母為人後者為所後祖父母承重皆斬衰三年孫為祖父母父母衆子為所生母齊衰不杖期壽安皇太后之喪陛下得為三年服乎非承重則不得為三年服然則陛下所承之重可知已憲廟正后孝貞純皇后也孝穆太后壽安太后皆憲廟妃而孝穆為孝宗母壽安為陛下祖母而皆尊稱曰后者也陛下以嫡孫言則承重在憲廟孝貞純皇后以為人後言亦在孝貞純皇后禮之委曲非臣等所能盡彼所言為遵古禮乎為遵御製孝慈錄乎彼前欲陛下不考孝宗不母昭聖而此所言又欲陛下不祖母於孝貞純皇后矣恐非憲廟之所欲聞也故大學士丘濬議漢孝元陵云為大宗後承正統非但繼父也亦繼母焉哀帝為成帝後而祖元帝則元后其祖母也尊無二上則所當合葬於元帝者元后也而傅氏合葬焉哀帝於傅太后固若隮於尊矣無乃卑其祖乎壽安之喪前此禮官議服期哭臨一日喪服十二日若夫十三日之制實出宸斷乃陛下不能自已之孝情也文移行兩京以文移之不以詔及兩京而不及天下禮官考之先朝故事或有損益爾故大學士李東陽燕對錄𢎞治十七年孝肅太后崩孝宗召内閣臣議陵廟事謂孝莊睿皇后葬不合禮欲為釐正又謂祔廟之禮尤所當講劉徤等奏先年奏議已定慈懿太后居左今大行太皇太后居右合祔裕陵配享英廟且引唐宋故事為證臣等不敢輕議其實漢以前惟一帝一后唐始有二后宋亦有三后竝祔者孝宗曰二后已非若三后尤為非禮事須師古末世鄙䙝之事不足學宗廟事關係綱常極重豈可有毫髮僣差太皇太后鞠育朕躬恩澤深厚朕何敢忘但一人之私情爾錢太后乃皇祖冊立正后我朝祖宗以來惟一帝一后今若竝祔乃從朕壞起後來雜亂恐無紀極孝穆太后朕生身母止尊稱為皇太后别祀於奉慈殿今仁壽宫前殿儘寛意欲奉太皇太后於此他日奉孝穆太后於後殿嵗時祭享一如太廟不敢少缺此孝宗所以為聖人而廟號為孝者也孝宗若從在先定議二后並祔人無復有言者而猶必改合於古禮不有孝宗髙世之見彼於今日又將何如其不請以壽安並祔於憲廟乎彼之謂已往之事莫大之失為天下後世非笑追悔不及皆是把持君父之説使我皇上於是有戚戚焉弗滿者以為前日真誤而今日不可再也亦何忍乎彼謂議禮之臣安然而無愧悟何也執政禮臣於今日事建議者謂其不能積誠以格聖心堅守以回天聽是則有愧焉爾而非此之謂也此其人之欺妄十一也一其言新頒詔令决宜重改云記曰生曰父母死曰考妣蓋人之生必各稟父母而無二豈可有兩考之稱乎雖閭閻童子亦羞稱之可加之萬乘之尊乎主稱兩考不知傍注奉祀果何稱乎近者𫝊聞陛下於孝宗皇帝稱嗣子於恭穆獻皇帝稱長子夫於恭穆獻皇帝稱長子是矣於孝宗皇帝可更稱嗣子乎長子嗣子之别為二主傍注子稱自古經傳未聞有此禮也今陛下改詔在一言之决片紙之費不改則百世之羞萬古之笑此欺妄十二也前件臣等聞書曰令出惟行弗惟反易曰渙汗其大號詔者帝王之所以號令天下告諸天地宗廟達之邦國一定而不可易所謂訏謨定命逺猷辰告者也陛下逺體祖宗之心輔導諸臣上體陛下之心於是乎演之為絲綸播之為號令傳之為典則天下諸藩宗室聞而遵之羣黎百姓聞而遵之九夷八蠻聞而遵之而可改乎其有改也必有悔也改而合禮悔而從義必如是而得乎天理之正必如是而即乎人心之安而後可改也然已犯不愼始之戒反汗易令已非治朝美節又况於天理有未正而人心所未安乎而彼乃敢昌言新詔决宜重改乃敢擅議宗廟非毁詔書葢漢制大不敬必誅而無赦者也臣等惟彼所引禮記父母考妣之云閭閻童子誠亦知之兩考之稱其失不細正是臣等重大宗者該以為言彼却反言之爾儀禮所謂不二斬者正是以小宗繼大宗便當以大宗所後為父母而服斬故於本生降為期是之謂不二斬嫌於二父也陛下入繼大統自當以孝宗為皇考獻皇帝為皇叔而後無兩考之嫌今以孝宗為皇考四年矣更以獻皇帝為本生皇考豈得已哉彼云以嗣子長子傍注奉祀之事非臣等所與知然實經傳未有之禮也彼之此言若似而非者也言若似禮而不明正統大義亦猶王莽之借周公之禮以自文曹操之借文王之功以自况爾故大學士丘濬作世史正綱書漢宣帝追尊悼考為皇考立寢廟而為之議曰後世自外入繼大統為其本生父母立廟始此夫無子者立兄弟之子以為後為之後者為之子也我既以彼為子則彼必以我為父其所生於我兄邪則稱之以伯父於我弟邪則稱之以叔父天地之大義生人之大倫不得而變易者也宣帝繼孝昭之統而又尊其所生以為皇考是其有見於生身之恩不可忘而無見於繼統之義不可二於倫則紊於禮則失後世自旁支入繼者徃徃引以為據而不以為非善乎伊川程氏有言揆量事體别立殊稱若曰皇伯叔父某國大王而使其子孫襲爵奉祀則於大統無嫌二之失而於所生亦極尊崇之道斯言也可以示法萬世矣孝宗皇帝勅翰林儒臣為厯代通鑑纂要書宋仁宗立宗實為皇子而為之註曰英宗被召為皇子戒其舍人曰謹守吾舍上有適嗣吾歸矣此固其謙讓避禍之心亦可見古者大宗之禮為後之義猶有存者此義若明則立後者無太早之嫌為後者無遲留之釁而天下之大計可定矣此注葢詳定官李東陽等筆也續書詔稱濮王為親立園廟又注程子頤曰言事之臣知稱親之非而不明尊崇之禮使濮王與諸父等若尊稱為皇伯父濮國大王則在濮王極尊崇之道於仁宗無嫌二之失矣丘濬成書在成化十七年李東陽等進書在正德二年當時未有今日事也其論議引注巳如此使先朝老成尚存為陛下議今日事亦不過如此陛下亦豈忍深罪之乎而彼因在廷諸臣議禮進言於陛下咸斥其非遂乃攘臂而起力詆執政禮官為欺妄向使丘濬李東陽等柄用如成化𢎞治時其敢肆其醜詆指為朋黨乎大禮已成矣而擬更於三年之後大詔已頒矣而直斥為片紙之費禮齒君之路馬者有誅而彼欲更易已成之禮奇衺惑衆而不聽懸法象魏者必殺而不以聽而彼敢非毁已頒之詔此在廷諸臣所以不得不合辭而訴於我皇上也陛下若再誤用彼言重改詔書則彼之所謂百世之羞萬古之笑者有在矣此其人之欺妄十二也一其言今日議禮朋黨之故云以陛下為孝宗之子之説者其始變於姦權大臣一人而已禮官附之九卿科道附之初不顧事體之大禮義之非者也九卿六科十三道官連名之疏豈議論同哉如九卿黨首自草一疏不令衆見止以空紙列書九卿官銜著吏送與畫一知字有不畫者回報即令科道黨與指事劾之内閣批令自陳吏部覆令致仕雖大臣多銜寃而去無敢聲言至於科道連章則亦猶然者掌事一人執筆餘者畫知今在廷助臣議者不為不多瞻前顧後但頷首稱是而已此欺妄十三也前件臣等嘗讀宋歐陽修朋黨論曰君子以同道為朋小人以同利為朋故為人君但當退小人之偽朋用君子之眞朋則天下治矣堯之時小人共工驩兠等四人為一朋君子八元八凱十六人為一朋堯退四凶小人之朋而進元凱君子之朋天下大治舜為天子而臯陶稷契二十二人竝列於朝更相稱善推讓為一朋而舜皆用之天下亦大治葢堯舜能用君子之眞朋故也又嘗讀歐陽修五代史傳論曰小人欲空人之國而去其君子者必進朋黨之説欲孤人主之勢而蔽其耳目者必進朋黨之説奪國而與人者必進朋黨之説去其君子者惟以朋黨罪之則無免者矣善人日逺小人日進則為人主者誰與之圖治安之計一君子在羣小人雖衆必有所忌而不敢為惟空國而無君子然後小人得肆志而無所不為則漢魏唐梁之際是也奪國而與人者由其國無君子由以朋黨而去之也朋黨之説𫝊所謂一言喪邦者也而彼之疏於此終篇乃有今日議禮朋黨之故之説皇上憲天聰明豈弗鑒哉頃歳皇上奉遺詔入繼大統施行之見於代言者雖不能一一致其詳然天下聞之皆知其大體是也禮官奉勅㫖會議大禮辯論之出於當事者雖不能一一致其詳然天下聞之皆知其大體是也彼以為非是之小人乃持將順之説者也將順之説便於逢迎匡拂之言易於沮忤公議未有能遽合者今日議禮之事是也彼謂權姦大臣一人必有所指若入繼之君之為人後則其公議不敢變也禮官附之九卿科道附之衆口同辭亦是附其公議非附其人也禮官近承陛下孝情所廹而公議莫克自伸者有之士林雖能諒其不得已於當時史冊終不能不責其備於後世而彼又託將順以迎合激怒其間臣等益懼受其任者之難其人也權姦非盛世之所宜有非大臣之所敢當也彼前此嘗言强臣乘君闇弱之漸以激怒於陛下矣陛下英頴天縱逺過周成漢昭而彼敢以闇弱言之其狂悖無人臣禮已甚無恠乎有權奸之言也我祖宗分任大臣不設丞相事權視古為最輕而老臣之事少主只恐恭之太過故宋韓琦有曰一小黄門至即可縳臣矣何謂䟦扈即如彼二三竒衺昔者逺在千里附馳尺牘恣意讒説以動聖聰而師輔之罷省卿之去如棄敝屣臣强君弱顧有是乎大禮之議九卿六科十三道及諸部署南北兩京各陳所見無慮百十章劄皆以尊正統重大宗為説人心理義不約自同而彼乃因近各衙門有㑹本又謂九卿黨首自草一疏不令衆見止以空紙列書官銜著吏人送與畫一知字科道官連章亦然掌事一人執筆餘者畫知及謂在廷助彼議者不為不多瞻前顧後但頷首稱是此等譎誑最為易見陛下試於御殿門時令九卿科道等官面議當時有何人不見疏草何人議論不同則黨首與掌事者之議自可破矣又令羣臣願從禮官議者班於左從彼議者班於右則助議之多寡自可見矣至謂不畫知者令科道黨與劾之批令自陳覆令致仕雖大臣多銜寃而去不知謂誰彼徒掇拾歐陽修濮議之緒餘以議大禮而不能鑒歐陽修朋黨之説以自照其奸而復以惑陛下以傾君子實歐陽修之罪人也九卿黨首彼之所指又必有在臣等伏覩我太祖髙皇帝法周官之制建立六部以吏部尚書為百官之長故凡德業聞望稱為君子者吏部得以薦之以陟其明凡糾結𤨏碎稱為小人者吏部得以罷之以黜其幽故當時聖論有曰衆人惡之一人悦之未必正也衆人悦之一人惡之未必邪也出於衆人為公論出於一人為私意又曰讒人之能害國猶稂莠之能害苖故善治田者必去稂莠善治國者必去讒邪稂莠始生似眞及其乆也苗不能勝矣讒人始言似忠及其乆也正人不能勝矣彼二三輩為朋而同利干進者又從而附和之此正歐陽修所謂小人之偽朋也此正我太祖所謂稂莠讒邪而私好私惡者也又且巧騰萋菲之謗而蒼蠅貝錦何所不至於九卿而曰黨首於六科十三道而曰黨與是何無禮不根之甚矣充是心也必如漢之黨禍使諸賢禁錮必如唐之黨禍使李德裕等出避牛僧孺必如宋黨禍禁司馬光等而進王安石行新法以亂天下昔人云註本草誤其禍疾而小註六經誤其禍遲而大又云邪説之害正甚於洪水猛獸之灾慘於夷狄簒弑之禍彼之謂也此其人之欺妄十三也伏望聖明加察治其欺妄之罪庶九廟常安兩宫無間而億萬載靈長之休可保矣嘉靖三年七月十三日回話疏奏為乞恩認罪回話事嘉靖三年七月十六日於吏科抄出該臣等題為辨小人斥讒説以全大禮以保治道事奉聖㫖已有勅㫖了但朕奉天明命嗣承大統祇奉宗廟㒺有間越尊稱大禮出自朕心何孟春等既居大臣各司所職却乃恣意奏擾訾毁君上害正妄為辨亂是非且不查究張璁等奏十三條本未經發出如何先知論奏便著回將話來該衙門知道欽此欽遵臣等聞命驚惶㒺知攸措切照南京刑部主事張璁桂蕚行取到京之時先次奏為昭聖斷息妄議以成大禮事本未投通政使司即以私稿所條七事傳示於人以炫其邪佞之得行也而其本留中不出故前此言官稱皇上聰明天授自能洞察其非且鴻號乆定天地祖宗實皆鑒臨天下臣民咸已知悉必不肯輕信其説輙有改移但其奏章宿留尚在依違輿論噂㳫而未平羣情惶惑而靡定者是也而彼後次又奏為條陳證據典籍乞昭聖斷以成大禮事本未投通政使司又即以私稿所條十三事傳示於人以炫其欺妄之得行也而其本亦留中不出本月十二日該禮部官欽奉勅諭一道臣等被召在左順門實親見之自念忝從大臣之後與議大禮之末聞彼之奏章委的宿留見彼之欺妄委的得行各於通政使司查得張璁等二次所奏副本見在臣等委的不忿彼之欺妄發其狂愚要與辨論遂同連名具本開坐上聞臣等冒凟天威罪當萬死伏望聖明加察分别孰正孰邪孰為君子小人孰為忠鯁孰為逄迎有以赦臣等之無他仍從所請并將一時愚直見被挐監之臣溥垂矜宥庻朝綱不壞國體無虧衆心獲安公議可息天下慶幸臣等不勝幸甚緣係乞恩認罪回話及節該奉欽依張璁等奏十三條本未經發出如何先知論奏便著回將話來該衙門知道事理為此具本親齎謹具奏聞伏候勅㫖嘉靖三年七月十六日認罪疏奏為乞恩認罪回話事嘉靖三年七月十八日於吏科抄出該臣等奏前事奉聖㫖尊崇大禮出自朕心巳降有勅諭何孟春等不以君命為重輙行奏擾及令回話又不輸情服罪好生玩法不諳大體且不究治還查的是何人倡率著從實回將話來該衙門知道欽此欽遵臣等再被天威益增氷懼所有奏辯張璁等原奏條件臣何孟春與尚書臣秦金臣金獻民臣趙鑑臣趙璜臣俞琳侍郎臣王承裕臣鄭岳臣劉玉臣陳雍都御史臣王時中臣張潤通政臣張瓚臣陳霑叅議臣陳經臣葛檜少卿臣張縉臣徐文華寺丞臣袁宗儒臣毛伯温均懷窺豹之忱各積輸涓之願心惟一理豈甘䧟於狂愚口實一詞初不容於倡率而衙門之次序非可那移故臣等之姓名以為先後回話自應從實垂憐惟在推仁臣等不勝惶悚之至緣係乞恩認罪回話及節該奉欽依還查的是何人倡率著從實回將話來該衙門知道事理為此具本親齎謹具奏聞伏候勅㫖嘉靖三年七月十八日自劾免任疏奏為奉勅修省自劾不職乞退休以消變異事邇者仁壽宫火災仰惟皇上祇承天戒親降德音布告臣鄰同加修省臣與聞聖訓思體上心敢不圖竭涓忱用禆淵慮臣誠惶誠恐除北向拜恩外竊念臣性資愚戅言行狂疎荷乾坤覆載之仁有罪不加於至死叨雨露霑濡之澤無才猶錄以備員居三品厯兩京者八年佐六卿專一銜者四任若不更求閒退何由消彌災祥且將益積愆尤重致淪胥譴謫如蒙伏望皇上特徵策免爰許詔歸俾晚節克全乎暮齡庶共工無曠於盛世臣無任悚仄俟命之至緣係修省并乞退休事理為此具本順差辦事官陳表齎捧謹具奏聞嘉靖四年五月日何文簡疏議巻十
