body:
  text: 何文簡疏議目録詔令奏議類二奏議之屬卷一建言疏省營繕疏應詔萬言疏恤邊疏卷二時政疏正祀疏馬政疏馬政第二疏地方疏卷三乞恩分豁疏計錢鈔疏表清節疏推行馬政疏軍務疏請還駕疏議馬政疏卷四議國課疏保襲祖爵疏地方疏乞恩㑹捕疏急救生靈疏卷五強賊激變疏貪官科害疏貪官害民疏貪官違法疏卷六申戒邊官疏地震疏積年草賊疏禁科擾疏議國課疏治貪疏議剿草賊疏卷七地方疏防禦疏乞復學校疏陳言疏公折俸疏辭俸廕疏閉銀場第二疏裁革冗員疏卷八陳革內官疏處置地方疏乞眀典禮疏開禁疏祠祀疏邊務疏設官疏便利官民疏卷九辭免改任疏陳言疏辭賞疏亟申公義疏救災防患疏乞隆聖孝疏卷十辨斥忠邪疏回話疏認罪疏自劾免任疏臣等謹案何文簡疏議十卷明何孟春撰孟春字子元郴州人𢎞治癸丑進士授兵部主事纍官右副都御史巡撫雲南入為吏部左侍郎以爭大禮泣諫左遷南京工部左侍郎尋削籍隆慶初贈禮部尚書諡文簡事蹟具明史本傳孟春沒後遺稿散軼萬厯初巡撫湖廣僉都御史汝陽趙賢始搜輯其詩文刻之於永州又別録其奏議為一集刋於衡州前二卷為官兵部時作第三卷為官河南參政入為太僕寺卿時作第四卷至八卷為巡撫雲南時作末二卷為官侍郎時作孟春少逰李東陽之門學問該博而詩文頗質率不能成家惟生平以氣節自許厯官所至敷奏剴切殊有可觀本傳所載如救言官龎泮等請停萬嵗山工役清寧宫灾陳八事出理陕西馬政上釐弊五事諫武宗幸宣府嘉靖初以旱潦相仍條奏八事尤其建白之卓卓者今多在集中大抵懇摯詳明侃侃鑿鑿實於朝政有禆固非徒意氣激發取名一時者所得而比擬矣乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
