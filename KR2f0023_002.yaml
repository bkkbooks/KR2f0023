body:
  text: 何文簡疏議卷二明何孟春撰時政疏奏為灾異陳言時政事邇者禮部以災異奏皇心祗畏如湯如宣詔諭羣臣痛加修省百司庶府封章日陳所以禆聖治而答天眷者無所不用其極臣叨綴末班與聞明戒雖責不在言而事有所感草茅之懷實耿耿焉謹用條列四事仰塵睿覽曰惜國儲曰寬民賦曰恤軍户曰處匠役指實時政此其梗槩倘䝉皇上赦臣狂瞽蚤賜施行天下生靈豈勝幸甚和氣充塞歡聲播𫝊天人感通而沴戾自不作矣為此具本親齎謹具奏聞伏候𠡠旨計開一惜國儲今之儲蓄視祖宗之舊有不逮矣祖宗時制度未備皆從創始攻戰甫畢糜費為多然公餘陳朽私剩蓋藏復有以為貽厥燕翼者焉百三十年於茲而為皇上垂拱仰成之日正重熙纍洽之世生齒之繁田野益闢商販之廣貨利益通而國儲之所入者僅足以為出所積者才給於取用而巳邊方小警曽不幾時公私之間巳為銷縮此不可不慮也今天下嵗徴糧稅三千六百三十二萬一千餘石內三百二十五萬九千石折銀八十一萬四千餘兩户口鈔商稅鈔除折米外并船料鈔一萬四千六百一十三萬餘貫折銀可得四十三萬九千餘兩各礦銀課嵗辦一十五萬一千餘兩兩淮折鹽場嵗賣所鹽銀常不下數萬千兩嵗嵗相仍而取足焉何以外府內藏收貯錢糧反不能逮祖宗之舊其平日朝廷所費必有加於祖宗之舊者臣愚伏乞皇上念守位必藉乎財思無積不可為國特𠡠該部將收貯前項錢糧倉庫監局逐一查計因其一年之所入通其纍嵗之所積嵗當支發幾何存積幾何國初之所以有餘其本何在今日之所以不逮其弊何由明白開具取自宸斷去其害財之事而講夫理財之道以求復祖宗儲蓄之舊凡百用度務從儉約內府衙門供應物件一照洪武永樂宣德正統年間則例而行有近年增添者即係浪費之數可以省革某件用若干昔為巳足某件支若干今為過多即可仍其巳足而減其過多者宸斷革減之後著為定規各衙門若不務樽節又行具奏增添許該部并科道官參劾究治富強之機實繫於此伏惟聖恩留意一寬民賦今之賦斂遍天下民不勝其辦納矣禹貢任土作貢周禮以九貢致國用解之者謂任其所有不強其所無聽其自至不強其不來也祖宗時於天下之賦著有定額如絲絹牲口藥材厨料顔色紙劄皮角翎鰾桑禳柴炭油蠟等項亦惟視其郡邑所産而分𣲖之地各有常數嵗各有常入遠近翕然稱便如一今官司所徴雖仍其舊然額外之收實相陪蓰黠胥狡徒窟穴其間下户編氓星火是逼逋負積壓嵗嘗不免倍償舉貸生理何堪此不可無寬政也民之嵗賦固有非其土産而轉買於他方難以物致而輳辦於臨期者計其所費又十百於所納之物而所納之物又非在官急缺之用於此聽其折銀公私豈不兩便臣愚伏願皇上愍民生之至艱惜財力之有限特𠡠該部查勘近年分𣲖各處辦納物料所坐地方所定數目與祖宗時所著之額有無相同若有在額外者乞即𠡠令除豁以免重斂厚征之困其年例辦納正數該部仍行內外庫藏官員通併計算某物不足某物有餘某物不堪久收某物可以常售枚而舉之總而㑹之計算明白行移各該司府除不足者照舊徴納本色外其他有餘并不堪久收可以常售物件酌量在彼時價從輕折銀辦納所在地方果有水旱疾癘民貧賦重纍嵗辦納不前亦就量為減免停止以候下年仍依額辦今後內府緊關缺用之物但係不時之需止許暫借官銀通融市易以相補助額外一毫不得再𣲖有擾於民如此則民賦以寬天下霑惠而庫藏之財不至乾沒何患額辦不足於用臣惟財之足用與否在朝廷供用之豐與儉何如耳臣姑舉用之小者一事言之正統以前黃蠟嵗用三萬斤正統十四年添一萬斤景泰年間添至八萬五千斤天順年間遂用八萬五千斤成化十一年添三萬五千斤遂用至一十二萬斤以此推之其餘財物花耗可知越額而賦良有所自皇上改元之初罷斥齊醮頓抑前數今日之供用獨不可復正統以前之舊乎皇上誠推此事以例其餘不輕取而浪費於祖宗所著賦額之內嵗用有餘財矣一恤軍户今天下軍户告乏久矣所在衛所遞年發册清勾而原籍不能解補十常八九清軍官員畏懼不勾三分之例將來考滿不便於已欲加苛勘則逃故者其跡巳湮少示寬責則隱謾者其弊滋甚誰得良法而善處之臣切見各處有司往往將在官軍户原衛有丁見當不曽册勾者亦行解衛查理甚至前批未銷後批又發此等户丁解發到衛不過隨批帶回徒費文移何益於事又有専差解人齎執空批代查别户軍役有丁無丁為注銷者道路間關動經數千百里軍受不盡之苦解䝉無妄之災究其所由皆緣所司欲輳清軍分數以為巳地而巳及今不謀以善後天下將擾於多事臣愚乞勑該部轉行各處清軍御史行移各該府州縣清軍官員今後除奉本部册勾遞年逃軍仍舊勾解及軍黃册內清出迷失衛分等項户丁仍解部定奪外其餘衛分明白有丁軍户不奉清勾者不分已未十五年已上俱先類衛造册申送清軍御史總類衛分每衛造册二本繳部一本存留備照一本發該衛所在地方清軍御史處吊集各衛編軍食糧底册查勘各軍在衛有無人丁繼當本軍是否本衛名伍務查明白填注發去册內轉繳前來然後勾解補伍若有司開寫衛分缺真衛所填注名伍不實及清軍官仍前朦朧將丁差解查理該衛官旗通同見當軍人掜開在逃致令勾丁到衛却稱原役見在勒要幫貼該管上司查究得出俱治以罪此亦清軍中便人情之一事也一處匠役今之役使紛然於天下所以病民者非一端矣富竭其財貧盡其力户别九等門分三甲家無少丁田無宿糧其輪班來役於京而有常數者則兵部之皂𨽻與工部各色之人匠也臣查得工部職掌浙江等八布政司南北直𨽻輪班各色人匠自天順八年遇例除豁以來實在之數餘二十一萬餘名除𨽻南京該部輪班及撥清江造船蘇杭等府織造假匹遵化鐡冶上工外該部所管四嵗一輪班見在之數每嵗尚餘二萬五千餘名每季輪班亦該五千六千之上核其班次使皆盡數而來內外監局自足撥用而逃亡事故長嵗不免連季有之所司作頭人等遇有監局工作無人應投或預寫自巳名下文約或借在官别項銀錢雇覔街市守藝之人前去成造及至該府州縣將前事故人匠清解至京期已過違作頭人等憾其到遲而先有舉貸也百倍而取償焉嵗復嵗季復季人不堪命而逃亡事故滋益多矣彼輪班皂𨽻河南山東山西北直𨽻每嵗解到七千四百餘名分撥各衙門各官名下不聞有脫役者蓋納柴薪者俱係府縣徴收銀兩差委官吏類解前來依數分送其直㕔等項正身亦多輕齎來京雇人代當圗回生理各衙門因無禁例多聽其便所雇之人計工得錢如何肯逃該部之人匠不然臣惟弓冶箕裘必世𫝊其業而後食其力今鄉村之愚民一旦而使之充匠本等藝業素非諳曉官府有事即要雇人答應力不足衣食於官身將何仰給於外此逃亡事故之所由致也臣愚乞𠡠該部行移各府州縣清匠官員今後清解人匠務要試其藝業諳曉願自當者解部當役其有藝業不通不願解當人户照依輪班皂𨽻事例計其班次量徴銀若干傾瀉成錠差人類解赴部以憑雇人凡雇人之直俱於按月已滿之後作頭總領而分給之則彼不至逋負而在官得備緩急事末者免遊於市井力本者常守其田廬豈不便哉古人固有差役募役雇役之法要在所司為之擘畫不拂人情而巳𢎞治十五年六月初三日正祀疏奏為崇正祀典事臣聞化民成俗莫先於學崇德報功莫大於祀四代之制絃誦有地釋奠有時先聖先師各有攸尚及周之衰而生孔子生民以來於斯為盛而親炙私淑其道者又有人焉後世右文之朝立學定祀固宜無所不用其極也恭惟皇帝陛下當紀元開治之初舉幸學崇儒之典聖道日月萬古增輝所以新橋門之耳目多矣顧先聖稱號未極尊崇諸賢從祀有當釐正者唐宋之所未行臣不能不有望於今日也臣管窺愚見不勝拳拳兹當明詔求言之餘敢輒覼縷以請倘下所司覆議施行聖聖相承必皆是式陛下新政鴻名與天無極是豈直吾道一時之幸哉為此開坐具本親齎謹具奏聞伏候𠡠旨計開一考孔子廟祀漢晉及隋或號先師或稱先聖宣尼宣父不越公稱至唐𤣥宗始諡為文宣王而至聖之諡加於宋真宗大成之號增於元成宗國初未有改也然則帝號之追諡其不有待於今日耶宋真宗未加諡前嘗詔禮臣定議為帝李清臣曰周室稱王陪臣不當為帝其事遂止清臣之言豈無可易者哉孔子大聖有位無位非所損益而道則配乎天地功則賢於堯舜後世尊崇惟知其為萬世帝王之師何與於周異代陪臣其何嫌疑之有而李清臣徒以其位言之必如所云公亦不可稱矣清臣得罪聖門至今人心不能無筆誅之忿近時有建言者或又為之辭曰周天子稱王孔子周人也而稱王是即尊以天子矣不當再改稱帝此論臣亦竊有未安夫帝王皆古天子之稱誠非有差級然自秦漢以來天子稱皇帝而分封其臣下有功者及宗支為王迄今然也聖朝之制既以王卑於帝則在當時所以尊崇孔子者又何必泥於周之所謂王者而曰此周天子之稱哉大聖無所假於位至尊極徽之號非在天之靈所有望於後世而尊崇之典則不容不隨代而致隆也元成宗加以大成之號出自孟子集大成之說可謂尊孔子矣而名位未加尚不足以盡尊崇之道孔子以帝王之道教萬世獲大行於聖朝列聖以帝王之道治天下蓋有徵於孔子國朝孔廟享祀循舊樂用六佾憲宗皇帝益而為八百代之下誰敢易焉此追諡孔子為帝之典臣所以重有望於今日梅福勉其君所謂不滅之名者也一考孔廟弟子配享隋以前惟顔子一人東漢時雖嘗祀七十二弟子不出闕里唐開元中追贈十哲及七十子爵號天下自是始並從祀按史記仲尼弟子列𫝊受業身通者七十有七人索隱曰家語亦有七十七人史記有公伯寮秦冉鄡單家語不載而别有琴牢陳亢懸豐當此三人之數然今世𫝊家語止得七十五人史記所有鄭國申黨顔何家語不載而載薛邦申績又史記之所無者杜佑通典載開元贈典自史記七十七人蘧瑗林放陳亢申棖琴牢琴張六人宋祥符大觀中加封從祀除去琴牢餘並因之懸豐今家語作懸亶字子象禮記檀弓篇縣子疑即其人而祀典今不及焉家語薛邦字子徒申績字子周與史記載鄭國申黨同字此則邦即國也績即黨也與琴牢琴張自是一人而𫝊者之訛耳論語釋文申棖鄭康成云蓋孔子弟子申續史記云申棠字周家語云申續字周今史記以棠為黨以續為績其為訛寫無疑後漢王政云有羔羊之潔無申棠之欲是以棖為棠也史記索隱謂文翁圗有申棖今圗有黨無棖是以黨為棖也唐宋加封申黨申棖俱列從祀一人而為二人薛邦之為鄭國姓氏猶頗相逺二申猶二琴也不祀薛邦而二申復並祀焉不已瀆乎國之大事在祀孔廟從祀祀事之大者又况其親炙之人而可瀆之臣愚欲乞今日補贈懸亶爵號列諸從祀而削除所重祀者著於令式以改正數百年之缺繆若公伯寮乃季氏之黨非孔子弟子蘧伯玉孔子之所嚴事不當在弟子列宋儒嘗辨其誤臣亦嘗有私議謂不當祀而重祀之失則不容一日而不正者弟子姓氏之可信莫可信於家語執家語以定封祀豈復有前失哉一考儒先從祀孔廟起唐太宗朝唐以左丘眀等二十二人代用其書垂於國胄故於本學祀之卜子夏自是聖門髙第此不暇論左丘明公羊髙穀梁赤有𫝊經之功非世儒可擬若髙堂生而下一十八人其所述作不越掇輯篇章訓詁文義而已而俱在侑食之席蓋當時之所取者在是故漢有醇儒如董仲舒而不及焉子書儒家有公孫尼子者漢志以為七十子之弟子隋志以為孔子弟子史記云樂記公孫尼子次撰李善文選注載沈約云樂記取公孫尼子馬總意林引劉巘曰緇衣公孫尼子所作也公孫尼子蓋不啻公穀比而親受業於孔子之門人其言可補六藝之文非有功於聖經者耶唐宋後來封爵俱不及者失之於不詳考耳公孫尼子見於信史諸書灼灼如此樂記緇衣之出其手無疑於此復疑將以誰信哉戴聖之徒其相去也逺矣忽立言之人弗祀而祀諸𫝊録訓解其言之人事理不倒置乎臣以為公孫尼子在今右文之朝不可以不祀也或曰唐宋時已失議而今驟舉之殆非所宜臣聞有其舉之莫敢廢之語矣未聞缺典之不可舉也董仲舒至我太祖髙皇帝朝始加封從祀英宗皇帝朝胡安國蔡沉真德秀吳澄之祀旋舉焉祖宗於漢宋儒者且拳拳如此則懸亶公孫尼子之封祀行於今日闡幽發潜以詔天下後世豈非聖朝一盛事哉馬政疏題為邊方馬政利病事節該欽奉𠡠邊方武備莫急於馬近來各邊官軍不思馬匹出民脂膏罔肯用心餧養每稱災病追賊等項倒失數多奏討關補除本色馬匹外連年發去價銀不知幾何彼處又有餘糧屯田草場椿頭等項銀兩管事人員不無玩法之徒恣為侵尅之計今特命爾前去陜西延綏寧夏甘肅公同各該行太僕寺官遍厯地方將前項發去馬價并餘糧屯田等項銀兩自𢎞治十一年十一月二十一日赦後至𢎞治十八年終逐一備細清查要見某年發去并本處收過銀若干兩買過馬若干匹給與某官某軍領養有無見存倒失領出未買銀若干兩拖缺馬若干匹及見存銀兩若干是何衙門收貯或有别項支用就行追究下落果有侵欺情弊應提問者徑自提問應奏請者指實奏聞處治欽此欽遵臣才本駑駘志甘豆櫪誤䝉差遣不任驅馳今經萬里有餘將及一年之久三邊馬政頗得摽聞四鎮地方實歸遍歷除公同各該行太僕寺官遵照𠡠內前項年分逐一清查太僕寺發到并本處收過銀兩買馬給軍備細緣由及將拖缺見在銀兩數目中間那移侵欺情弊追徴究問明白下落另行造冊具奏處治外臣採風無狀復命有期以馬名官敢忘兵事之所重攻車考牧况乃職分之當為謹因查勘之餘妄有條陳之舉伏望皇上將臣所言五事付諸督理大臣推之各邊未為無補酌彼舊例宜在可行馬政既修何憂馬價邊儲以足不費京儲騋牝三千公車千乘行載歌於西北矣為此開坐具本專差舍人陳聰齎捧謹題請旨計開一查得成化元等年為陳言邊務等事節該兵部議行陜西各邊衛所屯田除辦納外糧草外每頃出銀一錢委管屯官徴收回衛寄發有司倉庫收貯如遇邊操官軍倒死原領馬匹告相明白令其尋要堪中好馬將前貯官銀收買給發騎操不許那移别項支用鎮巡等官每於年終備將收過銀兩買過馬匹數目具奏查考此例之行為日久糧草額外實是加徴獨於邊方有之專為馬價而設奈何法缺周防事多虧弊稽案劾籍迄無可憑查得陜西都司等衙門開具所屬屯田原額與各衛所見徴數目多不相同有一衛差至千百餘頃者少亦不下數十頃畝究其所以不曰舊日拋荒則曰逺年分豁錢糧積嵗拖缺文卷片紙不存再行所司查勘竟不能回報此在衛徴銀者之無憑也腹裏衛分官軍多在各邊備禦一衛常分數處一處率是兩班前項銀兩徴收在衛領支在邊各邊分守守備副參等官但知差人領銀緣無印信文書又無銀兩數目衛中之所取以附者委官領狀而巳衛所解邊銀兩印信申文邊上又不存以為案管屯徴銀班操不得干涉該班買馬衛所無由預知其買馬數目問之分守分備衙門百不知一問之把總管操官員不過㑹集識字人役記憶揑凑豈能得真若事關下班彼又得諉於不知矣下班官軍或改按伏或作遊竒不在本邊不歸原衛逃亡事故何由可查遊竒按伏暫委領軍官員回報無印公文尤是不足信者查勘之間彼多此寡人名差拗年分乖違弊則顯然罪將誰執此在衛在邊領銀買馬者之難憑也陜西各衛腹裏者少邊方者多分𣲖屯田徴收糧草每頃糧六石草九束而又額外出銀一錢以為馬價殆非得已官不得巳而加徴軍於額外而重出苦寒之天斥鹵之地盡彼錙銖之積莫非膏血所成今不免被奸人之侵漁入私室之囊槖專罪則無所歸罪槩誅則不可勝誅蓋由事不皆出巡撫衙門周防缺人查考無地而年終無憑具奏具奏之數自不能致其詳故也臣愚乞𠡠該部查照陜西屯田馬價事例行移總制邊務兼督理馬政并各該巡撫官各查所屬衛分原額屯田頃畝每嵗徴收馬價銀兩數目腹裏衛分應該解銀兩各邊共有幾處在邊備禦應該原衛領銀共有幾衛今後各衛所管屯委官徴收前銀在腹裏者俱要寄附近府州縣在各邊者寄所在倉庫有司衙門收貯各置印信文簿執掌在官遇有本城騎操官軍倒死馬匹把總管操官開報巡撫衙門獲有明文回衛方許領出照例支給若係腹裏該解銀各邊及係備禦該原衛領銀非奉明文不得擅行領解腹裏解過銀兩即取在邊官司領過印信文書在邊領過銀兩即取給軍衙門買過馬匹數目各回申巡撫衙門查照仍於原置簿內開注前件支銷明白以俟弔查若管屯官徴銀仍有違例不寄有司倉庫及該衛備禦各邊人員齎執白批稱作副參等官差委赴衛領銀本衛掌印官仍前不行申逹巡撫衙門輒自取具領狀將銀領出解發通加究治以重罪巡撫官仍照例於年終具奏將所收屯田并朋合樁頭銀兩備開某衛所原收若干買過某處馬匹支銷若干見收某處倉庫或扣除糴糧銀准作前銀寄庫各若干一同奏報將拖缺未完之數議擬比較追徴施行庶幾法不徒立而弊可少祛也一查得成化十三等年為軍務等事節該兵部議行各邊騎操馬匹遇有倒失酌量官軍朋合出銀買補每年六箇月按月都指揮出銀一錢千百户鎮撫七分旗軍五分倒死馬主都指揮出銀三兩指揮二兩五錢千百户鎮撫二兩旗軍一兩五錢走失被盜各加五錢照依時價挨次買補鎮巡等官每半年一次將放過銀兩并倒死馬匹巳未買補數目奏報所收銀兩有侵欺作弊者聽巡撫官從重禁治所買馬匹各以十分為率把總官買過八分者免其住俸責限補完不及八分者住俸完日方許關支此例雖稱見行而各邊舉措實多不一今查得陜西延綏寧夏甘肅等處朋合銀有止徴馬者有徴及步隊者有不分官軍減徵皆一錢五分加徴至一兩者有將月糧折色扣除在官者有在操備地方徑自收放本衛全不預知者大假視死馬之多寡為徴銀之贏縮此朋合之不一也樁頭銀有以上中下户為等者有不分官軍槩徴一兩五錢二兩二兩五錢三兩者有因公出外倒死與槽下倒死一體徴收者有槽下倒死與走失被盜第加五錢謂之免責銀者或掌之於衛或收之於操大假死馬官軍給有官馬才徴樁頭無馬給之多只責令備價自買故陜西等處又有徴收者全不徴者此樁頭之不一也腹裏領馬官軍常在各邊備禦前二項銀兩在邊收放該衛不得預知吊到在邊簿籍率該白頭故紙夫徴銀不一既於定例得以從違稽案可疑寧保委官不為欺弊陜西都行二司邊務文册呈繳鎮巡等官奏報之數又是紙上栽乘有何根據隍中覆鹿誰與尋求平鞏岷洮在城操備失徴朋合已數嵗而所司仍造徴過若干莊凉固靖各邊備禦拖缺馬匹纍百千而原衛曽不開呈十一責任實無專理行移徒具虛文此近年以來各衛所官侵欺作弊者之所以無罪巳未買補不及分數者之所以無罰也臣愚乞𠡠該部再申前例榜示各邊今後朋合出銀毋令徴及步隊蓋無馬者巳田難舍有馬者外廄可償官軍為貴賤之分階級是富貧之辨出銀有等立法甚明倘不得巳而加徴不許混同而漫及若樁頭之應徴與否則聽總制邊務兼督理馬政及各該巡撫衙門斟酌處之倒死馬匹令官自買必能添價以凑買到馬匹給軍同領未必舉羣皆良所貴稱物平施損上益下之有道耳追賊燒荒等項因公死馬舊例原免追陪若查勘明白即與除豁槽下死馬告明相剝得自變賣皮毛肉臟與走失被盜馬匹雖是旗軍各令出銀三兩交官買馬亦不為多惟死馬告官之日無所刁蹬買馬給價之期不致遲難即困中受惠貧不積債矣在邊在衛委官收過前項銀兩俱凖屯田馬價事例收寄所在有司倉庫并月糧折色扣銀在官者各另封號收貯操備把總等官一遇各軍倒死馬匹即便開報巡撫衙門行文查給巡撫衙門仍行各該行太僕寺官比較印烙回報然後類奏施行庶幾收銀買馬數目易清欺弊無所容分數不能隱而奏報之數在本部者亦可為據依也一查得𢎞治五等年為清查草場租銀等事節該兵部議行兩京并在外各邊巡撫等官及委官於各該衛所清查原額牧馬草場地土若有被人耕為熟田者各照地土肥瘠出銀逐年徵收完日若係各邊衛所發都司官庫收貯具數呈報巡撫巡按知㑹候官軍倒死騎操馬匹量行支給貼助買馬此例通行內外各邊先年止據在京衛所并遼東山西大寧等都司衛所查過草場租銀買馬文册到部其陜西等處除苑馬寺草場牧放孳牧馬匹外各衛所俱無造册回報臣行據陜西都行二司查得西安前衛草場六十二頃五十畝每年徵銀買補騎操馬匹其餘各衛所俱各查無草場徵銀買馬緣由各具結狀呈繳前來臣又查得𢎞治元等年為分豁虧免草束馬匹等事該巡撫甘肅都御史羅明題稱甘州城北草湖一所名曰餧馬房遞年採草二十餘萬賣銀二十餘兩及又有葫蘆灣黑河灘等湖採草亦不下萬束俱被本邊鎮守等官占為巳業該户部覆奏轉行鎮守等官退出一半給與無草湖人採納草束一半變賣銀兩買補倒死馬匹續因太監傅德奏討前項草湖該部又經題准將餧馬湖地內給與傅德二百頃其餘與小葫蘆灣大葫蘆灣黑河灘俱退出與軍迷黑湖地內給與總兵官一百五十頃其餘亦給與軍鴨子渠湖居家湖共七頃一十八畝五分九釐給與副總兵教場湖鹻灘湖共七頃一十四畝一分七釐四毫給與監鎗各管業外所據退出給軍湖地每嵗採草或補納草束或變賣銀兩買補倒死馬匹係臣應查事理行據陜西都指揮僉事陳瑄甘肅行太僕寺卿陳寬寺丞田美各呈稱公同踏勘得餧馬房湖地止有九十餘頃見在鎮守太監楊定下管業迷黑湖地三十七頃二十五畝一分三毫九絲見在總兵官劉勝下鴨子渠湖居家湖地二十三頃六十一畝四分一釐四毫見在左副總兵白琮下比原給地多一十六頃四十二畝八分二釐四毫教場湖鹻灘湖地八頃二畝五分三釐七毫五絲見在監鎗左監丞王欣下比原給地多八十八畝三分六釐三毫五絲黑河灘等湖除在官未丈外相畔地四十二頃三十八畝九分七毫總兵劉勝下大葫蘆灣一十四頃二十九畝五分六釐七毫七絲內五頃九十畝副總兵白琮下八頃三十八畝八分一釐七毫七絲并小葫蘆灣二頃三十九畝九分三釐七毫五絲監鎗王欣下承管各湖四至弓口通為計算明白别無扶弊等因將各官管業并給軍地土分别界限置立峯堆填畫圖式取具各證親供各具呈到臣為照前項勘過湖地除各官應得管業外餘地七十六頃三十九畝五分九釐九毫七絲係先年給軍採草賣銀買補倒死馬匹之數巳經轉行巡撫甘肅都御史曹元查照題准事理定奪給撥去後臣切惟各邊草場湖地在處有之若必耕熟是求則屯田之餘無可指者官軍之所採納不患無而患遠鎮守之所占據不貴遠而貴近此事豈獨甘肅為然特羅明行之於前故臣得議之於後耳臣愚乞敕該部計議合無通行宣府大同遼東山西陜西榆林寧夏并順天保定等府有總制處總制衙門無處巡撫巡按等官各將沿邊一帶內外守臣原占空間地土堪以採草牧馬去處逐一清查頃畝數目明白撥與官軍採打草束先儘賠補虧免事故軍人草數餘剩賣銀收貯在官遇有官軍倒死馬匹與屯田朋合等銀相兼支給買補不許别項花銷巡撫官仍於年終將收過銀兩買過馬匹一體奏報施行庶幾邊馬少助萬一而前例草場之查亦不為虛名也一訪靈州鹽課司大小鹽池自祖宗以來與茶法並為各邊馬匹之用二池額課止有一萬三千九百餘引先年延寧二鎮遞互招商中馬給軍騎操每上馬一匹給引一百道中馬一匹給引八十道每引一道該支鹽二百斤百道即該鹽二萬斤八十道該鹽一萬六千斤常價一萬斤該銀二十五兩以應支兩倍二十五兩二十兩銀之鹽易十兩八兩銀之馬子本如此而引常有餘馬常不足萬車載去俱入權門數匹牽來僅存毛骨此利不在商人亦不在公家也𢎞治十三年內邊臣建議改撥納銀用之買馬其計始得又值寧夏巡撫衙門借支二年修理河渠功既未成鹽亦浪費近該總制邊務兼督理馬政都御史楊一清於額外奏討鹽引若干召商納銀一年之間商賈雲集地方日效其有鹽銀嵗增數倍臣因查各邊馬價併知鹽銀近日買馬數目助益邊方實多其轉移之法區處之宜臣不能悉竊以為此利在商人故亦在公家也向日馬少引常有餘今日引多鹽不告乏天地生財本自無窮顧人用之何如耳臣過靈州花馬池得聞二池之鹽自來不費人力煎熬夏秋晴暖水面皚皚如雪如霜隨取隨足以今權之課引舊額傷於狹矣又訪得鞏昌府漳縣西和縣亦有鹽池額課御史王愷曽奏要發洮河岷州折銀易馬其河西鎮番衛鎮夷所有鹽池而無額課除鎮夷鹽池該驛公用外鎮番境內外鹽池數多獨無可資於官者乎臣愚乞敕該部轉行都御史楊一清即其巳效廣為永圖前項鹽池若是討引重煩不如增額為便即行計量近嵗給引之數斟酌異時中鹽之額於雨暘乾潦之間制多寡贏縮之節大約可增至十萬引引鹽既定可計課銀每一百引可得銀二十五兩商人不問客行土著納銀二十五兩得引百道每引下池照鹽七石運至行鹽地方車腳盤費餘五之一該銀五錢百引得銀該五十兩本利相侔誰不樂從其鹽又是當年支放支不盡者次年聽其再支舊三新七兩無妨棄二池所得課銀一年當不下二三萬兩俱寄附近平凉固慶府收貯如遇各邊缺馬鎮巡等官具奏行移查照給發買補畢日造册奏繳鞏昌鎮番地方鹽池應否照此定奪亦要清查擘畫施行其餘河階狄道魚河等處土鹽小鹽及一應私鹽各加禁約不許採取興販致壞課程敢有權門勢族摻越商人多支鹽石或别項奏討無益浪費俱依律例從重治罪庶幾將來國用益充軍資有賴庫積餘財而邊軍自可無缺馬也一訪得洮州河州西寧三衛各茶馬司茶斤洪武永樂年間俱係差官起倩軍民夫役於四川保寧府巴縣等處般運赴司交收三年一次差京官選調各衛大勢官軍深入番境劄營調集夷衆比對金牌信符將前茶斤給與各蔟徵納差發馬匹如有拖缺次年前去催收俱給各邊官軍騎操祖宗法制非但可使邊方得馬濟用抑又羈縻番夷使知軍威不敢為惡後因地方多事陜西夫役急於軍餉無暇運茶腹裏衛分官軍多赴甘寧等處征操别無官軍可調前例俱各停止各茶馬司催取漢中等處民户納茶及巡獲私茶充用彼時或差堂上官或止差行人巡視整理續改御史巡禁私茶一年一次招番易馬成化初年三處易馬尚得萬匹自是以來一年所得僅足千數而巳𢎞治十八年該督理馬政都御史楊一清建議修復茶馬舊制曲盡撫馭安靖之道本官奏內要以𢎞治二十年為招番之期乞遣廷臣齎捧上號金牌㑹同本官及陜西甘肅二處巡撫官督同都布按三司官在於三衛住劄差委官員通事分投調取各番各齎原降下號金牌牽趕馬匹前來上納分别上中下三等給與價茶厚加賞勞遣回本蔟如有不敷原數聽次年徵收補還以後三年一次舉行計其所言招番之期即今日正德二年是巳臣過洮河等處聽聞土人傳言往年洮州招番止是臨近納郎駝羅地方火把哈藏等蔟河州亦止川下陸蔟乞台撒刺并歸德中左所西番達子二州七站及腹裏老鴉癿藏等蔟熟番調來中馬給茶其朵工等蔟近年楊都御史招調始出往時與黑章咂上下哈加阿劄爾逺竹等蔟專一伏路搶殺過往官軍糧賞財畜以為得計致使中馬熟番纍及馬匹數少西寧地方自巴哇等十三簇外曲先阿端四衛邈不相通而肅州所管葛羅黑巴等蔟時來為患大扺番夷種類強硬生拗纍撫不聽十居五六今以廷臣齎捧金牌前到三衛欲如舊制選調大勢官軍深入番境則我之舉措重有紛紛勞費欲如今擬只在三衛住劄差官調番納馬則彼中頑梗未能一一聽從臣愚乞敕該部行移本官再加審處合無今年暫免差官齎領金牌且於陜西三司行委才幹官員各赴洮河等處㑹同守備官各差該衛諳曉夷情的當指揮千百户各帶通事軍馬分投境外撫調番蔟或師禪師番官指揮千百户鎮撫驛丞頭目番人各趕馬匹前來上納分别上中下三等給與價茶比之往年有加無損衣服靴帽酒食等物從宜犒賞務要得其歡心而回中間馬有不敷之數聽於次年徵補仍諭以朝廷恩威殺伐利害使其歸語未來諸蔟今後三年一次朝廷必差近臣齎領金牌前來比對徵收原認差發馬匹給領茶斤各蔟敢有再不至者定加誅勦靡有孑遺彼亦自有人心寧不知感知畏自今以後又閲三年誠使潼關以西肅州以東漢中以北及四川碉門黎雅等處私茶屏絶巡禁之官有方興販之徒無赦則彼番蔟無茶命懸於我調之豈有不至者哉如是而後乞遣廷臣齎領金牌舉行舊制庶幾不為徒勞而各番原認馬匹不患其不如數也正德二年三月二十八日馬政第二疏題為邊方馬政利病事節該欽奉敕邊方武備莫急於馬近來各邊官軍不思馬匹出民脂膏罔肯用心餧養每稱災病追賊等項倒失數多奏討關補除本色馬匹外連年發去價銀不知幾何彼處又有餘糧屯田草場樁頭等項銀兩管事人員不無玩法之徒恣為侵剋之計嵗月既久姦弊多端民力巳窮馬常不足今特命爾前去陜西延綏寧夏甘肅公同各該行太僕寺官遍歷地方將前項發去馬價并餘糧屯田等項銀兩自𢎞治十一年十二月二十一日赦後至𢎞治十八年終逐一備細清查要見某年發去并本處收過銀若干兩買過馬若干匹給與某官某軍領養有無見存倒失領出未買馬銀若干兩拖缺馬若干匹及見存銀兩若干是何衙門收貯或有别項支用就行追究下落果有侵欺情弊應提問者徑自提問應奏請者指實奏聞處治欽此欽遵查得先為前事節奉本部劄付該本部題該太僕寺卿儲巏等題稱各邊節次奏討馬匹馬價數多及各處原有餘糧屯田草場樁頭等項銀兩要行奏差本部風力郎中一員與同該寺督理馬政少卿前去查勘本部議得遞年發下價銀馬匹并各邊前項銀兩其數既多歷年頗久除給領本色馬匹免查外合無將各項銀兩俱自𢎞治十一年十二月二十一日大赦以後至𢎞治十八年止宣府大同銀兩本部差風力郎中一員公同太僕寺督理少卿共請敕一道陜西延綏寧夏銀兩俱行彼處巡按御史公同陜西行太僕寺甘肅遼東山西者俱行彼處巡按御史公同本處行太僕寺堂上官各請敕一道前去親詣各該地方備將前項銀兩逐一清查等因奉聖旨是陜西等處也各選差本部官一員去公同各該行太僕寺清查明白來說欽此欽遵又該本部題稱各處地方中間亦有附近者或可兼理所差官員必須素有才幹者始可委用本部欲選差風力郎中二員一員何孟春請敕一道馳驛前去陜西延綏寧夏公同陜西行太僕寺甘肅公同本處行太僕寺各堂上官務要遍歷各該地方照依原擬年分逐一清查明白造册具奏仍造一本送部查考等因奉聖旨是欽此欽遵行間該臣等奏稱所勘事情遍歷數鎮中間偏僻去處欲委彼處守巡等官先行勘報等因節該奉聖旨是欽此欽遵又該本部題該太僕寺少卿于瑁題前事本部議得合無仍照郎中何孟春等原奏事理備行各官請敕到彼之日遇有應勘事情行委布按二司并所屬官員勘報等因奉聖旨還著郎中等官躬親遍歷查勘務要明白不許展轉委託欽此欽遵備行到臣奉敕親詣陜西延綏寧夏公同陜西行太僕寺卿王琰等甘肅公同本處行太僕寺卿陳寬等遵照敕內并欽依內事理遍歷各該地方行據陜西都行二司并西安甘州左等衛鳳翔古浪等所各將𢎞治十一年十二月二十一日起至𢎞治十八年終止太僕寺發到馬價并本處原額屯田草場頃畝官軍朋合樁頭等項收放銀兩數目文册各具由另呈繳前來照案拘喚經收委官屯甲操總知數人等到官逐一清查得陜西延綏寧夏甘肅前項年分太僕寺馬價并陜西布政司等衙門借支鹽糧贓罰及陜西都行二司所屬衛所屯田草場朋合樁頭等項銀共五十七萬五千九百七十兩三錢八分七釐二絲一忽銅錢二百七十七萬九千五百七十五文已支銀五十萬九千九百六兩八錢四釐八毫六忽六微銅錢二百四十一萬六百九文共買過馬八萬七千九百六十四匹見在銀二萬四千二百六十四兩四錢二分三釐五毫四忽四微銅錢三十六萬八千九百六十六文今查追銀四萬二千七百九十九兩一錢一分九釐四毫一絲追完銀三萬八千九百六十兩四錢八分一釐六毫八絲立限并追銀二千八百三十八兩六錢七分七釐七毫三絲除陜西等處西安左等衛所先年收放數目查無違礙并今奉追徵已未完足各有明白下落另行造册具奏及送部查考外臣查得延綏𢎞治十四年太僕寺發到銀一萬兩為急缺戰馬以防邊患事除買馬外銀三千五百五十八兩五錢四分巡撫右僉都御史陳夀不合不行查照係干京運馬價本年將前銀給延安綏德衛官軍藍海等准作俸月口糧馬匹料草等項支用訖𢎞治十六年十月內又該本官為巡撫地方事行委廣有倉守支副使袁聰跟隨東路出巡將廣有庫收貯榆林衛𢎞治十二等年屯田馬價銀一百兩二錢三分六釐并延安綏德二衛解到𢎞治十六年分屯田銀一千九百五十五兩一錢六分四釐支領前去除買馬外銀九百一十五兩四錢又不合違例混同該庫領出贓罰冠帶銀并銀牌銀錢假匹大小紅絹俱作犒勞官軍等項支用訖與前太僕寺銀兩俱各不曽補還甘肅𢎞治十四年太僕寺發到銀一萬兩為急募土兵以禦邊寇事除𢎞治十五等年巡撫右副都御史劉璋給軍買馬外剩銀三千四百一十五兩七錢𢎞治十八年該右副都御史畢亨同借過贓罰駝價等銀共四千二百八十三兩九錢解送莊浪等處給軍買過馬九百七十五匹本官續奏為足邊馬以禦邊患事不合妄稱暫借鹽糧等項銀共四千二百一十二兩係准折軍糧賑濟饑荒之數乞將太僕寺馬價銀內撥發補還再發銀若干兩買馬等因以致該部准信奏行太僕寺於馬價內支出銀一萬兩解送到邊本官又不合不行改正劄付委官詣庫明開原支過買馬廣盈庫馬價銀三千四百一十五兩七錢贓罰駝價并原奏外續支駝價課程銀共四千二百八十三兩九錢仍令於足邊馬以禦敵患銀兩稱出前數另鞘封號准作折糧等項銀兩固原衛𢎞治十八年分屯田銀一百二十三兩三錢本衛委官指揮同知申甫朋合銀三百一十兩三錢八分指揮同知趙昶各徵完不合不行發寄官庫正德元年十月二十五日掌印指揮使王爵呈繳馬價揭帖不合代為掜報該年屯田朋合銀共四百三十二兩四錢俱寄固原州庫收貯後申甫等因見行州查盤並無前銀追究間本月三十日方行輳補送州取具庫收繳照平凉衛𢎞治十六年分屯田銀一百五十兩該本衛百户曹文領解備禦莊浪官軍買馬不合將銀三兩送與本衛兵房典吏裴昭不合接受將前解莊浪銀於申參將蘇泰文內止開載一百四十兩連銀赴掌印指揮同知杜欽不合不行仔細照看將銀用印鈐記申文僉押付與曹文領出私開官封將前少開銀二十兩侵欺入已泰州衛𢎞治十二年分屯田銀一百三十兩一分內七十五兩該千戶王詔百戶孫鉞解送備禦莊浪領軍指揮黃宰給與軍人孫哈都等買馬一十三匹已行指揮使向泰班查明回報該衛掌印指揮使吳繼政不合朦朧册開前銀一百三十兩一分俱王詔等莊浪買馬行據署印指揮同知張賢重造手册內開王詔等領解銀兩與向泰班册相同餘銀五十五兩一分又不合不行查究却將靖北衛備冬軍人王吉等冒作支領前銀買馬二十五匹查無解銀靖北委官其王詔孫鉞俱莊浪備禦人數原卷亦無各官將銀分解靖虜領狀鞏昌衛𢎞治十二等年蘭莊備冬官軍指揮李能等下有馬官舍二十九員名每名該朋合銀八兩七錢掌印指揮同知种勛册開徵完俱發鞏昌府寄庫收貯內十二年李能支銀五兩十五年指揮汪麟支銀四兩三錢五分十七年汪麟并千戶陳欽百户郭登各支銀四兩三錢五分十八年銀八兩七錢該千户侯宣等支領訖扣算見在銀該二十五兩四錢五分隨弔該衛節年庫收領狀俱各不全行據鞏昌府經歷司呈稱查得該衛牒送𢎞治十八年下半年官軍朋合銀四兩三錢五分到府寄庫間正德元年七月內本衛支訖再無寄庫銀兩亦無該衛支過前項銀兩印信領狀緣由在卷岷州衛𢎞治十三年分屯田銀五十六兩四錢委官指揮僉事梅泰千户虎威劉玉龎鑑各不合擅將截取十二年分屯糧通關寧夏中護衛𢎞治十二年分屯田銀一百八十八兩五錢七分委官副千户湯新不合擅折粟米六百三石四斗二升四合於寧夏廣武足用等倉上納臨洮衛𢎞治十七年分屯田拖缺銀八十二兩五錢正德元年十二月內本衛委官千户周雄談經田俊費英百户胥瀚劉能朱顯鄒傑因奉清查各不合計同掌印指揮使晏欽不合掜作地土拋荒人户逃亡無徵具數開報蘭州衛原額備禦凉州官軍三百二十五員名馬三百二十五匹𢎞治六年告蒙總制邊務尚書秦紘准令官軍掣回固原操守遺下見在馬九十三匹兌與洮岷河臨鞏五衛旗軍騎操巳行分守凉州副總兵把琮行委把總指揮楊威查明回報該衛掌印指揮同知方珤先年凉州備禦與副千户王進兩班帶回馬二百三十五匹不合隱下前情槩作就班交兌洮岷等衛備禦千户郎宣等下軍人劉浦等騎操等因開報在册行據守備蘭州地方都指揮孫隆查勘前馬回衛俱各倒死不曽徵收朋合買補井州中護衛𢎞治十六年分屯田銀七十五兩六錢六分掌印指揮周倫册開𢎞治十七年備禦凉州百户單諫領解給軍買馬行據凉州單諫班查得十七年止領原衛屯田銀二十五兩給與軍人劉子山郭勝先孫旺劉成各買馬一匹餘銀五十兩六錢六分並無到邊弔查該衛并在邊俱無堪信文卷莊浪衛𢎞治十六年委放屯田并拋荒腳價副千户黃欽放過買馬銀二百六十兩餘剩二兩八錢八分十七年朋合樁頭委官百户張洪放過銀七百五十兩餘剩一兩三錢九分十八年屯田委官百户鄭銘放過銀八十兩餘剩三兩三錢六分髙臺守禦千户所𢎞治十八年朋合委官百户劉英放過銀一百六十二兩餘剩五錢四分與黃欽張洪鄭銘各不合侵欺入巳黃欽等先據掌印指揮同知史鎮册開各名下各有餘剩銀兩查出前情發仰該衛追銀寄庫黃欽又不合情囑史鎮亦不合依聽獨與回呈銀巳交庫收貯又查得秦州衛𢎞治十三等年指揮張誼向泰鞏昌衛十三年指揮使雷鳴千户孫林南寧錢永田英百戶陶經十五年指揮同知趙雲千戶盧珤陳英百户武林陶經與鎮夷守禦千户所十五等年副千户鄒祺各委收屯田銀各不合不行用心防範致被秦州衛屯甲馬得山等侵欺十三年分銀一十九兩二錢一分王文全侵欺十四年分銀七兩許亮等侵欺十五年分銀一十八兩九錢五分二釐五毫鞏昌衛計糧知數張景花等侵欺十三年分銀一十三兩屯甲杜文得等侵欺十五年分銀一十七兩鎮夷所軍人丁玉侵欺十五年分銀七兩一錢三分六釐八毫四絲十六年一十兩六釐八毫四絲十七年一十兩二錢九分五釐三毫四絲曽桂侵欺十八年分銀一兩七釐三毫九絲平凉衛城操有馬舍餘戴秀等七名臨洮衛城操有馬舍餘王英邵羊家等二十五名每名例該各出朋合銀三錢平凉衛指揮杜欽不合故違前例將戴秀等遞年朋合銀兩不行追徵臨洮衛指揮僉事郝鎮亦不合不行比併原管朋合總甲舍餘王英與邵羊家等𢎞治十五年十六年該納銀兩不行上納十七年郝鎮各邊征剿去訖副千户聞英暫管城操徵完本年分舍餘馬英等二十七名朋合銀八兩一錢王英等八名各仍恃頑不納聞英亦不合不行比併就將前銀八兩一錢并自備樁頭銀三兩買馬一匹印烙入官騎操十八年正月內本衛巳故指揮周禎軍政管操聞英前馬交與周禎騎操王英邵羊家等該納朋合又各不行上納杜欽郝鎮等各不合節將本衛城操舍餘未徴朋合銀朦朧俱作徵完之數開造陳言邊務文册岷州衛城操官軍𢎞治十二年指揮張溥十三年許慶十四年包永十五年至十八年張𤣥西南三路按伏十二年許慶十三年李世𦙍十四十六年陳謨十五年吉鏞十七年張槩十八年安鎮蘭州備禦十二十三十七年楊誼十五十六年龎壽固原遊兵十四年龎壽十五年至十八年楊誼環慶遊兵十四年楊誼下官軍朋合各不合不行徵收掌印指揮僉事葉勳亦不合不行查照却於邊務册內開稱十三年銀二百二十二兩三錢十四年一百五兩二錢十五年一百一兩五錢二分十六年一百二兩一錢二分十七年九十七兩六錢二分十八年九十五兩八錢二分俱收到衛洮州衛城操并東西北路按伏固慶等處逰兵指揮楊坤等𢎞治十二年共徵銀三百五十六兩五錢二分十三年一百八十六兩十四年一百八兩三錢十五至十八年掌印指揮使張綸册開俱為維持治道彌災禦敵事例停徵查得邊務册內十五年收過銀三百六十八兩八錢二分十六年一百八十三兩三錢六分十七年三百兩四錢六分十八年一百六十一兩七錢三分本官先年亦不合妄報與平凉等衛俱蒙鎮巡衙門依憑類奏環縣管操慶陽衛指揮使張隆原領操守官軍西固城所掌印岷州衛千户虎威該所屯田并官軍朋合樁頭等項應徵銀兩行據兵備衙門并衛回稱節經弔查俱無文卷送到無從查報及查得平凉衛典吏裴昭巳役滿回籍百户曹文散拘到官并提到舍人戴秀餘丁朱興朱受後文斌王玘楊小狗孫智俱發陜西行太僕寺秦州衛屯甲馬得山賈春屈愷夏友安王文全許亮曽文孔秀劉緒鞏昌衛計糧知數張景花李雄陳景春李友信陳廷秀屯甲杜文得梁梅蔡彪王祿李英俱發該衛臨洮衛舍餘王英邵羊家卜牛兒張斌周曹家陸進孫千家薛海王鎖鎖馬户保孫回軍劉升劉讓張旺門劄石劉得王俊馬英張義朱得林劉牟子王宏道周凉州沈茂陶四巴唐傑張章家柴能霍四安福顧重喜崔英張成嶽劉家李馬長發陜西按察司巡茶僉事李幾莊浪衛散拘副千户黃欽百户張洪郭銘發該衛髙臺守禦千户所散拘百户劉英鎮夷守禦千户所軍吏丁玉曽桂俱發帶管西寧道甘肅行太僕寺卿陳寬將曹文馬得山等張景花等黃欽張洪鄭銘劉英丁玉等侵欺屯田等銀戴秀等𢎞治十七十八年王英等𢎞治十四至七八年未收朋合銀各照數追完寄庫聽候買馬外將曹文黃欽張洪鄭銘劉英外戴秀等馬得山等張景花等王英等丁玉等各問擬發訖岷州衛截取𢎞治十二年屯糧通關銀巳行該衛查追補還臨洮衛拋荒屯田行據臨洮府經歷司呈該僉事李機行提該衛中等所餘丁孫原馬文景劉世傑魏廷甫葉鋭各到官究問明白追完𢎞治十七年分拖缺銀與岷州衛補還銀各寄庫訖秦州衛𢎞治十二年解莊浪查無銀五十五兩一分鞏昌衛𢎞治十二等年寄鞏昌府查無銀二十五兩四錢井州中護衛𢎞治十七年解凉州查無銀五十兩六錢六分寧夏中護衛𢎞治十七年折米銀一百八十八兩五錢七分岷州衛城操等項官軍朋合除過例蠲免外𢎞治十七十八年各有未徵銀兩蘭州衛備禦凉州𢎞治十六年兩班帶回倒死馬二百三十五匹與典吏裴昭接受曹文銀三兩各案候行查追徵開報外將查過文卷册籍發回各該衙門收架外參照固原衛指揮申甫趙昶各將巳徵係官財物隱匿私家指揮王爵妄指不曽到官錢糧寄收州庫清查之後方始補還收掌之間寧無借貸平凉衛百户曹文領解官銀預期尅減莊浪衛千户黃欽百户張洪鄭銘髙臺守禦千户所百户劉英放支馬價輒隱羡餘所得不多在法難恕莊浪衛指揮史鎮情受黃欽之囑罪與王爵不殊秦州衛指揮吳繼政張賢鞏昌衛指揮种勛甘州中護衛指揮周倫百户單諫呈送文卷一衛先後不倫出納錢糧一事彼此相戾數目豈容破調侵欺巳得指歸事干在邊備禦人員合候下班對理情罪岷州衛指揮梅泰千户虎威劉玉龎鑑寧夏中護衛千户湯新舉買馬之價銀充入倉之粟粒惟圖便利罔恤那移臨洮衛指揮晏欽千户周雄談經田俊費英百户胥瀚劉能朱顯鄒傑因屯田銀兩各有拖缺將地土人户揑報荒亡事巳勘明法當懲戒蘭州衛指揮方珤千户王進往嵗掣回固原操守實出姦謀近年倒死馬匹失追幸逢恩宥方珤乃敢隱下帶回死馬俱稱交兌在邊豈惟朋合無處尋求將致馬數亦皆湮沒為弊至此其他可知秦州衛指揮張誼向泰鞏昌衛指揮雷鳴趙雲千户孫林南寧錢永田英盧珤陳英百户武林陶經鎮夷守禦千户所千户鄒祺委管屯田罔修職業額課不加計慮催科一任胥徒侵漁之事雖出所屬典守之責難辭於巳平凉衛指揮杜欽臨洮衛指揮郝鎮千户聞英岷州衛指揮葉勳張溥許慶包永張絃李世𦙍陳謨吉鏞張槩安鎮楊誼龎壽洮州衛指揮張綸失徵朋合巳積嵗年茍具虗文不復知有法例因仍故事遂至誑及朝廷杜欽昔嘗見賣於猾胥兹亦難辭於憲典岷州衛千户虎威又在西固城所掌印與環縣管操慶陽衛指揮張隆各有地方之任亦膺戎馬之司屢奉弔查不行回報錢糧若果明白文卷無事隱藏公文既巳無存弊政何所不至此不加罰人將效尤所據各官俱合提問延綏巡撫都御史陳壽行事得從便宜立法盍思經久俸糧之給國有常經軍國之需制難輕費顧乃耗兹京運不補戎行既非益彼邊儲祗招物議私恩非市紛犒勞以何為公道可嫌况簿書之不備甘肅巡撫都御史畢亨持巳頗稱剛直居官稍盡公勤不圗舉奏之言乃有謾欺之事想當初慮謂非借銀買馬則該部未肯准行及至後來見巳解銀到邊則所司得為出納以故委官詣庫仍云另鞘折糧遂非實愧賢者之所為規利難保異時之無弊所據各官亦合究治伏乞聖明裁處緣陳夀畢亨係在京堂上官申甫趙昶王爵曹文黃欽張洪鄭銘劉英史鎮吳繼政張賢种勛周倫單諫梅泰虎威劉玉龎鑑湯新晏欽周雄談經田俊費英胥瀚劉能朱顯鄒傑方珤王進張誼向泰雷鳴趙雲孫林南寧錢永田英盧珤陳英武林陶經鄒祺杜欽郝鎮聞英葉勳張溥許慶包永張絃李世𦙍陳謨吉鏞張槩安鎮楊誼龎夀張綸張隆俱軍職及節該奉敕指實奏聞處治并欽依清查明白來說事理為此具本親齎謹題請旨正德二年四月日地方疏奏為地方緊急賊情事切照本職原籍湖廣郴州所屬五縣南接廣東樂昌仁化等名縣界如地名象牙山延溪山石花峒東坑西坑等處俱係徭獞并兩廣福建江西流來賊衆巢穴桂陽縣延夀山老虎峒與石花峒東西坑連強賊往來於此潜跡一日之間出山店即犯桂陽出官坑滁口即犯興寧西經赤石出兩路口即犯郴州及宜章縣郴州四十里山亦皆強賊假道託宿之地賊至興寧青草即郴桂永興不得寧居賊至益將濠村即桂陽桂東皆可行劫前項地方非無軍堡巡司而勢力單薄視賊猖獗莫敢誰何自去冬以至今秋所在人民不勝塗炭掌兵戎者寄喘孤城僅僅自保但遇野戰即敗而還告亟於朝今巳四疏方來禍患不知何所底止本職父母之邦丘墳所在目擊耳聞痛心疾首今將處置地方賊情事宜開坐具本親齎謹具奏聞伏候敕㫖計開一郴州屬縣接連别省地方大林窮谷一目千里猺獞所居善良罕至惟有亡命乃萃於此㩦帶妻孥逺逃差稅異類雜處頑悍成習時年豐稔狼飱豺噬絶無蓄積稍遇凶荒聊生無計或百十成羣或多至四五百為黨及千百以上出劫人財搶人孳畜殺人放火拒敵官軍此處捍禦加嚴則流毒於彼彼處禁防有道則貽患於此難以約量盡知其數然昔人云丐奴雖衆不過漢一大縣彼山峒凶竪固不衆於丐奴也今地方被其蹂躪將士為之挫衄賊勢益熾民患益滋良由我兵不知分合之道焉耳此賊先被廣東官軍截遏南路故爾奔軼及我門庭今我兵調集各衛既已衆有數千剋期進剿必須先遣乖覺健步去前要害通賊水頭密切爪探并於緊關路徑擺塘架炮晝夜哨瞭及將各衛官軍預先選其敢勇定作頭撥若干次撥若干其餘選退之數專守城池頭撥次撥內或分為三或分為五擇官管領聽候各路爪探聲息回報的確從宜分布頭撥某等先出某路某當按伏某處次撥某等暫劄某處某當策應某路若頭撥與賊對敵次撥提兵繼至按伏者得邀其中策應者又乘其後飛報四逺轉戰而前必有可克之勢我之門庭既掃彼之藩籬盡撤游魂假息逺竄窮奔危巢敗穴亦必自潰釜魚罝兔豈能久生我肯下令從而撫之募鄉導用間諜而誘之彼脅從餘黨當有擒殺首惡送馘軍前以來求贖罪者矣一郴州屬縣地方天順成化年間嘗為賊所攻破賊則苖人而流民實為之耳目𢎞治四等年及去年今年屢為賊所劫掠賊則流民而苖人實為之肘腋苖人謂何前所名徭獞是也流民謂何即前名亡命兩廣福建江西先年作耗大軍征勦所餘之種類也大抵苖人住處常有流民搆結其黨流民為賊常有苖人附成其惡村民炙於凶焰失業無歸情移勢奪相與鄉導亦常十有四五跨巖依險倐聚忽分萬徑千岐朝來夕去兹欲剿之非調大軍其勢不可而大軍之至事已先聞彼度力不能抗必預藏蹤潜跡我將何所收捕山凹水曲用武非地嵐深瘴作行役非時曠日持久非我利也彼窮寇懷必死之心困獸有猶鬬之氣我其能必勝乎縱能必勝勢必難於盡殱茍務盡殱寃必及於無辜夫用兵非得巳而迫脅之衆不免橫罹鋒鏑以虧上天好生之至仁除惡莫如盡而迷復之徒仍得負恃巖阻以貽他年不治之大患二者皆非善計然則今之所以剿之與所以處之之道如之何其可也今日之事渠魁首惡各有主名其同謀不軌之人若得陳前俘斬自無他議奈彼老山所藏不可影響而求玉石而辨多矣今當預揭告示遍曉賊中使悉朝廷矜宥之德殺伐之威順則自新有可求之路逆則王法無可逃之地利害兩端待其審擇彼脅從及窩主并隨來新舊黨衆告示到日一月以裏許赴官司自首免罪若能擒殺同起賊徒來獻或指引我兵撲捕有功照例與同平人一體給賞彼雖狼心狗態豈無革面而歸化者前項聽撫人犯除近屬摘發外别省流民供報貫址明白各另造册有告願復業者遞回原藉官司收領復業嚴立條禁不得重與苖人交通願報籍者就行附近縣分報籍册上開注某人於某里某人地上寄住或在某家安歇原荒田土任其墾種仍免糧差三年親管里老常要知在不得為非以此防於異日亦可消其邪志招撫令下賊勢自釋有名首惡其與幾何我兵然後從而勦之不慮無辜之盡殱矣用兵之後罪人斯得氛祲既除殘種遺孽方才出首此等人犯比聽撫者不同然視陳前所俘罪終有間合無貸以不死各解送湖廣都司轉解巡撫衙門㑹官編發本省各邊衛分永逺充軍彼此散處依受管束但逃置之極典若兵餘漏網復有避居林壑躲住鄉村不首官者事發從賊問擬謀叛本罪奏請發落幼男仍發邊衛紀録充軍窩隱之家取問如律官軍調發邊衛差操如此庶幾地方不致激變善惡早得分雪軍功易成民害易息且使朝廷威德始無濫殺之慘終無姑息之失此愚之謂所以剿之與所以處之之道也一郴州宜章桂陽縣三守禦所俱因洪武等年土寇倡亂之後而設所轄有笆籬寒口新坑煙竹黃沙栗源鎮安七堡與諸巡司分置要處專備不虞然當賊盜生發緊急之時不聞官兵少效截遏之力林箐幽深山溪逶復賊所出之路則多而官所守之地有限彼此懸絶誰其肯前各堡原轄所分相去又逺聞賊不能合力追剿有事不能先期傳報而為之守備官者又在桂陽州城居住相望邈然致誤地方實基於此先年奏設都指揮一員守備郴桂二州地方本擬宜章駐劄差來官員因見桂陽州城各堡空閒齊整遂移家小定居彼城去離興寧桂陽桂東動經三四日程遇警傳報巳難臨期䇿應何及宜章縣東距桂陽桂東西接藍山臨武南連樂昌北抵郴桂道里適均合無今後守備官仍令照依原擬在於宜章縣城蓋造公廨居中駐劄不時往來前項城堡操練人馬整搠器械庶燒眉有救噬臍無悔郴州永寧鄉原設石陂巡檢司守把野牛等峒𢎞治年間該司官以衙門毁塌申蒙金都御史准移州南兩路口創立更鋪摘發弓兵防守南路今春強賊劫害鄉民正由野牛等峒出入所據前項官兵應合擲回原設地方照舊守把但兩路口及東路山河口二處亦係通賊要害之地若將前巡司遷復去後於此各建軍堡一座就摘見在長沙瞿塘等衛輪戌官軍二百員名前來防守使營壘以密而軍威可振傳報易聞而緩急有備實為地方便益兵法所謂毋恃其不攻恃吾有所不可攻毋恃其不來恃吾有以待之者也一郴州其地雖據上游其城不過三里城中無一民入居城外無一軍守視養兵衛民之道似不宜如此先年有奏乞分地土者城小無市或巳嫌其僻冷地髙無水衆復病於行汲是以居民戀業重遷而止不圖去冬強賊突至關廂放火殺人比屋罹害今春以來戢翼思痛人皆此心賃地求容城無窽室守備等官所領戍兵亦不肯在關廂劄營俱各入城就軍營房一同攙住人烟稠密穢惡薰蒸疫癘相染時時有之久安長治之道又豈宜如此近時有議乞展城池者舊城工築儘是堅完一旦就墮恐難遽復郡志載本州原有外郭周圍八里三百五十餘步遺址尚在故老能知今欲東至蘇仙橋西至周家塘南至南關張苑冲北至北湖社壇嶺民居盡處坡岸締聮築立土城一座底濶一丈頂收七尺上築垜口五尺連腳共髙不過一丈八尺三川秀水流通其間城圈用磚石纍砌城門用鐡葉包褁城垜用石灰塗堊城角左右各置敵樓敵樓左右各置冷鋪冷鋪傍空地各量置草蓋營房若干合用夫役該管道官軍三民七量為起倩合用錢糧該布政司㑹計見在奏請支給候賊情稍寧雨水畢日定委州衛掌印正官用心監督併力興工守巡官員仍各以時按臨提調務臻實效期成永圖民免轉徙之勞軍脫征戰之苦土著者起居無虞客戍者安插有處或疑地方擾攘之餘軍民望蘇之際乃為此舉不無嗟怨夫民不可與慮始而可與樂成本州之興寧縣城築於洪武二十九年宜章縣築城於成化二年桂東縣築城於成化六年桂陽縣城近𢎞治十二年重展築焉皆因賊亂甫定而舉其事今日賴之多矣夫志逺功者不恤近費圗久逸者不辭暫勞語曰見兔顧犬亡羊補牢此言雖小可以喻大也一郴州五縣一年以來賊盜劫掠之慘地無遺土百姓荼毒之苦月無虗日膏腴田畝半入蒿萊大小鄉村久絶烟火死者尸骸臭而未巳生者瘡痍痛而未息或逃躲山林無處存住或去離鄉井不能自歸人口散亡孳畜蕩盡呼天哭地控訴無門今嵗春種秋收既皆廢矣來春之苦抑又可知本處地薄土瘠人民素乏蓋藏蟲蝻之餘重丁此難其間亡賴蓋有竄入賊黨甘為賊所脅從之人而為之所司者方且舉浩繁之差稅而驅迫之此賊黨之所以益多而地方之所以益壞也合無奏行湖省鎮巡衙門考政得失問民疾苦督同都布按三司官酌量本州地方被害事情一面平治盜賊一面撫安軍民何者利所當興何者害所當革其有流移未復業者早為招復饑寒極難過者即為賑濟無牛種子為生理者悉為措給户工二部原𣲖物料及一切徵科并今嵗稅糧可寬免者量為寬免可停止者暫為停止務使人人受惠不致失所查得本州額徵稅糧不及江南一大縣分之數近年所𣲖撥者止勾年中支用今盜賊未息進兵伊始支用日繁未可涯際合將明年以後稅糧盡數存留本州上納用實倉庾以備軍餉以免民人之折輸以省鄰國之乞糴亦為便益記稱國無三年之畜為急無一年之畜即國非其國夫意外之虞貴於潜消事前之慮誠不可不預定也正德四年九月初七日何文簡疏議卷二
